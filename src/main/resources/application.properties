#Mybatis : Default Setting, Override
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL
mybatis.type-aliases-package=com.weple.cloud
mybatis.mapper-locations=classpath:mapper/**/*.xml

# logging
logging.level.com.weple.cloud=debug

#JPA Basic Setting
# SQL, Display
spring.jpa.show-sql=true
# SQL, Easy Reading
spring.jpa.properties.hibernate.format_sql=true
# No Vender DDL
spring.jpa.generate-ddl=true
# JPA Databalse Setting
spring.jpa.database=oracle


jasypt.encryptor.password=${JASYPT_PASSWORD}

# 로컬 토큰 파일이 없어도 공개 GitHub 저장소 조회는 동작하도록 선택적으로 불러옵니다.
spring.config.import=optional:classpath:application-api.properties
github.api.token=${GITHUB_API_TOKEN:}



# 로컬 개발 환경 업로드 경로
file.upload.task-dir=C:/weple_uploads/tasks/
file.upload.profile-dir=C:/weple_uploads/profile/

# 게시판 업로드 경로는 게시판 기능 구현 시 별도 설정 예정
# 기존 참고값: file.upload.board-dir=??
# file.upload.board-dir=C:/weple_uploads/board/

# EC2 Docker 배포 환경은 application-prod.properties에서 별도 관리함
# 참고: Ubuntu 서버 직접 경로를 쓸 경우 /home/ubuntu/weple_uploads/tasks/ 사용


spring.datasource.hikari.minimum-idle=1



# 커넥션 풀 초기 구동 시 실패해도 애플리케이션이 바로 종료되지 않게 함
spring.datasource.hikari.initialization-fail-timeout=-1

# 끊긴 Oracle 커넥션을 정리하기 위한 검증 쿼리
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.maximum-pool-size=10

# Docker/EC2 환경에서 Oracle timezone region 오류 방지함
spring.datasource.hikari.data-source-properties.oracle.jdbc.timezoneAsRegion=false

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 로컬 S3 설정 파일 포함함
spring.profiles.include=local

# 파일 업로드 용량 제한
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

