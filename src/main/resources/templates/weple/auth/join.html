<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEPLE 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/main-v4-DDS6x4g-.css}">
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <main class="login-shell">
        <section class="login-form-panel" aria-label="회원가입 입력 영역">
            <!-- WEPLE 로고를 누르면 메인 화면으로 이동합니다. -->
            <a class="login-brand" href="/" aria-label="WEPLE 홈">
                <span class="login-brand-mark" aria-hidden="true"></span>
                <span>WEPLE</span>
            </a>

            <div class="login-card join-card">
                <h1 class="login-title">회원가입</h1>
                <p class="login-subtitle">WEPLE에 오신 것을 환영합니다! 계정을 만들어 보세요.</p>

                <p class="login-message login-message-error" th:if="${joinError}" th:text="${joinError}">
                    회원가입 입력값을 확인해주세요.
                </p>

                <!-- 회원가입 처리 API가 만들어지면 action 경로를 POST 컨트롤러와 맞추면 됩니다. -->
                <form th:action="${companyCode != null and companyCode != ''} ? @{/c/{companyCode}/join(companyCode=${companyCode})} : @{/join}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <!-- 기존 회사에 가입 요청하기 위해 회사 코드를 입력받습니다. -->
                    <div class="login-field">
                        <label for="companyCode">회사 코드</label>
                        <input class="login-input" type="text" id="companyCode" name="companyCode" placeholder="weple-00001" autocomplete="organization" required th:value="${signupRequest?.companyCode}">
                    </div>

                    <!-- 화면과 알림에서 사용할 사용자 이름을 입력받습니다. -->
                    <div class="login-field">
                        <label for="userName">이름</label>
                        <input class="login-input" type="text" id="userName" name="userName" placeholder="신재구" autocomplete="name" required th:value="${signupRequest?.userName}">
                    </div>

                    <!-- 로그인할 때 사용할 아이디를 입력받습니다. -->
                    <div class="login-field">
                        <label for="loginId">아이디</label>
                        <input class="login-input" type="text" id="loginId" name="loginId" placeholder="weple1234" autocomplete="username" minlength="4" maxlength="30" pattern="[a-zA-Z0-9._-]{4,30}" title="아이디는 영문, 숫자, 특수문자 ._- 조합 4~30자로 입력해주세요." required th:value="${signupRequest?.loginId}">
                        <p class="join-valid-message" hidden>사용 가능한 아이디입니다</p>
                    </div>

                    <!-- 로그인 검증에 사용할 비밀번호를 입력받습니다. -->
                    <div class="login-field">
                        <label for="password">비밀번호</label>
                        <input class="login-input" type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" minlength="8" required>
                    </div>

                    <!-- 비밀번호 오입력을 줄이기 위해 같은 값을 한 번 더 입력받습니다. -->
                    <div class="login-field">
                        <label for="passwordConfirm">비밀번호 확인</label>
                        <input class="login-input" type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password" minlength="8" required>
                    </div>

                    <!-- 계정 연락과 안내에 사용할 이메일을 입력받습니다. -->
                    <div class="login-field">
                        <label for="email">이메일</label>
                        <input class="login-input" type="email" id="email" name="email" placeholder="weple1234@email.com" autocomplete="email" required th:value="${signupRequest?.email}">
                    </div>

                    <!-- 사용자 연락처를 입력받습니다. -->
                    <div class="login-field">
                        <label for="phoneNumber">연락처</label>
                        <input class="login-input" type="tel" id="phoneNumber" name="phoneNumber" placeholder="010-1234-5678" autocomplete="tel" pattern="[0-9]{2,3}-?[0-9]{3,4}-?[0-9]{4}" title="연락처는 010-1234-5678 형식으로 입력해주세요." required th:value="${signupRequest?.phoneNumber}">
                    </div>

                    <button class="login-button" type="submit">회원가입</button>
                </form>

                <div class="login-links">
                    <span>
                        이미 계정이 있으신가요?
                        <a th:if="${companyCode}" th:href="@{/c/{companyCode}/login(companyCode=${companyCode})}">로그인</a>
                        <a th:unless="${companyCode}" th:href="@{/login}">로그인</a>
                    </span>
                </div>
            </div>
        </section>

        <section class="login-visual-panel" aria-label="협업 이미지">
            <img
                class="login-visual-image"
                th:src="@{/images/auth/people_puzzle_no_bg.webp}"
                alt="협업하는 사람들"
            >
        </section>
    </main>
</body>
</html>
