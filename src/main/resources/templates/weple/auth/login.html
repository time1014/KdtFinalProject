<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEPLE 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/main-v4-DDS6x4g-.css}">
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}">
</head>
<body>
    <main class="login-shell">
        <section class="login-form-panel" aria-label="로그인 입력 영역">
            <a class="login-brand" href="/" aria-label="WEPLE 홈">
                <span class="login-brand-mark" aria-hidden="true"></span>
                <span>WEPLE</span>
            </a>

            <div class="login-card">
                <h1 class="login-title">로그인</h1>
                <p class="login-subtitle">WEPLE에 오신 것을 환영합니다. 서비스를 시작해 보세요.</p>

                <p class="login-message login-message-error" th:if="${param.error}" th:text="${param.error[0]}">
                    아이디 또는 비밀번호가 일치하지 않습니다.
                </p>
                <p class="login-message login-message-success" th:if="${param.logout}">
                    로그아웃되었습니다.
                </p>
                <p class="login-message login-message-success" th:if="${joinSuccess}" th:text="${joinSuccess}">
                    회원가입 요청이 완료되었습니다.
                </p>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="companyCode" th:if="${companyCode}" th:value="${companyCode}">

                    <div class="login-field">
                        <label for="loginId">아이디</label>
                        <input class="login-input" type="text" id="loginId" name="loginId" placeholder="weple1234" autocomplete="username">
                    </div>

                    <div class="login-field">
                        <label for="password">비밀번호</label>
                        <input class="login-input" type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
                    </div>

                    <div class="login-options">
                        <label class="login-check" for="saveId">
                            <input type="checkbox" id="saveId" name="saveId">
                            <span>아이디 저장</span>
                        </label>
                        <label class="login-check" for="rememberMe">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>자동 로그인</span>
                        </label>
                    </div>

                    <button class="login-button" type="submit">로그인</button>
                </form>

                <div class="login-links">
                    <span>
                        계정이 없으신가요?
                        <a th:if="${companyCode}" th:href="@{/c/{companyCode}/join(companyCode=${companyCode})}">회원가입</a>
                        <a th:unless="${companyCode}" th:href="@{/join}">회원가입</a>
                    </span>
                    <span class="login-note">비밀번호를 잊으신 경우 기업에게 문의해주세요.</span>
                </div>
            </div>
        </section>

        <section class="login-visual-panel" aria-label="협업 이미지">
            <img
                class="login-visual-image"
                th:src="@{/images/auth/people_puzzle_no_bg.webp}"
                alt="협업하는 사람들"
            >
        </section>
    </main>
</body>
<script>
    // 로그아웃 안내 문구는 한 번만 보이도록 주소창의 logout 파라미터를 제거합니다.
    if (window.location.search.includes("logout")) {
        window.history.replaceState(null, "", window.location.pathname);
    }
</script>
<script th:src="@{/js/auth/login.js}"></script>
</html>
