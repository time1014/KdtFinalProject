<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>

	<section>
		<div class="worktime-container">
			<div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
			    <h3 style="margin: 0; font-size: 22px; font-weight: 700;">소요시간</h3>
			    <button class="btn btn-primary" th:onclick="|location.href='@{/insertProjectTime}'|">+ 소요시간 등록</button>
			</div>

			<!-- 검색 영역 -->
			<div class="search-box">
				<div class="search-title" style="margin-bottom: 10px; font-weight: bold; color: #1976d2; display: flex; align-items: center;">
                    <span style="margin-right: 5px;">▼</span> 검색조건
                </div>
				<div class="search-top">
					<div class="search-left">
						<div class="search-item">
							<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px; color: #1976d2;">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
						    <label>작업시간</label>
						    <input type="text" name="workTime" placeholder="작업시간을 입력하세요." style="width: 180px; height: 36px; border: 1px solid #d6d6d6; border-radius: 4px; padding: 0 10px;">
						</div>
					</div>
					<div class="search-right">
					    <button class="btn btn-primary">검색조건 추가 ▼</button>
					</div>
				</div>

				<div class="search-bottom">
					<div class="search-action">
						<button class="btn btn-primary">적용</button>
						<button class="btn btn-light">지우기</button>
					</div>
				</div>
			</div>

			<!-- 총 시간 -->
			<div class="summary-area">
			    <span>
			        시간 :
			        <strong th:text="${totalSpentHour + ':00'}">0:00</strong>
			    </span>
			</div>

			<!-- 테이블 -->
			<div class="table-wrapper">
				<table class="data-table">
					<thead>
						<tr>
							<th width="50"><input type="checkbox"></th>
							<th width="120">프로젝트</th>
							<th width="120">작업일자 ▼</th>
							<th width="150">사용자</th>
							<th width="120">작업분류</th>
							<th>일감</th>
							<th>내용</th>
							<th width="90">시간</th>
							<th width="70">관리</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${#lists.isEmpty(totalTimeList)}">
               				<td colspan="9">조회된 데이터가 없습니다.</td>
            			</tr>
            			
            			<th:block th:each="time : ${totalTimeList}">
						<tr>
							<td><input type="checkbox"></td>
			                <td th:text="${time.projectTitle}">프로젝트</td>
			                <td th:text="${time.workDate != null} ? ${#dates.format(time.workDate, 'yyyy/MM/dd')} : '-'">작업일자</td>
			                <td th:text="${time.userName}">사용자</td>
			                <td th:text="${time.workNameLabel}">작업분류</td>
			                <td th:text="${time.taskTitle}">일감</td>
			                <td th:text="${time.spentContent}">내용</td>
			                <td class="time" th:text="${time.spentHour} + ':00'">시간</td>
			                <td style="position: relative; text-align: center;" onclick="event.stopPropagation();">
								<div class="dropdown-wrapper">
									<span class="more-options-btn" onclick="toggleDropdown(this)">•••</span>
									<div class="dropdown-menu-box">
									    <button type="button" class="dropdown-item edit-btn"
									        	th:onclick="|location.href='@{/updateProjectTime(id=${time.workId})}'|">
									        	✏️ 수정
									    </button>
									    <button type="button" class="dropdown-item delete-btn" 
        										th:onclick="|deleteWork(${time.workId}, ${time.projectId})|">
        										🗑️ 삭제
        								</button>
									</div>
								</div>
							</td>
						</tr>
						</th:block>
					</tbody>
				</table>
			</div>

			<!-- 하단 -->
			<div class="bottom-area">
			    <div class="paging">
			        </div>
			    <div class="export-area">
			        <button class="csv-btn" onclick="exportToCSV()">내보내기 : CSV</button>
			    </div>
			</div>
		</div>
	<script>
	// 1. 공통 변수
    const searchInput = document.querySelector("input[name='workTime']");
    const searchBtn = document.querySelector(".search-action .btn-primary");
    const clearBtn = document.querySelector(".btn-light");
    const allRows = document.querySelectorAll(".data-table tbody tr:not([th\\:if])");
    
    let currentPage = 1;
    const itemsPerPage = 20;
	
	// 검색
	function applySearch() {
        const keyword = searchInput.value.toLowerCase();        
        // 검색 필터링
        allRows.forEach(row => {
            const timeText = row.cells[7] ? row.cells[7].innerText.toLowerCase() : "";
            const isMatch = timeText.includes(keyword);
            row.style.display = isMatch ? "" : "none";
        });
        showPage(1);
    }
    
	function showPage(page) {
        currentPage = page;
        const visibleRows = Array.from(allRows).filter(row => row.style.display !== "none");
        allRows.forEach((row, index) => {
            if (row.style.display === "none") return;
            const visibleIndex = visibleRows.indexOf(row);
            row.style.display = (visibleIndex >= (page - 1) * itemsPerPage && visibleIndex < page * itemsPerPage) 
                                ? "" : "none";
        });
        updatePagination(Math.ceil(visibleRows.length / itemsPerPage));
    }
	
	function updatePagination(pageCount) {
        const pagingDiv = document.querySelector(".paging");
        if (pageCount === 0) pageCount = 1;
        
        pagingDiv.innerHTML = `
            <button class="page-btn" onclick="showPage(Math.max(1, currentPage - 1))">&lt; 이전</button>
            <span id="page-numbers"></span>
            <button class="page-btn" onclick="showPage(Math.min(${pageCount}, currentPage + 1))">다음 &gt;</button>
        `;

        const numberSpan = document.getElementById("page-numbers");
        for (let i = 1; i <= pageCount; i++) {
            const a = document.createElement("a");
            a.href = "#";
            a.innerText = i;
            if (i === currentPage) a.className = "active";
            a.onclick = (e) => { e.preventDefault(); showPage(i); };
            numberSpan.appendChild(a);
        }
    }
	
	function toggleDropdown(element) {
	    // 클릭한 버튼의 부모(dropdown-wrapper) 내부에 있는 메뉴 박스를 찾음
	    const dropdownWrapper = element.parentElement;
	    const menuBox = dropdownWrapper.querySelector('.dropdown-menu-box');
	    
	    // 다른 곳을 클릭하면 닫히게 하려면 아래 '전체 닫기' 로직 추가 권장
	    document.querySelectorAll('.dropdown-menu-box').forEach(menu => {
	        if (menu !== menuBox) menu.classList.remove('show');
	    });

	    // 현재 메뉴 토글
	    menuBox.classList.toggle('show');
	}

	// 화면 아무 곳이나 클릭하면 열려있는 메뉴 닫기
	window.onclick = function(event) {
	    if (!event.target.matches('.more-options-btn')) {
	        document.querySelectorAll('.dropdown-menu-box').forEach(menu => {
	            menu.classList.remove('show');
	        });
	    }
	}
        
     // 검색 버튼 및 엔터키 이벤트 연결
        searchBtn.addEventListener("click", applySearch);
        searchInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                applySearch();
            }
        });
    
    // 지우기 버튼 클릭 이벤트
        clearBtn.addEventListener("click", () => {
            searchInput.value = "";
            allRows.forEach(row => row.style.display = "");
            showPage(1);
        });

        showPage(1);
	    
	    //삭제버튼 컨펌
	    function deleteWork(workId, projectId) {
		    if(confirm("정말 삭제하시겠습니까?")) {
		        location.href = `/deleteProjectTime?workId=${workId}&projectId=${projectId}`;
		    }
		}
	    
	    //CSV 내보내기
	    function exportToCSV() {
		    const today = new Date();
		    const dateStr = today.toISOString().slice(0, 10).replace(/-/g, "");
		    const fileName = `worktime_${dateStr}.csv`;
		
		    let csv = [];
		    const rows = document.querySelectorAll(".data-table tr:not([style*='display: none'])");
		
		    for (let i = 0; i < rows.length; i++) {
		        let row = [], cols = rows[i].querySelectorAll("td, th");
		        for (let j = 0; j < cols.length; j++) {
		            let text = cols[j].innerText.replace(/"/g, '""');
		            row.push('"' + text + '"');
		        }
		        csv.push(row.join(","));
		    }
		
		    const csvFile = new Blob(["\ufeff" + csv.join("\n")], { type: "text/csv;charset=utf-8;" });
		    const downloadLink = document.createElement("a");
		    downloadLink.href = URL.createObjectURL(csvFile);
		    downloadLink.download = fileName;
		    downloadLink.click();
	    }
	</script>
		<style>
/* ••• 버튼 자체 스타일 (클릭 반경 확대) */
.more-options-btn {
    cursor: pointer;
    color: #94a3b8;
    padding: 6px 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 4px;
    transition: background 0.2s;
}

/* 마우스 올렸을 때 피드백을 주어 오클릭 방지 */
.more-options-btn:hover {
    color: #475569;
    background-color: #f1f5f9;
}

/* 기본적으로 숨겨둘 편집/삭제 박스 */
.dropdown-menu-box {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    background-color: #ffffff;
    min-width: 90px;
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.12);
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    z-index: 100;
    padding: 4px 0;
}

/* 이 클래스가 붙으면 팝업이 나타남 */
.dropdown-menu-box.show {
    display: block;
}

/* 팝업 내부 버튼 공통 */
.dropdown-item {
    display: block;
    width: 100%;
    padding: 8px 14px;
    text-align: left;
    background: none;
    border: none;
    font-size: 13px;
    color: #334155;
    cursor: pointer;
    font-family: sans-serif;
}

.dropdown-item:hover {
    background-color: #f8fafc;
}

/* 삭제 버튼은 강조색 부여 */
.dropdown-item.delete-btn {
    color: #ef4444;
}
.dropdown-item.delete-btn:hover {
    background-color: #fef2f2;
}

/* 관리 버튼 스타일 */
.btn-edit, .btn-del {
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: #fff;
}

.btn-edit:hover { background: #e9f3ff; color: #1976d2; border-color: #1976d2; }
.btn-del:hover { background: #fff1f1; color: #d32f2f; border-color: #d32f2f; }
/* =========================공통========================= */
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: "Malgun Gothic", sans-serif;
	font-size: 14px;
	color: #333;
	background: #fff;
}

.worktime-container {
    width: 95%;
    margin: 25px auto;
    min-height: auto; /* 고정 높이가 있다면 auto로 변경 */
}

/* =========================제목========================= */
.page-header {
	margin-bottom: 15px;
}

.page-header h3 {
	font-size: 22px;
	font-weight: 700;
	color: #222;
}

/* =========================검색영역========================= */
.search-box {
	border: 1px solid #dcdfe6;
	border-radius: 6px;
	background: #fff;
	padding: 20px 25px;
	margin-bottom: 20px;
}

.search-top {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 20px;
}

.search-left {
	display: flex;
	align-items: center;
	gap: 15px;
}

.search-item {
	display: flex;
	align-items: center;
	gap: 10px;
}

.search-item label {
	font-weight: 600;
}

.search-item select {
	width: 160px;
	height: 36px;
	border: 1px solid #d6d6d6;
	border-radius: 4px;
	padding: 0 10px;
	outline: none;
	background: #fff;
}

.search-bottom {
	display: flex;
	justify-content: flex-start;
}

.search-action {
	display: flex;
	gap: 10px;
}

/* =========================버튼========================= */
.btn {
	min-width: 90px;
	height: 36px;
	border-radius: 4px;
	cursor: pointer;
	transition: .2s;
	font-size: 14px;
}

.btn-primary {
	background: #1976d2;
	color: #fff;
	border: 1px solid #1976d2;
}

.btn-primary:hover {
	background: #1565c0;
}

.btn-outline {
	background: #fff;
	color: #1976d2;
	border: 1px solid #1976d2;
}

.btn-outline:hover {
	background: #1976d2;
	color: #fff;
}

.btn-light {
	background: #fff;
	border: 1px solid #ccc;
}

.btn-light:hover {
	background: #f5f5f5;
}

/* =========================총 시간========================= */
.summary-area {
	display: flex;
	justify-content: flex-end;
	margin-bottom: 8px;
	font-size: 15px;
}

.summary-area strong {
	color: #1976d2;
}

/* =========================테이블========================= */
.table-wrapper {
    border: 1px solid #e2e2e2;
    border-radius: 6px;
    background: #fff;
    /* 아래 두 줄이 핵심입니다 */
    overflow: visible; 
    height: auto;
}

/* 3. 혹시나 table-layout: fixed가 행 높이를 강제한다면 */
.data-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; 
}

.data-table thead {
	background: #f7f8fa;
}

.data-table th, .data-table td {
    padding: 10px 8px; /* 위아래 패딩 추가 */
    border-bottom: 1px solid #e5e5e5;
    text-align: center;
    vertical-align: middle; /* 세로 중앙 정렬 */
}

.data-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #e5e5e5;
    text-align: center;
    vertical-align: middle;
    
    /* 여기서 한 줄 고정 및 말줄임 처리 */
    white-space: nowrap;       /* 줄바꿈 금지 */
    overflow: hidden;          /* 넘치는 텍스트 숨김 */
    text-overflow: ellipsis;   /* 넘치면 ... 표시 */
}

/* 관리 버튼이 들어있는 마지막 셀(td:nth-child(9)) 스타일 초기화 */
.data-table td:nth-child(9) {
    overflow: visible !important; /* 넘침 허용 (팝업 노출) */
    white-space: normal !important; /* 줄바꿈 허용 */
}

/* 드롭다운 영역이 버튼 밖으로 나갈 수 있도록 보장 */
.dropdown-wrapper {
    position: relative;
    display: inline-block;
}

/* 추가: 내용(내용 컬럼)은 왼쪽 정렬이 보기 좋을 수 있음 */
.data-table td:nth-child(7) {
    white-space: normal; /* 줄바꿈 허용 */
    text-align: left;
    word-break: break-all; /* 너무 긴 단어는 강제로 끊어서 줄바꿈 */
}

/* 내용(7번째)과 일감(6번째) 열에 대한 추가 조정 */
.data-table td:nth-child(6), 
.data-table td:nth-child(7) {
    text-align: left;          /* 왼쪽 정렬 */
    padding-left: 15px;        /* 여백 확보 */
}

.data-table tbody tr:hover {
	background: #f8fbff;
}

.data-table input[type=checkbox] {
	cursor: pointer;
}

.time {
	color: #1976d2;
	font-weight: bold;
}

/* =========================하단========================= */
.bottom-area {
	margin-top: 30px;
	position: relative;
	min-height: 40px;
	display: flex;
	justify-content: center; /* 중앙 정렬 */
	align-items: center;
}

/* 페이징 컨테이너 */
.paging {
	display: flex;
	align-items: center;
	gap: 10px; /* 버튼과 숫자 사이 간격 */
	font-size: 14px;
	color: #666;
}

/* 이전/다음 버튼 스타일 */
.page-btn {
	border: none;
	background: none;
	cursor: pointer;
	color: #999;
	font-weight: 500;
	padding: 5px 10px;
}

.page-btn:hover {
	color: #1976d2;
}

/* 숫자 링크 스타일 */
.paging a {
	width: 28px;
	height: 28px;
	display: flex;
	justify-content: center;
	align-items: center;
	text-decoration: none;
	color: #666;
	border-radius: 4px;
	transition: all 0.2s;
}

/* 활성화된 페이지 (파란색 박스) */
.paging a.active {
	background: #1976d2;
	color: #fff;
	font-weight: bold;
}

.paging a:hover:not(.active) {
	background: #f0f0f0;
}

/* CSV 버튼 영역을 우측 하단으로 고정 */
.export-area {
	position: absolute;
	right: 0;
	top: 0;
}

.csv-btn {
	border: none;
	background: none;
	color: #1976d2;
	cursor: pointer;
	font-weight: 600;
}

.csv-btn:hover {
	text-decoration: underline;
}

/* =========================반응형========================= */
@media ( max-width :900px) {
	.search-top {
		flex-direction: column;
		align-items: flex-start;
		gap: 15px;
	}
	.bottom-area {
		display: flex;
		flex-direction: column;
		gap: 20px;
	}
	.paging {
		position: static;
		transform: none;
		justify-content: center;
	}
	.export-area {
		justify-content: center;
	}
}

/* 이제 각 열의 너비를 비율에 맞게 설정하세요 */
.data-table th:nth-child(1) { width: 5%; }/* 체크박스 */
.data-table th:nth-child(2) { width: 10%; }/* 프로젝트 */
.data-table th:nth-child(3) { width: 10%; }/* 작업일자 */
.data-table th:nth-child(4) { width: 12%; }/* 사용자 */
.data-table th:nth-child(5) { width: 10%; }/* 작업분류 */
.data-table th:nth-child(6) { width: 20%; } /* 일감 */
.data-table th:nth-child(7) { width: auto; } /* 일감 */
.data-table th:nth-child(8) { width: 8%; }/* 시간 */
.data-table th:nth-child(9) { width: 7%; }/* 관리 */
</style>
	</section>

</body>
</html>
