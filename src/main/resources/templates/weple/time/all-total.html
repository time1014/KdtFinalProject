<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>

	<section>
		<div class="worktime-container">
			<div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
			    <h3 style="margin: 0; font-size: 22px; font-weight: 700;">소요시간</h3>
			    <button th:if="${isManager}" class="btn btn-primary" 
				        th:onclick="|location.href='@{/insertProjectTime}'|">
				    + 소요시간 등록
				</button>
			</div>

			<!-- 검색 영역 -->
			<div class="search-box">
	            <div class="search-title" style="margin-bottom: 10px; font-weight: bold; color: #6D5EF7; display: flex; align-items: center;">▼ 검색조건</div>
	            <div class="search-top">
	                <div class="search-left" id="search-container">
	                    <div class="search-item" id="workTime-filter">
	                        <label>작업시간</label>
							    <input type="number" name="startTime" placeholder="최소시간" 
							           style="height: 36px; padding: 0 10px;" >
							    <span>~</span>
							    <input type="number" name="endTime" placeholder="최대시간" 
							           style="height: 36px; padding: 0 10px;">
	                    </div>
	                </div>
	                <div class="search-right" style="position: relative;">
	                    <button class="btn btn-primary" onclick="toggleFilterMenu()">검색조건 추가 ▼</button>
	                    <div id="filter-menu" class="dropdown-menu-box" style="right:0; top: 40px; display:none; padding:10px; width: 150px; z-index:1000;">
	                        <label><input type="checkbox" value="2" onchange="toggleFilter(this, 1)"> 작업일자</label><br>
	                        <label><input type="checkbox" value="3" onchange="toggleFilter(this, 2)"> 사용자</label><br>
	                        <label><input type="checkbox" value="4" onchange="toggleFilter(this, 3)"> 작업분류</label><br>
	                        <label><input type="checkbox" value="5" onchange="toggleFilter(this, 4)"> 일감</label><br>
	                        <label><input type="checkbox" value="6" onchange="toggleFilter(this, 5)"> 내용</label><br>
	                        <label><input type="checkbox" value="7" onchange="toggleFilter(this, 0)"> 프로젝트명</label>
	                    </div>
	                </div>
	            </div>
	            <div class="search-bottom">
	                <div class="search-action"><button class="btn btn-primary" onclick="applySearch()">적용</button><button class="btn btn-light" onclick="resetSearch()">지우기</button></div>
	            </div>
	        </div>

			<!-- 총 시간 -->
			<div class="summary-area">
			    <span>
			        총 시간 :
			        <strong th:text="${totalSpentHour + ':00'}">0:00</strong>
			    </span>
			</div>

			<!-- 테이블 -->
			<div class="table-wrapper">
				<table class="data-table">
					<thead>
						<tr>
							<th width="120">프로젝트</th>
							<th width="120">작업일자</th>
							<th width="150">사용자</th>
							<th width="120">작업분류</th>
							<th>일감</th>
							<th>내용</th>
							<th width="90">시간</th>
							<th width="70">관리</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${#lists.isEmpty(totalTimeList)}">
               				<td colspan="8">조회된 데이터가 없습니다.</td>
            			</tr>
            			
            			<th:block th:each="time : ${totalTimeList}">
						<tr>
			                <td th:text="${time.projectTitle}">프로젝트</td>
			                <td th:text="${time.workDate != null} ? ${#dates.format(time.workDate, 'yyyy/MM/dd')} : '-'">작업일자</td>
			                <td th:text="${time.userName}">사용자</td>
			                <td th:text="${time.workNameLabel}">작업분류</td>
			                <td th:text="${time.taskTitle}">일감</td>
			                <td th:text="${time.spentContent}">내용</td>
			                <td class="time" th:text="${time.spentHour} + ':00'">시간</td>
			                <td style="position: relative; text-align: left;" onclick="event.stopPropagation();">
								<div class="dropdown-wrapper">
									<span class="more-options-btn" onclick="toggleDropdown(this)">•••</span>
									<div class="dropdown-menu-box">
									    <button type="button" class="dropdown-item edit-btn"
									    	th:if="${isManager or time.userCode == loginUserCode}"
									        	th:onclick="|location.href='@{/updateProjectTime(workId=${time.workId})}'|">
									        	✏️ 편집
									    </button>
									    <button type="button" class="dropdown-item edit-btn"
									    	th:unless="${isManager or time.userCode == loginUserCode}"
									        	onclick="showToast('편집 권한이 없습니다.', 'error')">
									        	✏️ 편집
									    </button>
									    <button type="button" class="dropdown-item delete-btn" th:if="${isManager}"
        										th:onclick="|deleteWork(${time.workId}, ${time.projectId})|">
        										🗑️ 삭제
        								</button>
									    <button type="button" class="dropdown-item delete-btn" th:unless="${isManager}"
        										onclick="showToast('삭제 권한이 없습니다.', 'error')">
        										🗑️ 삭제
        								</button>
									</div>
								</div>
							</td>
						</tr>
						</th:block>
					</tbody>
				</table>
			</div>

			<!-- 하단 -->
			<div class="bottom-area">
			    <div class="paging">
			        </div>
			    <div class="export-area">
			        <button class="csv-btn" onclick="exportToCSV()">내보내기 : CSV</button>
			    </div>
			    <div class="pagination-wrap" id="paginationWrap"></div>
			</div>
		</div>
	<script>
	// 1. 공통 변수
    const searchInput = document.querySelector("input[name='workTime']");
    const searchBtn = document.querySelector(".search-action .btn-primary");
    const clearBtn = document.querySelector(".btn-light");
    const allRows = document.querySelectorAll(".data-table tbody tr:not([th\\:if])");
    
    let currentPage = 1;
    const itemsPerPage = 10;
	
 	// 필터 토글
    function toggleFilterMenu() {
        const menu = document.getElementById('filter-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
 	
	function toggleFilter(checkbox, colIndex) {
	    const container = document.getElementById('search-container');
	    if (checkbox.checked) {
	        const div = document.createElement('div');
	        div.className = 'search-item';
	        div.id = 'filter-' + checkbox.value;
	        const inputType = (colIndex === 1) ? 'date' : 'text'; 
	        div.innerHTML = `
	            <label style="width: 60px;">${checkbox.nextSibling.textContent.trim()}</label>
	            <input type="${inputType}" data-col="${colIndex}" placeholder="검색어 입력" 
	                   style="width: 180px; height: 36px; border: 1px solid #d6d6d6; border-radius: 4px; padding: 0 10px;">`;
	        container.appendChild(div);
	    } else {
	        const el = document.getElementById('filter-' + checkbox.value);
	        if(el) el.remove();
	    }
	}
    
    //외부 클릭해도 검색추가 닫힘
    document.addEventListener('click', function(event) {
        const menu = document.getElementById('filter-menu');
        const btn = document.querySelector('.search-right button');
        if (!menu.contains(event.target) && event.target !== btn) {
            menu.style.display = 'none';
        }
    })
    let filteredRows = [];

	// 페이지 로딩 시 초기화
	document.addEventListener("DOMContentLoaded", function() {
	    filteredRows = Array.from(allRows);
	    showPage(1);
	});
    
    function showPage(page) {
	    currentPage = page;
	    allRows.forEach(row => row.style.display = "none");
	    const start = (page - 1) * itemsPerPage;
	    const end = start + itemsPerPage;
	    const pageRows = filteredRows.slice(start, end);
	    pageRows.forEach(row => row.style.display = "");
	    updatePagination(Math.ceil(filteredRows.length / itemsPerPage));
	}
    
    // 통합 검색 함수
	function applySearch() {
	    const inputs = document.querySelectorAll("#search-container input");
	    const minHour = parseInt(document.querySelector("input[name='startTime']").value) || 0;
	    const maxHour = parseInt(document.querySelector("input[name='endTime']").value) || 999;

	    filteredRows = Array.from(allRows).filter(row => {
	        let isMatch = true;
	        
	        const timeCell = row.cells[6].innerText; 
	        const hour = parseInt(timeCell.split(':')[0]);
	        if (hour < minHour || hour > maxHour) isMatch = false;

	        inputs.forEach(input => {
	            if (input.name === 'startTime' || input.name === 'endTime' || !input.value) return;
	            const colIndex = parseInt(input.getAttribute('data-col')); 
	            let cellValue = row.cells[colIndex]?.innerText.toLowerCase() || "";
	            if (input.type === 'date') cellValue = cellValue.replace(/\//g, '-');
	            if (!cellValue.includes(input.value.toLowerCase())) isMatch = false;
	        });
	        return isMatch;
	    });
	    showPage(1);
	}
	
	function updatePagination(pageCount) {
	    const pagingDiv = document.querySelector(".paging");
	    if (pageCount === 0) pageCount = 1;

	    // 페이지 번호를 10개 단위 블록으로 끊어서 보여준다.
	    // 1~10페이지에서 "다음"을 누르면 11페이지(다음 블록 첫 페이지)로 이동.
	    const blockSize = 10;
	    const currentBlock = Math.floor((currentPage - 1) / blockSize);
	    const startPage = currentBlock * blockSize + 1;
	    const endPage = Math.min(startPage + blockSize - 1, pageCount);
	    const isFirstBlock = startPage === 1;
	    const isLastBlock = endPage === pageCount;

	    pagingDiv.innerHTML = `
	        <button class="page-btn" onclick="showPage(${startPage - 1})" ${isFirstBlock ? 'disabled' : ''}>&lt; 이전</button>
	        <div id="page-numbers" style="display: flex; gap: 5px; align-items: center;"></div>
	        <button class="page-btn" onclick="showPage(${endPage + 1})" ${isLastBlock ? 'disabled' : ''}>다음 &gt;</button>
	    `;

	    const numberSpan = document.getElementById("page-numbers");
	    for (let i = startPage; i <= endPage; i++) {
	        const a = document.createElement("a");
	        a.href = "#";
	        a.innerText = i;
	        const textColor = (i === currentPage) ? "#ffffff" : "#666";
	        a.style.cssText = `display:flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:4px; text-decoration:none; color:${textColor};`;
	        if (i === currentPage) a.className = "active";
	        a.onclick = (e) => { e.preventDefault(); showPage(i); };
	        numberSpan.appendChild(a);
	    }
	}
	
	function toggleDropdown(element) {
	    const dropdownWrapper = element.parentElement;
	    const menuBox = dropdownWrapper.querySelector('.dropdown-menu-box');
	    document.querySelectorAll('.dropdown-menu-box').forEach(menu => {
	        if (menu !== menuBox) menu.classList.remove('show');
	    });
	    menuBox.classList.toggle('show');
	}

	// 토스트 알림 (권한 없음 안내용)
	function showToast(msg, type) {
	  var old = document.getElementById('_toastWrap');
	  if (old) old.remove();

	  var wrap = document.createElement('div');
	  wrap.id = '_toastWrap';
	  wrap.style.cssText = 'position:fixed;top:24px;left:50%;transform:translate(-50%,0);z-index:99999;';

	  var box = document.createElement('div');
	  box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:250px;';
	  box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
	  box.textContent = msg;

	  wrap.appendChild(box);
	  document.body.appendChild(wrap);

	  setTimeout(function() {
	    wrap.style.transition = 'opacity 0.4s';
	    wrap.style.opacity = '0';
	    setTimeout(function() { wrap.remove(); }, 400);
	  }, 2500);
	}
	window.onclick = function(event) {
	    if (!event.target.matches('.more-options-btn')) {
	        document.querySelectorAll('.dropdown-menu-box').forEach(menu => {
	            menu.classList.remove('show');
	        });
	    }
	}
        searchBtn.addEventListener("click", applySearch);
        searchInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                applySearch();
            }
        });
    
    // 지우기 버튼 클릭 이벤트
    function resetSearch() {
	    const inputs = document.querySelectorAll("#search-container input");
	    inputs.forEach(input => input.value = "");
	    const rows = document.querySelectorAll(".data-table tbody tr");
	    rows.forEach(row => row.style.display = "");
	    showPage(1);
	}
	    
	    // 삭제 확인 모달 (파일관리 삭제 모달과 동일한 스타일)
	    function showConfirmModal(title, msg, onConfirm, onCancel) {
	        const old = document.getElementById('_confirmModalWrap');
	        if (old) old.remove();
	        const overlay = document.createElement('div');
	        overlay.id = '_confirmModalWrap';
	        overlay.className = 'wiki-confirm-overlay';
	        overlay.innerHTML =
	            '<div class="wiki-confirm-box">' +
	                '<p class="wiki-confirm-title"></p>' +
	                '<p class="wiki-confirm-msg"></p>' +
	                '<div class="wiki-confirm-actions">' +
	                    '<button class="wiki-confirm-btn wiki-confirm-cancel" id="_confirmModalCancelBtn">취소</button>' +
	                    '<button class="wiki-confirm-btn wiki-confirm-ok" id="_confirmModalOkBtn">삭제</button>' +
	                '</div>' +
	            '</div>';
	        overlay.querySelector('.wiki-confirm-title').textContent = title;
	        overlay.querySelector('.wiki-confirm-msg').textContent = msg;
	        document.body.appendChild(overlay);

	        document.getElementById('_confirmModalOkBtn').onclick = () => { overlay.remove(); if (onConfirm) onConfirm(); };
	        document.getElementById('_confirmModalCancelBtn').onclick = () => { overlay.remove(); if (onCancel) onCancel(); };
	        overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); } });
	    }

	    //삭제버튼 컨펌
		function deleteWork(workId, projectId) {
		    showConfirmModal('소요시간 삭제', '정말 삭제하시겠습니까?', () => {
		        location.href = `/deleteTotalTime?workId=${workId}`;
		    });
		}
	    
	    //CSV 내보내기
	    function exportToCSV() {
		    const today = new Date();
		    const dateStr = today.toISOString().slice(0, 10).replace(/-/g, "");
		    const fileName = `worktime_${dateStr}.csv`;
		
		    let csv = [];
		    const rows = document.querySelectorAll(".data-table tr:not([style*='display: none'])");
		
		    for (let i = 0; i < rows.length; i++) {
		        let row = [], cols = rows[i].querySelectorAll("td, th");
		        for (let j = 0; j < cols.length; j++) {
		            let text = cols[j].innerText.replace(/"/g, '""');
		            row.push('"' + text + '"');
		        }
		        csv.push(row.join(","));
		    }
		
		    const csvFile = new Blob(["\ufeff" + csv.join("\n")], { type: "text/csv;charset=utf-8;" });
		    const downloadLink = document.createElement("a");
		    downloadLink.href = URL.createObjectURL(csvFile);
		    downloadLink.download = fileName;
		    downloadLink.click();
	    }
	</script>
		<style>
/* =========================공통========================= */
/* * {} body {} 전역 셀렉터 제거 - 사이드바/navbar 레이아웃 영향 방지 */

.worktime-container {
	width: 95%;
	margin: 25px auto;
	min-height: auto;
}

/* =========================제목 및 검색 ========================= */
.page-header {
	margin-bottom: 15px;
}

.page-header h3 {
	font-size: 22px;
	font-weight: 700;
	color: #222;
}

.search-box {
    border: 1px solid #dcdfe6;
    border-radius: 6px;
    background: #fff;
    padding: 20px 25px;
    margin-bottom: 20px;
}

.search-grid {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 15px;
	margin-bottom: 15px;
}

.search-top {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 20px;
}

.search-left {
	display: flex;
	align-items: center;
	gap: 15px;
}

#search-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
}

@media (max-width: 1200px) {
    #search-container {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 768px) {
    #search-container {
        grid-template-columns: 1fr;
    }
}

#workTime-filter {
    grid-column: span 1;
}

.search-item {
    display: flex;
    align-items: center;
    gap: 10px;
}

.search-item label {
    width: 70px; 
    font-weight: 600;
    flex-shrink: 0;
}

.search-item input[type="text"], 
.search-item input[type="number"], 
.search-item input[type="date"] {
    border: 1px solid #dcdfe6;
    border-radius: 4px;
    height: 36px;
    padding: 0 10px;
    flex-grow: 1;
}

.search-item span {
    margin: 0 5px;
}

.search-item select {
	width: 160px;
	height: 36px;
	border: 1px solid #d6d6d6;
	border-radius: 4px;
	padding: 0 10px;
	outline: none;
	background: #fff;
}

.search-action {
	display: flex;
	gap: 10px;
}

.search-left {
	display: flex;
	flex-wrap: wrap;
	gap: 15px;
	align-items: center;
}

/* =========================버튼 ========================= */
.worktime-container .btn {
	min-width: 90px;
	height: 36px;
	border-radius: 4px;
	cursor: pointer;
	transition: .2s;
	font-size: 14px;
}

.worktime-container .btn-primary {
	background: #6D5EF7;
	color: #fff;
	border: 1px solid #6D5EF7;
}

.worktime-container .btn-primary:hover {
	background: #5B4FEA;
}

.worktime-container .btn-light {
	background: #fff;
	border: 1px solid #ccc;
}

.worktime-container .btn-light:hover {
	background: #f5f5f5;
}

/* =========================테이블 영역 ========================= */
.table-wrapper {
	border: 1px solid #e2e2e2;
	border-radius: 6px;
	background: #fff;
	overflow: visible;
}

.data-table {
	width: 100%;
	border-collapse: collapse;
	table-layout: fixed;
}

.data-table thead {
	background: #F1EDFF;
}

/* 컬럼 순서: 1 프로젝트  2 작업일자  3 사용자  4 작업분류  5 일감  6 내용  7 시간  8 관리 */

.data-table th, .data-table td {
	padding: 12px 8px;
	border-bottom: 1px solid #e2e8f0;
	text-align: left;
	vertical-align: middle;
}

.data-table th, .data-table td {
	color: #4A5568;
}

.data-table th:nth-child(1), .data-table td:nth-child(1) /* 프로젝트 */ {
	text-align: left;
	padding-left: 25px;
}

.data-table td:not(:last-child) {
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

/* 내용 열(6번째) 줄바꿈 허용 */
.data-table td:nth-child(6) {
	white-space: normal;
	text-align: left;
	padding-left: 15px;
}

/* 관리 버튼(마지막 셀) 및 드롭다운 */
.data-table td:last-child {
	overflow: visible !important;
}

.dropdown-wrapper {
	position: relative;
	display: inline-block;
}

.more-options-btn {
	cursor: pointer;
	color: #94a3b8;
	padding: 6px 12px;
	font-size: 16px;
	font-weight: bold;
	border-radius: 4px;
	transition: background 0.2s;
}

.more-options-btn:hover {
	color: #475569;
	background-color: #f1f5f9;
}

.dropdown-menu-box {
	display: none;
	position: absolute;
	right: 0;
	top: 100%;
	background-color: #ffffff;
	min-width: 90px;
	box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.12);
	border: 1px solid #e2e8f0;
	border-radius: 6px;
	z-index: 999;
	padding: 4px 0;
}

.dropdown-menu-box.show {
	display: block;
}

.dropdown-item {
	display: block;
	width: 100%;
	padding: 8px 14px;
	text-align: left;
	background: none;
	border: none;
	font-size: 13px;
	color: #334155;
	cursor: pointer;
}

.dropdown-item:hover {
	background-color: #f8fafc;
}

.dropdown-item.delete-btn {
	color: #ef4444;
}

/* =========================총 시간 영역 ========================= */
.summary-area {
	display: flex;
	justify-content: flex-end;
	margin-bottom: 8px;
	font-size: 15px;
}

.summary-area strong {
	color: #6D5EF7;
	margin-left: 5px;
}

/* 열별 너비 설정 (체크박스 열 없음) */
.data-table th:nth-child(1) { width: 10%; }  /* 프로젝트 */
.data-table th:nth-child(2) { width: 10%; }  /* 작업일자 */
.data-table th:nth-child(3) { width: 12%; }  /* 사용자 */
.data-table th:nth-child(4) { width: 10%; }  /* 작업분류 */
.data-table th:nth-child(5) { width: 22%; text-align: left; padding-left: 15px; }  /* 일감 */
.data-table th:nth-child(6) { width: auto; text-align: left; padding-left: 15px; }  /* 내용 */
.data-table th:nth-child(7) { width: 8%; font-weight: bold; }  /* 시간 */
.data-table th:nth-child(8) { width: 7%; }  /* 관리 */

.data-table tbody tr:hover {
	background: #F1EDFF;
}

/* =========================하단 페이징 및 내보내기 ========================= */
.bottom-area {
	margin-top: 30px;
	position: relative;
	min-height: 40px;
	display: flex;
	justify-content: center;
	align-items: center;
}

.paging {
	display: flex;
	align-items: center;
	gap: 10px;
}

.page-btn {
	border: none;
	background: none;
	cursor: pointer;
	color: #999;
	font-weight: 500;
	padding: 5px 10px;
}

.page-btn:disabled {
	color: #ccc;
	cursor: not-allowed;
}

.paging a {
	width: 28px;
	height: 28px;
	display: flex;
	justify-content: center;
	align-items: center;
	text-decoration: none;
	color: #666;
	border-radius: 4px;
}

.paging a.active {
	background: #6D5EF7;
	color: #fff;
	font-weight: bold;
}

.export-area {
	position: absolute;
	right: 0;
	top: 0;
}
a
.csv-btn {
	border: none;
	background: none;
	color: #6D5EF7;
	cursor: pointer;
	font-weight: 600;
}

/* =========================반응형 ========================= */
@media ( max-width : 900px) {
	.search-top {
		flex-direction: column;
		align-items: flex-start;
		gap: 15px;
	}
}

/* ===== 삭제 확인 모달 (위키 삭제 모달과 동일 스타일) ===== */
.wiki-confirm-overlay {
	position: fixed; inset: 0; background: rgba(0,0,0,.15);
	z-index: 99999; display: flex; align-items: center; justify-content: center;
	animation: wikiConfirmFadeIn .18s ease;
}
@keyframes wikiConfirmFadeIn { from { opacity:0; } to { opacity:1; } }
.wiki-confirm-box {
	background: #fff; border-radius: 18px; padding: 26px 28px 22px;
	min-width: 300px; max-width: 380px;
	box-shadow: 0 12px 40px rgba(109,94,247,.18); text-align: center;
	animation: wikiConfirmSlideUp .2s ease;
}
@keyframes wikiConfirmSlideUp { from { transform:translateY(12px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.wiki-confirm-title  { font-size: 15px; font-weight: 700; color: #374151; margin: 0 0 10px; }
.wiki-confirm-msg    { font-size: 13px; color: #726F8F; margin: 0 0 20px; line-height: 1.6; white-space: pre-line; }
.wiki-confirm-actions{ display: flex; gap: 8px; justify-content: center; }
.wiki-confirm-btn {
	display: inline-flex; align-items: center; justify-content: center;
	height: 36px; min-width: 88px; padding: 0 20px;
	border-radius: 10px; font-size: 13px; font-weight: 600;
	cursor: pointer; border: none; transition: opacity .2s;
}
.wiki-confirm-btn:hover { opacity: .82; }
.wiki-confirm-cancel { background: #F1EDFF; color: #6D5EF7; }
.wiki-confirm-ok     { background: #EF4444; color: #fff; }
</style>
