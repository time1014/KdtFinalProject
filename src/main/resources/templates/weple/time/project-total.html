<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>

	<section>
		<div class="worktime-container">
			<div class="page-header"
				style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
				<h3 style="margin: 0; font-size: 22px; font-weight: 700;">소요시간</h3>
				<button class="btn btn-primary"
					th:onclick="|location.href='@{/insertProjectTime(projectId=${param.projectId != null ? param.projectId : ''}, taskId=${param.taskId != null ? param.taskId : ''})}'|">
					+ 소요시간 등록</button>
			</div>

			<!-- 일감 필터 안내 -->
			<div th:if="${filterTaskId != null}"
				style="margin-bottom: 12px; padding: 10px 16px; background: #e8f4fd; border-left: 4px solid #1976d2; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
				<span style="font-size: 14px; color: #1976d2; font-weight: 600;">
					일감 <strong th:text="${filterTaskId}"></strong> 의 소요시간 목록
				</span> <a th:href="@{/projectTimeList(projectId=${projectId})}"
					style="font-size: 13px; color: #1976d2; text-decoration: underline; cursor: pointer;">전체
					보기</a>
			</div>

			<!-- 검색 영역 -->
			<div class="search-box">
				<div class="search-title"
					style="margin-bottom: 10px; font-weight: bold; color: #1976d2; display: flex; align-items: center;">▼
					검색조건</div>
				<div class="search-top">
					<div class="search-left" id="search-container">
						<div class="search-item" id="workTime-filter">
							<label>작업시간</label> <input type="number" name="startTime"
								placeholder="최소시간" style="height: 36px; padding: 0 10px;">
							<span>~</span> <input type="number" name="endTime"
								placeholder="최대시간" style="height: 36px; padding: 0 10px;">
						</div>
					</div>
					<div class="search-right" style="position: relative;">
						<button class="btn btn-primary" onclick="toggleFilterMenu()">검색조건
							추가 ▼</button>
						<div id="filter-menu" class="dropdown-menu-box"
							style="right: 0; top: 40px; display: none; padding: 10px; width: 150px; z-index: 1000;">
							<label><input type="checkbox" value="2"
								onchange="toggleFilter(this, 1)"> 작업일자</label><br> <label><input
								type="checkbox" value="3" onchange="toggleFilter(this, 2)">
								사용자</label><br> <label><input type="checkbox" value="4"
								onchange="toggleFilter(this, 3)"> 작업분류</label><br> <label><input
								type="checkbox" value="5" onchange="toggleFilter(this, 4)">
								일감</label><br> <label><input type="checkbox" value="6"
								onchange="toggleFilter(this, 5)"> 내용</label>
						</div>
					</div>
				</div>
				<div class="search-bottom">
					<div class="search-action">
						<button class="btn btn-primary" onclick="applySearch()">적용</button>
						<button class="btn btn-light" onclick="resetSearch()">지우기</button>
					</div>
				</div>
			</div>

			<!-- 총 시간 -->
			<div class="summary-area">
				<span> 총 시간 : <strong
					th:text="${totalSpentHour != null} ? ${totalSpentHour + ':00'} : '0:00'">0:00</strong>
				</span>
			</div>

			<!-- 테이블 -->
			<div class="table-wrapper">
				<table class="data-table">
					<thead>
						<tr>
							<th width="120">프로젝트</th>
							<th width="120">작업일자 ▼</th>
							<th width="150">사용자</th>
							<th width="120">작업분류</th>
							<th>일감</th>
							<th>내용</th>
							<th width="90">시간</th>
							<th width="70">관리</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${#lists.isEmpty(projectTimeList)}">
							<td colspan="8">조회된 데이터가 없습니다.</td>
						</tr>
						<th:block th:each="time : ${projectTimeList}">
							<tr th:data-task-id="${time.taskId}">
								<td th:text="${time.projectTitle}">프로젝트</td>
								<td
									th:text="${time.workDate != null} ? ${#dates.format(time.workDate, 'yyyy/MM/dd')} : '-'">작업일자</td>
								<td th:text="${time.userName}">사용자</td>
								<td th:text="${time.workNameLabel}">작업분류</td>
								<td th:text="${time.taskTitle}">일감</td>
								<td th:text="${time.spentContent}">내용</td>
								<td class="time" th:text="${time.spentHour} + ':00'">시간</td>
								<td style="position: relative; text-align: center;"
									onclick="event.stopPropagation();">
									<div class="dropdown-wrapper">
										<span class="more-options-btn" onclick="toggleDropdown(this)">•••</span>
										<div class="dropdown-menu-box">
											<button type="button" class="dropdown-item edit-btn"
												th:onclick="|location.href='@{/updateProjectTime(workId=${time.workId})}'|">
												✏️ 편집</button>
											<button type="button"
												class="dropdown-item delete-btn task-delete-trigger"
												th:onclick="|deleteWork(${time.workId}, ${time.projectId})|">
												🗑️ 삭제</button>
										</div>
									</div>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>
			</div>

			<!-- 하단 -->
			<div class="bottom-area">
				<div class="paging"></div>
				<div class="export-area">
					<button class="csv-btn" onclick="exportToCSV()">내보내기 : CSV</button>
				</div>
			</div>
		</div>

		<script>
	const allRows = Array.from(document.querySelectorAll(".data-table tbody tr")).filter(row => row.cells.length > 1);
	let filteredRows = allRows.slice();
	let currentPage = 1;
	const itemsPerPage = 10;

	document.addEventListener('DOMContentLoaded', function() {
	    showPage(1);
	});

	function showPage(page) {
	    currentPage = page;
	    allRows.forEach(row => row.style.display = "none");
	    const start = (page - 1) * itemsPerPage;
	    const end = start + itemsPerPage;
	    filteredRows.slice(start, end).forEach(row => row.style.display = "");
	    updatePagination(Math.ceil(filteredRows.length / itemsPerPage));
	}

	function updatePagination(pageCount) {
	    const pagingDiv = document.querySelector(".paging");
	    if (pageCount === 0) pageCount = 1;
	    pagingDiv.innerHTML = `
	        <button class="page-btn" onclick="showPage(Math.max(1, currentPage - 1))">&lt; 이전</button>
	        <div id="page-numbers" style="display: flex; gap: 5px; align-items: center;"></div>
	        <button class="page-btn" onclick="showPage(Math.min(${pageCount}, currentPage + 1))">다음 &gt;</button>
	    `;
	    const numberSpan = document.getElementById("page-numbers");
	    for (let i = 1; i <= pageCount; i++) {
	        const a = document.createElement("a");
	        a.href = "#";
	        a.innerText = i;
	        a.style.cssText = "display:flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:4px; text-decoration:none; color:#666;";
	        if (i === currentPage) a.className = "active";
	        a.onclick = (e) => { e.preventDefault(); showPage(i); };
	        numberSpan.appendChild(a);
	    }
	}

	// 필터 토글
	function toggleFilterMenu() {
	    const menu = document.getElementById('filter-menu');
	    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
	}

	function toggleFilter(checkbox, colIndex) {
	    const container = document.getElementById('search-container');
	    if (checkbox.checked) {
	        const div = document.createElement('div');
	        div.className = 'search-item';
	        div.id = 'filter-' + checkbox.value;
	        const inputType = (colIndex === 1) ? 'date' : 'text';
	        div.innerHTML = `
	            <label style="width: 60px;">${checkbox.nextSibling.textContent.trim()}</label>
	            <input type="${inputType}" data-col="${colIndex}" placeholder="검색어 입력"
	                   style="width: 180px; height: 36px; border: 1px solid #d6d6d6; border-radius: 4px; padding: 0 10px;">`;
	        container.appendChild(div);
	    } else {
	        const el = document.getElementById('filter-' + checkbox.value);
	        if (el) el.remove();
	    }
	}

	document.addEventListener('click', function(event) {
	    const menu = document.getElementById('filter-menu');
	    const btn = document.querySelector('.search-right button');
	    if (menu && btn && !menu.contains(event.target) && event.target !== btn) {
	        menu.style.display = 'none';
	    }
	});

	// 통합 검색
	function applySearch() {
	    const inputs = document.querySelectorAll("#search-container input");
	    const minHour = parseInt(document.querySelector("input[name='startTime']").value) || 0;
	    const maxHour = parseInt(document.querySelector("input[name='endTime']").value) || 999;
	    filteredRows = allRows.filter(row => {
	        let isMatch = true;
	        const timeCell = row.cells[6] ? row.cells[6].innerText : '';
	        const hour = parseInt(timeCell.split(':')[0]);
	        if (hour < minHour || hour > maxHour) isMatch = false;
	        inputs.forEach(input => {
	            if (input.name === 'startTime' || input.name === 'endTime' || !input.value) return;
	            const colIndex = parseInt(input.getAttribute('data-col')) + 1;
	            let cellValue = row.cells[colIndex]?.innerText.toLowerCase() || "";
	            if (input.type === 'date') cellValue = cellValue.replace(/\//g, '-');
	            if (!cellValue.includes(input.value.toLowerCase())) isMatch = false;
	        });
	        return isMatch;
	    });
	    showPage(1);
	}

	function resetSearch() {
	    document.querySelectorAll("#search-container input").forEach(input => input.value = "");
	    filteredRows = allRows.slice();
	    showPage(1);
	}

	// 드롭다운
	function toggleDropdown(element) {
	    const menuBox = element.parentElement.querySelector('.dropdown-menu-box');
	    document.querySelectorAll('.dropdown-menu-box').forEach(menu => {
	        if (menu !== menuBox) menu.classList.remove('show');
	    });
	    menuBox.classList.toggle('show');
	}

	window.onclick = function(event) {
	    if (!event.target.matches('.more-options-btn')) {
	        document.querySelectorAll('.dropdown-menu-box').forEach(menu => menu.classList.remove('show'));
	    }
	}

	// 삭제
	function deleteWork(workId, projectId) {
	    if (confirm("정말 삭제하시겠습니까?")) {
	        location.href = `/deleteProjectTime?workId=${workId}&projectId=${projectId}`;
	    }
	}

	// CSV 내보내기
	function exportToCSV() {
	    const today = new Date();
	    const dateStr = today.toISOString().slice(0, 10).replace(/-/g, "");
	    const fileName = `worktime_${dateStr}.csv`;
	    let csv = [];
	    const rows = document.querySelectorAll(".data-table tr:not([style*='display: none'])");
	    for (let i = 0; i < rows.length; i++) {
	        let row = [], cols = rows[i].querySelectorAll("td, th");
	        for (let j = 0; j < cols.length; j++) {
	            let text = cols[j].innerText.replace(/"/g, '""');
	            row.push('"' + text + '"');
	        }
	        csv.push(row.join(","));
	    }
	    const csvFile = new Blob(["\ufeff" + csv.join("\n")], { type: "text/csv;charset=utf-8;" });
	    const downloadLink = document.createElement("a");
	    downloadLink.href = URL.createObjectURL(csvFile);
	    downloadLink.download = fileName;
	    downloadLink.click();
	}
	</script>

		<style>
.worktime-container {
	width: 95%;
	margin: 25px auto;
	min-height: auto;
}

.page-header {
	margin-bottom: 15px;
}

.page-header h3 {
	font-size: 22px;
	font-weight: 700;
	color: #222;
}

.search-box {
	border: 1px solid #dcdfe6;
	border-radius: 6px;
	background: #fff;
	padding: 20px 25px;
	margin-bottom: 20px;
}

.search-top {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 20px;
}

.search-left {
	display: flex;
	align-items: center;
	gap: 15px;
	flex-wrap: wrap;
}

#search-container {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 20px;
	width: 100%;
}

@media ( max-width : 1200px) {
	#search-container {
		grid-template-columns: repeat(2, 1fr);
	}
}

@media ( max-width : 768px) {
	#search-container {
		grid-template-columns: 1fr;
	}
}

#workTime-filter {
	grid-column: span 1;
}

.search-item {
	display: flex;
	align-items: center;
	gap: 10px;
}

.search-item label {
	width: 70px;
	font-weight: 600;
	flex-shrink: 0;
}

.search-item input[type="text"], .search-item input[type="number"],
	.search-item input[type="date"] {
	border: 1px solid #dcdfe6;
	border-radius: 4px;
	height: 36px;
	padding: 0 10px;
	flex-grow: 1;
}

.search-item span {
	margin: 0 5px;
}

.search-item select {
	width: 160px;
	height: 36px;
	border: 1px solid #d6d6d6;
	border-radius: 4px;
	padding: 0 10px;
	outline: none;
	background: #fff;
}

.search-action {
	display: flex;
	gap: 10px;
}

.search-bottom {
	display: flex;
	justify-content: flex-end;
}

.btn {
	min-width: 90px;
	height: 36px;
	border-radius: 4px;
	cursor: pointer;
	transition: .2s;
	font-size: 14px;
}

.btn-primary {
	background: #1976d2;
	color: #fff;
	border: 1px solid #1976d2;
}

.btn-primary:hover {
	background: #1565c0;
}

.btn-light {
	background: #fff;
	border: 1px solid #ccc;
}

.btn-light:hover {
	background: #f5f5f5;
}

.table-wrapper {
	border: 1px solid #e2e2e2;
	border-radius: 6px;
	background: #fff;
	overflow: visible;
}

.data-table {
	width: 100%;
	border-collapse: collapse;
	table-layout: fixed;
}

.data-table thead {
	background: #f7f8fa;
}

.data-table th, .data-table td {
	padding: 12px 8px;
	border-bottom: 1px solid #e2e8f0;
	text-align: center;
	vertical-align: middle;
}

.data-table th:nth-child(1), .data-table td:nth-child(1), .data-table th:nth-child(4),
	.data-table td:nth-child(4), .data-table th:nth-child(5), .data-table td:nth-child(5),
	.data-table th:nth-child(6), .data-table td:nth-child(6) {
	text-align: left;
	padding-left: 15px;
}

.data-table th:nth-child(7), .data-table td:nth-child(7), .data-table th:nth-child(8),
	.data-table td:nth-child(8) {
	text-align: center;
}

.data-table th:nth-child(1), .data-table td:nth-child(1) {
	text-align: left;
	padding-left: 25px;
}

.data-table td:not(:last-child) {
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.data-table td:nth-child(6) {
	white-space: normal;
	text-align: left;
	padding-left: 15px;
}

.data-table td:last-child {
	overflow: visible !important;
}

.data-table tbody tr:hover {
	background: #f8fbff;
}

.data-table th:nth-child(1) {
	width: 10%;
}

.data-table th:nth-child(2) {
	width: 10%;
}

.data-table th:nth-child(3) {
	width: 12%;
}

.data-table th:nth-child(4) {
	width: 10%;
}

.data-table th:nth-child(5) {
	width: 22%;
	text-align: left;
	padding-left: 15px;
}

.data-table th:nth-child(6) {
	width: auto;
	text-align: left;
	padding-left: 15px;
}

.data-table th:nth-child(7) {
	width: 8%;
	font-weight: bold;
}

.data-table th:nth-child(8) {
	width: 7%;
}

.dropdown-wrapper {
	position: relative;
	display: inline-block;
}

.more-options-btn {
	cursor: pointer;
	color: #94a3b8;
	padding: 6px 12px;
	font-size: 16px;
	font-weight: bold;
	border-radius: 4px;
	transition: background 0.2s;
}

.more-options-btn:hover {
	color: #475569;
	background-color: #f1f5f9;
}

.dropdown-menu-box {
	display: none;
	position: absolute;
	right: 0;
	top: 100%;
	background-color: #fff;
	min-width: 90px;
	box-shadow: 0px 4px 12px rgba(0, 0, 0, .12);
	border: 1px solid #e2e8f0;
	border-radius: 6px;
	z-index: 999;
	padding: 4px 0;
}

.dropdown-menu-box.show {
	display: block;
}

.dropdown-item {
	display: block;
	width: 100%;
	padding: 8px 14px;
	text-align: left;
	background: none;
	border: none;
	font-size: 13px;
	color: #334155;
	cursor: pointer;
}

.dropdown-item:hover {
	background-color: #f8fafc;
}

.dropdown-item.delete-btn {
	color: #ef4444;
}

.summary-area {
	display: flex;
	justify-content: flex-end;
	margin-bottom: 8px;
	font-size: 15px;
}

.summary-area strong {
	color: #1976d2;
	margin-left: 5px;
}

.bottom-area {
	margin-top: 30px;
	position: relative;
	min-height: 40px;
	display: flex;
	justify-content: center;
	align-items: center;
}

.paging {
	display: flex;
	align-items: center;
	gap: 10px;
}

.page-btn {
	border: none;
	background: none;
	cursor: pointer;
	color: #999;
	font-weight: 500;
	padding: 5px 10px;
}

.paging a {
	width: 28px;
	height: 28px;
	display: flex;
	justify-content: center;
	align-items: center;
	text-decoration: none;
	color: #666;
	border-radius: 4px;
}

.paging a.active {
	background: #1976d2;
	color: #fff;
	font-weight: bold;
}

.export-area {
	position: absolute;
	right: 0;
	top: 0;
}

.csv-btn {
	border: none;
	background: none;
	color: #1976d2;
	cursor: pointer;
	font-weight: 600;
}

@media ( max-width : 900px) {
	.search-top {
		flex-direction: column;
		align-items: flex-start;
		gap: 15px;
	}
}
</style>
	</section>

</body>
</html>
