<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>설정 - 시간추적</title>
    <link rel="stylesheet" href="/css/project/setting.css">
</head>
<body>
<section class="settings-page">

    <div th:replace="~{common/fragments/project-setting-tabs :: projectSettingTabs}"></div>

    <div id="settingsMessageBox">
        <p th:if="${toastMessage != null and (toastType == null or toastType != 'error')}"
           class="time-setting-message time-setting-message-success"
           th:text="${toastMessage}">시간추적 설정이 저장되었습니다.</p>
        <p th:if="${toastMessage != null and toastType == 'error'}"
           class="time-setting-message time-setting-message-error"
           th:text="${toastMessage}">작업분류를 최소 1개 이상 선택해주세요.</p>
    </div>

    <form id="timeSettingForm" method="post" th:action="@{/project/settings/time}">
        <input type="hidden" name="projectId" th:value="${projectId}">

        <div class="time-setting-toolbar">
            <button type="button" id="resetSelectionBtn" class="btn-time-reset">초기화</button>
            <a class="btn-time-manage" th:href="@{/codeValueList}">관리</a>
        </div>

        <div class="time-setting-table-wrap">
            <table class="time-setting-table">
                <thead>
                <tr>
                    <th>이름</th>
                    <th>사용중</th>
                    <th>사용 선택</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(classificationList)}">
                    <td colspan="3" class="time-setting-empty">
                        사용중인 작업분류가 없습니다. '관리' 버튼에서 코드값을 등록해주세요.
                    </td>
                </tr>
                <tr th:each="item : ${classificationList}">
                    <td th:text="${item.workName}"></td>
                    <td><span class="time-check-icon">✓</span></td>
                    <td>
                        <input type="checkbox"
                               class="time-selection-chk"
                               name="enabledClassifications"
                               th:value="${item.taskClassificationId}"
                               th:checked="${selectedIds != null and selectedIds.contains(item.taskClassificationId)}">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="form-btn-area">
            <button type="submit" class="btn-save">저장</button>
        </div>
    </form>

    <script th:inline="javascript">
        function showToast(msg, type) {
            const box = document.getElementById('settingsMessageBox');
            box.innerHTML = '';
            const p = document.createElement('p');
            p.className = 'time-setting-message ' + (type === 'error' ? 'time-setting-message-error' : 'time-setting-message-success');
            p.textContent = msg;
            box.appendChild(p);
        }

        document.getElementById('resetSelectionBtn').addEventListener('click', function () {
            document.querySelectorAll('.time-selection-chk').forEach(function (chk) {
                chk.checked = false;
            });
        });

        document.getElementById('timeSettingForm').addEventListener('submit', function (e) {
            const anyChecked = document.querySelectorAll('.time-selection-chk:checked').length > 0;
            if (!anyChecked) {
                e.preventDefault();
                showToast('작업분류를 최소 1개 이상 선택해주세요.', 'error');
            }
        });
    </script>
<style>
.time-setting-toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 12px;
}

.time-setting-message {
    max-width: 760px;
    margin: 0 0 14px;
    padding: 10px 12px;
    border-radius: 5px;
    font-size: 13px;
}
.time-setting-message-error {
    border: 1px solid #FECACA;
    background: #FEF2F2;
    color: #EF4444;
}
.time-setting-message-success {
    border: 1px solid #BBF7D0;
    background: #F0FDF4;
    color: #22C55E;
}

.btn-time-reset,
.btn-time-manage {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 32px;
    padding: 0 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background .15s;
}

.btn-time-reset {
    background: #f3f4f6;
    color: #4b525a;
    border: 1.5px solid #dfe3e8;
}
.btn-time-reset:hover { background: #e9ecef; }

.btn-time-manage {
    background: #F1EDFF;
    color: #6D5EF7;
    border: 1.5px solid #DDD6FE;
}
.btn-time-manage:hover { background: #EEEAFE; }

.btn-save {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 150px;
    height: 40px;
    border: none;
    border-radius: 10px;
    background: #6D5EF7;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: .2s;
}

.btn-save:hover {
    background: #5747E6;
}

.time-setting-table-wrap {
    border: 1px solid #DDD6FE;
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
}

.time-setting-table {
    width: 100%;
    border-collapse: collapse;
}

.time-setting-table thead {
    background: #f6f8fc;
}

.time-setting-table th,
.time-setting-table td {
    padding: 14px 18px;
    vertical-align: middle;
    box-sizing: border-box;
    text-align: center;
}

.time-setting-table th:first-child,
.time-setting-table td:first-child {
    text-align: left;
}

.time-setting-table tr {
    border-bottom: 1px solid #edf1fa;
}

.time-setting-table td {
    height: 56px;
}

.time-setting-empty {
    padding: 40px 0;
    text-align: center;
    color: #9ca3af;
}

.time-check-icon {
    color: #22c55e;
    font-size: 15px;
    font-weight: bold;
}

.time-selection-chk {
    accent-color: #6D5EF7;
}
</style>
</section>
</body>
</html>
