<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>

	<section>
		<div class="worktime-container">
			<div class="page-header">
				<h3>소요시간 등록</h3>
			</div>

			<form th:action="@{/insertProjectTime}" th:object="${workTimeVO}" method="post" class="insert-form">
				<input type="hidden" th:field="*{projectId}">
				
				<div class="form-group">
				    <label>프로젝트</label>
				    <input type="text" class="form-control" th:value="${currentProject.projectTitle}" readonly>
				</div>

				<div class="form-group">
					<label>일감</label>
					<div class="input-inline">
						<select id="taskSelect" name="taskId" class="form-control">
						    <option value="" disabled selected hidden>일감을 선택하세요.</option>
						    <option th:each="t : ${taskList}"
						            th:value="${t.taskId}"
						            th:text="${t.taskTitle}"
						            th:attr="data-describe=${t.taskDescribe}, data-estimated-time=${t.estimatedTime}"></option>
						</select>
					</div>
				</div>

				<div class="form-group">
				    <label>사용자 <span>*</span></label>
				    <select name="userCode" class="form-control" required>
				        <option value="" disabled selected hidden>사용자를 선택하세요.</option>
				        <option th:each="user : ${userList}" 
				                th:value="${user.userCode}" 
				                th:text="${user.userName}"></option>
				    </select>
				</div>

				<div class="form-group">
					<label>작업일자 <span>*</span></label> <input type="date"
						name="workDate" required>
				</div>

				<div class="form-group">
					<label>소요시간 <span>*</span></label> <input type="number"
						name="spentHour" step="1" placeholder="시간을 입력하세요." required>
				</div>

				<div class="form-group">
				    <label>설명</label>
				    <input type="text" id="taskDescribeInput" class="form-control" readonly placeholder="일감을 선택하면 표시됩니다">
				</div>

				<div class="form-group">
					<label>작업분류 <span>*</span></label>
					<select name="workName" class="form-control" required>
					    <option value="" disabled selected hidden>작업분류를 선택하세요.</option>
					    <option th:each="v : ${workTypeList}" 
					            th:value="${v.taskClassificationId}" 
					            th:text="${v.workName}"> </option>
					</select>
				</div>
				
				<div class="form-group">
				    <label>진척도</label>
				    <div class="progress-area" style="flex: 1; display: flex; align-items: center; gap: 10px;">
				        <input type="range" id="displayProgressRange" name="progress" min="0" max="100" value="0" style="flex: 1;">
				        <span id="displayProgressText" style="width: 40px; font-weight: bold;">0%</span>
				    </div>
				</div>

				<div class="btn-area">
					<button type="button" class="btn btn-light"
						onclick="history.back()">취소</button>
					<button type="submit" class="btn btn-primary">등록</button>
				</div>
			</form>
		</div>

		<script>
		document.addEventListener("DOMContentLoaded", function() {
		    // 1. 일감 선택 시 데이터 자동 입력
		    const taskSelect = document.getElementById('taskSelect');
		    taskSelect.addEventListener('change', function() {
		        const selectedOption = this.options[this.selectedIndex];
		        
		        // 데이터 가져오기
		        const describe = selectedOption.getAttribute('data-describe') || '';
		        const estimatedTime = parseFloat(selectedOption.getAttribute('data-estimated-time')) || 0;
		        
		        // 설명창 업데이트
		        document.getElementById('taskDescribeInput').value = describe;
		        
		        // 전역 변수에 예상시간 저장 (진척도 계산용)
		        window.currentEstimatedTime = estimatedTime;
		        
		        // 진척도 초기화
		        updateProgressUI(0);
		    });

		    // 2. 소요시간 입력 시 진척도 실시간 계산
		    const spentHourInput = document.querySelector('input[name="spentHour"]');
		    spentHourInput.addEventListener('input', function() {
		        const spentHour = parseFloat(this.value) || 0;
		        const estimatedTime = window.currentEstimatedTime || 0;
		        
		        if (estimatedTime > 0) {
		            let percent = Math.min(Math.round((spentHour / estimatedTime) * 100), 100);
		            updateProgressUI(percent);
		        }
		    });
		});

		// 진척도 UI 업데이트 함수
		function updateProgressUI(percent) {
		    document.getElementById('displayProgressRange').value = percent;
		    document.getElementById('displayProgressText').innerText = percent + '%';
		}
		
		
		document.getElementById('taskSelect').addEventListener('change', function() {
		    const selectedOption = this.options[this.selectedIndex];
		    
		    // 1. 값 가져오기
		    const describe = selectedOption.getAttribute('data-describe');
		    const estimatedTime = selectedOption.getAttribute('data-estimated-time');
		    
		    console.log("DEBUG - 가져온 설명값:", describe); // 여기서 null이 찍히는지 보세요
		    console.log("DEBUG - 가져온 예상시간값:", estimatedTime);

		    // 2. 입력창에 넣기 (null이면 빈 문자열로 처리)
		    document.getElementById('taskDescribeInput').value = (describe === 'null' || describe === null) ? "" : describe;
		    
		    // 3. 전역 변수 저장
		    window.currentEstimatedTime = parseFloat(estimatedTime) || 0;
		    
		    updateProgressUI(0);
		});
		</script>
		<style>
.worktime-container {
	width: 800px;
	margin: 40px auto;
}

.page-header h3 {
	font-size: 20px;
	font-weight: bold;
	margin-bottom: 20px;
}

.insert-form {
	background: #fff;
	padding: 30px;
	border: 1px solid #e2e2e2;
	border-radius: 6px;
}

.form-group {
	display: flex;
	align-items: center;
	margin-bottom: 15px;
}

.form-group label {
	width: 120px;
	font-weight: 600;
}

.form-group label span {
	color: #d32f2f;
}

.form-group input, .form-group textarea {
    flex: 1;
    height: 38px; 
    padding: 0 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.form-group select {
    flex: 1;
    height: auto; /* select는 고정 높이를 주지 않는 것이 안전합니다 */
    min-height: 38px; /* 최소 높이만 유지 */
    padding: 5px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.form-group textarea {
	height: auto;
	padding: 10px;
}

.input-inline {
	flex: 1;
	display: flex;
	align-items: center;
	gap: 10px;
}

.text-info {
	color: #1976d2;
	font-size: 13px;
}

.progress-area {
    flex: 1;
    display: flex;
    align-items: center;
}

#displayProgress {
    background-color: #f8f9fa; /* 연한 회색 배경 */
    border: 1px solid #ccc;
    font-weight: bold;
    color: #495057;
}

.btn-area {
	display: flex;
	justify-content: flex-end;
	gap: 10px;
	margin-top: 30px;
}
</style>
	</section>

</body>
</html>
