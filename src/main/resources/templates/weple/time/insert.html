<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>
	<section>
		<div class="insert-wrap">

			<!-- ① 프로젝트명 상단 중앙 -->
			<div class="project-header">
			    <span class="project-label"></span>
			    <span class="project-name"
			        th:if="${workTimeVO.projectId != null and workTimeVO.projectId != 0}"
			        th:text="${currentProject.projectTitle}">프로젝트명</span> <select
			        id="projectSelect" name="projectId" class="project-select"
			        th:if="${workTimeVO.projectId == null or workTimeVO.projectId == 0}"
			        onchange="onProjectChange(this.value)">
			        <option value="" disabled selected hidden>프로젝트를 선택하세요.</option>
			        <option th:each="p : ${projectList}" th:value="${p.projectId}"
			            th:text="${p.projectTitle}"></option>
			    </select>
			</div>

			<!-- ② 일감 검색 카드 -->
			<div class="task-card">
				<div class="task-card-title">일감 선택</div>

				<!-- 검색창 -->
				<div class="search-row">
					<div class="search-input-wrap">
						<input type="text" id="taskSearchInput" placeholder="일감명을 입력하세요"
							autocomplete="off">
						<button class="btn-clear" id="btnClear" onclick="clearSearch()"
							title="검색어 지우기" style="display: none;">✕</button>
					</div>
					<button class="btn-search" onclick="filterTasks()">검색</button>
				</div>

				<!-- 일감 테이블 -->
				<div class="table-wrap">
					<table class="task-table">
						<colgroup>
							<col style="width: 44px">
							<col style="width: 28%">
							<col style="width: 28%">
							<col style="width: 14%">
							<col style="width: 14%">
							<col style="width: 12%">
						</colgroup>
						<thead>
							<tr>
								<th></th>
								<th>일감명</th>
								<th>설명</th>
								<th>담당자</th>
								<th>유형</th>
								<th>마감일</th>
							</tr>
						</thead>
						<tbody id="taskTableBody">
							<tr id="emptyRow">
								<td colspan="6" class="empty-row">등록된 일감이 없습니다.</td>
							</tr>
							<tr th:each="t : ${taskList}" th:data-title="${t.taskTitle}"
								th:data-describe="${t.taskDescribe}" th:data-id="${t.taskId}"
								th:data-estimated="${t.estimatedTime}"
								th:data-manager="${t.taskManager}" th:data-type="${t.typeName}"
								th:data-finish="${t.finishDate}"
								th:data-progress="${t.taskProgress != null} ? ${t.taskProgress} : 0">
								<td class="td-check"><input type="radio" name="taskRadio"
									th:value="${t.taskId}"></td>
								<td class="td-ellipsis" th:text="${t.taskTitle}"></td>
								<td class="td-ellipsis td-desc" th:text="${t.taskDescribe}"></td>
								<td class="td-ellipsis" th:text="${t.taskManager}"></td>
								<td class="td-ellipsis" th:text="${t.typeName}"></td>
								<td class="td-ellipsis" th:text="${t.finishDate}"></td>
							</tr>
						</tbody>
					</table>
				</div>

				<!-- 페이징 -->
				<div class="paging-row" id="pagingArea"></div>

				<!-- 선택 버튼 -->
				<div class="select-btn-row">
					<button class="btn-select" onclick="openModal()">선택</button>
				</div>
			</div>

		</div>

		<!-- ③ 소요시간 입력 모달 -->
		<div id="timeModal" class="modal-backdrop" style="display: none;">
			<div class="modal-box">
				<div class="modal-header">
					<span class="modal-title">소요시간 등록</span>
					<button class="modal-close" onclick="closeModal()">✕</button>
				</div>

				<form th:action="@{/insertProjectTime}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<input type="hidden" id="modalProjectId" name="projectId" th:value="${workTimeVO.projectId}">
					<input type="hidden" id="modalTaskId" name="taskId">
					<input type="hidden" name="returnTaskId" th:value="${taskId}">

					<!-- 선택된 일감 정보 요약 -->
					<div class="modal-task-summary">
						<div class="summary-row">
							<span class="s-label">일감</span> <span class="s-value"
								id="summaryTitle">-</span>
						</div>
						<div class="summary-row">
							<span class="s-label">설명</span> <span class="s-value"
								id="summaryDesc">-</span>
						</div>
					</div>

					<!-- 사용자 -->
					<div class="modal-field modal-field-user">
						<label>사용자 <span class="req">*</span></label>
						<div class="user-search-wrap">
							<input type="text" id="userSearchInput" placeholder="이름으로 검색"
								autocomplete="off"> <input type="hidden"
								id="selectedUserCode" name="userCode" required>
							<ul id="userDropdown" class="user-dropdown"></ul>
						</div>
					</div>
					<!-- Thymeleaf로 userList JS 배열 생성 -->
					<script th:inline="javascript">
        const userList = /*[[${userList}]]*/ [];
      </script>

					<!-- 작업일자 -->
					<div class="modal-field">
						<label>작업일자 <span class="req">*</span></label> <input type="date"
							name="workDate" required>
					</div>

					<!-- 소요시간 -->
					<div class="modal-field">
						<label>소요시간(h) <span class="req">*</span></label> <input
							type="number" id="spentHourInput" name="spentHour" min="0"
							step="1" placeholder="시간 입력" required>
					</div>

					<!-- 작업분류 -->
					<div class="modal-field">
						<label>작업분류 <span class="req">*</span></label> <select
							name="workName" required>
							<option value="" disabled selected hidden>작업분류를 선택하세요.</option>
							<option th:each="v : ${workTypeList}"
								th:value="${v.taskClassificationId}" th:text="${v.workName}"></option>
						</select>
					</div>

					<!-- 진척도 -->
					<div class="modal-field">
						<label>진척도</label>
						<div class="progress-wrap">
							<input type="range" id="progressRange" name="progress" min="0"
								max="100" value="0"> <span id="progressText"
								class="progress-text">0%</span>
						</div>
					</div>

					<!-- 내용 -->
					<div class="modal-field modal-field-textarea">
						<label>내용</label>
						<textarea name="spentContent" rows="3" placeholder="작업 내용을 입력하세요"></textarea>
					</div>

					<div class="modal-footer">
						<button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
						<button type="submit" class="btn-submit">등록</button>
					</div>
				</form>
			</div>
		</div>

		<script th:inline="javascript">

/* ── 토스트 & 컨펌 공통 함수 ── */
function showToast(msg, type) {
  // 기존 토스트 제거
  var old = document.getElementById('_toastWrap');
  if (old) old.remove();

  var wrap = document.createElement('div');
  wrap.id = '_toastWrap';
  wrap.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;';

  var box = document.createElement('div');
  box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:220px;';
  box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
  box.textContent = msg;

  wrap.appendChild(box);
  document.body.appendChild(wrap);

  setTimeout(function() {
    wrap.style.transition = 'opacity 0.4s';
    wrap.style.opacity = '0';
    setTimeout(function() { wrap.remove(); }, 400);
  }, 2500);
}


// ── 프로젝트 선택 (관리자용: projectId 없을 때) ──
function onProjectChange(projectId) {
  // 선택한 프로젝트의 일감을 Ajax로 불러옴
  document.getElementById('modalProjectId').value = projectId;
  fetch('/getTasksByProject?projectId=' + projectId)
    .then(res => res.json())
    .then(tasks => {
      rebuildTaskRows(tasks);
    })
    .catch(() => showToast('일감 목록을 불러오지 못했습니다.', 'error'));
}

function rebuildTaskRows(tasks) {
  const tbody = document.getElementById('taskTableBody');
  // 기존 동적 행 제거 (data-dynamic 속성 기준)
  tbody.querySelectorAll('tr[data-dynamic]').forEach(r => r.remove());

  allRows.length = 0;

  if (!tasks || tasks.length === 0) {
    document.getElementById('emptyRow').style.display = '';
    filteredRows = [];
    renderTable();
    return;
  }
  document.getElementById('emptyRow').style.display = 'none';

  tasks.forEach(t => {
    const tr = document.createElement('tr');
    tr.setAttribute('data-dynamic', '1');
    tr.dataset.title    = t.taskTitle    || '';
    tr.dataset.describe = t.taskDescribe || '';
    tr.dataset.id       = t.taskId       || '';
    tr.dataset.estimated= t.estimatedTime|| 0;
    tr.dataset.manager  = t.taskManager  || '';
    tr.dataset.type     = t.typeName     || '';
    tr.dataset.finish   = t.finishDate   || '';
    tr.dataset.progress = t.taskProgress || 0;
    tr.innerHTML = `
      <td class="td-check"><input type="radio" name="taskRadio" value="${t.taskId}"></td>
      <td class="td-ellipsis">${escHtml(t.taskTitle)}</td>
      <td class="td-ellipsis td-desc">${escHtml(t.taskDescribe)}</td>
      <td class="td-ellipsis">${escHtml(t.taskManager)}</td>
      <td class="td-ellipsis">${escHtml(t.typeName)}</td>
      <td class="td-ellipsis">${escHtml(t.finishDate)}</td>`;
    tbody.appendChild(tr);
    allRows.push({
      el: tr,
      title:    tr.dataset.title,
      describe: tr.dataset.describe,
      id:       tr.dataset.id,
      estimated:parseFloat(tr.dataset.estimated)||0,
      manager:  tr.dataset.manager,
      type:     tr.dataset.type,
      finish:   tr.dataset.finish,
      progress: parseInt(tr.dataset.progress) || 0
    });
  });

  filteredRows = [...allRows];
  currentPage = 1;
  renderTable();
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 초기 데이터 (Thymeleaf → JS) ──
const allRows = [];
document.querySelectorAll('#taskTableBody tr[data-id]').forEach(tr => {
  allRows.push({
    el:       tr,
    title:    tr.dataset.title    || '',
    describe: tr.dataset.describe || '',
    id:       tr.dataset.id,
    estimated:parseFloat(tr.dataset.estimated)||0,
    manager:  tr.dataset.manager  || '',
    type:     tr.dataset.type     || '',
    finish:   tr.dataset.finish   || '',
    progress: parseInt(tr.dataset.progress) || 0
  });
});

// ── 페이징 ──
const PAGE_SIZE = 10;
let currentPage = 1;
let filteredRows = [...allRows];

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const end   = start + PAGE_SIZE;
  allRows.forEach(r => r.el.style.display = 'none');
  const pageRows = filteredRows.slice(start, end);
  pageRows.forEach(r => r.el.style.display = '');
  // 빈 행 처리
  const emptyRow = document.getElementById('emptyRow');
  if (emptyRow) emptyRow.style.display = filteredRows.length === 0 ? '' : 'none';
  renderPaging();
}

function renderPaging() {
  const total = Math.ceil(filteredRows.length / PAGE_SIZE) || 1;
  const area  = document.getElementById('pagingArea');
  let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})">&lt;</button>`;
  for (let i = 1; i <= total; i++) {
    html += `<button class="pg-btn ${i===currentPage?'pg-active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})">&gt;</button>`;
  area.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filteredRows.length / PAGE_SIZE) || 1;
  currentPage = Math.max(1, Math.min(p, total));
  renderTable();
}

// ── 검색 ──
const searchInput = document.getElementById('taskSearchInput');
const btnClear    = document.getElementById('btnClear');

searchInput.addEventListener('input', function() {
  btnClear.style.display = this.value ? 'flex' : 'none';
  filterTasks();
});

function filterTasks() {
  const kw = searchInput.value.trim().toLowerCase();
  filteredRows = kw ? allRows.filter(r => r.title.toLowerCase().includes(kw)) : [...allRows];
  currentPage = 1;
  renderTable();
}

function clearSearch() {
  searchInput.value = '';
  btnClear.style.display = 'none';
  filteredRows = [...allRows];
  currentPage = 1;
  renderTable();
  searchInput.focus();
}

// ── 모달 ──
let selectedRow = null;

function openModal() {
  const checked = document.querySelector('input[name="taskRadio"]:checked');
  if (!checked) { showToast('일감을 선택해주세요.', 'error'); return; }

  // 관리자 모드에서 프로젝트 미선택 체크
  const projectSel = document.getElementById('projectSelect');
  if (projectSel && !projectSel.value) { showToast('프로젝트를 먼저 선택해주세요.', 'error'); return; }

  selectedRow = allRows.find(r => r.id === checked.value);
  if (!selectedRow) return;

  document.getElementById('modalTaskId').value = selectedRow.id;
  document.getElementById('summaryTitle').textContent = selectedRow.title    || '-';
  document.getElementById('summaryDesc').textContent  = selectedRow.describe || '-';
  // 진척도를 일감 현재 진척도로 초기화
  const initProgress = selectedRow.progress || 0;
  document.getElementById('progressRange').value = initProgress;
  document.getElementById('progressText').textContent = initProgress + '%';
  document.getElementById('spentHourInput').value = '';
  resetUserSearch();

  document.getElementById('timeModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

// ── 사용자 검색 자동완성 ──
const userSearchInput = document.getElementById('userSearchInput');
const userDropdown    = document.getElementById('userDropdown');
const selectedUserCode = document.getElementById('selectedUserCode');

// 초성 추출 함수
function getChosung(str) {
  const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  return (str || '').split('').map(ch => {
    const code = ch.charCodeAt(0) - 0xAC00;
    return code >= 0 && code <= 11171 ? CHO[Math.floor(code / 588)] : ch;
  }).join('');
}

function matchUser(userName, kw) {
  if (!kw) return true;
  const name = (userName || '').toLowerCase();
  // 일반 포함 검색
  if (name.includes(kw)) return true;
  // 초성 검색
  const chosung = getChosung(userName);
  return chosung.includes(kw);
}

userSearchInput.addEventListener('input', function() {
  const kw = this.value.trim().toLowerCase();
  userDropdown.innerHTML = '';
  selectedUserCode.value = ''; // 직접 입력 시 선택 초기화

  if (!kw) { userDropdown.style.display = 'none'; return; }

  const matched = (typeof userList !== 'undefined' ? userList : [])
    .filter(u => matchUser(u.userName, kw));

  if (matched.length === 0) {
    userDropdown.style.display = 'none'; return;
  }

  matched.forEach(u => {
    const li = document.createElement('li');
    li.textContent = u.userName;
    li.dataset.code = u.userCode;
    li.addEventListener('click', function() {
      userSearchInput.value  = u.userName;
      selectedUserCode.value = u.userCode;
      userDropdown.style.display = 'none';
    });
    userDropdown.appendChild(li);
  });
  userDropdown.style.display = 'block';
});

// 모달 열릴 때 사용자 검색창 초기화
function resetUserSearch() {
  userSearchInput.value  = '';
  selectedUserCode.value = '';
  userDropdown.style.display = 'none';
}

// 모달 바깥 클릭 시 드롭다운 닫기
document.addEventListener('click', function(e) {
  if (!userSearchInput.contains(e.target) && !userDropdown.contains(e.target)) {
    userDropdown.style.display = 'none';
  }
});

function closeModal() {
  document.getElementById('timeModal').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('progressRange').addEventListener('input', function() {
  document.getElementById('progressText').textContent = this.value + '%';
});

// 모달 바깥 클릭 시 닫기 - 비활성화 (취소 버튼으로만 닫힘)

// 초기 렌더
renderTable();

// taskId가 있으면 해당 일감만 선택 가능하게 제한
const urlTaskId = /*[[${taskId != null ? taskId : ''}]]*/ '';
if (urlTaskId) {
    document.querySelectorAll('#taskTableBody tr[data-id]').forEach(tr => {
        const radio = tr.querySelector('input[name="taskRadio"]');
        if (tr.dataset.id === urlTaskId) {
            radio.checked = true;
            tr.style.background = '#f0f7ff';
        } else {
            if (radio) radio.disabled = true;
            tr.style.opacity = '0.4';
            tr.style.pointerEvents = 'none';
            tr.style.cursor = 'default';
        }
    });
}
</script>

		<style>
/* ── 전체 래퍼 ── */
.insert-wrap {
	max-width: 1000px;
	margin: 32px auto;
	padding: 0 16px;
	font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
	font-size: 14px;
	color: #333;
}

/* ── 프로젝트 헤더 ── */
.project-header {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 14px;
	margin-bottom: 28px;
}

.project-label {
	font-size: 13px;
	color: #888;
	font-weight: 600;
	flex-shrink: 0;
}

.project-name {
	font-size: 20px;
	font-weight: 700;
	color: #1a1a2e;
	border-bottom: 2px solid #1976d2;
	padding-bottom: 2px;
}

.project-select {
	min-width: 260px;
	height: 40px;
	border: 1px solid #d1d5db;
	border-radius: 6px;
	padding: 0 12px;
	font-size: 15px;
	font-weight: 600;
	color: #1a1a2e;
	outline: none;
	border-bottom: 2px solid #1976d2;
}

.project-select:focus {
	border-color: #1976d2;
}

/* ── 일감 카드 ── */
.task-card {
	background: #fff;
	border: 1px solid #e2e8f0;
	border-radius: 8px;
	padding: 24px;
	box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
}

.task-card-title {
	font-size: 16px;
	font-weight: 700;
	color: #1976d2;
	margin-bottom: 16px;
}

/* ── 검색창 ── */
.search-row {
	display: flex;
	gap: 8px;
	margin-bottom: 16px;
}

.search-input-wrap {
	flex: 1;
	position: relative;
	display: flex;
	align-items: center;
}

.search-input-wrap input {
	width: 100%;
	height: 38px;
	border: 1px solid #d1d5db;
	border-radius: 6px;
	padding: 0 36px 0 12px;
	font-size: 14px;
	outline: none;
	transition: border-color .2s;
}

.search-input-wrap input:focus {
	border-color: #1976d2;
}

.btn-clear {
	position: absolute;
	right: 8px;
	width: 22px;
	height: 22px;
	border: none;
	background: #cbd5e1;
	color: #fff;
	border-radius: 50%;
	cursor: pointer;
	font-size: 12px;
	display: flex;
	align-items: center;
	justify-content: center;
	line-height: 1;
}

.btn-clear:hover {
	background: #94a3b8;
}

.btn-search {
	height: 38px;
	padding: 0 20px;
	background: #1976d2;
	color: #fff;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	font-size: 14px;
	font-weight: 600;
}

.btn-search:hover {
	background: #1565c0;
}

/* ── 일감 테이블 ── */
.table-wrap {
	overflow-x: auto;
}

.task-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 14px;
	table-layout: fixed;
}

.task-table thead tr {
	background: #f7f8fa;
}

.task-table th, .task-table td {
	padding: 11px 12px;
	border-bottom: 1px solid #e8edf2;
	text-align: left;
	vertical-align: middle;
	overflow: hidden;
}

.task-table th {
	font-weight: 600;
	color: #64748b;
}

.task-table tbody tr:hover {
	background: #f0f7ff;
	cursor: pointer;
}

.td-check {
	text-align: center;
	overflow: visible;
}

.td-ellipsis {
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.td-desc {
	color: #888;
	font-size: 13px;
}

.empty-row {
	text-align: center;
	color: #aaa;
	padding: 30px 0;
}

.task-table input[type="radio"] {
	width: 16px;
	height: 16px;
	cursor: pointer;
	accent-color: #1976d2;
}

/* ── 페이징 ── */
.paging-row {
	display: flex;
	justify-content: center;
	gap: 4px;
	margin-top: 16px;
}

.pg-btn {
