<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>
	<section>
		<div class="insert-wrap">

			<!-- ① 프로젝트명 상단 중앙 -->
			<div class="project-header">
			    <span class="project-label"></span>
			    <span class="project-name"
			        th:if="${workTimeVO.projectId != null and workTimeVO.projectId != 0}"
			        th:text="${currentProject.projectTitle}">프로젝트명</span> <select
			        id="projectSelect" name="projectId" class="project-select"
			        th:if="${workTimeVO.projectId == null or workTimeVO.projectId == 0}"
			        onchange="onProjectChange(this.value)">
			        <option value="" disabled selected hidden>프로젝트를 선택하세요.</option>
			        <option th:each="p : ${projectList}" th:value="${p.projectId}"
			            th:text="${p.projectTitle}"></option>
			    </select>
			</div>

			<!-- ② 소요시간 입력 카드 (원래 모달이던 폼이 메인 페이지로 이동) -->
			<div class="task-card">
				<div class="task-card-title">소요시간 등록</div>

				<form id="timeForm" th:action="@{/insertProjectTime}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<input type="hidden" id="modalProjectId" name="projectId" th:value="${workTimeVO.projectId}">
					<input type="hidden" id="modalTaskId" name="taskId">
					<input type="hidden" name="returnTaskId" th:value="${taskId}">

					<!-- 선택된 일감 정보 요약 + 일감 선택 버튼 -->
					<div class="modal-task-summary">
						<div class="summary-row">
							<span class="s-label">일감</span>
							<span class="s-value" id="summaryTitle">선택된 일감이 없습니다.</span>
							<button type="button" class="btn-pick-task" onclick="openTaskModal()">일감 선택</button>
						</div>
						<div class="summary-row">
							<span class="s-label">설명</span> <span class="s-value"
								id="summaryDesc">-</span>
						</div>
					</div>

					<!-- 사용자 (로그인한 계정으로 고정) -->
					<div class="modal-field modal-field-user">
						<label>사용자 <span class="req">*</span></label>
						<span class="modal-static-user" th:text="${loginUserName}">-</span>
						<input type="hidden" name="userCode" th:value="${loginUserCode}">
					</div>

					<!-- 작업일자 -->
					<div class="modal-field">
						<label>작업일자 <span class="req">*</span></label> <input type="date"
							name="workDate" required>
					</div>

					<!-- 소요시간 -->
					<div class="modal-field">
						<label>소요시간(h) <span class="req">*</span></label> <input
							type="number" id="spentHourInput" name="spentHour" min="0"
							step="1" placeholder="시간 입력" required>
					</div>

					<!-- 작업분류 -->
					<div class="modal-field">
						<label>작업분류 <span class="req">*</span></label> <select
							id="workNameSelect" name="workName" required>
							<option value="" disabled selected hidden>작업분류를 선택하세요.</option>
							<option th:each="v : ${workTypeList}"
								th:value="${v.taskClassificationId}" th:text="${v.workName}"></option>
						</select>
					</div>

					<!-- 진척도 -->
					<div class="modal-field">
						<label>진척도</label>
						<div class="progress-wrap">
							<input type="range" id="progressRange" name="progress" min="0"
								max="100" step="10" value="0"> <span id="progressText"
								class="progress-text">0%</span>
						</div>
					</div>
					<p class="progress-hint" id="progressHint" style="display: none;">* 완료되지 않은 하위일감이 있는 일감은 진척도를 수정할 수 없습니다.</p>

					<!-- 내용 -->
					<div class="modal-field modal-field-textarea">
						<label>내용 <span class="req">*</span></label>
						<textarea name="spentContent" rows="3" placeholder="작업 내용을 입력하세요" required></textarea>
					</div>

					<div class="modal-footer">
						<button type="button" class="btn-cancel"
							th:if="${workTimeVO.projectId != null and workTimeVO.projectId != 0}"
							th:onclick="|location.href='@{/projectTimeList(projectId=${workTimeVO.projectId})}'|">취소</button>
						<button type="button" class="btn-cancel"
							th:if="${workTimeVO.projectId == null or workTimeVO.projectId == 0}"
							onclick="location.href='/totalTimeList'">취소</button>
						<button type="submit" class="btn-submit">등록</button>
					</div>
				</form>
			</div>

		</div>

		<!-- ③ 일감 선택 모달 (원래 페이지였던 검색/목록/페이징이 모달로 이동) -->
		<div id="taskModal" class="modal-backdrop" style="display: none;">
			<div class="modal-box">
				<div class="modal-header">
					<span class="modal-title">일감 선택</span>
					<button class="modal-close" onclick="closeTaskModal()">✕</button>
				</div>

				<div class="task-modal-body">
					<!-- 검색창 -->
					<div class="search-row">
						<div class="search-input-wrap">
							<input type="text" id="taskSearchInput" placeholder="일감명을 입력하세요"
								autocomplete="off">
							<button class="btn-clear" id="btnClear" onclick="clearSearch()"
								title="검색어 지우기" style="display: none;">✕</button>
						</div>
						<button class="btn-search" onclick="filterTasks()">검색</button>
					</div>

					<!-- 일감 테이블 -->
					<div class="table-wrap">
						<table class="task-table">
							<colgroup>
								<col style="width: 44px">
								<col style="width: 28%">
								<col style="width: 28%">
								<col style="width: 14%">
								<col style="width: 14%">
								<col style="width: 12%">
							</colgroup>
							<thead>
								<tr>
									<th></th>
									<th>일감명</th>
									<th>설명</th>
									<th>담당자</th>
									<th>유형</th>
									<th>마감일</th>
								</tr>
							</thead>
							<tbody id="taskTableBody">
								<tr id="emptyRow">
									<td colspan="6" class="empty-row">등록된 일감이 없습니다.</td>
								</tr>
								<tr th:each="t : ${taskList}" th:data-title="${t.taskTitle}"
									th:data-describe="${t.taskDescribe}" th:data-id="${t.taskId}"
									th:data-estimated="${t.estimatedTime}"
									th:data-manager="${t.taskManager}" th:data-type="${t.typeName}"
									th:data-finish="${t.finishDate}"
									th:data-progress="${t.taskProgress != null} ? ${t.taskProgress} : 0">
									<td class="td-check"><input type="radio" name="taskRadio"
										th:value="${t.taskId}"></td>
									<td class="td-ellipsis" th:text="${t.taskTitle}"></td>
									<td class="td-ellipsis td-desc" th:text="${t.taskDescribe}"></td>
									<td class="td-ellipsis" th:text="${t.taskManager}"></td>
									<td class="td-ellipsis" th:text="${t.typeName}"></td>
									<td class="td-ellipsis" th:text="${t.finishDate}"></td>
								</tr>
							</tbody>
						</table>
					</div>

					<!-- 페이징 -->
					<div class="paging-row" id="pagingArea"></div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn-cancel" onclick="closeTaskModal()">취소</button>
					<button type="button" class="btn-submit" onclick="confirmTaskSelect()">선택</button>
				</div>
			</div>
		</div>

<script th:inline="javascript">

/* ── 토스트 & 컨펌 공통 함수 ── */
function showToast(msg, type) {
  // 기존 토스트 제거
  var old = document.getElementById('_toastWrap');
  if (old) old.remove();

  var wrap = document.createElement('div');
  wrap.id = '_toastWrap';
  wrap.style.cssText = 'position:fixed;top:24px;left:50%;transform:translate(-50%,0);z-index:99999;';

  var box = document.createElement('div');
  box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:250px;';
  box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
  box.textContent = msg;

  wrap.appendChild(box);
  document.body.appendChild(wrap);

  setTimeout(function() {
    wrap.style.transition = 'opacity 0.4s';
    wrap.style.opacity = '0';
    setTimeout(function() { wrap.remove(); }, 400);
  }, 2500);
}


// ── 프로젝트 선택 (관리자용: projectId 없을 때) ──
function onProjectChange(projectId) {
  // 선택한 프로젝트의 일감을 Ajax로 불러옴
  document.getElementById('modalProjectId').value = projectId;
  // 프로젝트가 바뀌면 이전에 골라둔 일감 선택은 무효화
  resetTaskSelection();
  fetch('/getTasksByProject?projectId=' + projectId)
    .then(res => res.json())
    .then(tasks => {
      rebuildTaskRows(tasks);
    })
    .catch(() => showToast('일감 목록을 불러오지 못했습니다.', 'error'));
}

function rebuildTaskRows(tasks) {
  const tbody = document.getElementById('taskTableBody');
  // 기존 동적 행 제거 (data-dynamic 속성 기준)
  tbody.querySelectorAll('tr[data-dynamic]').forEach(r => r.remove());

  allRows.length = 0;

  if (!tasks || tasks.length === 0) {
    document.getElementById('emptyRow').style.display = '';
    filteredRows = [];
    renderTable();
    return;
  }
  document.getElementById('emptyRow').style.display = 'none';

  tasks.forEach(t => {
    const tr = document.createElement('tr');
    tr.setAttribute('data-dynamic', '1');
    tr.dataset.title    = t.taskTitle    || '';
    tr.dataset.describe = t.taskDescribe || '';
    tr.dataset.id       = t.taskId       || '';
    tr.dataset.estimated= t.estimatedTime|| 0;
    tr.dataset.manager  = t.taskManager  || '';
    tr.dataset.type     = t.typeName     || '';
    tr.dataset.finish   = t.finishDate   || '';
    tr.dataset.progress = t.taskProgress || 0;
    tr.innerHTML = `
      <td class="td-check"><input type="radio" name="taskRadio" value="${t.taskId}"></td>
      <td class="td-ellipsis">${escHtml(t.taskTitle)}</td>
      <td class="td-ellipsis td-desc">${escHtml(t.taskDescribe)}</td>
      <td class="td-ellipsis">${escHtml(t.taskManager)}</td>
      <td class="td-ellipsis">${escHtml(t.typeName)}</td>
      <td class="td-ellipsis">${escHtml(t.finishDate)}</td>`;
    tbody.appendChild(tr);
    allRows.push({
      el: tr,
      title:    tr.dataset.title,
      describe: tr.dataset.describe,
      id:       tr.dataset.id,
      estimated:parseFloat(tr.dataset.estimated)||0,
      manager:  tr.dataset.manager,
      type:     tr.dataset.type,
      finish:   tr.dataset.finish,
      progress: parseInt(tr.dataset.progress) || 0
    });
  });

  filteredRows = [...allRows];
  currentPage = 1;
  renderTable();
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 초기 데이터 (Thymeleaf → JS) ──
const allRows = [];
document.querySelectorAll('#taskTableBody tr[data-id]').forEach(tr => {
  allRows.push({
    el:       tr,
    title:    tr.dataset.title    || '',
    describe: tr.dataset.describe || '',
    id:       tr.dataset.id,
    estimated:parseFloat(tr.dataset.estimated)||0,
    manager:  tr.dataset.manager  || '',
    type:     tr.dataset.type     || '',
    finish:   tr.dataset.finish   || '',
    progress: parseInt(tr.dataset.progress) || 0
  });
});

// ── 페이징 ──
const PAGE_SIZE = 5;
let currentPage = 1;
let filteredRows = [...allRows];

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const end   = start + PAGE_SIZE;
  allRows.forEach(r => r.el.style.display = 'none');
  const pageRows = filteredRows.slice(start, end);
  pageRows.forEach(r => r.el.style.display = '');
  // 빈 행 처리
  const emptyRow = document.getElementById('emptyRow');
  if (emptyRow) emptyRow.style.display = filteredRows.length === 0 ? '' : 'none';
  renderPaging();
}

function renderPaging() {
  const total = Math.ceil(filteredRows.length / PAGE_SIZE) || 1;
  const area  = document.getElementById('pagingArea');
  let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})">&lt;</button>`;
  for (let i = 1; i <= total; i++) {
    html += `<button class="pg-btn ${i===currentPage?'pg-active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})">&gt;</button>`;
  area.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filteredRows.length / PAGE_SIZE) || 1;
  currentPage = Math.max(1, Math.min(p, total));
  renderTable();
}

// ── 검색 ──
const searchInput = document.getElementById('taskSearchInput');
const btnClear    = document.getElementById('btnClear');

searchInput.addEventListener('input', function() {
  btnClear.style.display = this.value ? 'flex' : 'none';
  filterTasks();
});

function filterTasks() {
  const kw = searchInput.value.trim().toLowerCase();
  filteredRows = kw ? allRows.filter(r => r.title.toLowerCase().includes(kw)) : [...allRows];
  currentPage = 1;
  renderTable();
}

function clearSearch() {
  searchInput.value = '';
  btnClear.style.display = 'none';
  filteredRows = [...allRows];
  currentPage = 1;
  renderTable();
  searchInput.focus();
}

// 현재 선택된 라디오의 행에 강조 클래스를 유지 (다른 행 선택 시 이전 강조는 해제)
function markSelectedRow() {
  document.querySelectorAll('#taskTableBody tr.row-selected').forEach(tr => tr.classList.remove('row-selected'));
  const checked = document.querySelector('input[name="taskRadio"]:checked');
  if (checked) {
    const tr = checked.closest('tr');
    if (tr) tr.classList.add('row-selected');
  }
}

// 행 아무 곳이나 클릭해도 그 줄의 라디오가 선택되도록 (동적으로 추가되는 행까지 포함하기 위해 tbody에 이벤트 위임)
document.getElementById('taskTableBody').addEventListener('click', function(e) {
  const row = e.target.closest('tr');
  if (!row) return;
  const radio = row.querySelector('input[name="taskRadio"]');
  if (!radio || radio.disabled) return;
  // 라디오를 직접 클릭한 경우엔 브라우저 기본 동작에 맡기고 중복 처리하지 않음
  if (e.target.tagName !== 'INPUT') {
    radio.checked = true;
  }
  markSelectedRow();
});

// ── 일감 선택 모달 ──
let selectedRow = null;

// range input의 트랙을 현재 값(min~max 대비 %)만큼 색이 채워지도록 갱신
function updateRangeFill(rangeEl) {
  const min = parseInt(rangeEl.min) || 0;
  const max = parseInt(rangeEl.max) || 100;
  const val = parseInt(rangeEl.value) || 0;
  const percent = max > min ? ((val - min) / (max - min)) * 100 : 0;
  const filledColor = rangeEl.disabled ? '#94a3b8' : '#6D5EF7';
  rangeEl.style.background =
    `linear-gradient(to right, ${filledColor} 0%, ${filledColor} ${percent}%, #e2e8f0 ${percent}%, #e2e8f0 100%)`;
}

// 작업분류 select에서 "완료" 라벨을 가진 <option>을 찾음
function findCompleteWorkNameOption(selectEl) {
  return Array.from(selectEl.options).find(o => o.textContent.trim() === '완료');
}

// 진척도가 100%가 되면 작업분류를 자동으로 "완료"로 맞춰줌
function syncWorkNameWithProgress(progressValue) {
  const workNameSelect = document.getElementById('workNameSelect');
  if (!workNameSelect) return;
  const completeOption = findCompleteWorkNameOption(workNameSelect);
  if (parseInt(progressValue) === 100 && completeOption) {
    workNameSelect.value = completeOption.value;
  }
}

// 일감을 하나 확정 선택했을 때 메인 폼(요약/진척도 등)에 반영
function selectTaskRow(row) {
  selectedRow = row;
  document.getElementById('modalTaskId').value = row.id;
  document.getElementById('summaryTitle').textContent = row.title    || '-';
  document.getElementById('summaryDesc').textContent  = row.describe || '-';

  const initProgress = row.progress || 0;
  const rangeEl = document.getElementById('progressRange');
  rangeEl.disabled = false;
  rangeEl.classList.remove('progress-locked');
  rangeEl.min = 0;
  rangeEl.value = initProgress;
  document.getElementById('progressText').textContent = initProgress + '%';
  document.getElementById('progressHint').style.display = 'none';
  document.getElementById('spentHourInput').value = '';
  document.getElementById('workNameSelect').value = '';
  updateRangeFill(rangeEl);

  // 하위 일감 유무에 따라 진척도 편집 가능 여부/범위 결정
  applyProgressLock(row.id, initProgress);
}

// 프로젝트를 바꾸는 등 기존 선택이 무효화될 때 폼 요약/필드를 초기화
function resetTaskSelection() {
  selectedRow = null;
  document.getElementById('modalTaskId').value = '';
  document.getElementById('summaryTitle').textContent = '선택된 일감이 없습니다.';
  document.getElementById('summaryDesc').textContent  = '-';
}

function openTaskModal() {
  // 관리자 모드에서 프로젝트 미선택 체크
  const projectSel = document.getElementById('projectSelect');
  if (projectSel && !projectSel.value) { showToast('프로젝트를 먼저 선택해주세요.', 'error'); return; }

  document.getElementById('taskModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeTaskModal() {
  document.getElementById('taskModal').style.display = 'none';
  document.body.style.overflow = '';
}

function confirmTaskSelect() {
  const checked = document.querySelector('input[name="taskRadio"]:checked');
  if (!checked) { showToast('일감을 선택해주세요.', 'error'); return; }

  const row = allRows.find(r => r.id === checked.value);
  if (!row) return;

  selectTaskRow(row);
  closeTaskModal();
}

function applyProgressLock(taskId, currentProgress) {
  const rangeEl = document.getElementById('progressRange');
  const hint = document.getElementById('progressHint');
  fetch('/hasChildTask?taskId=' + encodeURIComponent(taskId))
    .then(res => res.json())
    .then(hasChild => {
      if (hasChild) {
        // 하위일감이 있으면 완전 잠금
        rangeEl.disabled = true;
        rangeEl.classList.add('progress-locked');
        rangeEl.value = currentProgress;
        document.getElementById('progressText').textContent = currentProgress + '%';
        hint.textContent = '* 완료되지 않은 하위일감이 있어 진척도를 수정할 수 없습니다.';
        hint.style.display = 'block';
      } else {
        // 하위일감이 없으면 0~100% 범위에서 자유롭게 편집 가능 (현재값보다 낮게도 설정 가능)
        rangeEl.disabled = false;
        rangeEl.classList.remove('progress-locked');
        rangeEl.min = 0;
        hint.style.display = 'none';
      }
      updateRangeFill(rangeEl);
    })
    .catch(() => {
      rangeEl.disabled = false;
      rangeEl.min = 0;
      hint.style.display = 'none';
      updateRangeFill(rangeEl);
    });
}

document.getElementById('progressRange').addEventListener('input', function() {
  document.getElementById('progressText').textContent = this.value + '%';
  updateRangeFill(this);
  syncWorkNameWithProgress(this.value);
});

// 진척도가 100%가 아닌데 작업분류를 "완료"로 직접 선택하려는 경우 막음
document.getElementById('workNameSelect').addEventListener('change', function() {
  const completeOption = findCompleteWorkNameOption(this);
  if (completeOption && this.value === completeOption.value) {
    const currentProgress = parseInt(document.getElementById('progressRange').value) || 0;
    if (currentProgress !== 100) {
      showToast('진척도가 100%가 아니면 작업분류를 완료로 설정할 수 없습니다.', 'error');
      this.value = '';
    }
  }
});

// 일감을 아직 선택 안 했으면 등록 자체를 막고 일감 선택 모달을 열어줌
document.getElementById('timeForm').addEventListener('submit', function(e) {
  if (!document.getElementById('modalTaskId').value) {
    e.preventDefault();
    showToast('일감을 선택해주세요.', 'error');
    openTaskModal();
  }
});

// 모달 바깥 클릭 시 닫기 - 비활성화 (취소 버튼으로만 닫힘)


// 초기 렌더
renderTable();

// taskId가 있으면(일감 상세 페이지에서 넘어온 경우) 해당 일감만 선택 가능하게 제한하고
// 모달을 열 것도 없이 바로 메인 폼에 그 일감을 채워준다.
const urlTaskId = /*[[${taskId != null ? taskId : ''}]]*/ '';
if (urlTaskId) {
    document.querySelectorAll('#taskTableBody tr[data-id]').forEach(tr => {
        const radio = tr.querySelector('input[name="taskRadio"]');
        if (tr.dataset.id === urlTaskId) {
            radio.checked = true;
        } else {
            if (radio) radio.disabled = true;
            tr.style.opacity = '0.4';
            tr.style.pointerEvents = 'none';
            tr.style.cursor = 'default';
        }
    });
    markSelectedRow();

    const preselected = allRows.find(r => r.id === urlTaskId);
    if (preselected) selectTaskRow(preselected);
}
