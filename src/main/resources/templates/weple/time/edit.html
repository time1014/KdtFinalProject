<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE - 소요시간 수정</title>
</head>
<body>
<section>
<div class="edit-wrap">

  <div class="edit-card">
    <!-- 헤더 -->
    <div class="edit-header">
      <span class="edit-title">소요시간 수정</span>
    </div>

    <!-- 일감 정보 요약 -->
    <div class="task-summary">
      <div class="summary-row">
        <span class="s-label">프로젝트</span>
        <span class="s-value" th:text="${workTime.projectTitle}">-</span>
      </div>
      <div class="summary-row">
        <span class="s-label">일감</span>
        <span class="s-value" th:text="${workTime.taskTitle}">-</span>
      </div>
      <div class="summary-row">
        <span class="s-label">설명</span>
        <span class="s-value" th:text="${workTime.taskDescribe}">-</span>
      </div>
    </div>

    <!-- 수정 폼 -->
    <form th:action="@{/updateProjectTime}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="workId"    th:value="${workTime.workId}">
      <input type="hidden" name="projectId" th:value="${workTime.projectId}">
      <input type="hidden" name="taskId"    th:value="${workTime.taskId}">

      <!-- 사용자 -->
      <div class="edit-field edit-field-user">
        <label>사용자 <span class="req">*</span></label>
        <div class="user-search-wrap">
          <input type="text" id="userSearchInput"
                 placeholder="이름 또는 초성으로 검색"
                 th:value="${workTime.userName}"
                 autocomplete="off">
          <input type="hidden" id="selectedUserCode" name="userCode"
                 th:value="${workTime.userCode}" required>
          <ul id="userDropdown" class="user-dropdown"></ul>
        </div>
      </div>

      <!-- 작업일자 -->
      <div class="edit-field">
        <label>작업일자 <span class="req">*</span></label>
        <input type="date" name="workDate"
               th:value="${workTime.workDate != null} ? ${#dates.format(workTime.workDate,'yyyy-MM-dd')} : ''"
               required>
      </div>

      <!-- 소요시간 -->
      <div class="edit-field">
        <label>소요시간(h) <span class="req">*</span></label>
        <input type="number" id="spentHourInput" name="spentHour"
               min="0" step="1"
               th:value="${workTime.spentHour}"
               placeholder="시간 입력" required>
      </div>

      <!-- 작업분류 -->
      <div class="edit-field">
        <label>작업분류 <span class="req">*</span></label>
        <select name="workName" required>
          <option value="" disabled hidden>작업분류를 선택하세요.</option>
          <option th:each="v : ${workTypeList}"
                  th:value="${v.taskClassificationId}"
                  th:text="${v.workName}"
                  th:selected="${v.taskClassificationId == workTime.workName}"></option>
        </select>
      </div>

      <!-- 진척도 -->
      <div class="edit-field">
        <label>진척도</label>
        <div class="progress-wrap">
          <input type="range" id="progressRange" name="progress"
                 min="0" max="100" value="0">
          <span id="progressText" class="progress-text">0%</span>
        </div>
      </div>

      <!-- 내용 -->
      <div class="edit-field edit-field-textarea">
        <label>내용</label>
        <textarea name="spentContent" rows="3"
                  placeholder="작업 내용을 입력하세요"
                  th:text="${workTime.spentContent}"></textarea>
      </div>

      <div class="edit-footer">
        <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
        <button type="submit" class="btn-submit">저장</button>
      </div>
    </form>
  </div>

</div>

<!-- Thymeleaf → JS -->
<script th:inline="javascript">
const userList      = /*[[${userList}]]*/ [];
const estimatedTime = /*[[${workTime.estimatedTime}]]*/ 0;
const savedSpentHour = /*[[${workTime.spentHour}]]*/ 0;

// ── 진척도 초기값 설정 ──
(function() {
  const pct = estimatedTime > 0
    ? Math.min(Math.round(savedSpentHour / estimatedTime * 100), 100)
    : 0;
  document.getElementById('progressRange').value = pct;
  document.getElementById('progressText').textContent = pct + '%';
})();

// ── 소요시간 변경 시 진척도 자동계산 ──
document.getElementById('spentHourInput').addEventListener('input', function() {
  if (!estimatedTime) return;
  const pct = Math.min(Math.round((parseFloat(this.value)||0) / estimatedTime * 100), 100);
  document.getElementById('progressRange').value = pct;
  document.getElementById('progressText').textContent = pct + '%';
});
document.getElementById('progressRange').addEventListener('input', function() {
  document.getElementById('progressText').textContent = this.value + '%';
});

// ── 초성 추출 ──
function getChosung(str) {
  const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  return (str||'').split('').map(ch => {
    const code = ch.charCodeAt(0) - 0xAC00;
    return code >= 0 && code <= 11171 ? CHO[Math.floor(code/588)] : ch;
  }).join('');
}
function matchUser(name, kw) {
  if (!kw) return true;
  const n = (name||'').toLowerCase();
  return n.includes(kw) || getChosung(name).includes(kw);
}

// ── 사용자 검색 자동완성 ──
const userSearchInput  = document.getElementById('userSearchInput');
const userDropdown     = document.getElementById('userDropdown');
const selectedUserCode = document.getElementById('selectedUserCode');

userSearchInput.addEventListener('input', function() {
  const kw = this.value.trim().toLowerCase();
  userDropdown.innerHTML = '';
  selectedUserCode.value = '';

  if (!kw) { userDropdown.style.display = 'none'; return; }

  const matched = userList.filter(u => matchUser(u.userName, kw));
  if (!matched.length) { userDropdown.style.display = 'none'; return; }

  matched.forEach(u => {
    const li = document.createElement('li');
    li.textContent  = u.userName;
    li.dataset.code = u.userCode;
    li.addEventListener('click', () => {
      userSearchInput.value  = u.userName;
      selectedUserCode.value = u.userCode;
      userDropdown.style.display = 'none';
    });
    userDropdown.appendChild(li);
  });
  userDropdown.style.display = 'block';
});

document.addEventListener('click', e => {
  if (!userSearchInput.contains(e.target) && !userDropdown.contains(e.target))
    userDropdown.style.display = 'none';
});
</script>

<style>
.edit-wrap {
  max-width: 100%;
  margin: 20px 0;
  padding: 0;
  font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
  font-size: 14px;
  color: #333;
}
.edit-card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.10);
  overflow: hidden;
}
.edit-header {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid #e2e8f0;
  background: #f8fafc;
}
.edit-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }

/* 일감 요약 */
.task-summary {
  background: #f0f7ff;
  border-left: 3px solid #1976d2;
  margin: 20px 24px 8px;
  padding: 12px 14px;
  border-radius: 0 6px 6px 0;
}
.summary-row { display: flex; gap: 10px; margin-bottom: 4px; font-size: 13px; }
.summary-row:last-child { margin-bottom: 0; }
.s-label { color: #94a3b8; font-weight: 600; min-width: 48px; }
.s-value { color: #1e293b; }

/* 필드 */
.edit-field {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  border-bottom: 1px solid #f1f5f9;
}
.edit-field label {
  width: 90px;
  font-weight: 600;
  color: #475569;
  font-size: 13px;
  flex-shrink: 0;
}
.edit-field input[type="date"],
.edit-field input[type="number"],
.edit-field select {
  flex: 1;
  height: 36px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 14px;
  outline: none;
}
.edit-field input:focus,
.edit-field select:focus { border-color: #1976d2; }
.req { color: #ef4444; }

/* 사용자 검색 */
.edit-field-user { position: relative; }
.user-search-wrap { flex: 1; position: relative; }
.user-search-wrap input[type="text"] {
  width: 100%;
  height: 36px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 14px;
  outline: none;
}
.user-search-wrap input[type="text"]:focus { border-color: #1976d2; }
.user-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: #fff;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
  max-height: 180px;
  overflow-y: auto;
  z-index: 10000;
  list-style: none;
  margin: 4px 0 0;
  padding: 4px 0;
}
.user-dropdown li { padding: 9px 12px; cursor: pointer; font-size: 14px; }
.user-dropdown li:hover { background: #f0f7ff; color: #1976d2; }

/* 진척도 */
.progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.progress-wrap input[type="range"] { flex: 1; accent-color: #1976d2; }
.progress-text { width: 38px; font-weight: 700; color: #1976d2; text-align: right; }

/* textarea */
.edit-field-textarea { align-items: flex-start; padding-top: 12px; }
.edit-field-textarea label { padding-top: 6px; }
.edit-field textarea {
  flex: 1;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  resize: vertical;
  min-height: 72px;
  line-height: 1.5;
}
.edit-field textarea:focus { border-color: #1976d2; }

/* 푸터 */
.edit-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 24px;
  background: #f8fafc;
  border-top: 1px solid #e2e8f0;
}
.btn-cancel {
  height: 38px; padding: 0 22px;
  background: #fff; border: 1px solid #d1d5db;
  border-radius: 6px; font-size: 14px; cursor: pointer;
}
.btn-cancel:hover { background: #f1f5f9; }
.btn-submit {
  height: 38px; padding: 0 28px;
  background: #1976d2; color: #fff;
  border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-submit:hover { background: #1565c0; }
</style>
</section>
</body>
</html>
