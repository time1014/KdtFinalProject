<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE - 소요시간 수정</title>
</head>
<body>
<section>
<div class="edit-wrap">

  <div class="edit-card">
    <!-- 헤더 -->
    <div class="edit-header">
      <span class="edit-title">소요시간 수정</span>
    </div>

    <!-- 일감 정보 요약 -->
    <div class="task-summary">
      <div class="summary-row">
        <span class="s-label">프로젝트</span>
        <span class="s-value" th:text="${workTime.projectTitle}">-</span>
      </div>
      <div class="summary-row">
        <span class="s-label">일감</span>
        <span class="s-value" th:text="${workTime.taskTitle}">-</span>
      </div>
      <div class="summary-row">
        <span class="s-label">설명</span>
        <span class="s-value" th:text="${workTime.taskDescribe}">-</span>
      </div>
    </div>

    <!-- 수정 폼 -->
    <form th:action="@{/updateProjectTime}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="workId"    th:value="${workTime.workId}">
      <input type="hidden" name="projectId" th:value="${workTime.projectId}">
      <input type="hidden" name="taskId"    th:value="${workTime.taskId}">

      <!-- 사용자 (고정) -->
      <div class="edit-field">
        <label>사용자 <span class="req">*</span></label>
        <span class="edit-static-value" th:text="${workTime.userName}">-</span>
        <input type="hidden" name="userCode" th:value="${workTime.userCode}">
      </div>

      <!-- 작업일자 (고정) -->
      <div class="edit-field">
        <label>작업일자 <span class="req">*</span></label>
        <span class="edit-static-value"
              th:text="${workTime.workDate != null} ? ${#dates.format(workTime.workDate,'yyyy-MM-dd')} : '-'">-</span>
        <input type="hidden" name="workDate"
               th:value="${workTime.workDate != null} ? ${#dates.format(workTime.workDate,'yyyy-MM-dd')} : ''">
      </div>

      <!-- 소요시간 -->
      <div class="edit-field">
        <label>소요시간(h) <span class="req">*</span></label>
        <input type="number" id="spentHourInput" name="spentHour"
               min="0" step="1"
               th:value="${workTime.spentHour}"
               placeholder="시간 입력" required>
      </div>

      <!-- 작업분류 -->
      <div class="edit-field">
        <label>작업분류 <span class="req">*</span></label>
        <select id="workNameSelect" name="workName" required>
          <option value="" disabled hidden>작업분류를 선택하세요.</option>
          <option th:each="v : ${workTypeList}"
                  th:value="${v.taskClassificationId}"
                  th:text="${v.workName}"
                  th:selected="${v.taskClassificationId == workTime.workName}"></option>
        </select>
      </div>

      <!-- 진척도 (수정 가능, 일감 상세조회의 진척도와 동일하게 반영됨) -->
      <div class="edit-field">
        <label>진척도</label>
        <div class="progress-wrap">
          <input type="range" id="progressRange" name="progress"
                 min="0" max="100" step="10" value="0">
          <span id="progressText" class="progress-text">0%</span>
        </div>
      </div>
      <p class="progress-hint" id="progressHint" style="display: none;"></p>

      <!-- 내용 -->
      <div class="edit-field edit-field-textarea">
        <label>내용</label>
        <textarea name="spentContent" rows="3"
                  placeholder="작업 내용을 입력하세요"
                  th:text="${workTime.spentContent}"></textarea>
      </div>

      <div class="edit-footer">
        <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
        <button type="submit" class="btn-submit">저장</button>
      </div>
    </form>
  </div>

</div>

<!-- Thymeleaf → JS -->
<script th:inline="javascript">
const editTaskId = /*[[${workTime.taskId}]]*/ '';
// 일감의 현재 진척도 (일감 상세조회 진척도와 동일한 값에서 시작)
const currentTaskProgress = /*[[${workTime.taskProgress}]]*/ 0;

// range input의 트랙을 현재 값(min~max 대비 %)만큼 색이 채워지도록 갱신
function updateRangeFill(rangeEl) {
  const min = parseInt(rangeEl.min) || 0;
  const max = parseInt(rangeEl.max) || 100;
  const val = parseInt(rangeEl.value) || 0;
  const percent = max > min ? ((val - min) / (max - min)) * 100 : 0;
  const filledColor = rangeEl.disabled ? '#94a3b8' : '#6D5EF7';
  rangeEl.style.background =
    `linear-gradient(to right, ${filledColor} 0%, ${filledColor} ${percent}%, #e2e8f0 ${percent}%, #e2e8f0 100%)`;
}

function setProgress(pct) {
  const rangeEl = document.getElementById('progressRange');
  rangeEl.value = pct;
  document.getElementById('progressText').textContent = pct + '%';
  updateRangeFill(rangeEl);
}

// 작업분류 select에서 "완료" 라벨을 가진 <option>을 찾음
function findCompleteWorkNameOption(selectEl) {
  return Array.from(selectEl.options).find(o => o.textContent.trim() === '완료');
}

// 진척도가 100%가 되면 작업분류를 자동으로 "완료"로 맞춰줌
function syncWorkNameWithProgress(progressValue) {
  const workNameSelect = document.getElementById('workNameSelect');
  if (!workNameSelect) return;
  const completeOption = findCompleteWorkNameOption(workNameSelect);
  if (parseInt(progressValue) === 100 && completeOption) {
    workNameSelect.value = completeOption.value;
  }
}

// 하위일감 유무에 따라 진척도 편집 가능 여부 결정
// (완료되지 않은 하위일감이 있으면 잠금, 없으면 0~100% 자유 편집 - 현재값보다 낮게도 설정 가능)
function applyProgressLock() {
  const rangeEl = document.getElementById('progressRange');
  const hint = document.getElementById('progressHint');
  fetch('/hasChildTask?taskId=' + encodeURIComponent(editTaskId))
    .then(res => res.json())
    .then(hasChild => {
      if (hasChild) {
        rangeEl.disabled = true;
        rangeEl.classList.add('progress-locked');
        rangeEl.min = currentTaskProgress;
        setProgress(currentTaskProgress);
        hint.textContent = '* 완료되지 않은 하위일감이 있어 진척도를 수정할 수 없습니다.';
        hint.style.display = 'block';
      } else {
        rangeEl.disabled = false;
        rangeEl.classList.remove('progress-locked');
        rangeEl.min = 0;
        hint.style.display = 'none';
        updateRangeFill(rangeEl);
      }
    })
    .catch(() => {
      rangeEl.disabled = false;
      rangeEl.min = 0;
      hint.style.display = 'none';
      updateRangeFill(rangeEl);
    });
}

setProgress(currentTaskProgress);
if (editTaskId) {
  applyProgressLock();
}

document.getElementById('progressRange').addEventListener('input', function() {
  document.getElementById('progressText').textContent = this.value + '%';
  updateRangeFill(this);
  syncWorkNameWithProgress(this.value);
});

// 진척도가 100%가 아닌데 작업분류를 "완료"로 직접 선택하려는 경우 막음
document.getElementById('workNameSelect').addEventListener('change', function() {
  const completeOption = findCompleteWorkNameOption(this);
  if (completeOption && this.value === completeOption.value) {
    const currentProgress = parseInt(document.getElementById('progressRange').value) || 0;
    if (currentProgress !== 100) {
      alert('진척도가 100%가 아니면 작업분류를 완료로 설정할 수 없습니다.');
      this.value = '';
    }
  }
});
</script>

<style>
.edit-wrap {
  max-width: 100%;
  margin: 20px 0;
  padding: 0;
  font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
  font-size: 14px;
  color: #333;
}
.edit-card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.10);
  overflow: hidden;
}
.edit-header {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid #e2e8f0;
  background: #f8fafc;
}
.edit-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }

/* 일감 요약 */
.task-summary {
  background: #F1EDFF;
  border-left: 3px solid #6D5EF7;
  margin: 20px 24px 8px;
  padding: 12px 14px;
  border-radius: 0 6px 6px 0;
}
.summary-row { display: flex; gap: 10px; margin-bottom: 4px; font-size: 13px; }
.summary-row:last-child { margin-bottom: 0; }
.s-label { color: #94a3b8; font-weight: 600; min-width: 48px; }
.s-value { color: #1e293b; }

/* 필드 */
.edit-field {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  border-bottom: 1px solid #f1f5f9;
}
.edit-field label {
  width: 90px;
  font-weight: 600;
  color: #475569;
  font-size: 13px;
  flex-shrink: 0;
}
.edit-field input[type="date"],
.edit-field input[type="number"],
.edit-field select {
  flex: 1;
  height: 36px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 0 10px;
  font-size: 14px;
  outline: none;
}
.edit-field input:focus,
.edit-field select:focus { border-color: #6D5EF7; }
.req { color: #ef4444; }

/* 고정 값 표시 (사용자 / 작업일자) */
.edit-static-value {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: #1e293b;
}

/* 진척도 (수정 가능) */
.progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.progress-wrap input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  background: #e2e8f0; /* JS가 값에 따라 linear-gradient로 덮어씀 */
}
.progress-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #6D5EF7;
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px #6D5EF7;
}
.progress-wrap input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #6D5EF7;
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px #6D5EF7;
}
.progress-wrap input[type="range"]::-moz-range-track {
  height: 6px;
  border-radius: 3px;
  background: transparent;
}
.progress-wrap input[type="range"].progress-locked {
  opacity: .5;
  cursor: not-allowed;
}
.progress-wrap input[type="range"].progress-locked::-webkit-slider-thumb {
  background: #94a3b8;
  box-shadow: 0 0 0 1px #94a3b8;
}
.progress-wrap input[type="range"].progress-locked::-moz-range-thumb {
  background: #94a3b8;
  box-shadow: 0 0 0 1px #94a3b8;
}
.progress-text { width: 38px; font-weight: 700; color: #6D5EF7; text-align: right; }
.progress-hint {
  margin: -8px 24px 0;
  padding-left: 102px;
  font-size: 12px;
  color: #94a3b8;
}

/* textarea */
.edit-field-textarea { align-items: flex-start; padding-top: 12px; }
.edit-field-textarea label { padding-top: 6px; }
.edit-field textarea {
  flex: 1;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  resize: vertical;
  min-height: 72px;
  line-height: 1.5;
}
.edit-field textarea:focus { border-color: #6D5EF7; }

/* 푸터 */
.edit-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 24px;
  background: #f8fafc;
  border-top: 1px solid #e2e8f0;
}
.btn-cancel {
  height: 38px; padding: 0 22px;
  background: #fff; border: 1px solid #d1d5db;
  border-radius: 6px; font-size: 14px; cursor: pointer;
}
.btn-cancel:hover { background: #f1f5f9; }
.btn-submit {
  height: 38px; padding: 0 28px;
  background: #6D5EF7; color: #fff;
  border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-submit:hover { background: #5B4FEA; }
</style>
</section>
</body>
</html>
