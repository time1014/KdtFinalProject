<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 설정</title>
    <link rel="stylesheet" href="/css/project/setting.css">
</head>
<body>
<section class="settings-page">
	<div th:replace="~{common/fragments/project-setting-tabs :: projectSettingTabs}"></div>
    <div class="settings-card">
        <form method="post"
              th:action="@{/project/{id}/setting(id=${setting.projectId})}">

            <!-- CSRF 토큰 -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <!-- 프로젝트 이름 (필수) -->
            <div class="form-row">
                <label class="form-label required">이름</label>
                <input type="text"
                       name="projectTitle"
                       class="form-input"
                       th:value="${setting.projectTitle}"
                       placeholder="프로젝트 이름을 입력하세요."
                       required>
            </div>

            <!-- 프로젝트 설명 -->
            <div class="form-row">
                <label class="form-label">설명</label>
                <textarea name="projectDescribe"
                          class="form-textarea"
                          th:text="${setting.projectDescribe}"></textarea>
            </div>

            <!-- 식별자 (읽기 전용) -->
            <div class="form-row">
                <label class="form-label">식별자</label>
                <input type="text"
                       class="form-input readonly"
                       th:value="${setting.projectIdentifier}"
                       readonly>
            </div>

            <!-- 모듈 체크박스 -->
            <div class="form-row module-row">
                <label class="form-label">모듈</label>
                <div class="module-checks">
                    <div class="module-flex">
                        <div class="module-item" th:each="m : ${modules}">
						    <th:block th:if="${m.name != 'b11'}">
						        <label>
						            <input type="checkbox" name="moduleNames"
						                   th:value="${m.name}" th:checked="${m.checked}">
						            <span class="custom-check-box"></span>
						            <span class="module-text" th:text="${m.label}"></span>
						        </label>
						    </th:block>
						</div>
                    </div>
                </div>
            </div>

            <!-- 저장 버튼 -->
            <div class="form-btn-area">
                <button type="submit" class="btn-save">저장</button>
            </div>

        </form>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast" class="toast-message"
         th:if="${toastMessage != null}"
         th:text="${toastMessage}"></div>

    <script>
        const toast = document.getElementById("toast");
        if (toast) {
            toast.style.opacity = "1";
            toast.style.visibility = "visible";
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.visibility = "hidden";
            }, 3000);
        }
    </script>

</section>
</body>
</html>
