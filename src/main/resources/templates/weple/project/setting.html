<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 설정</title>
    <link rel="stylesheet" href="/css/project/setting.css">
</head>
<body>
<section class="settings-page">

    <h3 class="settings-title">설정</h3>

    <!-- 설정 탭 (프로젝트 / 구성원 / 저장소 / 시간추적) -->
    <div class="settings-tab-bar">
        <a th:href="@{/project/{id}/settings(id=${setting.projectId})}"
           th:classappend="${activeTab == 'project'} ? ' active'">프로젝트</a>
        <a th:href="@{/project/{id}/settings/members(id=${setting.projectId})}"
           th:classappend="${activeTab == 'member'} ? ' active'">구성원</a>
        <a th:href="@{/project/{id}/settings/repository(id=${setting.projectId})}"
           th:classappend="${activeTab == 'repository'} ? ' active'">저장소</a>
        <a th:href="@{/project/{id}/settings/time(id=${setting.projectId})}"
           th:classappend="${activeTab == 'time'} ? ' active'">시간추적</a>
    </div>

    <div class="settings-card">
        <form method="post"
              th:action="@{/project/{id}/settings(id=${setting.projectId})}">

            <!-- CSRF 토큰 -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <!-- 프로젝트 이름 (필수) -->
            <div class="form-row">
                <label class="form-label required">이름</label>
                <input type="text"
                       name="projectTitle"
                       class="form-input"
                       th:value="${setting.projectTitle}"
                       placeholder="프로젝트 이름을 입력하세요."
                       required>
            </div>

            <!-- 프로젝트 설명 -->
            <div class="form-row">
                <label class="form-label">설명</label>
                <textarea name="projectDescribe"
                          class="form-textarea"
                          th:text="${setting.projectDescribe}"></textarea>
            </div>

            <!-- 식별자 (읽기 전용 - 변경 불가) -->
            <!-- ★ th:value 필드명 projectIdentifier 로 수정 -->
            <div class="form-row">
                <label class="form-label">식별자</label>
                <input type="text"
                       class="form-input readonly"
                       th:value="${setting.projectIdentifier}"
                       readonly>
            </div>

            <!-- 모듈 체크박스 목록 -->
            <div class="form-row module-row">
                <label class="form-label">모듈</label>
                <div class="module-checks">
                    <!-- name="moduleNames" → form submit 시 ProjectVO.moduleNames 에 바인딩 -->
                    <label class="module-item" th:each="m : ${modules}">
                        <input type="checkbox"
                               name="moduleNames"
                               th:value="${m.name}"
                               th:checked="${m.checked}">
                        <span th:text="${m.label}"></span>
                    </label>
                </div>
            </div>

            <!-- 저장 버튼 -->
            <div class="form-btn-area">
                <button type="submit" class="btn-save">저장</button>
            </div>

        </form>
    </div>

    <!-- 저장 완료 토스트 메시지 -->
    <div id="toast" class="toast-message"
         th:if="${toastMessage != null}"
         th:text="${toastMessage}"></div>

    <script>
        // 토스트 메시지 3초 후 자동 숨김
        const toast = document.getElementById("toast");
        if (toast) {
            toast.style.opacity = "1";
            toast.style.visibility = "visible";
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.visibility = "hidden";
            }, 3000);
        }
    </script>

</section>
</body>
</html>
