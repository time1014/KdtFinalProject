<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>н”„лЎңм қнҠё м„Өм •</title>
    <link rel="stylesheet" href="/css/project/setting.css">
</head>
<body>
<section class="settings-page">
	<div th:replace="~{common/fragments/project-setting-tabs :: projectSettingTabs}"></div>
    <div class="settings-card">
        <form method="post"
              th:action="@{/project/{id}/setting(id=${setting.projectId})}">

            <!-- CSRF нҶ нҒ° -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <!-- н”„лЎңм қнҠё мқҙлҰ„ (н•„мҲҳ) -->
            <div class="form-row">
                <label class="form-label required">мқҙлҰ„</label>
                <!-- вҶ“вҶ“вҶ“ th:readonly, th:classappend м¶”к°Җ вҶ“вҶ“вҶ“ -->
                <input type="text"
                       name="projectTitle"
                       class="form-input"
                       th:value="${setting.projectTitle}"
                       placeholder="н”„лЎңм қнҠё мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”."
                       th:readonly="${!canSaveSetting}"
                       th:classappend="${!canSaveSetting} ? 'readonly' : ''"
                       required>
            </div>

            <!-- н”„лЎңм қнҠё м„ӨлӘ… -->
            <div class="form-row">
                <label class="form-label">м„ӨлӘ…</label>
                <textarea name="projectDescribe"
                          class="form-textarea"
                          th:text="${setting.projectDescribe}"
                          th:readonly="${!canSaveSetting}"
                          th:classappend="${!canSaveSetting} ? 'readonly' : ''"></textarea>
            </div>

            <!-- мӢқлі„мһҗ (мқҪкё° м „мҡ©) вҖ” мӣҗлһҳл¶Җн„° readonlyлқј ліҖкІҪ м—ҶмқҢ -->
            <div class="form-row">
                <label class="form-label">мӢқлі„мһҗ</label>
                <input type="text"
                       class="form-input readonly"
                       th:value="${setting.projectIdentifier}"
                       readonly>
            </div>

            <!-- лӘЁл“Ҳ мІҙнҒ¬л°•мҠӨ -->
            <div class="form-row module-row">
                <label class="form-label">лӘЁл“Ҳ</label>
                <div class="module-checks">
                    <div class="module-flex">

                        <!-- к°ңмҡ”: н•ӯмғҒ к°•м ң нҸ¬н•Ё, мқҪкё° м „мҡ© -->
                        <div class="module-item">
                            <label id="labelOverview">
                                <input type="checkbox" name="moduleNames" value="b1" checked disabled>
                                <input type="hidden" name="moduleNames" value="b1">
                                <span class="custom-check-box"></span>
                                <span class="module-text">к°ңмҡ”</span>
                            </label>
                        </div>

                        <div class="module-item" th:each="m : ${modules}">
                            <label>
                                <input type="checkbox" name="moduleNames"
                                       th:value="${m.name}"
                                       th:checked="${m.checked}"
                                       th:disabled="${!canSaveSetting}">
                                <span class="custom-check-box"></span>
                                <span class="module-text" th:text="${m.label}"></span>
                            </label>
                        </div>

                        <!-- м„Өм •: н•ӯмғҒ к°•м ң нҸ¬н•Ё, мқҪкё° м „мҡ© -->
                        <div class="module-item">
                            <label id="labelSettings">
                                <input type="checkbox" name="moduleNames" value="b11" checked disabled>
                                <input type="hidden" name="moduleNames" value="b11">
                                <span class="custom-check-box"></span>
                                <span class="module-text">м„Өм •</span>
                            </label>
                        </div>

                    </div>
                </div>
            </div>

            <!-- м ҖмһҘ лІ„нҠј -->
            <div class="form-btn-area">
			    <button th:if="${canSaveSetting}" type="submit" class="btn-save">м ҖмһҘ</button>
			</div>

        </form>
    </div>

    <!-- нҶ мҠӨнҠё л©”мӢңм§Җ -->
    <div id="toast" class="toast-message"
         th:if="${toastMessage != null}"
         th:text="${toastMessage}"></div>

    <script src="/js/project/setting.js"></script>

</section>
</body>
</html>
