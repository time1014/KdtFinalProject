<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 목록</title>
    <link rel="stylesheet" href="/css/project/project.css">
</head>
<body>

<section class="project-page">
    <h3 class="project-title">프로젝트 목록</h3>
    <div class="project-card">

        <div class="project-toolbar">
            <form id="searchForm" method="get" th:action="@{/project}">
                <div class="project-search">
                    <i class="fa fa-search"></i>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="프로젝트명을 입력하세요.">
                </div>
            </form>
            <a th:href="@{/system/project}" class="project-create-btn"
			   sec:authorize="hasAnyAuthority('ROLE_COMPANY_OWNER','ROLE_COMPANY_ADMIN')">
			    <i class="fa fa-folder"></i> 프로젝트 생성
			</a>
        </div>

        <div class="project-table-wrap">
            <table class="project-table">
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>프로젝트명</th>
                        <th>설명</th>
                        <th>등록일</th>
                        <th>마감일</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="project, stat : ${projects}"
                        th:classappend="${project?.status == '완료'} ? 'project-dim' : ''">
                        <td th:text="${(currentPage - 1) * 10 + stat.count}"></td>
                        <td>
                            <a class="project-link"
                               th:href="@{/project/outline(projectId=${project.projectId})}"
                               th:text="${project.projectTitle}">
                            </a>
                        </td>
                        <td th:text="${project?.projectDescribe}"></td>
                        <td th:text="${project?.createdAt != null ? #dates.format(project.createdAt,'yyyy-MM-dd') : '-'}"></td>
                        <td th:text="${project?.finishDate != null ? #dates.format(project.finishDate,'yyyy-MM-dd') : '-'}"></td>
                        <td>
                            <span th:if="${project?.status == '신규'}" class="status-badge status-new">신규</span>
                            <span th:if="${project?.status == '진행 중'}" class="status-badge status-progress">진행 중</span>
                            <span th:if="${project?.status == '완료'}" class="status-badge status-done">완료</span>
                            <span th:if="${project?.status == null or project?.status == ''}">-</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(projects)}">
                        <td colspan="6" class="empty-message">검색 결과가 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이징 -->
        <div class="pagination-wrap" th:if="${totalPages > 0}">
            <a th:href="${currentPage > 1} ? @{/project(page=${currentPage - 1}, keyword=${keyword})} : '#'"
               th:classappend="${currentPage <= 1} ? 'disabled' : ''"
               class="page-btn">&lt; 이전</a>

            <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a th:href="@{/project(page=${i}, keyword=${keyword})}"
                   th:text="${i}"
                   th:classappend="${i == currentPage} ? 'active' : ''"
                   class="page-btn"></a>
            </th:block>

            <a th:href="${currentPage < totalPages} ? @{/project(page=${currentPage + 1}, keyword=${keyword})} : '#'"
               th:classappend="${currentPage >= totalPages} ? 'disabled' : ''"
               class="page-btn">다음 &gt;</a>
        </div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const navigationEntries = performance.getEntriesByType('navigation');
            if (navigationEntries.length > 0 && navigationEntries[0].type === 'reload') {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('keyword')) {
                    window.location.href = '/project';
                }
            }
        });
    </script>
</section>

</body>
</html>
