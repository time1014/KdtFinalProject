<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE - 테스트 관리</title>
<link rel="stylesheet" th:href="@{/css/testcase/testcase-list.css}">
</head>
<body>

	<section class="testcase-section">
		<form id="searchForm"
			th:action="${currentTab == 'coverage'} ? @{/project/coverage} : @{/project/testcase}"
			method="get">
			<input type="hidden" name="projectId" th:value="${projectId}" /> <input
				type="hidden" id="pageInput" name="page" th:value="${currentPage}" />

			<div class="tc-header">
				<div class="tc-tabs">
					<div class="tc-tab"
						th:classappend="${currentTab == 'testcase'} ? 'active'"
						th:onclick="|location.href='@{/project/testcase(projectId=${projectId})}'|">테스트
						케이스</div>

					<div class="tc-tab"
						th:classappend="${currentTab == 'coverage'} ? 'active'"
						th:onclick="|location.href='@{/project/coverage(projectId=${projectId})}'|">요구사항
						커버리지</div>
				</div>

				<div class="tc-search" id="search-box"
					th:if="${currentTab == 'testcase'}">
					<input type="text" name="searchKeyword" th:value="${searchKeyword}"
						placeholder="테스트 케이스 검색">
				</div>
			</div>
		</form>

		<div id="tab-testcase" class="tab-content active"
			th:if="${currentTab == 'testcase'}">
			<div class="tc-table-container">
				<table class="tc-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>테스트 케이스</th>
							<th>작성자</th>
							<th>담당자</th>
							<th>진행상황</th>
							<th>작성일자</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${#lists.isEmpty(testCaseList)}">
							<td colspan="6" style="text-align: center;">등록된 테스트 케이스가
								없습니다.</td>
						</tr>
						<tr th:unless="${#lists.isEmpty(testCaseList)}"
							th:each="tc : ${testCaseList}">
							<td th:text="${tc.testId}"></td>
							<td th:text="${tc.testName}"></td>
							<td th:text="${tc.userName}"></td>
							<td th:text="${tc.managerName}"></td>
							<td><span class="status-badge"
								th:classappend="${#strings.toLowerCase(tc.coverageStatus) == 'partial' ? 'status-partial' : 
                                                       #strings.toLowerCase(tc.coverageStatus) == 'covered' ? 'status-covered' : 
                                                       #strings.toLowerCase(tc.coverageStatus) == 'designed' ? 'status-designed' : 'status-not-covered'}"
								th:text="${tc.coverageStatus}"></span></td>
							<td th:text="${#dates.format(tc.createdAt, 'yyyy/MM/dd')}"></td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="tc-footer">
				<button class="btn-register" type="button"
					th:onclick="|location.href='@{/project/testcase/insert(projectId=${projectId})}'|">등록</button>
			</div>

			<div class="pagination-wrap"
				th:if="${totalPages != null and totalPages > 0}">
				<a href="javascript:void(0);"
					th:onclick="${currentPage > 1} ? '|goPage(${currentPage - 1})|' : ''"
					th:classappend="${currentPage <= 1} ? 'disabled'" class="page-btn">&lt;
					이전</a>
				<th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
					<a href="javascript:void(0);" th:onclick="|goPage(${i})|"
						th:text="${i}" th:classappend="${i == currentPage} ? 'active'"
						class="page-btn">1</a>
				</th:block>
				<a href="javascript:void(0);"
					th:onclick="${currentPage < totalPages} ? '|goPage(${currentPage + 1})|' : ''"
					th:classappend="${currentPage >= totalPages} ? 'disabled'"
					class="page-btn">다음 &gt;</a>
			</div>
		</div>

		<th:block th:if="${currentTab == 'coverage'}">
			<div th:replace="~{weple/testcase/coverage :: coverageTab}"></div>
		</th:block>

		<script th:src="@{/js/testcase/testcase.js}"></script>
	</section>

</body>
</html>
