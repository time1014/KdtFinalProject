<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div id="tab-coverage" class="tab-content active"
	th:fragment="coverageTab">

	<div class="coverage-legend">
		<span class="legend-title">커버리지 범례</span> <span
			class="legend-color covered">Covered</span> 실행 대상 모두 통과, 미완료 결함 없음 <span
			class="legend-divider">|</span> <span class="legend-color partial">Partial</span>
		일부만 통과 또는 일부만 실행 <br> <span class="legend-color designed">Designed</span>
		테스트 케이스는 있으나 아직 실행 안함 <span class="legend-divider">|</span> <span
			class="legend-color not-covered">Not Covered</span> fail/block 또는 미완료
		결함 존재
	</div>

	<div class="tc-table-container">
		<table class="tc-table">
			<thead>
				<tr>
					<th>요구사항</th>
					<th>버전</th>
					<th>테스트 케이스</th>
					<th>커버리지</th>
				</tr>
			</thead>
			<tbody>
				<tr th:if="${#lists.isEmpty(testCaseList)}">
					<td colspan="4" style="text-align: center;">등록된 커버리지 정보가 없습니다.</td>
				</tr>
				<tr th:unless="${#lists.isEmpty(testCaseList)}"
					th:each="tc : ${testCaseList}">
					<td th:text="${tc.taskTitle}"></td>
					<td th:text="${tc.milestoneVersion}"></td>
					<td th:text="${tc.testName}"></td>
					<td><span class="status-badge"
						th:classappend="${#strings.toLowerCase(tc.coverageStatus) == 'partial' ? 'status-partial' : 
                                               #strings.toLowerCase(tc.coverageStatus) == 'covered' ? 'status-covered' : 
                                               #strings.toLowerCase(tc.coverageStatus) == 'designed' ? 'status-designed' : 'status-not-covered'}"
						th:text="${tc.coverageStatus}"></span></td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="pagination-wrap"
		th:if="${totalPages != null and totalPages > 0}">
		<a href="javascript:void(0);"
			th:onclick="${currentPage > 1} ? '|goPage(${currentPage - 1})|' : ''"
			th:classappend="${currentPage <= 1} ? 'disabled'" class="page-btn">&lt;
			이전</a>
		<th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
			<a href="javascript:void(0);" th:onclick="|goPage(${i})|"
				th:text="${i}" th:classappend="${i == currentPage} ? 'active'"
				class="page-btn">1</a>
		</th:block>
		<a href="javascript:void(0);"
			th:onclick="${currentPage < totalPages} ? '|goPage(${currentPage + 1})|' : ''"
			th:classappend="${currentPage >= totalPages} ? 'disabled'"
			class="page-btn">다음 &gt;</a>
	</div>
</div>
</html>
