<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE</title>
    <link rel="stylesheet" th:href="@{/css/testcase/testcase-detail.css}" > 
</head>
<body>

<section class="my-test-detail">

    <div class="breadcrumb">
        <span>연결된 일감</span> : <a  id="connectTask"
        							th:text="${testCaseDetail.taskTitle}"
                                    th:href="@{/project/task/detail/{id}(id=${taskId}, projectId=${projectId})}"></a>
    </div>

    <h2 class="page-title" th:text="${testCaseDetail.testName}">
        
    </h2>

    <div class="info-grid">

        <div class="info-item">
            <div class="label">진행상황</div>
            <div class="value" th:text="${testCaseDetail.coverageStatus}">
            </div>
        </div>

        <div class="info-item">
            <div class="label">테스트 일자</div>
            <div class="value" 
                 th:text="${testCaseDetail.testDate != null ? #dates.format(testCaseDetail.testDate, 'yyyy/MM/dd') : ''}">
            </div>
        </div>

        <div class="info-item">
            <div class="label">우선순위</div>
            <div class="value" th:text="${testCaseDetail.priority}">
            </div>
        </div>

        <div class="info-item">
            <div class="label">테스트 여부</div>
            <div class="value" th:text="${testCaseDetail.testYn}">
            </div>
        </div>

        <div class="info-item">
            <div class="label">담당자</div>
            <div class="value user-name" th:text="${testCaseDetail.managerName}">
            </div>
        </div>

    </div>

    <div class="content-box">
        <h3>테스트 사항 및 결과</h3>

        <div class="content-item">
            <div class="content-title">테스트 사항 및 결과 :</div>
            <div class="content-text" th:text="${testCaseDetail.testContent}">
            </div>
        </div>
    </div>

    <div class="content-box">
        <h3>설명</h3>
        <div class="description" th:text="${testCaseDetail.testDescribe}">
        </div>
    </div>

    <div class="btn-area">
    <th:block th:if="${#strings.equals(testCaseDetail.userCode, loginUserCode)}">
        <button type="button" class="btn btn-primary"
                th:onclick="|location.href='@{/project/testcase/update(projectId=${projectId}, testId=${testCaseDetail.testId})}'|">✏ 편집</button>
        
        <button type="button" class="btn btn-danger"
        th:data-test-id="${testCaseDetail.testId}"
        th:data-test-name="${testCaseDetail.testName}"
        th:data-project-id="${projectId}"
        onclick="openTcDeleteModal(this)">🗑 삭제</button>

<dialog class="tc-delete-dialog" id="tcDeleteDialog">
    <div class="tc-dialog-header">
        <h2>테스트 케이스 삭제</h2>
        <button class="tc-dialog-close" type="button" onclick="closeTcDeleteModal()">&times;</button>
    </div>
    
    <form id="tcDeleteForm" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"> 
        
        <div class="tc-dialog-body">
            <p class="tc-dialog-desc">
                <strong id="tcDeleteName">테스트 케이스명</strong>을(를) 삭제합니다. 
                관련된 테스트 이력이나 결과가 함께 영향받을 수 있으며, 이 작업은 되돌릴 수 없습니다.
            </p>
            
            <div class="tc-dialog-input-wrap">
                <label for="tcDeleteConfirmationName" id="tcDeletePrompt" class="tc-dialog-prompt">
                    삭제하려면 테스트 케이스명을 입력하세요.
                </label>
                <input id="tcDeleteConfirmationName" name="confirmationName" type="text" class="tc-dialog-input" required autocomplete="off">
            </div>
            
            <div class="tc-dialog-actions">
                <button class="tc-btn-cancel" type="button" onclick="closeTcDeleteModal()">취소</button>
                <button class="tc-btn-delete" type="submit" id="tcDeleteSubmitBtn" disabled>삭제 확인</button>
            </div>
        </div>
    </form>
</dialog>
<script th:src="@{/js/testcase/testcase.js}"></script>
</section>

</body>
</html>
