<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>위키 문서 등록</title>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css">
    <link rel="stylesheet" href="/css/wiki/wiki.css">
</head>
<body>
<section class="wiki-page">

    <h3 class="wiki-page-title">위키 문서 등록</h3>

    <form id="wikiForm" method="post" th:action="@{/project/wiki/register}">
        <input type="hidden" name="projectId"  th:value="${projectId}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" id="contentInput" name="content">
        <input type="hidden" id="relationsInput" name="relations">

        <!-- 제목 컨트롤 행 -->
        <div class="wiki-modify-ctrl-row">
            <span class="wiki-modify-title-label">
                <span class="title-icon">📝</span>
                문서 제목 <span class="required">*</span>
            </span>
            <select name="parentPageId" class="wiki-register-parent-select">
                <option value="">상위 없음</option>
                <option th:each="wiki : ${wikiTree}"
                        th:value="${wiki.wikiPageId}"
                        th:text="${wiki.title}"
                        th:selected="${wiki.wikiPageId == parentPageId}"></option>
            </select>
            <input type="text" name="title" id="titleInput"
                   class="wiki-modify-title-input"
                   placeholder="제목을 입력하세요." required>
            <div class="wiki-modify-action-btns">
                <button type="button" class="wiki-register-btn wiki-register-btn-cancel"
                        th:onclick="|location.href='@{/project/wiki(projectId=${projectId})}'|">취소</button>
                <button type="button" class="wiki-register-btn wiki-register-btn-save"
                        onclick="submitWikiForm()">등록</button>
            </div>
        </div>

        <!-- 에디터 카드 (우측 패널 없음) -->
        <div class="wiki-register-editor-card">
            <!-- Toast UI Editor -->
            <div id="wikiEditor"></div>

            <!-- 관련 문서 영역 -->
            <div class="wiki-register-relation-area">
                <div class="wiki-register-relation-label">🔗 관련 문서</div>

                <!-- 선택된 태그 칩 + 검색 입력 인라인 -->
                <div class="wiki-tag-chip-inline-wrap" id="tagInputArea">
                    <div id="tagChipList" class="wiki-tag-chip-inline-list"></div>
                    <input type="text" id="hashtagInput"
                           class="wiki-hashtag-inline-input"
                           placeholder="#일감 또는 #위키 제목으로 검색"
                           autocomplete="off">
                </div>
                <!-- 드롭다운 -->
                <div id="hashtagDropdown" class="wiki-hashtag-dropdown" style="display:none;"></div>
            </div>
        </div>
    </form>

    <script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/i18n/ko-kr.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var projectId  = /*[[${projectId}]]*/ 0;
        var csrfHeader = /*[[${_csrf.headerName}]]*/ '';
        var csrfToken  = /*[[${_csrf.token}]]*/ '';
        /*]]>*/

        var selectedRelations = [];
        var wikiEditor;

        document.addEventListener('DOMContentLoaded', function () {
            wikiEditor = new toastui.Editor({
                el: document.getElementById('wikiEditor'),
                height: '460px',
                initialEditType: 'markdown',
                previewStyle: 'vertical',
                language: 'ko-KR',
                placeholder: '마크다운으로 내용을 작성하세요...',
                toolbarItems: [
                    ['heading', 'bold', 'italic', 'strike'],
                    ['hr', 'quote'],
                    ['ul', 'ol', 'task'],
                    ['table', 'image', 'link'],
                    ['code', 'codeblock']
                ]
            });
        });

        function submitWikiForm() {
            var title = document.getElementById('titleInput').value.trim();
            if (!title) { alert('문서 제목은 필수 입력 항목입니다.'); document.getElementById('titleInput').focus(); return; }
            var content = wikiEditor.getMarkdown();
            if (!content.trim()) { alert('내용을 입력하세요.'); return; }
            document.getElementById('contentInput').value = content;
            document.getElementById('relationsInput').value = JSON.stringify(selectedRelations.filter(Boolean));
            document.getElementById('wikiForm').submit();
        }

        /* ── 해시태그 인라인 입력 ── */
        var hashDebounce = null;
        var inp = document.getElementById('hashtagInput');
        var dd  = document.getElementById('hashtagDropdown');
        var chipArea = document.getElementById('tagInputArea');

        inp.addEventListener('input', function () {
            var val = this.value;
            clearTimeout(hashDebounce);
            // '#' 입력 후 키워드
            var m = val.match(/#([\w가-힣ㄱ-ㅎa-zA-Z0-9\-_]+)$/);
            if (!m || m[1].length < 1) { closeDD(); return; }
            hashDebounce = setTimeout(function () { fetchHashtag(m[1]); }, 250);
        });

        inp.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeDD();
        });

        document.addEventListener('click', function (e) {
            if (!e.target.closest('#tagInputArea') && !e.target.closest('#hashtagDropdown')) closeDD();
        });

        // 드롭다운 위치: tagInputArea 기준
        function positionDD() {
            var rect = chipArea.getBoundingClientRect();
            dd.style.top  = (chipArea.offsetTop + chipArea.offsetHeight) + 'px';
            dd.style.left = chipArea.offsetLeft + 'px';
            dd.style.width = chipArea.offsetWidth + 'px';
        }

        function fetchHashtag(keyword) {
            fetch('/project/wiki/hashtag/search?projectId=' + projectId + '&keyword=' + encodeURIComponent(keyword))
                .then(function(r){ return r.json(); })
                .then(function(list){ renderDD(list); });
        }

        function renderDD(list) {
            dd.innerHTML = '';
            var filtered = list.filter(function(item) {
                var key = item.targetType + '|' + (item.targetTaskId || item.targetWikiId || '');
                return !selectedRelations.some(function(r){ return r && (r.targetType+'|'+(r.targetTaskId||r.targetWikiId||'')) === key; });
            });
            if (!filtered.length) { closeDD(); return; }
            filtered.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'wiki-hashtag-item';
                div.innerHTML = '<span class="wiki-relation-type-badge ' + (item.targetType==='TASK'?'badge-task':'badge-wiki') + '">'
                    + (item.targetType==='TASK'?'일감':'위키') + '</span>'
                    + '<span class="wiki-hashtag-item-title">#' + item.targetTitle + '</span>';
                div.addEventListener('click', function(){ selectItem(item); });
                dd.appendChild(div);
            });
            positionDD();
            dd.style.display = 'block';
        }

        function closeDD() { dd.style.display = 'none'; dd.innerHTML = ''; }

        function selectItem(item) {
            var idx = selectedRelations.length;
            selectedRelations.push({
                targetType: item.targetType, projectId: projectId,
                targetTaskId: item.targetType==='TASK' ? item.targetTaskId : null,
                targetWikiId: item.targetType==='WIKI' ? item.targetWikiId : null,
                targetTitle: item.targetTitle, targetUrl: item.targetUrl
            });
            addChip(item, idx);
            inp.value = '';
            closeDD();
            inp.focus();
        }

        function addChip(item, idx) {
            var chip = document.createElement('span');
            chip.className = 'wiki-tag-chip ' + (item.targetType==='TASK'?'chip-task':'chip-wiki');
            chip.setAttribute('data-idx', idx);
            chip.innerHTML = '#' + item.targetTitle
                + ' <button type="button" class="wiki-chip-remove" onclick="removeChip('+idx+')">✕</button>';
            // 입력창 앞에 삽입
            var list = document.getElementById('tagChipList');
            list.appendChild(chip);
        }

        function removeChip(idx) {
            selectedRelations[idx] = null;
            var chip = document.querySelector('.wiki-tag-chip[data-idx="'+idx+'"]');
            if (chip) chip.remove();
        }
    </script>
</section>
</body>
</html>
