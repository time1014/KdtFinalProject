<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">

<head>
    <meta charset="UTF-8">
    <title>위키 등록</title>
    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css">
    <link rel="stylesheet" href="/css/wiki/wiki.css">
</head>

<body>
<section class="wiki-page">

    <div class="wiki-form-wrap">
        <h3 class="wiki-form-title">위키 등록</h3>

        <form id="wikiForm" method="post" th:action="@{/project/wiki/register}">
            <input type="hidden" name="projectId" th:value="${projectId}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <!-- Toast UI Editor 내용을 hidden에 저장 -->
            <input type="hidden" id="contentInput" name="content">

            <!-- 상위 페이지 선택 -->
            <div class="wiki-form-row">
                <label class="wiki-form-label">상위 페이지</label>
                <select name="parentPageId" class="wiki-form-select">
                    <option value="">없음 (최상위)</option>
                    <option th:each="wiki : ${wikiTree}"
                            th:value="${wiki.wikiPageId}"
                            th:text="${wiki.title}"
                            th:selected="${wiki.wikiPageId == parentPageId}">
                    </option>
                </select>
            </div>

            <!-- 제목 -->
            <div class="wiki-form-row">
                <label class="wiki-form-label required">제목</label>
                <input type="text" name="title" class="wiki-form-input"
                       placeholder="위키 제목을 입력하세요." required>
            </div>

            <!-- 본문 - Toast UI Editor -->
            <div class="wiki-form-row">
                <label class="wiki-form-label required">본문</label>
                <div id="wikiEditor"></div>
            </div>

            <!-- 버튼 -->
            <div class="wiki-form-btn-area">
                <button type="button" class="wiki-btn wiki-btn-cancel"
                        onclick="history.back()">취소</button>
                <button type="button" class="wiki-btn wiki-btn-save"
                        onclick="submitForm()">등록</button>
            </div>
        </form>
    </div>

<!-- Toast UI Editor JS -->
<script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>

<script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
<script th:inline="javascript">
    let editor;

    document.addEventListener('DOMContentLoaded', function () {
        editor = new toastui.Editor({
            el: document.getElementById('wikiEditor'),
            height: '500px',
            initialEditType: 'wysiwyg',
            previewStyle: 'vertical',
            placeholder: '내용을 입력하세요.',
            toolbarItems: [
                ['heading', 'bold', 'italic', 'strike'],
                ['hr', 'quote'],
                ['ul', 'ol', 'task'],
                ['table', 'link'],
                ['code', 'codeblock']
            ]
        });
    });

    function submitForm() {
        const content = editor.getMarkdown();
        if (!content.trim()) {
            alert('본문을 입력하세요.');
            return;
        }
        document.getElementById('contentInput').value = content;
        document.getElementById('wikiForm').submit();
    }
</script>
</section>


</body>
</html>
