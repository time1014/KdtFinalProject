<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>위키 내용 수정</title>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css">
    <link rel="stylesheet" href="/css/wiki/wiki.css">
</head>
<body>
<section class="wiki-page">

    <div id="wikiToastContainer" class="wiki-toast-container"></div>

    <h3 class="wiki-page-title">위키 문서 수정</h3>

    <!-- 편집 잠금 배너 -->
    <div class="wiki-modify-lock-banner">
        <span class="wiki-modify-lock-icon">🔒</span>
        <div class="wiki-modify-lock-text-wrap">
            <span class="wiki-modify-lock-title">편집 잠금 상태</span>
            <span class="wiki-modify-lock-desc">
                문서를 수정하고 있습니다. 다른 사용자의 수정을 잠시 제한합니다.
                <span th:if="${lockInfo != null and lockInfo.lockedAt != null}"
                      th:text="'(잠금 시작 : ' + ${lockInfo.lockUserName} + ' '
                               + ${#temporals.format(lockInfo.lockedAt,'yyyy-MM-dd HH:mm')} + ')'"></span>
            </span>
        </div>
    </div>

    <form id="wikiForm" method="post" th:action="@{/project/wiki/modify}">
        <input type="hidden" name="projectId"  th:value="${projectId}">
        <input type="hidden" name="wikiPageId" th:value="${wiki.wikiPageId}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" id="contentInput" name="content">

        <!-- 제목 컨트롤 행 -->
        <div class="wiki-modify-ctrl-row">
            <span class="wiki-modify-title-label">
                <span class="title-icon">📝</span>
                문서 제목 <span class="required">*</span>
            </span>
            <input type="text" name="title" id="titleInput"
                   class="wiki-modify-title-input"
                   placeholder="문서 제목을 입력하세요."
                   th:value="${wiki.title}" required>
            <span class="wiki-modify-status-badge editing">수정 중</span>
            <span class="wiki-modify-version-badge"
                  th:text="'현재 v' + ${wiki.currentVersion}">현재 v1</span>
            <div class="wiki-modify-action-btns">
                <button type="button" class="wiki-register-btn wiki-register-btn-cancel"
                        onclick="cancelEdit()">취소</button>
                <button type="button" class="wiki-register-btn wiki-register-btn-save"
                        onclick="submitWikiForm()">저장</button>
            </div>
        </div>

        <!-- 2컬럼 바디 -->
        <div class="wiki-modify-body">

            <!-- 에디터 카드 -->
            <div class="wiki-modify-editor-card">
                <div id="wikiEditor"></div>

                <!-- 연관 문서 영역 -->
                <div class="wiki-register-relation-area">
                    <div class="wiki-register-relation-label">🔗 연관 문서</div>
                    <div class="wiki-tag-chip-inline-wrap" id="tagInputArea">
                        <th:block th:if="${relationList != null}">
                            <span th:each="rel : ${relationList}"
                                  th:attr="data-relation-id=${rel.wikiRelationId}"
                                  class="wiki-tag-chip"
                                  th:classappend="${rel.targetType == 'TASK'} ? ' chip-task' : ' chip-wiki'">
                                <span th:text="'#' + ${rel.targetTitle}"></span>
                                <button type="button" class="wiki-chip-remove"
                                        th:attr="onclick='removeExistingRelation(\'' + ${rel.wikiRelationId} + '\', this)'">✕</button>
                            </span>
                        </th:block>
                        <div id="newChipList" style="display:contents;"></div>
                        <input type="text" id="hashtagInput"
                               class="wiki-hashtag-inline-input"
                               placeholder="#일감 또는 #위키 제목"
                               autocomplete="off">
                    </div>
                    <div id="hashtagDropdown" class="wiki-hashtag-dropdown" style="display:none;"></div>
                </div>
            </div>

            <!-- 우측: 변경 이력 -->
            <div class="wiki-modify-right">
                <div class="wiki-history-box" style="flex:1; display:flex; flex-direction:column;">
                    <div class="wiki-box-title">변경 이력</div>
                    <div class="wiki-history-body">
                        <ul class="wiki-history-list">

                            <!-- 현재 편집 중 -->
                            <li class="wiki-history-item selected-version">
                                <label class="history-radio-wrap">
                                    <input type="radio" name="modifyHistoryVersion"
                                           class="history-radio" value="latest" checked
                                           onchange="highlightModifyItem(this);">
                                </label>
                                <span class="history-version history-version-latest"
                                      th:text="'v' + ${wiki.currentVersion} + ' (편집중)'"></span>
                                <span class="history-user" th:text="${wiki.userName}"></span>
                                <span class="history-date"
                                      th:text="${wiki.updateAt != null ? #temporals.format(wiki.updateAt,'yyyy-MM-dd HH:mm') : ''}"></span>
                            </li>

                            <!-- 이전 버전들: 클릭 이동 없음, 라디오+버튼으로만 이동 -->
                            <th:block th:if="${historyList != null and !#lists.isEmpty(historyList)}">
                                <li class="wiki-history-item"
                                    th:each="h : ${historyList}"
                                    th:id="'modifyItem-' + ${h.wikiVersion}">
                                    <label class="history-radio-wrap">
                                        <input type="radio" name="modifyHistoryVersion"
                                               class="history-radio"
                                               th:value="${h.wikiVersion}"
                                               onchange="highlightModifyItem(this);">
                                    </label>
                                    <span class="history-version" th:text="'v' + ${h.wikiVersion}"></span>
                                    <span class="history-user" th:text="${h.userName}"></span>
                                    <span class="history-date"
                                          th:text="${h.createdAt != null ? #temporals.format(h.createdAt,'yyyy-MM-dd HH:mm') : ''}"></span>
                                </li>
                            </th:block>

                        </ul>

                        <!-- 이 버전 보기 버튼으로만 이동 -->
                        <div class="history-view-wrap">
                            <button type="button" class="history-view-btn" onclick="goToSelectedVersion()">
                                이 버전 보기
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </form>

    <script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/i18n/ko-kr.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var initialContent = /*[[${wiki.content != null ? wiki.content : ''}]]*/ '';
        var wikiPageId     = /*[[${wiki.wikiPageId}]]*/ '';
        var projectId      = /*[[${projectId}]]*/ 0;
        var csrfHeader     = /*[[${_csrf.headerName}]]*/ '';
        var csrfToken      = /*[[${_csrf.token}]]*/ '';
        /*]]>*/

        var wikiEditor;
        var hashDebounce = null;
        var inp = null;
        var dd  = null;

        /* ── 토스트 (detail.html과 동일) ── */
        var TOAST_ICONS = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
		function wikiToast(type, title, msg, duration) {
		    var overlay = document.createElement('div');
		    overlay.className = 'wiki-toast-overlay';
		
		    var toast = document.createElement('div');
		    toast.className = 'wiki-toast toast-' + (type || 'info');
		    var icon = TOAST_ICONS[type] || 'ℹ️';
		    var msgHtml = msg ? '<span class="wiki-toast-msg">' + msg + '</span>' : '';
		    toast.innerHTML =
		        '<span class="wiki-toast-icon">' + icon + '</span>' +
		        '<div class="wiki-toast-body"><span class="wiki-toast-title">' + title + '</span>' + msgHtml + '</div>' +
		        '<button class="wiki-toast-close" onclick="wikiToastClose(this.closest(\'.wiki-toast-overlay\'))">✕</button>';
		
		    overlay.appendChild(toast);
		    document.body.appendChild(overlay);
		    setTimeout(function() { wikiToastClose(overlay); }, duration || 2500);
		}
		function wikiToastClose(overlay) {
		    if (!overlay || overlay.classList.contains('removing')) return;
		    overlay.classList.add('removing');
		    var toast = overlay.querySelector('.wiki-toast');
		    if (toast) toast.classList.add('removing');
		    setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 200);
		}

        document.addEventListener('DOMContentLoaded', function () {
            wikiEditor = new toastui.Editor({
                el: document.getElementById('wikiEditor'),
                height: '100%',
                minHeight: '480px',
                initialEditType: 'markdown',
                previewStyle: 'vertical',
                language: 'ko-KR',
                initialValue: initialContent,
                toolbarItems: [
                    ['heading', 'bold', 'italic', 'strike'],
                    ['hr', 'quote'],
                    ['ul', 'ol', 'task'],
                    ['table', 'image', 'link'],
                    ['code', 'codeblock']
                ]
            });
            initHashtag();
        });

        function submitWikiForm() {
            var title = document.getElementById('titleInput').value.trim();
            if (!title) { wikiToast('warning', '문서 제목은 필수 입력 항목입니다.'); return; }
            var content = wikiEditor.getMarkdown();
            if (!content.trim()) { wikiToast('warning', '내용을 입력하세요.'); return; }
            document.getElementById('contentInput').value = content;
            document.getElementById('wikiForm').submit();
        }

        function cancelEdit() {
            fetch('/project/wiki/unlock?wikiPageId=' + encodeURIComponent(wikiPageId), {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken }
            }).finally(function () {
                location.href = '/project/wiki?projectId=' + projectId
                              + '&wikiPageId=' + encodeURIComponent(wikiPageId);
            });
        }

        window.addEventListener('beforeunload', function () {
            navigator.sendBeacon(
                '/project/wiki/unlock?wikiPageId=' + encodeURIComponent(wikiPageId)
                + '&_csrf=' + encodeURIComponent(csrfToken)
            );
        });

        /* 이력 라디오 강조 */
        function highlightModifyItem(radio) {
            document.querySelectorAll('.wiki-history-item').forEach(function(li) {
                li.classList.remove('selected-version');
            });
            if (radio) {
                var li = radio.closest('.wiki-history-item');
                if (li) li.classList.add('selected-version');
            }
        }

        /* 이 버전 보기 버튼으로만 이동 */
        function goToSelectedVersion() {
            var selected = document.querySelector('input[name="modifyHistoryVersion"]:checked');
            if (!selected || selected.value === 'latest') {
            	wikiToast('warning', '이전 버전을 선택해주세요.', '변경 이력에서 보고 싶은 버전을 선택한 후 눌러주세요.');
                return;
            }
            window.open(
                '/project/wiki/version?projectId=' + projectId
                + '&wikiPageId=' + encodeURIComponent(wikiPageId)
                + '&version=' + selected.value,
                '_blank'
            );
        }

        function removeExistingRelation(relationId, btn) {
            var headers = {};
            headers[csrfHeader] = csrfToken;
            fetch('/project/wiki/relation/' + encodeURIComponent(relationId), {
                method: 'DELETE', headers: headers
            }).then(function(r) {
                if (r.ok) btn.closest('span').remove();
            });
        }

        function initHashtag() {
            inp = document.getElementById('hashtagInput');
            dd  = document.getElementById('hashtagDropdown');
            if (!inp || !dd) return;

            inp.addEventListener('input', function () {
                clearTimeout(hashDebounce);
                var m = this.value.match(/#([\uAC00-\uD7A3\u3131-\u318E\w\-_]+)$/);
                if (!m || m[1].length < 1) { closeDD(); return; }
                hashDebounce = setTimeout(function() { fetchHashtag(m[1]); }, 250);
            });

            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeDD();
            });
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#tagInputArea') && !e.target.closest('#hashtagDropdown')) closeDD();
        });

        function positionDD() {
            if (!dd) return;
            var area = document.getElementById('tagInputArea');
            if (!area) return;
            var rect       = area.getBoundingClientRect();
            var vpHeight   = window.innerHeight;
            var spaceBelow = vpHeight - rect.bottom - 8;
            var spaceAbove = rect.top - 8;

            dd.style.position  = 'fixed';
            dd.style.left      = rect.left + 'px';
            dd.style.width     = rect.width + 'px';
            dd.style.overflowY = 'auto';

            if (spaceBelow >= 120 || spaceBelow >= spaceAbove) {
                dd.style.top       = (rect.bottom + 4) + 'px';
                dd.style.bottom    = 'auto';
                dd.style.maxHeight = Math.max(spaceBelow - 4, 80) + 'px';
            } else {
                dd.style.bottom    = (vpHeight - rect.top + 4) + 'px';
                dd.style.top       = 'auto';
                dd.style.maxHeight = Math.max(spaceAbove - 4, 80) + 'px';
            }
        }



        function fetchHashtag(keyword) {
            fetch('/project/wiki/hashtag/search?projectId=' + projectId
                    + '&keyword=' + encodeURIComponent(keyword))
                .then(function(r) { return r.json(); })
                .then(function(list) { renderDD(list); })
                .catch(function() { closeDD(); });
        }

        function renderDD(list) {
            if (!dd) return;
            dd.innerHTML = '';
            if (!list || !list.length) { closeDD(); return; }
            list.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'wiki-hashtag-item';
                div.innerHTML =
                    '<span class="wiki-relation-type-badge '
                    + (item.targetType === 'TASK' ? 'badge-task' : 'badge-wiki') + '">'
                    + (item.targetType === 'TASK' ? '일감' : '위키') + '</span>'
                    + '<span class="wiki-hashtag-item-title">#' + item.targetTitle + '</span>';
                div.addEventListener('click', function() { selectItem(item); });
                dd.appendChild(div);
            });
            positionDD();
            dd.style.display = 'block';
        }

        function closeDD() {
            if (!dd) return;
            dd.style.display = 'none';
            dd.innerHTML = '';
        }

        function selectItem(item) {
            var params = new URLSearchParams();
            params.append('wikiPageId', wikiPageId);
            params.append('targetType', item.targetType);
            params.append('projectId',  String(projectId));
            if (item.targetType === 'TASK' && item.targetTaskId) params.append('targetTaskId', item.targetTaskId);
            if (item.targetType === 'WIKI' && item.targetWikiId) params.append('targetWikiId', item.targetWikiId);

            var headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
            headers[csrfHeader] = csrfToken;

            fetch('/project/wiki/relation/add', {
                method: 'POST', headers: headers, body: params.toString()
            }).then(function(r) {
                if (r.ok) {
                    r.text().then(function(text) {
                        var relationId = text.split(':')[1];
                        addChip(item, relationId);
                    });
                } else {
                    r.text().then(function(t) { wikiToast('error', '연관문서 등록 실패', t); });
                }
            }).catch(function(e) { console.error('relation add error:', e); });

            if (inp) inp.value = '';
            closeDD();
            if (inp) inp.focus();
        }

        function addChip(item, relationId) {
            var chip = document.createElement('span');
            chip.className = 'wiki-tag-chip ' + (item.targetType === 'TASK' ? 'chip-task' : 'chip-wiki');
            chip.setAttribute('data-relation-id', relationId);
            chip.innerHTML = '#' + item.targetTitle
                + ' <button type="button" class="wiki-chip-remove"'
                + " onclick=\"removeExistingRelation('" + relationId + "', this)\">✕</button>";
            document.getElementById('newChipList').appendChild(chip);
        }
        /*]]>*/
    </script>

</section>
</body>
</html>
