<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>위키</title>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css">
    <link rel="stylesheet" href="/css/wiki/wiki.css">
</head>
<body>
<section class="wiki-page">

    <div id="wikiToastContainer" class="wiki-toast-container"></div>

    <div class="wiki-layout" th:classappend="${selectedWiki == null} ? ' wiki-layout-empty' : ''">

        <!-- ① 좌측: 위키 목록 -->
        <div class="wiki-sidebar">
            <div class="wiki-list-header">
                <span class="wiki-list-label">위키 목록</span>
            </div>

            <div class="wiki-search-row">
                <form method="get" th:action="@{/project/wiki}" class="wiki-search-form">
                    <input type="hidden" name="projectId" th:value="${projectId}">
                    <div class="wiki-search-box">
                        <span class="wiki-search-icon">🔍</span>
                        <input type="text" name="keyword" class="wiki-search-input"
                               placeholder="위키 제목 검색"
                               th:value="${keyword}"
                               onchange="this.form.submit()">
                    </div>
                </form>
                <a th:if="${canEdit}"
				   th:href="@{/project/wiki/register(projectId=${projectId})}"
				   class="wiki-add-btn">등록</a>
            </div>

            <div class="wiki-tree-wrap">
                <div th:if="${searchResult != null}">
                    <div th:if="${#lists.isEmpty(searchResult)}" class="wiki-empty">결과 없음</div>
                    <ul class="wiki-tree">
                        <li th:each="wiki : ${searchResult}">
                            <a th:href="@{/project/wiki(projectId=${projectId}, wikiPageId=${wiki.wikiPageId})}"
                               th:text="${wiki.title}"
                               th:classappend="${selectedWiki != null and selectedWiki.wikiPageId == wiki.wikiPageId} ? 'active' : ''"></a>
                        </li>
                    </ul>
                </div>
                <div th:if="${searchResult == null}">
                    <div th:if="${#lists.isEmpty(wikiTree)}" class="wiki-empty">등록된 위키가 없습니다.</div>
                    <ul class="wiki-tree" th:unless="${#lists.isEmpty(wikiTree)}">
                        <th:block th:replace="~{weple/wiki/detail :: wikiTreeFragment(${wikiTree}, 0)}"></th:block>
                    </ul>
                </div>
            </div>
        </div>

        <!-- ② 중앙: 본문 -->
        <div class="wiki-content-wrap">
            <div th:if="${selectedWiki == null}" class="wiki-empty-center">
                좌측에서 문서를 선택하거나 새 위키를 등록하세요.
            </div>

            <th:block th:if="${selectedWiki != null}">

                <form th:action="@{/project/wiki/delete/{id}(id=${selectedWiki.wikiPageId})}"
                      method="post" id="deleteForm" style="display:none">
                    <input type="hidden" name="projectId" th:value="${projectId}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                </form>

                <div class="wiki-doc-header">
                    <div class="wiki-doc-left">
                        <h2 class="wiki-doc-title" th:text="${selectedWiki.title}"></h2>
                        <div class="wiki-doc-meta">
                            <div class="wiki-author-wrap">
                                <!-- 프로필 이미지: 기본 hamster.jpg, JS로 실제 프로필 교체 -->
                                <img id="wikiAuthorImg"
                                     src="/images/default-profile.svg"
                                     class="wiki-author-img" alt=""
                                     th:attr="data-user-code=${selectedWiki.userCode}"
                                     onerror="this.src='/images/default-profile.svg'">
                                <span class="wiki-author-name"
                                      th:text="${selectedWiki.userName != null ? selectedWiki.userName : ''}"></span>
                                <span class="wiki-author-email"
                                      th:if="${selectedWiki.userEmail != null and !#strings.isEmpty(selectedWiki.userEmail)}"
                                      th:text="'(' + ${selectedWiki.userEmail} + ')'"></span>
                            </div>
                            <div class="wiki-updated-wrap">
                                <span>⏱</span>
                                <span>최종 수정일</span>
                                <span th:text="${selectedWiki.updateAt != null ? #temporals.format(selectedWiki.updateAt,'yyyy-MM-dd HH:mm') : ''}"></span>
                            </div>
                            <span class="wiki-version-badge"
                                  th:text="'버전 v' + ${selectedWiki.currentVersion}"></span>
                        </div>
                    </div>
                    <div class="wiki-doc-actions" th:unless="${isVersionView}">
					    <a th:if="${canEdit}"
					       th:href="@{/project/wiki/modify/{id}(id=${selectedWiki.wikiPageId}, projectId=${projectId})}"
					       class="wiki-btn wiki-btn-edit">수정</a>
					    <button th:if="${canDelete}"
					            type="button" class="wiki-btn wiki-btn-delete"
					            onclick="wikiConfirm('정말 삭제하시겠습니까?', '삭제된 위키는 복구할 수 없습니다.', function(){ document.getElementById('deleteForm').submit(); })">
					        삭제
					    </button>
					</div>
                </div>
                <hr class="wiki-divider">

                <div th:if="${selectedWiki.content == null or #strings.isEmpty(selectedWiki.content)}"
                     class="wiki-no-content">
                    등록된 내용이 없습니다. 수정 버튼을 눌러 내용을 작성해주세요.
                </div>

                <div id="wikiViewer" class="wiki-viewer-wrap"></div>

                <th:block th:if="${relationList != null and !#lists.isEmpty(relationList)}">
                    <div class="wiki-relation-section">
                        <div class="wiki-relation-section-title">🔗 연관 문서</div>
                        <ul class="wiki-relation-view-list">
                            <li th:each="rel : ${relationList}">
                                <a th:href="${rel.targetUrl}"
                                   th:text="'#' + ${rel.targetTitle}"
                                   th:classappend="${rel.targetType == 'TASK'} ? ' type-task' : ' type-wiki'"
                                   class="wiki-relation-view-item"
                                   target="_blank">#연결문서</a>
                            </li>
                        </ul>
                    </div>
                </th:block>

            </th:block>
        </div>

        <!-- ③ 우측: 문서정보 + 변경이력 -->
        <div class="wiki-right-col" th:if="${selectedWiki != null}">

            <div class="wiki-info-box">
                <div class="wiki-box-title">문서 정보</div>
                <div class="wiki-info-body">
                    <div class="wiki-info-row">
                        <span class="info-label">문서 ID</span>
                        <span class="info-value"
                              th:text="${currentWiki != null ? currentWiki.wikiPageId : selectedWiki.wikiPageId}"></span>
                    </div>
                    <div class="wiki-info-row">
                        <span class="info-label">태그 (연관 문서)</span>
                        <span class="info-value wiki-tag-list">
                            <th:block th:if="${relationList != null and !#lists.isEmpty(relationList)}">
                                <a th:each="rel : ${relationList}"
                                   th:href="${rel.targetUrl}"
                                   th:text="'#' + ${rel.targetTitle}"
                                   th:classappend="${rel.targetType == 'TASK'} ? ' wiki-tag-task' : ' wiki-tag-wiki'"
                                   class="wiki-tag"
                                   target="_blank">#연결</a>
                            </th:block>
                            <span th:if="${relationList == null or #lists.isEmpty(relationList)}"
                                  style="color:#adb5bd; font-size:12px;">연결된 문서 없음</span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="wiki-history-box">
                <div class="wiki-box-title">변경 이력</div>
                <div class="wiki-history-body">
                    <ul class="wiki-history-list" id="historyList">

                        <li class="wiki-history-item"
                            id="historyItem-latest"
                            th:with="cw=${currentWiki != null ? currentWiki : selectedWiki}">
                            <label class="history-radio-wrap">
                                <input type="radio" name="historyVersion"
                                       class="history-radio"
                                       value="latest"
                                       th:attr="data-wiki-id=${cw.wikiPageId},data-project-id=${projectId}">
                            </label>
                            <span class="history-version history-version-latest"
                                  th:text="'v' + ${cw.currentVersion} + ' (최신 버전)'"></span>
                            <span class="history-user" th:text="${cw.userName}"></span>
                            <span class="history-date"
                                  th:text="${cw.updateAt != null ? #temporals.format(cw.updateAt,'yyyy-MM-dd HH:mm') : ''}"></span>
                        </li>

                        <th:block th:if="${historyList != null}">
                            <li class="wiki-history-item"
                                th:each="h : ${historyList}"
                                th:id="'historyItem-' + ${h.wikiVersion}">
                                <label class="history-radio-wrap">
                                    <input type="radio" name="historyVersion"
                                           class="history-radio"
                                           th:value="${h.wikiVersion}"
                                           th:attr="data-wiki-id=${selectedWiki.wikiPageId},data-project-id=${projectId}">
                                </label>
                                <span class="history-version" th:text="'v' + ${h.wikiVersion}"></span>
                                <span class="history-user" th:text="${h.userName}"></span>
                                <span class="history-date"
                                      th:text="${#temporals.format(h.createdAt,'yyyy-MM-dd HH:mm')}"></span>
                            </li>
                        </th:block>
                    </ul>

                    <div class="history-view-wrap">
                        <button type="button" class="history-view-btn" onclick="goToVersion()">
                            이 버전 보기
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${selectedWiki == null}"></div>
    </div>

    <script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var wikiContent    = /*[[${selectedWiki != null ? selectedWiki.content : ''}]]*/ '';
        var isVersionView  = /*[[${isVersionView != null ? isVersionView : false}]]*/ false;
        var viewingVersion = /*[[${isVersionView and selectedWiki != null ? selectedWiki.currentVersion : 0}]]*/ 0;
        var lockError    = /*[[${lockError != null ? lockError : false}]]*/ false;
        var lockUserName = /*[[${lockUserName != null ? lockUserName : ''}]]*/ '';
        var lockedAt      = /*[[${lockedAt != null ? #temporals.format(lockedAt,'yyyy-MM-dd HH:mm') : ''}]]*/ '';
        /*]]>*/

        var TOAST_ICONS = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
		function wikiToast(type, title, msg, duration) {
		    var overlay = document.createElement('div');
		    overlay.className = 'wiki-toast-overlay';
		
		    var toast = document.createElement('div');
		    toast.className = 'wiki-toast toast-' + (type || 'info');
		    var icon = TOAST_ICONS[type] || 'ℹ️';
		    var msgHtml = msg ? '<span class="wiki-toast-msg">' + msg + '</span>' : '';
		    toast.innerHTML =
		        '<span class="wiki-toast-icon">' + icon + '</span>' +
		        '<div class="wiki-toast-body"><span class="wiki-toast-title">' + title + '</span>' + msgHtml + '</div>' +
		        '<button class="wiki-toast-close" onclick="wikiToastClose(this.closest(\'.wiki-toast-overlay\'))">✕</button>';
		
		    overlay.appendChild(toast);
		    document.body.appendChild(overlay);
		    setTimeout(function() { wikiToastClose(overlay); }, duration || 2500);
		}
		function wikiToastClose(overlay) {
		    if (!overlay || overlay.classList.contains('removing')) return;
		    overlay.classList.add('removing');
		    var toast = overlay.querySelector('.wiki-toast');
		    if (toast) toast.classList.add('removing');
		    setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 200);
		}

        function wikiConfirm(title, msg, onOk, onCancel) {
            var overlay = document.createElement('div');
            overlay.className = 'wiki-confirm-overlay';
            overlay.innerHTML =
                '<div class="wiki-confirm-box">' +
                    '<p class="wiki-confirm-title">' + title + '</p>' +
                    '<p class="wiki-confirm-msg">' + (msg || '') + '</p>' +
                    '<div class="wiki-confirm-actions">' +
                        '<button class="wiki-confirm-btn wiki-confirm-cancel" id="wikiConfirmNo">취소</button>' +
                        '<button class="wiki-confirm-btn wiki-confirm-ok" id="wikiConfirmYes">삭제</button>' +
                    '</div>' +
                '</div>';
            document.body.appendChild(overlay);
            document.getElementById('wikiConfirmYes').addEventListener('click', function() {
                document.body.removeChild(overlay);
                if (typeof onOk === 'function') onOk();
            });
            document.getElementById('wikiConfirmNo').addEventListener('click', function() {
                document.body.removeChild(overlay);
                if (typeof onCancel === 'function') onCancel();
            });
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                    if (typeof onCancel === 'function') onCancel();
                }
            });
        }

        function updateHistoryHighlight(radio) {
            document.querySelectorAll('.wiki-history-item').forEach(function(li) {
                li.classList.remove('selected-version');
            });
            if (radio) {
                var li = radio.closest('.wiki-history-item');
                if (li) li.classList.add('selected-version');
            }
        }
        function bindHistoryRadios() {
            document.querySelectorAll('input[name="historyVersion"]').forEach(function(r) {
                r.addEventListener('change', function() { updateHistoryHighlight(this); });
            });
        }
        function initRadio() {
            var targetVal = isVersionView && viewingVersion ? String(viewingVersion) : 'latest';
            document.querySelectorAll('input[name="historyVersion"]').forEach(function(r) {
                if (r.value === targetVal) { r.checked = true; updateHistoryHighlight(r); }
            });
        }

        var KO_TOOLBAR_LABELS = {
            'Heading':'제목','Bold':'굵게','Italic':'기울임','Strike':'취소선',
            'HR':'구분선','Quote':'인용','Bullet List':'글머리 기호',
            'Ordered List':'번호 목록','Task':'체크리스트','Indent':'들여쓰기',
            'Outdent':'내어쓰기','Table':'표','Image':'이미지','Link':'링크',
            'Code':'인라인 코드','Codeblock':'코드 블록','Scroll Sync':'스크롤 동기화'
        };
        function applyKoreanToolbar() {
            document.querySelectorAll('.toastui-editor-toolbar-icons, .toastui-editor-toolbar button').forEach(function(btn) {
                var tip = btn.getAttribute('aria-label') || btn.title || '';
                if (KO_TOOLBAR_LABELS[tip]) { btn.setAttribute('aria-label', KO_TOOLBAR_LABELS[tip]); btn.title = KO_TOOLBAR_LABELS[tip]; }
            });
            document.querySelectorAll('.toastui-editor-mode-switch .tab-item').forEach(function(tab) {
                var t = tab.textContent.trim();
                if (t === 'Markdown') tab.textContent = '마크다운';
                if (t === 'Wysiwyg')  tab.textContent = '편집 모드';
            });
        }

        function extractYoutubeId(url) {
            if (!url) return null;
            var patterns = [
                /youtu\.be\/([^?&\s#]+)/,
                /youtube\.com\/watch\?.*v=([^&\s]+)/,
                /youtube\.com\/embed\/([^?&\s]+)/,
                /youtube\.com\/v\/([^?&\s]+)/,
                /youtube\.com\/shorts\/([^?&\s]+)/
            ];
            for (var i = 0; i < patterns.length; i++) {
                var m = url.match(patterns[i]);
                if (m) return m[1];
            }
            return null;
        }
        function embedYoutubeLinks() {
            var viewerEl = document.getElementById('wikiViewer');
            if (!viewerEl) return;
            var inserted = [];
            viewerEl.querySelectorAll('a').forEach(function(a) {
                var vid = extractYoutubeId(a.href) || extractYoutubeId(a.textContent.trim());
                if (!vid) return;
                var wrap = document.createElement('div');
                wrap.className = 'wiki-youtube-embed';
                wrap.innerHTML = '<iframe src="https://www.youtube.com/embed/' + vid + '" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>';
                a.parentNode.insertBefore(wrap, a.nextSibling);
                inserted.push(vid);
            });
            var walker = document.createTreeWalker(viewerEl, NodeFilter.SHOW_TEXT, null, false);
            var nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            nodes.forEach(function(node) {
                var text = node.textContent.trim();
                if (!text) return;
                var vid = extractYoutubeId(text);
                if (!vid || inserted.indexOf(vid) !== -1) return;
                if (node.parentNode && node.parentNode.tagName === 'A') return;
                var wrap = document.createElement('div');
                wrap.className = 'wiki-youtube-embed';
                wrap.innerHTML = '<iframe src="https://www.youtube.com/embed/' + vid + '" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>';
                node.parentNode.insertBefore(wrap, node.nextSibling);
                inserted.push(vid);
            });
        }

        function initWikiViewer() {
            var viewerEl = document.getElementById('wikiViewer');
            if (!viewerEl || !wikiContent || !wikiContent.trim()) return;
            if (viewerEl.children.length > 0) return;
            try {
                toastui.Editor.factory({ el: viewerEl, viewer: true, initialValue: wikiContent });
                setTimeout(embedYoutubeLinks, 200);
            } catch(e) { console.error('Toast UI error:', e); }
        }

        function goToVersion() {
            var selected = document.querySelector('input[name="historyVersion"]:checked');
            if (!selected) {
                wikiToast('warning', '버전을 선택해주세요.', '변경 이력에서 버전을 선택한 후 눌러주세요.');
                return;
            }
            var version   = selected.value;
            var wikiId    = selected.getAttribute('data-wiki-id');
            var projectId = selected.getAttribute('data-project-id');
            if (version === 'latest') {
                location.href = '/project/wiki?projectId=' + projectId + '&wikiPageId=' + encodeURIComponent(wikiId);
            } else {
                location.href = '/project/wiki/version?projectId=' + projectId
                              + '&wikiPageId=' + encodeURIComponent(wikiId)
                              + '&version=' + version;
            }
        }

        /* ── 위키 트리 펼치기/접기 ──
           기본은 전체 펼침 상태. 화살표 버튼 클릭 시 해당 노드의 하위 <ul>만 토글. */
        function toggleWikiNode(btn) {
            var li = btn.closest('li');
            if (!li) return;
            var childUl = li.querySelector(':scope > ul.wiki-tree-children');
            if (!childUl) return;
            var collapsed = childUl.classList.toggle('collapsed');
            btn.classList.toggle('collapsed', collapsed);
            btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        }

        document.addEventListener('DOMContentLoaded', function() {
        	if (lockError) {
                wikiToast('warning', '편집 잠금 상태',
                    lockUserName + '님이 문서를 수정 중입니다.' + (lockedAt ? ' (' + lockedAt + ')' : ''));
            }
            setTimeout(function() {
                initWikiViewer();
                bindHistoryRadios();
                initRadio();
                applyKoreanToolbar();
                loadAuthorProfile();
            }, 150);
        });

        /* 작성자 프로필 이미지 동적 로드 */
        function loadAuthorProfile() {
            var img = document.getElementById('wikiAuthorImg');
            if (!img) return;
            var userCode = img.getAttribute('data-user-code');
            if (!userCode) return;
            fetch('/project/wiki/user/profile?userCode=' + encodeURIComponent(userCode))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.profileImg && data.profileImg.trim()) {
                        /* 이미지 미리 로드 후 교체 (깜빡임 방지) */
                        var preload = new Image();
                        preload.onload = function() { img.src = data.profileImg; };
                        preload.onerror = function() { /* hamster.jpg 유지 */ };
                        preload.src = data.profileImg;
                    }
                })
                .catch(function() { /* hamster.jpg 유지 */ });
        }
    </script>

</section>

<!-- 위키 트리 프래그먼트: 무한 depth 재귀 (depth를 직접 받아 인라인 padding으로 고정) -->
<th:block th:fragment="wikiTreeFragment(nodes, depth)">
    <li th:each="node : ${nodes}">
        <span class="wiki-tree-row" th:style="${'padding-left:' + (depth * 14) + 'px'}">
            <button th:if="${node.children != null and !#lists.isEmpty(node.children)}"
                    type="button" class="wiki-tree-toggle" aria-expanded="true"
                    onclick="toggleWikiNode(this)">▼</button>
            <span th:unless="${node.children != null and !#lists.isEmpty(node.children)}"
                  class="wiki-tree-toggle-spacer"></span>
            <a th:href="@{/project/wiki(projectId=${projectId}, wikiPageId=${node.wikiPageId})}"
               th:text="${node.title}"
               th:classappend="${selectedWiki != null and selectedWiki.wikiPageId == node.wikiPageId} ? 'active' : ''"></a>
        </span>
        <ul th:if="${node.children != null and !#lists.isEmpty(node.children)}"
            class="wiki-tree-children">
            <th:block th:replace="~{weple/wiki/detail :: wikiTreeFragment(${node.children}, ${depth + 1})}"></th:block>
        </ul>
    </li>
</th:block>

<!-- 상위 페이지 select 옵션용 재귀 fragment -->
<th:block th:fragment="selectTreeFragment(nodes, depth)">
    <th:block th:each="node : ${nodes}">
        <option th:value="${node.wikiPageId}"
                th:selected="${node.wikiPageId == parentPageId}">
            <th:block th:if="${depth > 0}">
                <th:block th:each="i : ${#numbers.sequence(1, depth)}">　</th:block>└ 
            </th:block>
            <th:block th:text="${node.title}"></th:block>
        </option>
        <th:block th:if="${node.children != null and !#lists.isEmpty(node.children)}">
            <th:block th:replace="~{weple/wiki/detail :: selectTreeFragment(${node.children}, ${depth + 1})}"></th:block>
        </th:block>
    </th:block>
</th:block>

</body>
</html>
