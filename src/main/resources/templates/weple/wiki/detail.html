<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">

<head>
    <meta charset="UTF-8">
    <title>위키</title>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor-viewer.min.css">
    <link rel="stylesheet" href="/css/wiki/wiki.css">
</head>

<body>
<section class="wiki-page">
    <div class="wiki-layout">

        <!-- ① 좌측 목록 패널 -->
        <div class="wiki-sidebar">
            <div class="wiki-search-wrap">
                <form method="get" th:action="@{/project/wiki}">
                    <input type="hidden" name="projectId" th:value="${projectId}">
                    <div class="wiki-search-box">
                        <input type="text" name="keyword" class="wiki-search-input"
                               placeholder="위키 검색" th:value="${keyword}">
                        <button type="submit" class="wiki-search-btn">🔍</button>
                    </div>
                </form>
            </div>

            <div class="wiki-sidebar-actions">
                <a th:href="@{/project/wiki/register(projectId=${projectId})}"
                   class="wiki-add-btn">+ 등록</a>
            </div>

            <!-- 검색 결과 -->
            <div th:if="${searchResult != null}">
                <div class="wiki-tree-title">검색 결과</div>
                <div th:if="${#lists.isEmpty(searchResult)}" class="wiki-empty">결과 없음</div>
                <ul class="wiki-tree">
                    <li th:each="wiki : ${searchResult}">
                        <a th:href="@{/project/wiki(projectId=${projectId}, wikiPageId=${wiki.wikiPageId})}"
                           th:text="${wiki.title}"
                           th:classappend="${selectedWiki != null and selectedWiki.wikiPageId == wiki.wikiPageId} ? 'active' : ''">
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 위키 트리 목록 -->
            <div th:if="${searchResult == null}">
                <div th:if="${#lists.isEmpty(wikiTree)}" class="wiki-empty">등록된 위키가 없습니다.</div>
                <ul class="wiki-tree" th:unless="${#lists.isEmpty(wikiTree)}">
                    <th:block th:replace="~{weple/wiki/detail :: wikiTreeFragment(${wikiTree})}"></th:block>
                </ul>
            </div>
        </div>

        <!-- ② 중앙 문서 영역 -->
        <div class="wiki-content-wrap">
            <div th:if="${selectedWiki == null}" class="wiki-empty-center">
                좌측에서 문서를 선택하거나 새 위키를 등록하세요.
            </div>

            <th:block th:if="${selectedWiki != null}">
                <!-- 제목 -->
                <h2 class="wiki-doc-title" th:text="${selectedWiki.title}"></h2>

                <!-- 작성자 + 수정일 + 버전 + 수정/삭제 버튼 한 줄 -->
                <div class="wiki-doc-meta-row">
                    <div class="wiki-doc-meta">
                        <span class="wiki-author-icon">👤</span>
                        <span class="wiki-author-name"
                              th:text="${selectedWiki.userName + '(' + selectedWiki.userCode + ')'}"></span>
                        <span class="wiki-meta-sep">⏱</span>
                        <span class="wiki-updated-text">최종 수정일</span>
                        <span class="wiki-updated-date"
                              th:text="${#temporals.format(selectedWiki.updateAt, 'yyyy-MM-dd HH:mm')}"></span>
                        <span class="wiki-version-badge"
                              th:text="'버전 v' + ${selectedWiki.currentVersion}"></span>
                    </div>
                    <div class="wiki-doc-actions">
                        <a th:href="@{/project/wiki/modify/{id}(id=${selectedWiki.wikiPageId}, projectId=${projectId})}"
                           class="wiki-btn wiki-btn-edit">✏ 수정</a>
                        <form th:action="@{/project/wiki/delete/{id}(id=${selectedWiki.wikiPageId})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('정말 삭제하시겠습니까?')">
                            <input type="hidden" name="projectId" th:value="${projectId}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="wiki-btn wiki-btn-delete">🗑 삭제</button>
                        </form>
                    </div>
                </div>

                <hr class="wiki-divider">

                <!-- 본문 - Toast UI Viewer -->
                <div id="wikiViewer" class="wiki-viewer-wrap"></div>
            </th:block>
        </div>

        <!-- ③ 우측 문서 정보 + 변경 이력 패널 -->
        <div class="wiki-info-panel" th:if="${selectedWiki != null}">
            <!-- 문서 정보 -->
            <div class="wiki-info-section">
                <div class="wiki-info-title">문서 정보</div>
                <div class="wiki-info-row">
                    <span class="info-label">문서 ID</span>
                    <span class="info-value" th:text="${selectedWiki.wikiPageId}"></span>
                </div>
                <div class="wiki-info-row">
                    <span class="info-label">유형</span>
                    <span class="info-value">개발 표준</span>
                </div>
            </div>

            <!-- 변경 이력 -->
            <div class="wiki-info-section">
                <div class="wiki-info-title">변경 이력</div>
                <ul class="wiki-history-list">
                    <!-- 현재 버전 -->
                    <li class="wiki-history-item current">
                        <span class="history-dot current-dot"></span>
                        <div class="history-info">
                            <span class="history-version"
                                  th:text="'v' + ${selectedWiki.currentVersion} + ' (현재 버전)'"></span>
                            <span class="history-user" th:text="${selectedWiki.userName}"></span>
                            <span class="history-date"
                                  th:text="${#temporals.format(selectedWiki.updateAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </li>
                    <!-- 이전 버전들 -->
                    <li class="wiki-history-item" th:each="h : ${historyList}">
                        <span class="history-dot"></span>
                        <div class="history-info">
                            <span class="history-version" th:text="'v' + ${h.wikiVersion}"></span>
                            <span class="history-user" th:text="${h.userName}"></span>
                            <span class="history-date"
                                  th:text="${#temporals.format(h.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                        <button class="history-view-btn"
                                th:attr="data-wiki-id=${selectedWiki.wikiPageId},data-version=${h.wikiVersion}"
                                onclick="viewVersion(this)">이 버전 보기</button>
                    </li>
                </ul>
            </div>
        </div>

    </div>

    <!-- 버전 보기 모달 -->
    <div id="versionModal" class="wiki-modal-overlay" style="display:none">
        <div class="wiki-modal">
            <div class="wiki-modal-header">
                <span id="modalVersionTitle">버전 보기</span>
                <button onclick="closeVersionModal()" class="wiki-modal-close">✕</button>
            </div>
            <div id="versionViewer" class="wiki-viewer-wrap"></div>
        </div>
    </div>

    <script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-viewer.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const wikiContent = /*[[${selectedWiki != null ? selectedWiki.content : ''}]]*/ '';
        /*]]>*/

        document.addEventListener('DOMContentLoaded', function () {
            console.log('wikiContent length:', wikiContent ? wikiContent.length : 0);
            if (wikiContent) {
                toastui.Editor.factory({
                    el: document.getElementById('wikiViewer'),
                    viewer: true,
                    initialValue: wikiContent
                });
            }
        });

        function viewVersion(btn) {
            const wikiId  = btn.dataset.wikiId;
            const version = btn.dataset.version;
            fetch('/project/wiki/history?wikiPageId=' + wikiId + '&wikiVersion=' + version)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('modalVersionTitle').textContent = 'v' + data.wikiVersion + ' 보기';
                    const el = document.getElementById('versionViewer');
                    el.innerHTML = '';
                    toastui.Editor.factory({ el: el, viewer: true, initialValue: data.content || '' });
                    document.getElementById('versionModal').style.display = 'flex';
                });
        }

        function closeVersionModal() {
            document.getElementById('versionModal').style.display = 'none';
        }
    </script>

</section>

<!-- 위키 트리 재귀 fragment -->
<th:block th:fragment="wikiTreeFragment(nodes)">
    <li th:each="node : ${nodes}">
        <a th:href="@{/project/wiki(projectId=${projectId}, wikiPageId=${node.wikiPageId})}"
           th:text="${node.title}"
           th:classappend="${selectedWiki != null and selectedWiki.wikiPageId == node.wikiPageId} ? 'active' : ''">
        </a>
        <ul th:if="${node.children != null and !#lists.isEmpty(node.children)}">
            <th:block th:replace="~{weple/wiki/detail :: wikiTreeFragment(${node.children})}"></th:block>
        </ul>
    </li>
</th:block>

</body>
</html>
