<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>내 대시보드</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}"/>
    
    <style>
        /* 대시보드 모듈용 기본 스타일 예시 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .dashboard-card {
            background: #fff;
            border: 1px solid #e3e6f0;
            border-radius: 0.35rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            padding: 1.5rem;
        }
        .card-header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4e73df;
            margin-bottom: 1rem;
            border-bottom: 2px solid #eaecf4;
            padding-bottom: 0.5rem;
        }
        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #858796;
        }
        .task-list-table {
            width: 100%;
            border-collapse: collapse;
        }
        .task-list-table th, .task-list-table td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid #eaecf4;
            font-size: 0.9rem;
        }
        .badge-priority {
            padding: 0.25em 0.4em;
            font-size: 75%;
            font-weight: 700;
            border-radius: 0.25rem;
            background-color: #f6c23e;
            color: #fff;
        }
    </style>
</head>
<body>
<section>
    <div class="container-fluid">
        <h2 class="mt-4 mb-4" style="padding-left: 20px;">대시보드</h2>
        
        <div class="dashboard-grid">
            
            <div class="dashboard-card" id="upcoming-tasks-module">
                <div class="card-header-title">⏰ 마감 임박 일감 (7일 이내)</div>
                <div class="card-body">
                    <div class="loading-spinner">
                        <span>데이터를 불러오는 중입니다...</span>
                    </div>
                </div>
            </div>
            
            </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // 페이지 로드 시 마감 임박 일감 모듈 호출
            loadUpcomingTasks();
            
            // 추후 생성할 다른 모듈 함수도 이곳에 차례로 작성하여 동시/순차 실행 가능
            // loadProjectProgress();
        });

        /**
         * 마감 임박 일감 데이터를 REST API로부터 가져와 DOM에 바인딩하는 함수
         */
        function loadUpcomingTasks() {
            const container = document.querySelector("#upcoming-tasks-module .card-body");

            fetch('/api/dashboard/upcoming-tasks', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('데이터 요청에 실패했습니다.');
                }
                return response.json();
            })
            .then(data => {
                // 데이터 바인딩 함수 호출
                renderUpcomingTasks(data, container);
            })
            .catch(error => {
                console.error('Error:', error);
                container.innerHTML = `<p style="color: red; text-align:center;">데이터를 불러오는 중 오류가 발생했습니다.</p>`;
            });
        }

        /**
         * 받아온 JSON 데이터를 가공해 HTML 테이블 프래그먼트를 동적으로 생성하는 함수
         */
        function renderUpcomingTasks(tasks, targetContainer) {
            if (!tasks || tasks.length === 0) {
                targetContainer.innerHTML = `<p style="text-align: center; color: #858796; padding: 1.5rem 0;">마감 예정인 일감이 없습니다. 🎉</p>`;
                return;
            }

            let html = `
                <table class="task-list-table">
                    <thead>
                        <tr>
                            <th>프로젝트</th>
                            <th>일감 제목</th>
                            <th>우선순위</th>
                            <th>마감일</th>
                            <th>진척도</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            tasks.forEach(task => {
                // 날짜 포맷 정리 (YYYY-MM-DD)
                const dueDate = task.finishDate ? task.finishDate.substring(0, 10) : '-';
                
                html += `
                    <tr>
                        <td><strong>${escapeHtml(task.projectTitle)}</strong></td>
                        <td><a href="/task/detail/${task.taskId}" style="color: #4e73df; text-decoration: none;">${escapeHtml(task.taskTitle)}</a></td>
                        <td><span class="badge-priority">${escapeHtml(task.priority || '보통')}</span></td>
                        <td style="color: #e74a3b; font-weight: bold;">${dueDate}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap: 5px;">
                                <progress value="${task.taskProgress}" max="100" style="width:60px;"></progress>
                                <span>${task.taskProgress}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            // HTML 교체하여 로딩 스피너 제거 및 리스트 출력
            targetContainer.innerHTML = html;
        }

        // XSS 방지를 위한 HTML 이스케이프 함수
        function escapeHtml(str) {
            if(!str) return '';
            return String(str).replace(/[&<>"']/g, function (m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }
    </script>
</section>
</body>
</html>
