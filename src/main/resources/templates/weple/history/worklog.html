<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
      th:replace="~{common/layouts/default_layout :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>작업 내역 목록</title>
</head>
<body>
	
<section class="project-page">
    <div class="project-toolbar-top">
        <h3 class="project-title">전체 작업 내역</h3>
        <div class="total-time-card">
            <div class="time-title">총 소요시간</div>
            <div class="time-value" th:text="${totalWorkTime != null ? totalWorkTime : '428h 15m'}">428h 15m</div>
            <div class="time-period" th:text="${searchPeriod != null ? searchPeriod : '2026.06.05 ~ 2026.06.09'}">2026.06.05 ~ 2026.06.09</div>
        </div>
    </div>

    <div class="project-card">
        <form id="searchForm" method="get" th:action="@{/weple/worklog/list}">
            <div class="filter-toolbar">
                <div class="filter-group">
                    <label class="filter-label">프로젝트</label>
                    <select name="projectId" class="filter-select">
                        <option value="">전체 프로젝트</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">조회 기간</label>
                    <div class="date-range-wrap">
                        <button type="button" class="date-arrow-btn">&larr; 뒤로</button>
                        <input type="text" name="startDate" th:value="${param.startDate}" class="filter-input-date" placeholder="2026.06.05">
                        <span class="date-separator">~</span>
                        <input type="text" name="endDate" th:value="${param.endDate}" class="filter-input-date" placeholder="2026.06.09">
                        <button type="button" class="date-period-btn">최근 5일</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">사용자</label>
                    <select name="userCode" class="filter-select">
                        <option value="">전체</option>
                    </select>
                </div>
            </div>
            <div class="filter-checkbox-row">
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="기획" checked>
                    <span class="custom-check-box dev-box"></span> 기획
                </label>
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="새 기능" checked>
                    <span class="custom-check-box bug-box"></span> 새 기능
                </label>
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="개선" checked>
                    <span class="custom-check-box support-box"></span> 개선
                </label>
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="피드백">
                    <span class="custom-check-box improve-box"></span> 피드백
                </label>
            </div>
        </form>
        <h4 class="sub-list-title">전체 작업 내역 목록</h4>
        <div class="project-table-wrap">
            <table class="project-table">
                <thead>
                    <tr>
                        <th>등록일시</th>
                        <th>프로젝트</th>
                        <th>사용자</th>
                        <th>일감</th>
                        <th>일감유형</th>
                        <th>작업유형</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${workLogList}">
					    <td th:text="${log.actionAt != null ? #temporals.format(log.actionAt, 'HH:mm') : '00:00'}">14:20</td>
					    <td class="text-left" th:text="${log.projectTitle}">WEPLE</td>
					    <td th:text="${log.userName}">신짱구</td>
					    <td class="text-left" th:text="${log.taskTitle}">로그인 기능 구현</td>
					    <td>
					        <span th:if="${log.typeName == '기획'}" class="status-badge type-dev" th:text="${log.typeName}">기획</span>
					        <span th:if="${log.typeName == '새 기능'}" class="status-badge type-bug" th:text="${log.typeName}">새 기능</span>
					        <span th:if="${log.typeName == '개선'}" class="status-badge type-support" th:text="${log.typeName}">개선</span>
					        <span th:if="${log.typeName == '피드백'}" class="status-badge type-improve" th:text="${log.typeName}">피드백</span>
					        <span th:if="${log.typeName != '기획' and log.typeName != '새 기능' and log.typeName != '개선' and log.typeName != '피드백'}" class="status-badge type-default" th:text="${log.typeName}">-</span>
					    </td>
					    <td class="action-cell" th:text="${log.actionType}">CREATE</td>
					</tr>
                    <tr th:if="${#lists.isEmpty(workLogList)}">
                        <td colspan="6" class="empty-message">조회된 작업 내역이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-wrap">
            <a href="#" class="page-btn disabled">&lt; 이전</a>
            <a href="#" class="page-btn active">1</a>
            <a href="#" class="page-btn">2</a>
            <a href="#" class="page-btn">3</a>
            <a href="#" class="page-btn">4</a>
            <a href="#" class="page-btn">5</a>
            <a href="#" class="page-btn">다음 &gt;</a>
        </div>
    </div>
    
    <style>
		.right_col {
		    background: #f5f6fa !important;
		}
		
		.container-fluid {
		    padding: 0 !important;
		}
		
		.project-page {
		    padding: 20px 25px;
		    min-height: 100vh;
		    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		}
	
		.project-toolbar-top {
		    display: flex;
		    justify-content: space-between;
		    align-items: flex-end;
		    width: 100%;
		    margin-bottom: 20px;
		    gap: 15px;
		}
		
		.project-title {
		    margin: 0;
		    font-size: 24px;
		    font-weight: 700;
		    color: #222;
		    letter-spacing: -0.5px;
		    white-space: nowrap;
		}
		
		.total-time-card {
		    background: #ffffff;
		    border: 1px solid #edf1f7;
		    border-radius: 14px;
		    padding: 15px 20px;
		    text-align: right;
		    box-shadow: 0 2px 8px rgba(0, 0, 0, .02);
		    min-width: 220px;
		    flex-shrink: 0;
		}
		
		.time-title {
		    font-size: 11px;
		    font-weight: 600;
		    color: #9aa8c4;
		    margin-bottom: 4px;
		}
		
		.time-value {
		    font-size: 24px;
		    font-weight: 800;
		    color: #4d84ff;
		}
		
		.time-period {
		    font-size: 11px;
		    color: #adb5bd;
		    margin-top: 2px;
		}
		
		.project-card {
		    width: 100%;
		    background: #ffffff;
		    border-radius: 24px;
		    padding: 30px;
		    border: 1px solid #edf1f7;
		    box-shadow: 0 2px 10px rgba(0, 0, 0, .03);
		    min-width: 0;
		}
		
		.filter-toolbar {
		    display: flex;
		    align-items: center;
		    gap: 24px;
		    width: 100%;
		    padding-bottom: 20px;
		    border-bottom: 1px solid #f1f3f7;
		    overflow-x: auto;
		    white-space: nowrap;
		}
		
		.filter-group {
		    display: flex;
		    flex-direction: column;
		    gap: 8px;
		    flex-shrink: 0;
		}
		
		.filter-label {
		    font-size: 12px;
		    font-weight: 700;
		    color: #8a99b5;
		    margin: 0;
		}
		
		.filter-select {
		    min-width: 180px;
		    height: 40px;
		    padding: 0 12px;
		    border: 1px solid #d9e1f2;
		    border-radius: 10px;
		    font-size: 13px;
		    color: #495057;
		    outline: none;
		    background: #fff;
		}
		
		.date-range-wrap {
		    display: flex;
		    align-items: center;
		    gap: 6px;
		}
		
		.date-arrow-btn, .date-period-btn {
		    height: 40px;
		    padding: 0 14px;
		    border: 1px solid #d9e1f2;
		    background: #fff;
		    border-radius: 10px;
		    font-size: 13px;
		    color: #495057;
		    cursor: pointer;
		    font-weight: 500;
		}
		
		.filter-input-date {
		    width: 110px;
		    height: 40px;
		    border: 1px solid #d9e1f2;
		    border-radius: 10px;
		    text-align: center;
		    font-size: 13px;
		    color: #495057;
		    outline: none;
		}
		
		.date-separator {
		    color: #9aa8c4;
		    font-weight: 500;
		}
		
		.filter-checkbox-row {
		    display: flex;
		    align-items: center;
		    gap: 20px;
		    padding: 20px 0 10px 0;
		    overflow-x: auto;
		    white-space: nowrap;
		}
		
		.checkbox-inline {
		    display: flex;
		    align-items: center;
		    gap: 8px;
		    font-size: 13px;
		    font-weight: 600;
		    color: #495057;
		    cursor: pointer;
		    flex-shrink: 0;
		}
		
		.checkbox-inline input[type="checkbox"] {
		    position: absolute;
		    width: 1px;
		    height: 1px;
		    padding: 0;
		    margin: -1px;
		    overflow: hidden;
		    clip: rect(0,0,0,0);
		    border: 0;
		}
		
		.custom-check-box {
		    width: 16px;
		    height: 16px;
		    border: 2px solid #cbd5e1;
		    border-radius: 4px;
		    display: inline-block;
		    position: relative;
		    background: #fff;
		}
		
		.checkbox-inline input[type="checkbox"]:checked + .custom-check-box.dev-box { background: #eef4ff; border-color: #4d84ff; }
		.checkbox-inline input[type="checkbox"]:checked + .custom-check-box.bug-box { background: #fff1f1; border-color: #f64e60; }
		.checkbox-inline input[type="checkbox"]:checked + .custom-check-box.support-box { background: #fbf2ff; border-color: #b55dff; }
		.checkbox-inline input[type="checkbox"]:checked + .custom-check-box.improve-box { background: #e8fff3; border-color: #50cd89; }
		
		.sub-list-title {
		    font-size: 15px;
		    font-weight: 700;
		    color: #222;
		    margin: 30px 0 15px 0;
		}
		
		.project-table-wrap {
		    border: 1px solid #e6ecf5;
		    border-radius: 14px;
		    overflow: hidden;
		    background: #fff;
		    margin-bottom: 30px;
		    overflow-x: auto; 
		}
		
		.project-table {
		    width: 100%;
		    border-collapse: collapse;
		    table-layout: auto; 
		    min-width: 900px;
		}
		
		.project-table th {
		    height: 50px;
		    font-size: 13px;
		    font-weight: 700;
		    color: #5d6b87;
		    background: #f8faff;
		    border-bottom: 1px solid #e9edf5;
		    text-align: center;
		    white-space: nowrap;
		}
		
		.project-table td {
		    height: 56px;
		    padding: 0 15px;
		    border-top: 1px solid #edf1f7;
		    color: #495057;
		    font-size: 13px;
		    text-align: center;
		    white-space: nowrap;
		}
		
		.project-table th:nth-child(2),
		.project-table td:nth-child(2),
		.project-table th:nth-child(4),
		.project-table td:nth-child(4) {
		    text-align: left;
		    padding-left: 20px;
		    white-space: normal;
		    min-width: 180px; 
		}
		
		.project-table tbody tr:hover {
		    background: #fafcff;
		}
		
		.status-badge {
		    display: inline-flex;
		    align-items: center;
		    justify-content: center;
		    min-width: 78px;
		    height: 28px;
		    border-radius: 6px;
		    font-size: 12px;
		    font-weight: 700;
		    white-space: nowrap;
		}
		
		.type-dev { background: #eef4ff; color: #4d84ff; }
		.type-bug { background: #fff1f1; color: #f64e60; }
		.type-support { background: #fbf2ff; color: #b55dff; }
		.type-improve { background: #e8fff3; color: #50cd89; }
		.type-default { background: #f1f3f7; color: #8a99b5; }
		
		.action-cell {
		    font-weight: 600;
		    font-size: 12px;
		    color: #5e6278;
		    white-space: nowrap;
		}
		
		.empty-message {
		    padding: 50px !important;
		    text-align: center !important;
		    color: #adb5bd;
		    font-size: 14px;
		}
		
		.pagination-wrap {
		    display: flex;
		    justify-content: center;
		    align-items: center;
		    gap: 6px;
		}
		
		.page-btn {
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    min-width: 32px;
		    height: 32px;
		    text-decoration: none;
		    font-size: 13px;
		    font-weight: 500;
		    color: #5d6b87;
		    border-radius: 6px;
		    transition: all .2s ease;
		}
		
		.page-btn.active {
		    background: #4d84ff;
		    color: #fff;
		    font-weight: 700;
		}
		
		.page-btn.disabled {
		    opacity: .3;
		    pointer-events: none;
		}
		
		.page-btn:hover:not(.active):not(.disabled) {
		    background: #eef4ff;
		    color: #4d84ff;
		}
		
		@media(max-width: 992px) {
		    .project-toolbar-top {
		        flex-direction: column;
		        align-items: flex-start;
		    }
		    .total-time-card {
		        width: 100%;
		        text-align: left;
		    }
		}

    </style>
</section>

</body>
</html>
