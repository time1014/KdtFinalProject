<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">

<head>
    <meta charset="UTF-8">
    <title>작업 내역 목록</title>
    <link rel="stylesheet" href="/css/history/worklog.css">
</head>
<body>

<section class="project-page">
    <div class="project-toolbar-top">
        <h3 class="project-title">전체 작업 내역</h3>
        <div class="total-time-card">
            <div class="time-title">총 소요시간</div>
            <div class="time-value"
                 th:text="${totalSpentHour != null and totalSpentHour > 0
                          ? #numbers.formatDecimal(totalSpentHour, 1, 1) + 'h'
                          : '-'}">
            </div>
            <div class="time-period"
                 th:text="${startDate} + ' → ' + ${endDate}">
            </div>
        </div>
    </div>

    <div class="project-card">
        <form id="searchForm" method="get" th:action="@{/worklog}">
            <input type="hidden" id="searchFlag" name="search" value="true">

            <div class="filter-toolbar">

                <!-- 프로젝트 필터 -->
                <div class="filter-group">
                    <label class="filter-label">프로젝트</label>
                    <select name="projectId" class="filter-select">
                        <option value="">전체 프로젝트</option>
                        <optgroup label="진행 중인 프로젝트">
                            <option th:each="project : ${projects}"
                                    th:if="${project.status != '완료'}"
                                    th:value="${project.projectId}"
                                    th:text="${project.projectTitle}"
                                    th:selected="${project.projectId.toString() == projectId}">
                            </option>
                        </optgroup>
                        <optgroup label="완료된 프로젝트">
                            <option th:each="project : ${projects}"
                                    th:if="${project.status == '완료'}"
                                    th:value="${project.projectId}"
                                    th:text="${project.projectTitle}"
                                    th:selected="${project.projectId.toString() == projectId}">
                            </option>
                        </optgroup>
                    </select>
                </div>

                <!-- 조회 기간 -->
                <div class="filter-group">
                    <label class="filter-label">조회 기간</label>
                    <div class="date-range-wrap">
                        <button type="button" id="dateBackBtn" class="date-arrow-btn">이전 5일</button>
                        <input type="date" id="startDateInput"
                               th:value="${startDate != null ? #strings.replace(startDate, '.', '-') : ''}"
                               class="filter-input-date">
                        <input type="hidden" id="startDateHidden" name="startDate" th:value="${startDate}">
                        <span class="date-separator">~</span>
                        <input type="date" id="endDateInput"
                               th:value="${endDate != null ? #strings.replace(endDate, '.', '-') : ''}"
                               class="filter-input-date">
                        <input type="hidden" id="endDateHidden" name="endDate" th:value="${endDate}">
                        <button type="button" id="recentPeriodBtn" class="date-period-btn">최근 5일</button>
                    </div>
                </div>

                <!-- 작업자 필터 -->
                <div class="filter-group">
                    <label class="filter-label">작업자</label>
                    <select name="userCode" class="filter-select">
                        <option value="">전체</option>
                        <option th:each="user : ${users}"
                                th:value="${user.userCode}"
                                th:text="${user.userName}"
                                th:selected="${user.userCode == userCode}">
                        </option>
                    </select>
                </div>

                <!-- 검색 / 초기화 버튼 -->
                <div class="filter-group">
                    <label class="filter-label">&nbsp;</label>
                    <div class="date-range-wrap">
                        <button type="submit" class="btn-search">검색</button>
                        <button type="button" id="resetBtn" class="date-period-btn">초기화</button>
                    </div>
                </div>
            </div>

            <!-- 일감유형 체크박스 (task_types 동적 목록) -->
			<div class="filter-checkbox-row">
			    <label class="checkbox-inline" th:each="type : ${taskTypes}">
			        <input type="checkbox" name="typeNames" th:value="${type.typeName}"
			               th:checked="${typeNames != null and #lists.contains(typeNames, type.typeName)}">
			        <span class="custom-check-box"></span>
			        <span th:text="${type.typeName}"></span>
			    </label>
                <!-- 위키는 일감유형(task_types) 소속이 아닌 별도 로그 구분값이라 고정 노출 -->
                <label class="checkbox-inline">
			        <input type="checkbox" name="typeNames" value="위키"
			               th:checked="${typeNames != null and #lists.contains(typeNames, '위키')}">
			        <span class="custom-check-box"></span> 위키
			    </label>
            </div>
        </form>

        <h4 class="sub-list-title">전체 작업 내역 목록</h4>

        <!-- 검색 전 안내 -->
        <div th:if="${!searched}" class="empty-message">
            필터를 설정하고 검색 버튼을 눌러주세요.
        </div>

        <!-- 검색 후 결과 -->
        <th:block th:if="${searched}">

            <div th:if="${workLogList == null or workLogList.isEmpty()}" class="empty-message">
                조회된 작업 내역이 없습니다.
            </div>

            <th:block th:if="${workLogList != null and !workLogList.isEmpty()}">
                <!-- 날짜 헤더 -->
                <div class="date-section-title" th:text="${targetDate}"></div>

                <div class="project-table-wrap">
                    <table class="project-table">
                        <thead>
                            <tr>
                                <th>등록일시</th>
                                <th>프로젝트</th>
                                <th>작업자</th>
                                <th>제목</th>
                                <th>일감유형</th>
                                <th>작업유형</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${workLogList}">
                                <td th:text="${log.actionAt != null ? #temporals.format(log.actionAt,'HH:mm') : '00:00'}"></td>
                                <!-- ★ 프로젝트명 링크 → 프로젝트 개요 -->
                                <td>
                                    <a th:if="${log.projectId != null}"
									   th:href="@{/project/outline(projectId=${log.projectId})}"
									   class="table-link"
									   th:text="${log.projectTitle}">
									</a>
                                    <span th:if="${log.projectId == null}" th:text="${log.projectTitle}"></span>
                                </td>
                                <td th:text="${log.userName}"></td>
                                <!-- ★ 일감명 링크 → 일감 상세 -->
                               <td class="text-left">
								    <a th:if="${log.typeName == '위키' and log.taskId != null and log.projectId != null}"
								       th:href="@{/project/wiki(projectId=${log.projectId}, wikiPageId=${log.taskId})}"
								       class="table-link"
								       th:text="${log.taskTitle}">
								    </a>
								    <a th:if="${log.typeName != '위키' and log.taskId != null and log.projectId != null}"
								       th:href="@{/project/task/detail/{tId}(tId=${log.taskId}, projectId=${log.projectId})}"
								       class="table-link"
								       th:text="${log.taskTitle}">
								    </a>
								    <span th:if="${log.taskId == null or log.projectId == null}" th:text="${log.taskTitle}"></span>
								</td>
                                <td>
									<span th:if="${log.typeName == '위키'}" class="status-badge type-wiki" th:text="${log.typeName}"></span>
									<span th:if="${log.typeName != '위키'}"
									      class="status-badge"
									      th:classappend="${typeColorMap != null and typeColorMap.containsKey(log.typeName)
									                        ? typeColorMap.get(log.typeName)
									                        : 'type-default'}"
									      th:text="${log.typeName}"></span>
								</td>
                                <td>
                                    <span th:if="${log.actionType == 'CREATE'}" class="action-badge action-create">CREATE</span>
                                    <span th:if="${log.actionType == 'UPDATE'}" class="action-badge action-update">UPDATE</span>
                                    <span th:if="${log.actionType == 'DELETE'}" class="action-badge action-delete">DELETE</span>
                                    <span th:if="${log.actionType != 'CREATE' and log.actionType != 'UPDATE' and log.actionType != 'DELETE'}"
                                          class="action-badge action-default" th:text="${log.actionType}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </th:block>

            <!-- 페이징 (날짜 단위) -->
            <div class="pagination-wrap">
                <a th:href="${currentPage > 1}
                        ? @{/worklog(page=${currentPage - 1}, projectId=${projectId}, startDate=${startDate}, endDate=${endDate}, userCode=${userCode}, typeNames=${typeNames}, search='true')}
                        : '#'"
                   th:classappend="${currentPage <= 1} ? 'disabled'"
                   class="page-btn">&lt; 이전</a>
                <th:block th:if="${totalPages > 0}" th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <a th:href="@{/worklog(page=${i}, projectId=${projectId}, startDate=${startDate}, endDate=${endDate}, userCode=${userCode}, typeNames=${typeNames}, search='true')}"
                       th:text="${i}" th:classappend="${i == currentPage} ? 'active'" class="page-btn">1</a>
                </th:block>
                <a th:href="${currentPage < totalPages}
                        ? @{/worklog(page=${currentPage + 1}, projectId=${projectId}, startDate=${startDate}, endDate=${endDate}, userCode=${userCode}, typeNames=${typeNames}, search='true')}
                        : '#'"
                   th:classappend="${currentPage >= totalPages} ? 'disabled'"
                   class="page-btn">다음 &gt;</a>
            </div>

        </th:block>

    </div>

	<script src="/js/history/worklog.js"></script>
</section>

</body>
</html>
