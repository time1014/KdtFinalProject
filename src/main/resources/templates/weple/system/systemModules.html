<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>새 프로젝트에 추가할 모듈</title>
    <link rel="stylesheet" href="/css/system/project-create.css">
</head>
<body>

    <section class="project-page">
        <div th:replace="~{common/fragments/adminSetting :: adminSettingTabsFragment}"></div>
        <div class="project-toolbar-top">
            <h3 class="project-title">새 프로젝트에 포함될 모듈</h3>
        </div>
        <div class="project-card">
            <form id="moduleSettingForm" method="post" th:action="@{/system/systemModules}">

                <div class="form-group-row">
                    <div class="module-label-row">
                        <label class="form-label">새 프로젝트에 항상 포함할 모듈</label>
                        <div class="module-select-controls">
                            <button type="button" class="module-ctrl-btn" onclick="toggleAllChecks('moduleBoxContainer', true)">전체선택</button>
                            <button type="button" class="module-ctrl-btn" onclick="toggleAllChecks('moduleBoxContainer', false)">전체해제</button>
                        </div>
                    </div>
                    <div class="module-box-container" id="moduleBoxContainer">
                        <div class="module-flex-layout">
                            <div class="module-item-wrapper"
                                 th:each="module : ${moduleList}">
                                <label class="checkbox-inline"
                                       th:classappend="${module.defaultDescribe == '개요' or module.defaultDescribe == '설정'} ? ' module-readonly' : ''">
                                    <input type="checkbox" name="enabledModules"
									       th:value="${module.commonId}"
									       th:checked="${(module.defaultDescribe == '개요' or module.defaultDescribe == '설정') ? true : (enabledCodes != null and enabledCodes.contains(module.commonId))}"
									       th:disabled="${module.defaultDescribe == '개요' or module.defaultDescribe == '설정'}">
                                    <span class="custom-check-box"></span>
                                    <span class="module-text" th:text="${module.defaultDescribe}">모듈명</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group-row">
                    <div class="module-label-row">
                        <label class="form-label">새 프로젝트에 추가할 일감 유형</label>
                        <div class="module-select-controls">
                            <button type="button" class="module-ctrl-btn" onclick="toggleAllChecks('taskTypeBoxContainer', true)">전체선택</button>
                            <button type="button" class="module-ctrl-btn" onclick="toggleAllChecks('taskTypeBoxContainer', false)">전체해제</button>
                        </div>
                    </div>
                    <div class="module-box-container" id="taskTypeBoxContainer">
                        <div class="module-flex-layout">
                            <div class="module-item-wrapper"
                                 th:each="type : ${taskTypeList}">
                                <label class="checkbox-inline">
                                    <input type="checkbox" name="enabledTaskTypes"
       									   th:value="${type.typeId}"
       									   th:checked="${enabledTaskTypeIds != null and enabledTaskTypeIds.contains(#strings.toString(type.typeId))}">
                                    <span class="custom-check-box"></span>
                                    <span class="module-text" th:text="${type.typeName}">일감유형명</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pagination-wrap button-group-right">
				    <button type="button" class="page-btn btn-cancel" id="cancelBtn">취소</button>
				    <button type="submit" class="page-btn active btn-submit">저장</button>
				</div>

            </form>
        </div>
        <script th:inline="javascript">
let isSubmitting = false;
document.getElementById('moduleSettingForm').addEventListener('submit', function (e) {
    if (isSubmitting) {
        e.preventDefault();
        return;
    }
    isSubmitting = true;
    document.querySelector('.btn-submit').disabled = true;
});

// 전체선택 / 전체해제
function toggleAllChecks(containerId, checked) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach(function (chk) {
        chk.checked = checked;
    });
}

// 토스트 알림
function showToast(msg, type) {
    var old = document.getElementById('_toastWrap');
    if (old) old.remove();
    var wrap = document.createElement('div');
    wrap.id = '_toastWrap';
    wrap.style.cssText = 'position:fixed;top:24px;left:50%;transform:translate(-50%,0);z-index:99999;';
    var box = document.createElement('div');
    box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:250px;';
    box.style.backgroundColor = (type === 'error') ? '#e53e3e' : (type === 'info' ? '#3b82f6' : '#38a169');
    box.textContent = msg;
    wrap.appendChild(box);
    document.body.appendChild(wrap);
    setTimeout(function () {
        wrap.style.transition = 'opacity 0.4s';
        wrap.style.opacity = '0';
        setTimeout(function () { wrap.remove(); }, 400);
    }, 2500);
}

// 취소 버튼: 토스트 띄우고 약간의 딜레이 후 이동
document.getElementById('cancelBtn').addEventListener('click', function () {
    showToast('취소되었습니다.', 'info');
    setTimeout(function () {
        history.back();
    }, 600);
});

// 서버에서 내려준 결과 플래시 메시지 처리
window.addEventListener('DOMContentLoaded', function () {
    const toastType = /*[[${toastType}]]*/ null;
    const toastMessage = /*[[${toastMessage}]]*/ null;
    if (toastMessage) {
        showToast(toastMessage, toastType);
    }
});
</script>
    </section>

</body>
</html>
