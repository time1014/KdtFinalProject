<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>역할 및 권한</title>
    <link rel="stylesheet" href="/css/system/role-list.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<section class="role-page">
    <h3 class="role-title">역할 및 권한</h3>
    <div class="role-card">

        <div class="role-toolbar">
            <a th:href="@{/system/role/create}" class="role-create-btn">
                <i class="fas fa-plus"></i>
                <span>역할 등록</span>
            </a>
        </div>

        <div class="role-table-wrap">
            <table class="role-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>역할명</th>
                        <th>생성일자</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(roleList)}">
                        <td colspan="4" class="empty-message">등록된 역할이 없습니다.</td>
                    </tr>
                    <tr th:each="role : ${roleList}">
                        <td th:text="${role.roleId}"></td>
                        <td class="text-left" th:text="${role.roleName}"></td>
                        <td th:text="${role.createdAt != null ? #dates.format(role.createdAt,'yyyy/MM/dd') : '-'}"></td>
                        <td style="position:relative; text-align:center;"
                            onclick="event.stopPropagation();">
                            <div class="dropdown-wrapper">
                                <span class="more-options-btn"
                                      onclick="toggleDropdown(this)">•••</span>
                                <div class="dropdown-menu-box">
                                    <button type="button"
                                            class="dropdown-item edit-btn"
                                            th:onclick="|location.href='@{/system/role/edit(roleId=${role.roleId})}'|">
                                        ✏️ 편집
                                    </button>
                                    <button type="button"
                                            class="dropdown-item delete-btn delete-role-btn"
                                            th:data-role-id="${role.roleId}">
                                        🗑️ 삭제
                                    </button>
                                </div>
                            </div>
                            <form th:action="@{/system/role/delete}"
                                  method="post"
                                  class="delete-form"
                                  style="display:none;">
                                <input type="hidden" name="roleId"
                                       th:value="${role.roleId}">
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- 삭제 확인 모달 -->
    <div id="confirmModal"
         style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35);
                justify-content:center; align-items:center; z-index:9999;">
        <div style="width:360px; background:#fff; border-radius:16px; padding:28px;
                    box-shadow:0 10px 40px rgba(0,0,0,.15); text-align:center;">
            <h4 style="margin:0 0 12px; font-size:18px; font-weight:700;">역할 삭제</h4>
            <p style="margin:0; color:#6b7280; font-size:14px;">역할을 삭제하시겠습니까?</p>
            <div style="display:flex; gap:10px; margin-top:24px;">
                <button type="button" onclick="closeModal()"
                        style="flex:1; height:42px; border:none; border-radius:10px;
                               cursor:pointer; font-weight:600; background:#f3f4f6; color:#374151;">
                    취소
                </button>
                <button type="button" onclick="submitDelete()"
                        style="flex:1; height:42px; border:none; border-radius:10px;
                               cursor:pointer; font-weight:600; background:#ff6b6b; color:#fff;">
                    삭제
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-message" th:text="${toastMessage}"></div>

    <script defer>
        function initRoleList() {
            let deleteForm = null;

            document.querySelectorAll(".delete-role-btn").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    deleteForm = this.closest("td").querySelector(".delete-form");
                    document.getElementById("confirmModal").style.display = "flex";
                });
            });

            window.closeModal = function () {
                document.getElementById("confirmModal").style.display = "none";
            };

            window.submitDelete = function () {
                if (deleteForm) {
                    document.getElementById("confirmModal").style.display = "none";
                    deleteForm.submit();
                }
            };

            const toast = document.getElementById("toast");
            if (toast && toast.textContent.trim() !== "") {
                toast.style.opacity = "1";
                toast.style.visibility = "visible";
                setTimeout(function () {
                    toast.style.opacity = "0";
                    toast.style.visibility = "hidden";
                }, 3000);
            }
        }

        if (document.readyState === "complete") {
            initRoleList();
        } else {
            window.addEventListener("load", initRoleList);
        }

        function toggleDropdown(el) {
            document.querySelectorAll('.dropdown-menu-box').forEach(function (menu) {
                if (menu !== el.nextElementSibling) {
                    menu.classList.remove('show');
                }
            });
            el.nextElementSibling.classList.toggle('show');
        }

        document.addEventListener('click', function () {
            document.querySelectorAll('.dropdown-menu-box').forEach(function (menu) {
                menu.classList.remove('show');
            });
        });
    </script>
</section>
</body>
</html>
