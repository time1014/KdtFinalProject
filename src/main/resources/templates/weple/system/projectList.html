<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">

<head>
    <meta charset="UTF-8">
    <title>프로젝트 목록</title>
    <link rel="stylesheet" href="/css/system/project-list.css">
</head>

<body>
<section class="project-page">

    <h3 class="project-title">프로젝트</h3>
    <div class="project-card">
        <!-- 상단 -->
        <div class="project-toolbar">

    <!-- 검색 -->
    <form method="get"
          th:action="@{/system/project/list}"
          class="filter-toolbar">

        <div class="project-search">
            <i class="fa fa-search"></i>
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="프로젝트명을 입력하세요."
                   onchange="this.form.submit()">
        </div>

    </form>

    <!-- 버튼 -->
    <a th:href="@{/system/project}" class="project-create-btn">
	    <i class="fa fa-folder"></i>
	    <span>프로젝트 생성</span>
	</a>

</div>

        <!-- 테이블 -->
        <div class="project-table-wrap">
            <table class="project-table">
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>프로젝트명</th>
                        <th>설명</th>
                        <th>등록일</th>
                        <th>마감일</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(projectList)}">
                        <td colspan="7" class="empty-message">등록된 프로젝트가 없습니다.</td>
                    </tr>
                    <tr th:each="project, stat : ${projectList}">
                        <td th:text="${(currentPage - 1) * 10 + stat.count}"></td>
                        <td>
						    <a class="project-link"
						       th:href="@{/project/outline(projectId=${project.projectId})}"
						       th:text="${project.projectTitle}">
						    </a>
						</td>
                        <td th:text="${project.projectDescribe}"></td>
                        <td th:text="${project.createdAt != null ? #dates.format(project.createdAt,'yyyy-MM-dd') : '-'}"></td>
                        <td th:text="${project.finishDate != null ? #dates.format(project.finishDate,'yyyy-MM-dd') : '-'}"></td>
                        <td>
						    <span class="status-badge"
						          th:classappend="${project.status == '신규'} ? 'type-new'
						                          : (${project.status == '진행 중'} ? 'type-progress'
						                          : (${project.status == '완료'} ? 'type-done'
						                          : 'type-default'))"
						          th:text="${project.status != null and project.status != ''} ? ${project.status} : '-'">
						    </span>
						</td>
                        <td style="position: relative; text-align: center;"
						    onclick="event.stopPropagation();">
						    <div class="dropdown-wrapper">
						        <span class="more-options-btn" onclick="toggleDropdown(this)">•••</span>
						        <div class="dropdown-menu-box">
						            <button type="button"
						                    class="dropdown-item edit-btn"
						                    th:onclick="|location.href='@{/system/project/update/{id}(id=${project.projectId})}'|">
						                ✏️ 편집
						            </button>
						            <button type="button"
						                    class="dropdown-item delete-btn delete-project-btn"
						                    th:data-project-id="${project.projectId}"
						                    th:data-project-title="${project.projectTitle}"
						                    th:data-project-identifier="${project.projectIdentifier}">
						                🗑️ 삭제
						            </button>
						        </div>
						    </div>
						    <form th:action="@{/system/project/delete}"
						          method="post"
						          class="delete-form"
						          style="display:none;">
						        <input type="hidden" name="projectId"
						               th:value="${project.projectId}">
						        <input type="hidden"
						               th:name="${_csrf.parameterName}"
						               th:value="${_csrf.token}">
						    </form>
						</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이징 -->
		<div class="pagination-wrap">
		    <a th:href="@{/system/project/list(page=${currentPage - 1}, keyword=${keyword})}"
		       th:classappend="${currentPage <= 1} ? 'disabled' : ''"
		       class="page-btn">&lt; 이전</a>
		
		    <a th:each="i : ${#numbers.sequence(1, totalPages)}"
		       th:href="@{/system/project/list(page=${i}, keyword=${keyword})}"
		       th:text="${i}"
		       th:classappend="${i == currentPage} ? 'active' : ''"
		       class="page-btn"></a>
		
		    <a th:href="@{/system/project/list(page=${currentPage + 1}, keyword=${keyword})}"
		       th:classappend="${currentPage >= totalPages} ? 'disabled' : ''"
		       class="page-btn">다음 &gt;</a>
		</div>

    </div>

    <!-- 삭제 확인 모달 -->
	<div id="confirmModal"
	     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35);
	            justify-content:center; align-items:center; z-index:9999;">
	    <div style="width:400px; background:#fff; border-radius:16px; padding:32px 28px;
	                box-shadow:0 10px 40px rgba(0,0,0,.15); text-align:center;">
	        <h4 style="margin:0 0 14px; font-size:18px; font-weight:700; color:#ef4444;">프로젝트 삭제</h4>
	        <p id="modalProjectTitle"
	           style="margin:0 0 8px; color:#111; font-size:14px; font-weight:600;"></p>
	        <p style="margin:0; color:#6b7280; font-size:13px; line-height:1.7;">
	            해당 프로젝트를 삭제하면 내부의<br>
	            <strong style="color:#ef4444;">모든 데이터가 영구 삭제</strong>됩니다.
	        </p>
	        <p id="modalDeletePrompt"
	           style="margin:14px 0 6px; color:#374151; font-size:13px; font-weight:600;"></p>
	        <input type="text" id="deleteConfirmationInput" autocomplete="off"
	               style="width:100%; height:40px; box-sizing:border-box; padding:0 12px;
	                      border:1.5px solid #e2e8f0; border-radius:8px; font-size:13px;
	                      text-align:center;">
	        <div style="display:flex; gap:10px; margin-top:24px;">
	            <button type="button" onclick="closeModal()"
	                    style="flex:1; height:42px; border:none; border-radius:10px;
	                           cursor:pointer; font-weight:600; background:#f3f4f6; color:#374151;">
	                취소
	            </button>
	            <button type="button" id="confirmDeleteBtn" onclick="submitDelete()" disabled
	                    style="flex:1; height:42px; border:none; border-radius:10px;
	                           cursor:not-allowed; font-weight:600; background:#fca5a5; color:#fff;">
	                삭제
	            </button>
	        </div>
	    </div>
	</div>

    <!-- 토스트 -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        var serverToastMessage = /*[[${toastMessage}]]*/ '';
        var serverToastType    = /*[[${toastType}]]*/ '';
        /*]]>*/
    </script>

	<script defer src="/js/system/project-list.js"></script>

</section>
</body>
</html>
