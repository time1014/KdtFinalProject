<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 일감 유형 등록</title>
    <link rel="stylesheet" th:href="@{/css/system/taskType-register.css}">
</head>
<body>

    <section>

        <div class="mb-4" style="max-width: 800px; margin: 0 auto 20px auto;">
            <h4 style="font-weight: bold; color: #2c3e50;">일감 유형 등록</h4>
        </div>

        <div class="form-container shadow-sm">
            <form th:action="${taskType != null} ? @{/system/taskType/update} : @{/system/taskType/insert}"
                  th:method="${taskType != null} ? 'put' : 'post'">
            
            	<input type="hidden" name="typeId" th:if="${taskType != null}" th:value="${taskType.typeId}">
                
                <div class="form-group">
                    <label for="typeName" class="form-label">
                        이름<span class="required">*</span>
                    </label>
                    <input type="text" id="typeName" name="typeName" class="custom-input" 
                           placeholder="일감 유형 이름을 입력해 주세요." required
                           th:value="${taskType != null} ? ${taskType.typeName} : ''">
                </div>

                <div class="form-group">
                    <label for="taskTypeDescribe" class="form-label">설명</label>
                    <textarea id="taskTypeDescribe" name="taskTypeDescribe" class="custom-input custom-textarea" 
                              placeholder="일감 유형에 대한 설명을 입력해 주세요."
                              th:text="${taskType != null} ? ${taskType.taskTypeDescribe} : ''"></textarea>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn-cancel" onclick="history.back();">취소</button>
                    <button type="submit" class="btn-submit" th:text="${taskType != null} ? '수정' : '저장'">저장</button>
                </div>
                
            </form>
        </div>
        
    </section>

</body>
</html>
