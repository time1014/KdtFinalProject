<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 일감 유형 등록</title>
    <link rel="stylesheet" th:href="@{/css/system/taskType-register.css}">
</head>
<body>

    <section class="project-page">

        <div class="project-toolbar-top">
            <h3 class="project-title" th:text="${taskType != null} ? '일감 유형 수정' : '일감 유형 등록'">일감 유형 등록</h3>
        </div>

        <div class="project-card">
            <form th:action="${taskType != null} ? @{/system/taskType/update} : @{/system/taskType/insert}"
                  th:method="${taskType != null} ? 'put' : 'post'">
            
            	<input type="hidden" name="typeId" th:if="${taskType != null}" th:value="${taskType.typeId}">
                
                <div class="form-group-row">
                    <label for="typeName" class="form-label required">이름</label>
                    <input type="text" id="typeName" name="typeName" class="form-input-text" 
                           placeholder="일감 유형 이름을 입력해 주세요." required
                           th:value="${taskType != null} ? ${taskType.typeName} : ''">
                </div>

                <div class="form-group-row">
                    <label for="taskTypeDescribe" class="form-label">설명</label>
                    <textarea id="taskTypeDescribe" name="taskTypeDescribe" class="form-textarea" 
                              placeholder="일감 유형에 대한 설명을 입력해 주세요."
                              th:text="${taskType != null} ? ${taskType.taskTypeDescribe} : ''"></textarea>
                </div>

                <div class="button-group-right">
                    <button type="button" class="page-btn btn-cancel" onclick="history.back();">취소</button>
                    <button type="submit" class="page-btn active btn-submit" th:text="${taskType != null} ? '수정' : '저장'">저장</button>
                </div>
                
            </form>
        </div>
        
    </section>

</body>
</html>
