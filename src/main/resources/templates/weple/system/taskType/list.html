<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 공통 관리</title>
    <link rel="stylesheet" th:href="@{/css/system/taskType-list.css}">
    <meta id="_csrf" name="_csrf" th:content="${_csrf.token}"/>
    <meta id="_csrf_header" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}"/>
</head>
<body>            

    <section class="project-page">
    
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.7/Sortable.min.js">
        </script> <script th:src="@{/js/system/taskType/list.js}"></script>   

        <h3 class="project-title">일감 유형 관리</h3>
        
        <div class="project-card">
            <div class="project-toolbar" style="justify-content: flex-end;">
                <a th:href="@{/system/taskType/insert}" class="project-create-btn">
                    <span>+ 일감유형 등록</span>
                </a>
            </div>
            
            <div class="project-table-wrap">
                <table class="project-table">
                    <thead>
                        <tr>
                            <th>일감유형</th>
                            <th>설명</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="sortable-list">
                        <th:block th:each="taskType : ${taskTypes}">
                            <tr th:data-id="${taskType.typeId}">
                                <td>[[ ${taskType.typeName} ]]</td>
                                <td class="text-muted">[[ ${taskType.taskTypeDescribe} ]]</td>
                                <td>
                                    <div class="btn-action-group">
                                        <button type="button" class="btn-action drag-handle" title="드래그 앤 드랍 순서변경">↕</button>
                                        <button type="button" class="btn-action edit-btn" title="편집" th:onclick="|location.href='@{/system/taskType/update(typeId=${taskType.typeId})}'|">✏️</button>
                                        <button type="button" class="btn-action delete-btn" title="삭제">❌</button>
                                    </div>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>        
        </div>

    </section>

</body>
</html>
