<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 생성</title>
    <link rel="stylesheet" href="/css/system/project-create.css">
</head>
<body>

    <section class="project-page">
        <!-- 토스트 -->
        <div id="toastWrap" class="toast-wrap" th:if="${toastError}">
            <div class="toast-msg toast-error" th:text="${toastError}"></div>
        </div>
        <div class="project-toolbar-top">
            <h3 class="project-title">프로젝트 생성</h3>
        </div>
        <div class="project-card">
            <form id="projectForm" method="post" th:action="@{/system/project}">

                <div class="form-group-row">
                    <label for="projectTitle" class="form-label required">프로젝트명</label>
                    <input type="text" id="projectTitle" name="projectTitle"
                           class="form-input-text" placeholder="프로젝트명을 입력하세요." required>
                </div>
                <div class="form-group-row">
                    <label for="projectDescribe" class="form-label">설명</label>
                    <textarea id="projectDescribe" name="projectDescribe"
                              class="form-textarea" placeholder="프로젝트의 설명을 입력하세요."></textarea>
                </div>
                <div class="form-group-row">
                    <label for="projectIdentifier" class="form-label required">식별자</label>
                    <div class="identifier-input-wrap">
                        <input type="text" id="projectIdentifier" name="projectIdentifier"
                               class="form-input-text"
                               placeholder="식별자를 입력하세요 (예: my-project)" required>
                    </div>
                </div>
                <div class="form-group-row">
                    <label class="form-label">날짜</label>
                    <div class="date-row">
                        <div class="date-field">
                            <label for="startDate" class="date-label required">시작일자</label>
                            <input type="date" id="startDate" name="startDate"
                                   class="form-input-text date-input" required>
                        </div>
                        <div class="date-field">
                            <label for="finishDate" class="date-label required">마감일자</label>
                            <input type="date" id="finishDate" name="finishDate"
                                   class="form-input-text date-input" required>
                        </div>
                    </div>
                </div>
                <div class="form-group-row">
                    <div class="module-label-row">
                        <label class="form-label required">모듈</label>
                        <div class="module-select-controls">
                            <button type="button" class="module-ctrl-btn" id="selectAll">전체선택</button>
                            <button type="button" class="module-ctrl-btn" id="deselectAll">전체해제</button>
                        </div>
                    </div>
                    <div class="module-box-container">
					    <div class="module-flex-layout">
					        <div class="module-item-wrapper">
					        <label class="checkbox-inline" id="labelOverview">
					            <input type="checkbox" name="moduleNames" value="b1" id="moduleOverview" checked>
					            <span class="custom-check-box"></span>
					            <span class="module-text">개요</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b2" th:checked="${enabledCodes.contains('b2')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">작업내역</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b3" th:checked="${enabledCodes.contains('b3')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">로드맵</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b4" th:checked="${enabledCodes.contains('b4')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">일감</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b5" th:checked="${enabledCodes.contains('b5')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">소요시간</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b6" th:checked="${enabledCodes.contains('b6')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">간트차트</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b12" th:checked="${enabledCodes.contains('b12')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">테스트</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b7" th:checked="${enabledCodes.contains('b7')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">위키</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b13" th:checked="${enabledCodes.contains('b13')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">파일관리</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b8" th:checked="${enabledCodes.contains('b8')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">저장소</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b9" th:checked="${enabledCodes.contains('b9')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">칸반보드</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline">
					            <input type="checkbox" name="moduleNames" value="b10" th:checked="${enabledCodes.contains('b10')}">
					            <span class="custom-check-box"></span>
					            <span class="module-text">캘린더</span>
					        </label>
					    </div>
					    <div class="module-item-wrapper">
					        <label class="checkbox-inline" id="labelSettings">
					            <input type="checkbox" name="moduleNames" value="b11" id="moduleSettings" checked>
					            <span class="custom-check-box"></span>
					            <span class="module-text">설정</span>
					        </label>
					    </div>
					    </div>
					</div>
                </div>

                <div class="pagination-wrap button-group-right">
				    <a th:href="@{/system/project/list}" class="page-btn btn-cancel">취소</a>
				    <button type="submit" class="page-btn active btn-submit">등록</button>
				</div>

            </form>
        </div>

		<script src="/js/system/project-create.js"></script>

    </section>

</body>
</html>
