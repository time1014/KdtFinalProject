<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layouts/default_layout :: layout(~{::section})}">
<head>
<title>WEPLE - 새 일감 등록</title>
<style>
.form-container {
	background-color: #ffffff;
	padding: 30px;
	margin-bottom: 30px;
}

.form-label {
	font-size: 14px;
	font-weight: bold;
	color: #333333;
	margin-bottom: 6px;
}

.text-danger {
	color: #e74c3c;
	margin-left: 3px;
} /* 필수 표시 * */
.form-control, .form-select {
	font-size: 14px;
	padding: 10px 12px;
	border: 1px solid #dcdde1;
	border-radius: 6px;
	color: #444444;
}

.form-control::placeholder {
	color: #a0a0a0;
}

.upload-zone {
	border: 1px dashed #b2bec3;
	border-radius: 8px;
	background-color: #f8f9fa;
	padding: 40px 20px;
	text-align: center;
	cursor: pointer;
	transition: background 0.2s;
}

.upload-zone:hover {
	background-color: #f1f2f6;
}

.upload-icon {
	font-size: 32px;
	color: #95a5a6;
	margin-bottom: 10px;
}

.upload-text {
	font-size: 13px;
	color: #7f8c8d;
}
</style>
</head>
<body>

	<section class="container-fluid my-4">
		<div class="mb-4">
			<h3 class="fw-bold" style="color: #2c3e50;">새 일감</h3>
		</div>

		<div class="form-container">
			<form id="taskInsertForm" method="post" enctype="multipart/form-data"
				th:action="@{/task/insert}">

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">프로젝트 <span class="text-danger">*</span></label>
						<select class="form-select" name="projectId" required>
							<option value="" disabled selected hidden>프로젝트</option>
							<option value="1">예담</option>
							<option value="2">기획</option>
							<option value="3">개발</option>
						</select>
					</div>
					<div class="col-md-6">
						<label class="form-label">일감 유형 <span class="text-danger">*</span></label>
						<select class="form-select" name="typeId" required>
							<option value="" disabled selected hidden>일감 유형 선택</option>
							<option th:each="type : ${typeList}" th:value="${type.typeId}"
								th:text="${type.typeName}">기획</option>
						</select>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-12">
						<label class="form-label">제목 <span class="text-danger">*</span></label>
						<input type="text" class="form-control" name="taskTitle"
							placeholder="일감 제목을 입력하세요" required>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-12">
						<label class="form-label">설명</label>
						<textarea class="form-control" name="taskDescribe" rows="5"></textarea>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">상태 <span class="text-danger">*</span></label>
						<select class="form-select" name="taskStatus" required>
							<option value="" disabled selected hidden>상태 선택</option>
							<option th:each="status : ${statusList}"
								th:value="${status.commonId}"
								th:text="${status.defaultDescribe}">신규</option>
						</select>
					</div>
					<div class="col-md-6">
						<label class="form-label">우선순위 <span class="text-danger">*</span></label>
						<select class="form-select" name="priority" required>
							<option value="" disabled selected hidden>우선순위 선택</option>
							<option value="매우낮음">매우낮음</option>
							<option value="낮음">낮음</option>
							<option value="보통" selected>보통</option>
							<option value="높음">높음</option>
							<option value="매우높음">매우높음</option>
						</select>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">담당자</label> <select class="form-select"
							name="taskManager">
							<option value="">&lt;&lt; 담당자 지정 안함 &gt;&gt;</option>
							<option th:each="member : ${memberList}"
								th:value="${member.userCode}" th:text="${member.userName}">홍길동</option>
						</select>
					</div>
					<div class="col-md-6">
						<label class="form-label">시작일</label> <input type="date"
							class="form-control" name="startDate">
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">완료일</label> <input type="date"
							class="form-control" name="finishDate">
					</div>
					<div class="col-md-6">
						<label class="form-label">추정시간</label>
						<div class="input-group">
							<input type="number" class="form-control" name="estimatedTime"
								value="0" min="0"> <span
								class="input-group-text bg-light text-muted"
								style="font-size: 13px;">시간</span>
						</div>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">진척도</label> <select class="form-select"
							name="taskProgress">
							<option value="0" selected>0 %</option>
							<option value="10">10 %</option>
							<option value="20">20 %</option>
							<option value="30">30 %</option>
							<option value="40">40 %</option>
							<option value="50">50 %</option>
							<option value="60">60 %</option>
							<option value="70">70 %</option>
							<option value="80">80 %</option>
							<option value="90">90 %</option>
							<option value="100">100 %</option>
						</select>
					</div>

					<div class="col-md-6 position-relative">
						<label class="form-label">상위일감</label>
						<div class="input-group">
							<span class="input-group-text bg-white border-end-0">🔍</span> <input
								type="text" id="parentTaskSearch"
								class="form-control border-start-0" placeholder="상위일감 검색"
								autocomplete="off"> <input type="hidden"
								id="parentTaskId" name="parentTaskId">
						</div>

						<div id="autocomplete-list"
							class="list-group shadow-sm position-absolute w-100 mt-1"
							style="z-index: 1000; max-height: 200px; overflow-y: auto; display: none; left: 12px; padding-right: 24px;">
						</div>
					</div>
				</div>

				<div class="row mb-5">
					<div class="col-12">
						<label class="form-label">파일</label>
						<div class="upload-zone"
							onclick="document.getElementById('fileInput').click();">
							<div class="upload-icon">📁</div>
							<div class="upload-text">파일을 선택하거나 여기로 드래그하세요 (최대 크기: 5 MB)</div>
							<input type="file" id="fileInput" name="files" multiple
								style="display: none;">
						</div>
					</div>
				</div>

				<div class="d-flex justify-content-end gap-2">
					<button type="button" th:onclick="|location.href='@{/task/list}'|"
						class="btn btn-sm btn-light border px-4 py-2" style="color: #555;">취소</button>
					<button type="submit"
						class="btn btn-sm btn-primary px-4 py-2 fw-bold"
						style="background-color: #0000ff; border-color: #0000ff;">등록</button>
				</div>

			</form>
		</div>
	</section>

	<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function() {
    // 1. 타임리프로 받아온 부모 일감 리스트를 자바스크립트 배열 객체로 변환
    /*<![CDATA[*/
    const parentTasks = /*[[${parentTaskList}]]*/ [];
    /*]]>*/

    const searchInput = document.getElementById("parentTaskSearch");
    const hiddenInput = document.getElementById("parentTaskId");
    const autocompleteList = document.getElementById("autocomplete-list");

    // 2. 검색창 입력 이벤트 리스너 리얼타임 감지
    searchInput.addEventListener("input", function() {
        const val = this.value.trim().toLowerCase();
        autocompleteList.innerHTML = ""; // 기존 자동완성 목록 초기화

        // 입력값이 없으면 자동완성 리스트 숨기기
        if (!val) {
            autocompleteList.style.display = "none";
            hiddenInput.value = ""; // 검색어 지우면 ID 값도 날림
            return;
        }

        // 3. 자바스크립트 배열에서 검색어를 포함(includes)하는 일감 필터링
        const filtered = parentTasks.filter(task => 
            task.taskTitle && task.taskTitle.toLowerCase().includes(val)
        );

        if (filtered.length > 0) {
            filtered.forEach(task => {
                // 부트스트랩 클래스를 활용하여 깔끔한 아이템 행 생성
                const item = document.createElement("button");
                item.type = "button";
                item.className = "list-group-item list-group-item-action small text-start py-2";
                item.style.cursor = "pointer";
                item.textContent = task.taskTitle;

                // 목록 아이템 클릭 시 이벤트
                item.addEventListener("click", function() {
                    searchInput.value = task.taskTitle;  // 인풋창에 제목 바인딩
                    hiddenInput.value = task.taskId;    // 히든 태그에 실제 ID 세팅
                    autocompleteList.style.display = "none"; // 목록 숨기기
                });

                autocompleteList.appendChild(item);
            });
            autocompleteList.style.display = "block"; // 필터 결과가 있으면 목록 열기
        } else {
            autocompleteList.style.display = "none"; // 매칭되는 일감 없으면 숨김
        }
    });

    // 4. 화면의 다른 빈 곳을 클릭하면 자동완성 창이 닫히도록 예외 처리
    document.addEventListener("click", function(e) {
        if (e.target !== searchInput && e.target !== autocompleteList) {
            autocompleteList.style.display = "none";
        }
    });
});
</script>

</body>
</html>
