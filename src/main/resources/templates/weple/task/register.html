<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8">
<title>WEPLE</title>
<link rel="stylesheet" th:href="@{/css/task/task-insert.css}">
</head>
<body>

	<section class="container-fluid my-4" style="padding: 20px;">
		<div class="mb-4" style="margin-bottom: 25px;">
			<h3 class="fw-bold" style="color: #1e293b; font-weight: 700;">새
				일감</h3>
		</div>

		<div class="form-container">
			<form id="taskInsertForm" method="post" enctype="multipart/form-data"
				th:action="@{/project/task/insert(projectId=${param.projectId})}">

				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-6">
						<label class="form-label">일감 유형 <span class="text-danger">*</span></label>
						<select class="form-control form-select" name="typeIdName"
							required>
							<option value="" disabled selected hidden>일감 유형 선택</option>
							<option th:each="type : ${typeList}" th:value="${type.typeName}"
								th:text="${type.typeName}"></option>
						</select>
					</div>
				</div>

				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-12">
						<label class="form-label">제목 <span class="text-danger">*</span></label>
						<input type="text" class="form-control" name="taskTitle"
							placeholder="예담 기획" required>
					</div>
				</div>

				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-12">
						<label class="form-label">설명</label>
						<textarea class="form-control" name="taskDescribe" rows="5"
							placeholder="내용을 입력해주세요."></textarea>
					</div>
				</div>

				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-6">
						<label class="form-label">상태 <span class="text-danger">*</span></label>
						<select class="form-control form-select" name="taskStatus"
							required>
							<option value="" disabled selected hidden>상태 선택</option>
							<option th:each="status : ${statusList}"
								th:value="${status.commonId}"
								th:text="${status.defaultDescribe}"></option>
						</select>
					</div>
					<div class="col-md-6">
						<label class="form-label">우선순위 <span class="text-danger">*</span></label>
						<select class="form-control form-select" name="priority" required>
							<option value="" disabled selected hidden>우선순위 선택</option>
							<option th:each="priority : ${priorityList}"
								th:value="${priority.priorityName}"
								th:text="${priority.priorityName}"></option>
						</select>
					</div>
				</div>

				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-6">
						<label class="form-label">담당자</label> <select
							class="form-control form-select" name="taskManager">
							<option value="">담당자 지정안함</option>
							<option th:value="${loginUserCode}"><< 내게 할당 >></option>
							<option th:each="member : ${memberList}"
								th:value="${member.userCode}"
								th:text="|${member.userName} (${member.email})|"></option>
						</select>
					</div>
					<div class="col-md-6">
					<input type="hidden" id="projectStartDate"
       th:value="${projectPeriod.startDate}">
						<label class="form-label">시작일</label> <input type="date"
							class="form-control" name="startDate" id="startDate">
					</div>
				</div>

				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-6">
					<input type="hidden" id="projectFinishDate"
       th:value="${projectPeriod.finishDate}">
						<label class="form-label">완료일</label> <input type="date"
							class="form-control" name="finishDate" id="finishDate">
					</div>
					<div class="col-md-6">
						<label class="form-label">추정시간</label>
						<div class="input-group">
							<input type="number" class="form-control" name="estimatedTime"
								value="0" min="0"> <span
								class="input-group-addon bg-light text-muted"
								style="font-size: 13px; border: 1px solid #cbd5e1; border-left: none; border-radius: 0 6px 6px 0;">시간</span>
						</div>
					</div>
				</div>

				<div class="row" style="margin-bottom: 30px;">
					<div class="col-md-4">
						<label class="form-label">진척도</label> <select
							class="form-control form-select" name="taskProgress">
							<option value="0" selected>0 %</option>
							<option value="10">10 %</option>
							<option value="20">20 %</option>
							<option value="30">30 %</option>
							<option value="40">40 %</option>
							<option value="50">50 %</option>
							<option value="60">60 %</option>
							<option value="70">70 %</option>
							<option value="80">80 %</option>
							<option value="90">90 %</option>
							<option value="100">100 %</option>
						</select>
					</div>
					<div class="col-md-4">
						<label class="form-label">마일스톤</label> <select
							class="form-control form-select" name="milestoneId">
							<option value="" disabled selected hidden>마일스톤 선택</option>
							<option value="">선택 안 함</option>
							<th:block th:each="milestone : ${milestoneList}">
								<option th:value="${milestone.milestoneId}"
									th:text="${milestone.milestoneTitle}"></option>
							</th:block>
						</select>
					</div>
					<div class="col-md-4">
						<label class="form-label">상위일감</label>
						<div style="position: relative;">
							<div class="input-group">
								<span class="input-group-addon"
									style="background: #fff; border-right: none; border-radius: 6px 0 0 6px;">🔍</span>
								<input type="text" id="parentTaskSearch" name="parentTaskTitle"
									class="form-control" placeholder="상위일감 검색" autocomplete="off"
									style="border-left: none; border-radius: 0 6px 6px 0 !important;">
								<input type="hidden" id="parentTaskId" name="parentTaskId">
							</div>
							<div id="autocomplete-list" class="list-group shadow"
								style="z-index: 10000; max-height: 200px; overflow-y: auto; display: none; position: absolute; left: 0; right: 0; top: 100%; border-radius: 4px;"></div>
						</div>
					</div>
				</div>

				<div class="row" style="margin-bottom: 30px;">
					<div class="col-md-12">
						<label class="form-label">파일</label>
						<div class="upload-zone" id="dropZone"
							onclick="document.getElementById('fileInput').click();"
							style="border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; border-radius: 5px;">
							<div class="upload-icon">📁</div>
							<div class="upload-text">파일을 선택하거나 여기로 드래그하세요 (최대 크기: 5 MB)</div>
							<input type="file" id="fileInput" name="files" multiple
								style="display: none;">
						</div>

						<div id="fileListDisplay"
							style="margin-top: 10px; font-size: 14px; color: #555;"></div>
					</div>
				</div>

				<div style="display: flex; justify-content: flex-end; gap: 10px;">
					<button type="button"
						th:onclick="|location.href='@{/project/task?projectId={projectId}(projectId=${param.projectId})}'|"
						class="btn-insert-cancel">취소</button>
					<button type="submit" class="btn-insert-submit">등록</button>
				</div>
			</form>
		</div>

		<script th:inline="javascript">
			window.globalParentTaskList = /*[[${parentTaskList}]]*/[];
		</script>
		<script th:src="@{/js/task/task-insert.js}"></script>
	</section>
</body>
</html>
