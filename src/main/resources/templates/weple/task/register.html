<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>새 일감 등록</title>
</head>
<body>

	<section class="container-fluid my-4">
		<div class="mb-4">
			<h3 class="fw-bold" style="color: #2c3e50;">새 일감</h3>
		</div>
		<div class="form-container">
			<form id="taskInsertForm" method="post" enctype="multipart/form-data"
				th:action="@{/task/insert}">

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">일감 유형 <span class="text-danger">*</span></label>
						<select class="form-select" name="typeIdName" required>
							<option value="" disabled selected hidden>일감 유형 선택</option>
							<option th:each="type : ${typeList}" th:value="${type.typeName}"
								th:text="${type.typeName}">기획</option>
						</select>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-12">
						<label class="form-label">제목 <span class="text-danger">*</span></label>
						<input type="text" class="form-control" name="taskTitle"
							placeholder="예담 기획" required>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-12">
						<label class="form-label">설명</label>
						<textarea class="form-control" name="taskDescribe" rows="5"></textarea>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">상태 <span class="text-danger">*</span></label>
						<select class="form-select" name="taskStatus" required>
							<option value="" disabled selected hidden>상태 선택</option>
							<option th:each="status : ${statusList}"
								th:value="${status.commonId}"
								th:text="${status.defaultDescribe}">신규</option>
						</select>
					</div>
					<div class="col-md-6">
						<label class="form-label">우선순위 <span class="text-danger">*</span></label>
						<select class="form-select" name="priority" required>
							<option value="" disabled selected hidden>우선순위 선택</option>
							<option value="매우낮음">매우낮음</option>
							<option value="낮음">낮음</option>
							<option value="보통" selected>보통</option>
							<option value="높음">높음</option>
							<option value="매우높음">매우높음</option>
						</select>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">담당자</label> <select class="form-select"
							name="taskManager">
							<option value="">&lt;&lt; 내게 할당 &gt;&gt;</option>
							<option th:each="member : ${memberList}"
								th:value="${member.userCode}" th:text="${member.userName}">홍길동</option>
						</select>
					</div>
					<div class="col-md-6">
						<label class="form-label">시작일</label> <input type="date"
							class="form-control" name="startDate">
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">완료일</label> <input type="date"
							class="form-control" name="finishDate" placeholder="YYYY/MM/DD">
					</div>
					<div class="col-md-6">
						<label class="form-label">추정시간</label>
						<div class="input-group">
							<input type="number" class="form-control" name="estimatedTime"
								value="0" min="0"> <span
								class="input-group-text bg-light text-muted"
								style="font-size: 13px;">시간</span>
						</div>
					</div>
				</div>

				<div class="row mb-4">
					<div class="col-md-6">
						<label class="form-label">진척도</label> <select class="form-select"
							name="taskProgress">
							<option value="0" selected>0 %</option>
							<option value="10">10 %</option>
							<option value="20">20 %</option>
							<option value="30">30 %</option>
							<option value="40">40 %</option>
							<option value="50">50 %</option>
							<option value="60">60 %</option>
							<option value="70">70 %</option>
							<option value="80">80 %</option>
							<option value="90">90 %</option>
							<option value="100">100 %</option>
						</select>
					</div>

					<div class="col-md-6">
						<label class="form-label">상위일감</label>
						<div class="position-relative">
							<div class="input-group">
								<span class="input-group-text bg-white border-end-0">🔍</span> <input
									type="text" id="parentTaskSearch" name="parentTaskTitle"
									class="form-control border-start-0" placeholder="상위일감 검색"
									autocomplete="off"> <input type="hidden"
									id="parentTaskId">
							</div>

							<div id="autocomplete-list"
								class="list-group shadow position-absolute"
								style="z-index: 10000; max-height: 200px; overflow-y: auto; display: none; left: 0; right: 0; top: 100%; border-radius: 4px;">
							</div>
						</div>
					</div>
				</div>

				<div class="row mb-5">
					<div class="col-12">
						<label class="form-label">파일</label>
						<div class="upload-zone"
							onclick="document.getElementById('fileInput').click();">
							<div class="upload-icon">📁</div>
							<div class="upload-text">파일을 선택하거나 여기로 드래그하세요 (최대 크기: 5 MB)</div>
							<input type="file" id="fileInput" name="files" multiple
								style="display: none;">
						</div>
					</div>
				</div>

				<div class="d-flex justify-content-end gap-2">
					<button type="button" th:onclick="|location.href='@{/task/list}'|"
						class="btn btn-sm btn-light border px-4 py-2" style="color: #555;">취소</button>
					<button type="submit"
						class="btn btn-sm btn-primary px-4 py-2 fw-bold"
						style="background-color: #0000ff; border-color: #0000ff;">등록</button>
				</div>

			</form>
		</div>

		<script th:inline="javascript">
        // 제이쿼리 에러 강제 우회 방어벽
        window.onerror = function(message, source, lineno, colno, error) {
            if (message && (message.indexOf('indexOf') !== -1 || (source && (source.indexOf('jquery') !== -1 || source.indexOf('custom') !== -1)))) {
                return true; 
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            const parentTasks = /*[[${parentTaskList}]]*/ [];

            const searchInput = document.getElementById("parentTaskSearch");
            const hiddenInput = document.getElementById("parentTaskId");
            const autocompleteList = document.getElementById("autocomplete-list");

            if (!searchInput || !autocompleteList) return;

            // 검색창 입력 이벤트
            searchInput.addEventListener("input", function(e) {
                e.stopPropagation(); 
                
                const val = this.value.trim().toLowerCase();
                autocompleteList.innerHTML = ""; 

                if (!val) {
                    autocompleteList.style.display = "none";
                    hiddenInput.value = ""; 
                    return;
                }

                const filtered = parentTasks.filter(task => {
                    if (task && task.taskTitle) {
                        const titleStr = String(task.taskTitle).toLowerCase();
                        return titleStr.includes(val);
                    }
                    return false;
                });

                if (filtered.length > 0) {
                    let htmlContent = "";
                    
                    filtered.forEach(task => {
                        htmlContent += `
                            <button type="button" 
                                    class="list-group-item list-group-item-action small text-start py-2 parent-task-item" 
                                    style="cursor: pointer; background-color: #ffffff; border-top: none; border-left: 1px solid #dee2e6; border-right: 1px solid #dee2e6; border-bottom: 1px solid #dee2e6;"
                                    data-id="${task.taskId}" 
                                    data-title="${task.taskTitle}">
                                ${task.taskTitle}
                            </button>
                        `;
                    });
                    
                    autocompleteList.innerHTML = htmlContent;
                    
                    const firstItem = autocompleteList.querySelector(".parent-task-item");
                    if (firstItem) firstItem.style.borderTop = "1px solid #dee2e6";
                    
                    autocompleteList.style.display = "block"; 
                    
                    const items = autocompleteList.querySelectorAll(".parent-task-item");
                    items.forEach(item => {
                        item.addEventListener("click", function(clickEvent) {
                            clickEvent.stopPropagation(); 
                            
                            searchInput.value = this.getAttribute("data-title");  
                            hiddenInput.value = this.getAttribute("data-id");    
                            autocompleteList.style.display = "none"; 
                        });
                    });
                    
                } else {
                    autocompleteList.style.display = "none"; 
                }
            });

            document.addEventListener("click", function(e) {
                if (e.target !== searchInput && e.target !== autocompleteList) {
                    autocompleteList.style.display = "none";
                }
            });
        });
        </script>
	</section>
</body>
</html>
