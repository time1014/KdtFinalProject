<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<link rel="stylesheet" th:href="@{/css/task/task-list.css}">
<link rel="stylesheet" th:href="@{/css/repository/repository.css}">
</head>
<body>

	<section class="container-fluid my-4" style="padding: 20px;">

		<div
			style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
			<h3 style="color: #1e293b; font-weight: 700; margin: 0;">전체 일감</h3>
			<button th:if="${isAdminOrOwner or taskPerms.k3Add != null}"
				type="button" data-toggle="modal" data-target="#projectSelectModal"
				class="btn btn-sm text-primary fw-bold"
				style="background: none; border: none; color: #5B4FEA; font-weight: bold;">
				+ 새 일감만들기</button>
		</div>

		<div class="filter-box">
			<form id="searchForm" method="get" th:action="@{/task/all-list}">
				<input type="hidden" id="pageInput" name="page"
					th:value="${currentPage != null ? currentPage : 1}">
				<div class="row" style="margin-bottom: 20px;">
					<div class="col-md-4 col-md-offset-8">
						<div class="input-group input-group-sm search-group">
							<span class="input-group-addon">🔍</span> <input type="text"
								class="form-control" name="searchKeyword" placeholder="일감명 검색"
								th:value="${param.searchKeyword}">
						</div>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-project">프로젝트</div>
					<div class="filter-options">
						<label th:each="proj : ${projectList}"> <input
							type="checkbox" name="projectIds" th:value="${proj.projectId}"
							th:checked="${param.projectIds != null and #arrays.contains(param.projectIds, #strings.toString(proj.projectId))}">
							<span   th:text="${proj.projectTitle}">프로젝트명</span>
						</label>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-type">일감유형</div>
					<div class="filter-options">
						<label th:each="type : ${typeList}"> <input
							type="checkbox" name="typeIds" th:value="${type.typeId}"
							th:checked="${param.typeIds != null and #arrays.contains(param.typeIds, #strings.toString(type.typeId))}">
							<span th:text="${type.typeName}" >기능개발</span>
						</label>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-status">상태</div>
					<div class="filter-options">
						<label th:each="taskStatus : ${statusList}"> <input
							type="checkbox" name="statusIds"
							th:value="${taskStatus.commonId}"
							th:checked="${param.statusIds != null and #arrays.contains(param.statusIds, #strings.toString(taskStatus.commonId))}">
							<span th:text="${taskStatus.defaultDescribe}">신규</span>
						</label>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-priority">우선순위</div>
					<div class="filter-options">
						<label th:each="priority : ${priorityList}"> <input
							type="checkbox" name="priorityNames"
							th:value="${priority.priorityName}"
							th:checked="${param.priorityNames != null and #arrays.contains(param.priorityNames, priority.priorityName)}">
							<span th:text="${priority.priorityName}">보통</span>
						</label>
					</div>
				</div>
				<div class="filter-row" th:if="${isAdminOrOwner}">
					<div class="filter-label label-manager">담당자</div>
					<div class="filter-options">
						<select id="memberChoices" name="memberIds" multiple>
							<option th:each="member : ${allMemberList}"
								th:value="${member.userCode}"
								th:text="|${member.userName} (${member.email})|"></option>
						</select>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-progress">진척도</div>
					<div class="filter-options">
						<label><input type="checkbox" name="progress" value="0"
							th:checked="${param.progress != null and #arrays.contains(param.progress, '0')}">
							0%</label> <label><input type="checkbox" name="progress"
							value="1-25"
							th:checked="${param.progress != null and #arrays.contains(param.progress, '1-25')}">
							1~25%</label> <label><input type="checkbox" name="progress"
							value="26-50"
							th:checked="${param.progress != null and #arrays.contains(param.progress, '26-50')}">
							26~50%</label> <label><input type="checkbox" name="progress"
							value="51-75"
							th:checked="${param.progress != null and #arrays.contains(param.progress, '51-75')}">
							51~75%</label> <label><input type="checkbox" name="progress"
							value="76-100"
							th:checked="${param.progress != null and #arrays.contains(param.progress, '76-100')}">
							76~100%</label>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-date">등록일자</div>
					<div class="filter-options">
						<label><input type="checkbox" name="regDate" value="today"
							th:checked="${param.regDate != null and #arrays.contains(param.regDate, 'today')}">
							오늘</label> <label><input type="checkbox" name="regDate"
							value="thisWeek"
							th:checked="${param.regDate != null and #arrays.contains(param.regDate, 'thisWeek')}">
							이번주</label> <label><input type="checkbox" name="regDate"
							value="thisMonth"
							th:checked="${param.regDate != null and #arrays.contains(param.regDate, 'thisMonth')}">
							이번달</label>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-label label-date">마감일자</div>
					<div class="filter-options">
						<label><input type="checkbox" name="dueDate" value="today"
							th:checked="${param.dueDate != null and #arrays.contains(param.dueDate, 'today')}">
							오늘</label> <label><input type="checkbox" name="dueDate"
							value="thisWeek"
							th:checked="${param.dueDate != null and #arrays.contains(param.dueDate, 'thisWeek')}">
							이번주</label> <label><input type="checkbox" name="dueDate"
							value="thisMonth"
							th:checked="${param.dueDate != null and #arrays.contains(param.dueDate, 'thisMonth')}">
							이번달</label>
					</div>
				</div>

				<div
					style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
					<div style="margin: 0 auto; margin-left: 47%;"></div>
					<div style="display: flex; gap: 8px;">
						<button type="button" class="btn-pill-light"
							th:onclick="|location.href='@{/task/all-list}'|">지우기</button>
						<button type="submit" class="btn-pill-primary"
							onclick="document.getElementById('pageInput').value=1;">적용</button>
					</div>
				</div>
			</form>
		</div>

		<div class="table-container">
			<table class="table table-hover custom-table"
				style="font-size: 14px; text-align: center;">
				<thead>
					<tr>
						<th style="width: 60px; text-align: center;">#</th>
						<th style="text-align: center;">프로젝트</th>
						<th style="text-align: center;">일감유형</th>
						<th style="text-align: center;">상태</th>
						<th style="text-align: center;">우선순위</th>
						<th style="text-align: center;">일감명</th>
						<th style="width: 120px; text-align: center;">진척도</th>
						<th style="text-align: center;">담당자</th>
						<th style="text-align: center;">등록일자</th>
						<th style="text-align: center;">마감일자</th>
						<th style="width: 50px; text-align: center;"></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="task, status : ${allList}"
						th:onclick="|location.href='@{/project/task/detail/{id}(id=${task.taskId}, projectId=${task.projectId})}'|"
						style="cursor: pointer;">
						<td th:text="${status.count}">1</td>
						<td><a href="#"
							style="text-decoration: none; color: #5B4FEA; font-weight: 500;"
							th:text="${task.projectTitle}">프로젝트명</a></td>
						<td th:text="${task.typeName}">기획</td>
						<td th:text="${task.defaultDescribe}">신규</td>
						<td th:text="${task.priority}">매우낮음</td>
						<td><a href="#"
							style="text-decoration: none; color: #1e293b; font-weight: 500;"
							th:text="${task.taskTitle}">일감명</a></td>
						<td>
							<div class="progress-container">
								<div class="progress">
									<div class="progress-bar" role="progressbar"
										th:style="|width: ${task.taskProgress != null ? task.taskProgress : 0}%|"></div>
								</div>
								<span class="progress-text"
									th:text="${task.taskProgress != null ? task.taskProgress + '%' : '0%'}">0%</span>
							</div>
						</td>
						<td
							th:text="${task.taskManager != null && task.taskManager != '' ? task.taskManager : '-'}">-</td>
						<td th:text="${#temporals.format(task.createdAt, 'yyyy.MM.dd')}">2023.09.12</td>
						<td th:text="${#temporals.format(task.finishDate, 'yyyy.MM.dd')}">2024.01.27</td>
						<td style="position: relative; text-align: center;"
							onclick="event.stopPropagation();">
							<div class="dropdown-wrapper">
								<span class="more-options-btn" onclick="toggleDropdown(this)">•••</span>

								<div class="dropdown-menu-box">
									<button class="dropdown-item edit-btn"
										th:if="${isAdminOrOwner or taskPerms.k3Edit != null or (taskPerms.k3Myedit != null and task.taskManagerId == loginUserCode)}"
										th:onclick="|location.href='@{/project/task/update/{id}(id=${task.taskId}, projectId=${task.projectId})}'|">
										✏️ 편집</button>

									<button class="dropdown-item delete-btn task-delete-trigger"
										th:if="${isAdminOrOwner or taskPerms.k3Delete != null}"
										th:data-task-id="${task.taskId}"
										th:data-task-title="${task.taskTitle}"
										th:data-project-id="${task.projectId}">🗑️ 삭제</button>
									<span
										th:unless="${isAdminOrOwner or taskPerms.k3Edit != null or (taskPerms.k3Myedit != null and task.taskManagerId == loginUserCode) or taskPerms.k3Delete != null}"
										style="padding: 10px; color: #999; font-size: 13px; display: block; text-align: center; white-space: nowrap;">
										접근 권한 없음 </span>
								</div>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(allList)}">
						<td colspan="12" style="color: #94a3b8; padding: 40px 0;">등록된
							일감이 존재하지 않습니다.</td>
					</tr>
				</tbody>
			</table>
			<div class="pagination-wrap"
				th:if="${totalPages != null and totalPages > 0}">
				<a href="javascript:void(0);"
					th:onclick="${currentPage != null and currentPage > 1} ? '|goPage(${currentPage - 1})|' : ''"
					th:classappend="${currentPage == null or currentPage <= 1} ? 'disabled'"
					class="page-btn">&lt; 이전</a>

				<th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
					<a href="javascript:void(0);" th:onclick="|goPage(${i})|"
						th:text="${i}" th:classappend="${i == currentPage} ? 'active'"
						class="page-btn">1</a>
				</th:block>

				<a href="javascript:void(0);"
					th:onclick="${currentPage != null and currentPage < totalPages} ? '|goPage(${currentPage + 1})|' : ''"
					th:classappend="${currentPage == null or currentPage >= totalPages} ? 'disabled'"
					class="page-btn">다음 &gt;</a>
			</div>
		</div>

		<dialog class="repository-delete-dialog" id="taskDeleteDialog"
			aria-labelledby="taskDeleteDialogTitle">
		<div class="repository-delete-dialog-header">
			<h2 id="taskDeleteDialogTitle">일감 삭제</h2>
			<button class="repository-dialog-close" type="button" aria-label="닫기"
				data-task-delete-close>&times;</button>
		</div>
		<p>
			<strong id="taskDeleteName" style="color: #ff4d4f;">일감명</strong>을(를)
			삭제합니다. 하위 일감이나 관련 데이터가 함께 영향받을 수 있으며, 이 작업은 되돌릴 수 없습니다.
		</p>

		<form id="taskDeleteForm" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}"> <label
				for="taskDeleteConfirmationName"> <span
				id="taskDeletePrompt">삭제하려면 일감명을 입력하세요.</span> <input
				id="taskDeleteConfirmationName" name="confirmationName" type="text"
				required autocomplete="off">
			</label>

			<div class="repository-dialog-actions">
				<button class="repository-button repository-button-secondary"
					type="button" data-task-delete-close>취소</button>
				<button class="repository-button repository-button-danger"
					type="submit" id="taskDeleteSubmitBtn" disabled>삭제 확인</button>
			</div>
		</form>
		</dialog>

		<div class="modal fade" id="projectSelectModal" tabindex="-1"
			role="dialog" aria-labelledby="projectSelectModalLabel">
			<div class="modal-dialog modal-sm" role="document"
				style="margin-top: 15%;">
				<div class="modal-content"
					style="border-radius: 12px; border: none; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);">
					<div class="modal-header"
						style="border-bottom: 1px solid #f1f5f9; padding: 15px 20px;">
						<button type="button" class="close" data-dismiss="modal"
							aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
						<h4 class="modal-title" id="projectSelectModalLabel"
							style="color: #1e293b; font-weight: 700;">프로젝트 선택</h4>
					</div>
					<div class="modal-body" style="padding: 20px;">
						<div class="form-group" style="margin: 0;">
							<select class="form-control" id="modalProjectId"
								style="border-radius: 6px;">
								<option value="">-- 프로젝트 선택 --</option>
								<th:block th:each="proj : ${projectList}">
									<option th:value="${proj.projectId}"
										th:text="${proj.projectTitle}"></option>
								</th:block>
							</select>
						</div>
					</div>
					<div class="modal-footer"
						style="border-top: 1px solid #f1f5f9; padding: 12px 20px; display: flex; justify-content: flex-end; gap: 6px;">
						<button type="button" class="btn btn-sm btn-default"
							data-dismiss="modal" style="border-radius: 6px; margin: 0;">취소</button>
						<button type="button" class="btn btn-sm btn-primary"
							onclick="redirectToInsertTask()"
							style="background-color: #3b82f6; border: none; border-radius: 6px; margin: 0; padding: 5px 15px;">이동</button>
					</div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			window.insertTaskBaseUrl = /*[[@{/project/task/insert}]]*/'/project/task/insert';
		</script>
		<script th:src="@{/js/task/task-list.js}"></script>
		<script th:src="@{/js/task/task-detail.js}"></script>
	</section>
</body>
</html>
