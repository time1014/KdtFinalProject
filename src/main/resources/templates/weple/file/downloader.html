<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE - 다운로드 이력</title>
<link rel="stylesheet" href="/css/system/project-create.css">
</head>
<body>
<section>
<div class="file-wrap">

  <div class="file-toolbar" style="margin-bottom:16px;">
    <h3 class="file-page-title">파일관리 &gt; 다운로드 이력</h3>
    <div class="file-toolbar-right">
      <div class="search-field">
        <input type="text" id="searchInput" placeholder="다운로더 또는 파일명을 검색하세요." style="width:240px;">
        <button type="button" class="btn-icon-search" onclick="searchHistory()">🔍</button>
      </div>
      <button class="page-btn" onclick="history.back()">← 목록</button>
    </div>
  </div>

  <div class="project-card" style="padding:0;">
    <table class="file-table">
      <thead>
        <tr>
          <th width="60">NO.</th>
          <th>다운로더</th>
          <th>파일명</th>
          <th>연결 일감</th>
          <th>파일 크기</th>
          <th>파일 버전</th>
          <th>다운로드 일시</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>김위플</td>
          <td>기획서_v2.pdf</td>
          <td>#3 메인화면 설계</td>
          <td>2.4 MB</td>
          <td><span class="version-badge">v2.0</span></td>
          <td>2026-06-25 10:14</td>
        </tr>
        <tr>
          <td>2</td>
          <td>이개발</td>
          <td>UI_가이드라인.png</td>
          <td>-</td>
          <td>1.1 MB</td>
          <td><span class="version-badge">v1.0</span></td>
          <td>2026-06-24 15:32</td>
        </tr>
        <tr>
          <td>3</td>
          <td>박미나</td>
          <td>회의록_0625.docx</td>
          <td>#7 스프린트 회의</td>
          <td>320 KB</td>
          <td><span class="version-badge">v1.0</span></td>
          <td>2026-06-25 18:05</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 페이징 -->
  <div class="paging-row">
    <button class="pg-btn pg-disabled">이전</button>
    <button class="pg-btn pg-active">1</button>
    <button class="pg-btn">2</button>
    <button class="pg-btn">다음</button>
  </div>

</div>

<script>
function showToast(msg, type) {
  var old = document.getElementById('_toastWrap');
  if (old) old.remove();
  var wrap = document.createElement('div');
  wrap.id = '_toastWrap';
  wrap.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;';
  var box = document.createElement('div');
  box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:220px;';
  box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
  box.textContent = msg;
  wrap.appendChild(box);
  document.body.appendChild(wrap);
  setTimeout(function() {
    wrap.style.transition = 'opacity 0.4s';
    wrap.style.opacity = '0';
    setTimeout(function() { wrap.remove(); }, 400);
  }, 2500);
}

function searchHistory() {
  showToast('검색 기능은 서버 연동 후 사용 가능합니다.', 'error');
}
</script>

<style>
.file-wrap { max-width: 1100px; margin: 24px auto; padding: 0 20px; }
.file-toolbar { display: flex; justify-content: space-between; align-items: center; }
.file-page-title { font-size: 20px; font-weight: 700; color: #333; margin: 0; }
.file-toolbar-right { display: flex; align-items: center; gap: 10px; }
.search-field { display: flex; align-items: center; gap: 6px; }
.search-field input { height: 34px; border: 1px solid #ced4da; border-radius: 5px; padding: 0 10px; font-size: 13px; outline: none; }
.btn-icon-search { height: 34px; padding: 0 10px; border: 1px solid #ced4da; border-radius: 5px; background: #fff; cursor: pointer; }
.file-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.file-table thead tr { background: #f7f8fa; }
.file-table th, .file-table td { padding: 11px 12px; border-bottom: 1px solid #e8edf2; text-align: left; vertical-align: middle; }
.file-table th { font-weight: 600; color: #64748b; }
.file-table tbody tr:hover { background: #f9fafb; }
.version-badge { background: #f1f5f9; color: #475569; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
.empty-row { text-align: center; color: #aaa; padding: 40px; }
.paging-row { display: flex; justify-content: center; gap: 4px; margin-top: 20px; }
.pg-btn { padding: 6px 12px; border: 1px solid #ced4da; border-radius: 5px; background: #fff; color: #495057; font-size: 13px; cursor: pointer; text-decoration: none; transition: .15s; }
.pg-btn:hover { background: #e9ecef; }
.pg-active { background: #007bff !important; color: #fff !important; border-color: #007bff !important; }
.pg-disabled { pointer-events: none; color: #aaa; }
</style>
</section>
</body>
</html>
