<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE - 파일 상세</title>
<link rel="stylesheet" href="/css/system/project-create.css">
</head>
<body>
	<section>
		<div class="file-wrap" th:data-project-id="${projectId}">

			<div class="file-toolbar" style="margin-bottom: 16px;">
				<h3 class="file-page-title">파일관리</h3>
			</div>

			<div class="project-card">

				<!-- 파일 상세 헤더 -->
				<div class="detail-header">
					<span class="detail-label">파일 상세조회</span> <span
						class="detail-filename" th:text="${projectFileInfo.logicalName}">파일명</span>
				</div>

				<!-- 파일 메타 정보 -->
				<div class="detail-meta-grid">
					<div class="meta-item">
						<span class="meta-label">파일 ID</span> <span class="meta-value"
							th:text="${projectFileInfo.fileId}">-</span>
					</div>
					<div class="meta-item">
						<span class="meta-label">파일명</span> <span class="meta-value"
							th:text="${projectFileInfo.logicalName}">-</span>
					</div>
					<div class="meta-item">
						<span class="meta-label">등록한 사용자</span> <span class="meta-value"
							th:text="${projectFileInfo.userName != null} ? ${projectFileInfo.userName} : '-'">-</span>
					</div>
					<div class="meta-item">
						<span class="meta-label">등록일</span> <span class="meta-value"
							th:text="${#dates.format(projectFileInfo.createdAt, 'yyyy-MM-dd')}">-</span>
					</div>
					<div class="meta-item">
					    <span class="meta-label">버전</span> <span class="meta-value"
					        th:text="${!#lists.isEmpty(projectFileVersionList)} ? 'v' + ${#lists.size(projectFileVersionList)} + '.0' : '-'">-</span>
					</div>
					<div class="meta-item">
						<span class="meta-label">연결 일감</span> <span class="meta-value">
							<span th:if="${projectFileInfo.taskId != null}"
							class="task-badge-linked"
							th:text="${projectFileInfo.taskTitle != null} ? ${projectFileInfo.taskTitle} : ${projectFileInfo.taskId}"></span>
							<span th:if="${projectFileInfo.taskId == null}"
							class="task-badge-none">연결 없음</span>
						</span>
					</div>
					<div class="meta-item">
						<span class="meta-label">일감 유형</span> <span class="meta-value"
							th:text="${projectFileInfo.typeName != null} ? ${projectFileInfo.typeName} : '-'">-</span>
					</div>
					<div class="meta-item">
						<span class="meta-label">삭제여부</span> <span class="meta-value">
							<span th:if="${projectFileInfo.isDeleted == 'N'}"
							class="status-badge status-active">정상</span> <span
							th:if="${projectFileInfo.isDeleted == 'Y'}"
							class="status-badge status-deleted">삭제됨</span>
						</span>
					</div>
				</div>

				<!-- 파일 미리보기 -->
				<div class="detail-preview-label">파일 미리보기</div>
				<div class="preview-box" id="previewBox">
				    <!-- 이미지 미리보기 -->
				    <div th:if="${!#lists.isEmpty(projectFileVersionList) and
				                 projectFileInfo.logicalName != null and
				                 (#strings.endsWith(projectFileInfo.logicalName, '.png') or
				                  #strings.endsWith(projectFileInfo.logicalName, '.jpg') or
				                  #strings.endsWith(projectFileInfo.logicalName, '.jpeg') or
				                  #strings.endsWith(projectFileInfo.logicalName, '.gif') or
				                  #strings.endsWith(projectFileInfo.logicalName, '.webp'))}">
				        <img th:src="${'https://weple-cloud-files.s3.ap-northeast-2.amazonaws.com/' + projectFileVersionList[0].savedName}">
				    </div>
				
				    <!-- PDF 미리보기 -->
				    <div th:if="${!#lists.isEmpty(projectFileVersionList) and
				                 projectFileInfo.logicalName != null and
				                 #strings.endsWith(projectFileInfo.logicalName, '.pdf')}">
				        <iframe th:src="${'https://weple-cloud-files.s3.ap-northeast-2.amazonaws.com/' + projectFileVersionList[0].savedName}"></iframe>
				    </div>
				
				    <!-- 텍스트 미리보기 -->
				    <div th:if="${!#lists.isEmpty(projectFileVersionList) and
				                 projectFileInfo.logicalName != null and
				                 (#strings.endsWith(projectFileInfo.logicalName, '.txt') or
				                  #strings.endsWith(projectFileInfo.logicalName, '.csv'))}">
				        <pre class="preview-text" id="previewText">미리보기 로딩 중...</pre>
				        <script th:inline="javascript">
				            const filePath = /*[[${projectFileVersionList[0].savedName}]]*/ '';
				            if (filePath) {
				            	fetch('https://weple-cloud-files.s3.ap-northeast-2.amazonaws.com/' + filePath)
				                    .then(r => r.text())
				                    .then(t => document.getElementById('previewText').textContent = t)
				                    .catch(() => document.getElementById('previewText').textContent = '파일을 불러올 수 없습니다.');
				            }
				        </script>
				    </div>
				
				    <!-- 미리보기 불가 -->
				    <div th:if="${#lists.isEmpty(projectFileVersionList) or
				                 projectFileInfo.logicalName == null or
				                 (!#strings.endsWith(projectFileInfo.logicalName, '.png') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.jpg') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.jpeg') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.gif') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.webp') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.pdf') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.txt') and
				                  !#strings.endsWith(projectFileInfo.logicalName, '.csv'))}"
				         class="preview-unavail-wrap">
				        <p th:if="${#lists.isEmpty(projectFileVersionList)}" class="preview-unavail">등록된 버전 정보가 없습니다.</p>
				        <p th:if="${!#lists.isEmpty(projectFileVersionList)}" class="preview-unavail">이 파일 형식은 미리보기를 지원하지 않습니다.</p>
				        <p class="preview-unavail">다운로드하여 확인해 주세요.</p>
				    </div>
				
				</div>
				<!-- 파일 버전 목록 -->
				<div class="detail-preview-label" style="margin-top: 24px;">파일
					버전 이력</div>
				<div class="table-container">
					<table class="file-table">
						<thead>
							<tr>
								<th>파일 제목</th>
								<th>등록한 사용자</th>
								<th>등록일자</th>
								<th>버전</th>
								<th>연결 일감</th>
								<th width="70" style="text-align: center;">⬇</th>
							</tr>
						</thead>
						<tbody>
						    <tr th:if="${#lists.isEmpty(projectFileVersionList)}">
							    <td colspan="6" class="empty-row">버전 정보가 없습니다.</td>
							</tr>
							<tr th:each="ver, verStat : ${projectFileVersionList}">
							    <td th:text="${projectFileInfo.logicalName != null} ? ${projectFileInfo.logicalName} : '-'">-</td>
							    <td th:text="${projectFileInfo.userName != null} ? ${projectFileInfo.userName} : '-'">-</td>
							    <td th:text="${ver.uploadedAt != null} ? ${#dates.format(ver.uploadedAt, 'yyyy-MM-dd')} : '-'">-</td>
							    <td><span class="version-badge" th:text="'v' + ${verStat.count} + '.0'">v1.0</span></td>
							    <td>
							        <span th:if="${projectFileInfo.taskId != null}"
							              class="task-badge-linked"
							              th:text="${projectFileInfo.taskTitle != null} ? ${projectFileInfo.taskTitle} : ${projectFileInfo.taskId}"></span>
							        <span th:if="${projectFileInfo.taskId == null}"
							              class="task-badge-none">연결 없음</span>
							    </td>
							    <td class="td-center">
								    <button class="icon-btn" title="다운로드"
								        th:data-version-id="${ver.versionId}"
								        onclick="downloadFile(this.dataset.versionId)">⬇</button>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

			</div>

			<!-- 뒤로가기 -->
			<div class="button-group-right" style="margin-top: 16px;">
				<button class="page-btn" onclick="history.back()">목록으로</button>
			</div>

		</div>

		<script>
function showToast(msg, type) {
  const old = document.getElementById('_toastWrap');
  if (old) old.remove();
  const wrap = document.createElement('div');
  wrap.id = '_toastWrap';
  wrap.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;';
  const box = document.createElement('div');
  box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:220px;';
  box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
  box.textContent = msg;
  wrap.appendChild(box);
  document.body.appendChild(wrap);
  setTimeout(() => {
    wrap.style.transition = 'opacity 0.4s';
    wrap.style.opacity = '0';
    setTimeout(() => wrap.remove(), 400);
  }, 2500);
}

function downloadFile(versionId) {
	  if (!versionId || versionId === 'null') {
	    showToast('다운로드할 파일 정보가 없습니다.', 'error');
	    return;
	  }
	  const projectId = getProjectId();
	  window.location.href = '/project/' + projectId + '/file/projectFileDownload/' + versionId;
	}

	function getProjectId() {
	  const wrap = document.querySelector('.file-wrap');
	  if (wrap && wrap.dataset.projectId) return wrap.dataset.projectId;
	  const match = location.pathname.match(/\/project\/([^\/]+)\/file/);
	  return match ? match[1] : '';
	}
</script>

		<style>
:root {
	--weple-purple: #8B7CF8;
	--weple-purple-dark: #7868F2;
	--weple-purple-light: #F5F3FF;
	--weple-purple-border: #DDD6FE;
	--weple-text: #4A5568;
	--weple-text-dark: #1a1a2e;
	--weple-text-muted: #94a3b8;
	--weple-bg: #FAFAFC;
	--weple-white: #ffffff;
	--weple-border: #EEEAFE;
}

.file-wrap {
	width: 95%;
    margin: 24px auto;
    padding: 0;
}

.file-toolbar {
	display: flex;
	align-items: center;
}

.file-page-title {
	font-size: 20px;
	font-weight: 700;
	color: var(--weple-text-dark);
	margin: 0;
}

.project-card {
	background: var(--weple-white);
	border: 1px solid var(--weple-purple-border);
	border-radius: 14px;
	padding: 30px;
	box-shadow: 0 4px 16px rgba(139, 124, 248, .08);
}

.detail-header {
	display: flex;
	align-items: center;
	gap: 14px;
	padding: 16px 24px;
	border-bottom: 1px solid var(--weple-purple-border);
	background: var(--weple-purple-light);
	border-radius: 8px 8px 0 0;
	margin: -30px -30px 24px;
}

.detail-label {
	font-size: 13px;
	color: var(--weple-purple);
	font-weight: 600;
}

.detail-filename {
	font-size: 16px;
	font-weight: 700;
	color: var(--weple-text-dark);
}

.detail-meta-grid {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 20px;
	margin-bottom: 24px;
}

.meta-item {
	display: flex;
	flex-direction: column;
	gap: 5px;
}

.meta-label {
	font-size: 12px;
	color: var(--weple-text-muted);
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: .5px;
}

.meta-value {
	font-size: 14px;
	color: var(--weple-text-dark);
	font-weight: 500;
}

.task-badge-linked {
	background: var(--weple-purple-light);
	color: var(--weple-purple-dark);
	padding: 2px 8px;
	border-radius: 10px;
	font-size: 12px;
	font-weight: 600;
}

.task-badge-none {
	color: var(--weple-text-muted);
	font-size: 13px;
}

.version-badge {
	background: var(--weple-purple-light);
	color: var(--weple-purple);
	padding: 2px 8px;
	border-radius: 10px;
	font-size: 12px;
	font-weight: 600;
}

.status-badge {
	padding: 2px 10px;
	border-radius: 10px;
	font-size: 12px;
	font-weight: 600;
}

.status-active {
	background: #f0fff4;
	color: #38a169;
}

.status-deleted {
	background: #fff5f5;
	color: #e53e3e;
}

/* 미리보기 */
.detail-preview-label {
	font-size: 13px;
	font-weight: 700;
	color: var(--weple-text);
	margin-bottom: 10px;
	padding-bottom: 8px;
	border-bottom: 2px solid var(--weple-purple-border);
}

.preview-box {
    border: 1px solid var(--weple-purple-border);
    border-radius: 8px;
    background: var(--weple-bg);
    overflow: hidden;
    height: 360px;        /* 고정 높이 */
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview-img {
    max-width: 100%;
    max-height: 360px;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto;
}

.preview-pdf {
	width: 100%;
	height: 500px;
	border: none;
	display: block;
}

.preview-text {
	width: 100%;
	max-height: 300px;
	overflow: auto;
	padding: 16px;
	font-size: 15px;
	color: var(--weple-text-dark);
	background: var(--weple-purple-light);
	white-space: pre-wrap;
	word-break: break-all;
	margin: 0;
	box-sizing: border-box;
	text-align: left;
}
.preview-unavail-wrap {
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	min-height: 180px;
}

.preview-unavail {
	color: var(--weple-text-muted);
	font-size: 14px;
	margin: 4px 0;
	text-align: center;
}

.table-container {
	border-radius: 10px;
	overflow: hidden;
	border: 1px solid var(--weple-purple-border);
}

.file-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 13px;
}

.file-table thead tr {
	background: #FCFBFF;
}

.file-table th, .file-table td {
	padding: 11px 14px;
	border-bottom: 1px solid var(--weple-border);
	text-align: left;
	vertical-align: middle;
}

.file-table th {
	font-weight: 600;
	color: var(--weple-text);
}

.file-table tbody tr:hover {
	background: var(--weple-purple-light);
}

.td-center {
	text-align: center;
}

.icon-btn {
	background: none;
	border: none;
	cursor: pointer;
	font-size: 16px;
	color: var(--weple-text-muted);
	padding: 2px 4px;
	transition: color .15s;
}

.icon-btn:hover {
	color: var(--weple-purple-dark);
}

.empty-row {
	text-align: center;
	color: var(--weple-text-muted);
	padding: 32px;
}

.page-btn {
	padding: 7px 16px;
	border: 1px solid var(--weple-purple-border);
	border-radius: 6px;
	background: var(--weple-white);
	color: var(--weple-text);
	font-size: 13px;
	font-weight: 600;
	cursor: pointer;
	transition: .15s;
}

.page-btn:hover {
	background: var(--weple-purple-light);
	color: var(--weple-purple-dark);
	border-color: var(--weple-purple);
}

.page-btn.active {
	background: var(--weple-purple);
	color: #fff;
	border-color: var(--weple-purple);
}

.button-group-right {
	display: flex;
	justify-content: flex-end;
}
</style>
	</section>
</body>
</html>
