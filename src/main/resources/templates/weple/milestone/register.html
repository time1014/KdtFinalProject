<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8">
<title>새 마일스톤 등록</title>
<link rel="stylesheet" th:href="@{/css/milestone/milestone-insert.css}">
</head>
<body>

<section class="container-fluid my-4" style="padding: 20px;">
	<div class="mb-4" style="margin-bottom: 25px;">
		<h3 class="fw-bold" style="color: #1e293b; font-weight: 700;">새 마일스톤</h3>
	</div>
	
	<div class="form-container">
		<form id="milestoneInsertForm" method="post" enctype="multipart/form-data"
			th:action="@{/project/milestone/insert(projectId=${param.projectId})}">
			
			<div id="hiddenTasksContainer"></div>

			<div class="row" style="margin-bottom: 20px;">
				<div class="col-md-12">
					<label class="form-label">마일스톤 이름 <span class="text-danger">*</span></label>
					<input type="text" class="form-control" name="milestoneTitle" placeholder="마일스톤 이름을 입력해주세요" required>
				</div>
			</div>

			<div class="row" style="margin-bottom: 20px;">
				<div class="col-md-12">
					<label class="form-label">설명 <span class="text-danger">*</span></label>
					<textarea class="form-control" name="milestoneDescribe" rows="5" placeholder="마일스톤에 대한 설명을 입력해주세요." required></textarea>
				</div>
			</div>

			<div class="row" style="margin-bottom: 20px;">
			    <div class="col-md-6">
			        <label class="form-label">목표 완료일</label> 
			        <input type="date" class="form-control" name="finishDate" id="finishDateInput">
			    </div>
			</div>
			
			<div class="row" style="margin-bottom: 20px;">
			    <div class="col-md-6">
			        <label class="form-label">버전 선택 <span class="text-danger">*</span></label>
			        <select class="form-select" name="parentMilestoneId" required>
			        	<option value="" selected disabled>버전을 선택해주세요</option>
			            <option th:each="parent : ${parentMilestoneList}" 
			                    th:value="${parent.milestoneId}" 
			                    th:text="${parent.milestoneTitle}">
			            </option>
			         </select>
			         
			    </div>
			</div>

			<div class="row" style="margin-bottom: 30px;">
				<div class="col-md-12">
					<label class="form-label" style="display: flex; justify-content: space-between; align-items: center;">
						<span>연결된 일감 <span id="selectedCount" class="badge bg-secondary">0개</span></span>
						<button type="button" class="btn-task-select" id="btnOpenModal">일감 등록하기</button>
					</label>
					<div id="selectedTasksPreview" class="selected-tasks-preview-box">
						선택된 일감이 없습니다. '일감 등록하기' 버튼을 눌러 일감을 선택해주세요.
					</div>
				</div>
			</div>
			
			<div style="display: flex; justify-content: flex-end; gap: 10px;">
				<button type="button" th:onclick="|location.href='@{/project/milestone(projectId=${param.projectId})}'|" class="btn-insert-cancel">취소</button>
				<button type="submit" class="btn-insert-submit">등록</button>
			</div>
		</form>
	</div>

	<div id="taskModal" class="custom-modal">
		<div class="custom-modal-content">
			<div class="custom-modal-header">
				<h5 class="fw-bold m-0">미지정 일감 불러오기</h5>
				<span class="close-modal" id="btnCloseModal">&times;</span>
			</div>
			
			<div class="custom-modal-body">
				<div class="modal-filter-box row g-2 mb-3">
					<div class="col-md-3">
						<select id="filterStatus" class="form-select">
							<option value="">-- 일감 상태 --</option>
							<option value="e1">신규</option>
							<option value="e2">진행 중</option>
							<option value="e3">완료</option>
							<option value="e4">결함</option>
						</select>
					</div>
					<div class="col-md-2">
						<select id="filterPriority" class="form-select">
							<option value="">-- 우선순위 --</option>
							<option value="긴급">긴급</option>
							<option value="높음">높음</option>
							<option value="낮음">낮음</option>
						</select>
					</div>
					<div class="col-md-3">
				        <input type="text" id="filterManager" class="form-control" placeholder="담당자명 입력">
				    </div>
				    <div class="col-md-3">
				        <select id="filterTypeId" class="form-select">
				            <option value="">-- 일감 유형 전체 --</option>
				            <option th:each="type : ${taskTypeList}" 
				                    th:value="${type.typeId}" 
				                    th:text="${type.typeName}">
				            </option>
				        </select>
				    </div>
					<div class="col-md-1">
						<button type="button" id="btnSearchTasks" class="btn btn-dark w-100 h-100">검색</button>
					</div>
				</div>

				<div class="table-responsive" style="max-height: 320px; overflow-y: auto;">
					<table class="table table-hover align-middle" style="font-size: 13px;">
						<thead class="table-light sticky-top">
							<tr>
								<th style="width: 40px;"><input type="checkbox" id="thCheckAll"></th>
								<th>일감명</th>
								<th>상태</th>
								<th>우선순위</th>
								<th>담당자</th>
								<th>유형</th>
							</tr>
						</thead>
						<tbody id="unassignedTaskListBody">
							<tr><td colspan="6" class="text-center text-muted py-4">조회된 일감이 없습니다.</td></tr>
						</tbody>
					</table>
				</div>

				<div class="d-flex justify-content-center mt-3">
					<nav>
						<ul class="pagination pagination-sm m-0" id="taskPaginationNav">
							</ul>
					</nav>
				</div>
			</div>
			
			<div class="custom-modal-footer">
				<button type="button" class="btn-insert-cancel py-2" id="btnCancelModal">취소</button>
				<button type="button" class="btn-insert-submit py-2" id="btnConfirmTasks">선택 완료</button>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
		/* 정밀 처리를 통해 IDE 빨간 줄 에러를 완벽하게 회피하는 타임리프 인라인 문법 */
		const projectId = /*[[${projectId}]]*/ null;
		
		document.addEventListener("DOMContentLoaded", function() {
	        const projectId = /*[[${projectId}]]*/ null;
	        
	        // 1. 데이터 가져오기
	        let rawStart = /*[[${projectStart}]]*/ null;
	        let rawFinish = /*[[${projectFinish}]]*/ null;
	        
	        // 2. HTML date 포맷(YYYY-MM-DD)으로 변환하는 헬퍼 함수
	        function formatDate(rawDate) {
	            if (!rawDate) return null;
	            try {
	                // 만약 자바 내장 객체나 ISO 문자열 형태로 넘어와도 10글자(YYYY-MM-DD)만 컷
	                const d = new Date(rawDate);
	                if (isNaN(d.getTime())) {
	                    // Date 객체 변환 실패 시 문자열 패턴 매칭 시도
	                    const match = rawDate.match(/\d{4}-\d{2}-\d{2}/);
	                    return match ? match[0] : null;
	                }
	                return d.toISOString().split('T')[0];
	            } catch (e) {
	                console.error("날짜 파싱 에러:", e);
	                return null;
	            }
	        }
	
	        const projectStart = formatDate(rawStart);
	        const projectFinish = formatDate(rawFinish);
	        
	        console.log("포맷팅된 시작일:", projectStart);
	        console.log("포맷팅된 종료일:", projectFinish);
	
	        const dateInput = document.getElementById('finishDateInput');
	        
	        if (dateInput) {
	            // 최소/최대 날짜 반영
	            if (projectStart) dateInput.min = projectStart;
	            if (projectFinish) dateInput.max = projectFinish;
	            
	            // 3. 키보드로 타이핑해서 뚫는 꼼수 원천 차단 (Validation 추가)
	            dateInput.addEventListener('change', function() {
	                const val = this.value;
	                if (!val) return;
	                
	                if (projectStart && val < projectStart) {
	                    alert("프로젝트 시작일(" + projectStart + ") 이전 날짜는 선택할 수 없습니다.");
	                    this.value = projectStart;
	                } else if (projectFinish && val > projectFinish) {
	                    alert("프로젝트 종료일(" + projectFinish + ") 이후 날짜는 선택할 수 없습니다.");
	                    this.value = projectFinish;
	                }
	            });
	        }
	    });
	</script>
	<script th:src="@{/js/milestone/milestone-tasks.js}"></script>
	
</section>

</body>
</html>
