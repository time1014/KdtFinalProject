<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 마일스톤 관리</title>
    <link rel="stylesheet" th:href="@{/css/milestone/milestone-list.css}">
</head>
<body>
<section>
    <div class="milestone-page">
        <div class="milestone-page-header">
            <h1 class="milestone-page-title">마일스톤 관리</h1>
            <a th:href="@{/project/milestone/insert(projectId=${projectId})}" class="milestone-add-link">+ 새 마일스톤 추가</a>
        </div>

        <div class="milestone-container" th:each="milestone : ${milestones}">
            
            <div class="milestone-header">
                <div class="milestone-title-group">
                    <span class="milestone-icon">📋</span>
                    <h2 class="milestone-title" th:text="${milestone.milestoneTitle}">설계</h2>
                    
                    <span class="milestone-badge" 
                          th:classappend="${milestone.milestoneStatus == 'g1' ? 'badge-process' : 'badge-success'}"
                          th:text="${milestone.milestoneStatus == 'g1' ? '진행 중' : '완료'}">진행 중</span>
                </div>
                <a th:href="@{/project/milestone/update(projectId=${projectId}, milestoneId=${milestone.milestoneId})}" class="milestone-edit-btn">마일스톤 편집</a>
            </div>

            <div class="milestone-progress-row">
                <div class="milestone-progress-bar-wrap">
                    <div class="milestone-progress-bar" th:style="'width: ' + ${milestone.progressPercentage} + '%'"></div>
                </div>
                <span class="milestone-progress-percent" th:text="${milestone.progressPercentage} + '%'">100%</span>
            </div>
            
            <div class="milestone-task-summary">
                <span th:text="${milestone.totalTaskCount} + '일감 (' + ${milestone.closedTaskCount} + ' 건 완료 — ' + (${milestone.progressPercentage == 100} ? '모두 완료' : '진행중') + ')'">
                    10일감 (10 건 완료 — 모두 완료)
                </span>
            </div>

            <div class="connected-tasks-section">
                <h3 class="connected-tasks-title">연결된 일감</h3>
                
                <div class="task-list-card">
                    <div class="task-item-row" th:each="task : ${milestone.recentTasks}">
                        <div class="task-col col-id" th:text="'#' + ${task.taskId}">#1</div>
                        
                        <div class="task-col col-type">
                            <span class="task-type-tag" th:text="${task.typeName}">일감유형</span>
                        </div>
                        
                        <div class="task-col col-name">
                            <a th:href="@{/project/task/detail(taskId=${task.taskId})}" th:text="${task.taskTitle}">일감명</a>
                        </div>
                        
                        <div class="task-col col-progress">
                            <div class="task-mini-bar-wrap">
                                <div class="task-mini-bar" th:style="'width: ' + ${task.taskProgress} + '%'"></div>
                            </div>
                            <span class="task-mini-percent" th:text="${task.taskProgress} + '%'">80%</span>
                        </div>
                        
                        <div class="task-col col-assignee" th:text="${task.taskManager}">담당자명</div>
                        
                        <div class="task-col col-status">
                            <span class="status-dot-group" th:classappend="'status-' + ${task.taskStatus}">
                                <span class="status-dot"></span>
                                <span class="status-text" th:text="${task.defaultDescribe}">진행중</span>
                            </span>
                        </div>
                    </div>

                    <div class="task-empty-row" th:if="${#lists.isEmpty(milestone.recentTasks)}">
                        연결된 일감이 존재하지 않습니다.
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</section>
</body>
</html>
