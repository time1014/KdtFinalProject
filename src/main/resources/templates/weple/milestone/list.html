<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 마일스톤 관리</title>
    <link rel="stylesheet" th:href="@{/css/milestone/milestone-list.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}"/>
</head>
<body>
<section>
	

    <div class="milestone-page-header">
	    <div class="header-action-group" th:if="${canManageMilestone}">
	        <a th:href="@{/project/milestone/version/insert(projectId=${projectId})}" class="milestone-add-btn">+ 새 버전 추가</a>
	        <a th:href="@{/project/milestone/insert(projectId=${projectId})}" class="milestone-add-btn">+ 새 마일스톤 추가</a>
	    </div>
	</div>

        <div class="milestone-container" th:each="milestone : ${milestones}">
            
            <div class="milestone-header" th:data-milestone-id="${milestone.milestoneId}">
                
                <div class="view-mode-container" style="display: flex; width: 100%; justify-content: space-between; align-items: flex-start; gap: 20px;">
				    <div class="milestone-title-group" style="display: flex; flex-direction: column; gap: 8px;">
				        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
				            <span class="milestone-icon">📁</span>
				            <h2 class="milestone-title" style="margin: 0;" th:text="${milestone.milestoneTitle}">상위 마일스톤명</h2>
				            
				            <span class="milestone-badge" 
				                  th:classappend="${milestone.milestoneStatus == 'g2' ? 'badge-success' : 'badge-process'}"
				                  th:text="${milestone.milestoneStatus == 'g2' ? '완료' : '진행 중'}">진행 중</span>
				            
				            <span class="milestone-due-date" 
				                  th:if="${milestone.finishDate != null}"
				                  th:text="${#temporals.format(milestone.finishDate, 'yyyy.MM.dd')} + ' 까지'">2026.03.01 까지</span>
				            
				            <span class="milestone-badge badge-delay-text" 
				                  th:if="${milestone.delayDays > 0}" 
				                  th:text="'지연됨 (D+' + ${milestone.delayDays} + ')'">지연됨 (D+2)</span>
				        </div>
				    </div>
				    
                    <div class="milestone-action-group" th:if="${canManageMilestone}" style="display: flex; gap: 8px; flex-shrink: 0;">
                        <button type="button" class="milestone-edit-btn" onclick="enableEditMode(this)">편집</button>
                        <button type="button" class="milestone-delete-btn milestone-delete-trigger" 
                                th:data-milestone-id="${milestone.milestoneId}"
                                th:data-milestone-title="${milestone.milestoneTitle}">삭제</button>
                    </div>
				</div>

                <div class="edit-mode-container" th:if="${canManageMilestone}" style="display: none; width: 100%; flex-direction: column; gap: 12px;">
				    <div style="display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 20px;">
				        <div class="milestone-edit-inputs" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
				            <input type="text" class="edit-title-input" th:value="${milestone.milestoneTitle}" placeholder="마일스톤명 입력" />
				            <input type="date" class="edit-date-input" th:value="${milestone.finishDate}" />
				            
				            <div style="display: flex; align-items: center; gap: 8px;">
				                <label class="switch-label" style="position: relative; display: inline-block; width: 44px; height: 22px; margin: 0;">
				                    <input type="checkbox" class="edit-status-toggle" 
				                           th:checked="${milestone.milestoneStatus == 'g2'}"
				                           th:disabled="${milestone.progressPercentage < 100}"
				                           onchange="toggleStatusText(this)" />
				                    <span class="slider round"></span>
				                </label>
				                <span class="switch-text" 
				                      th:data-progress="${milestone.progressPercentage}"
				                      th:text="${milestone.progressPercentage < 100 ? '진척도 100% 필수' : (milestone.milestoneStatus == 'g2' ? '완료 처리' : '진행 중')}"
				                      style="font-size: 12px; color: #888; user-select: none;">진척도 100% 필수</span>
				            </div>
				        </div>
				        
				        <div class="milestone-action-btns" style="flex-shrink: 0;">
				            <button type="button" class="milestone-cancel-btn" onclick="cancelEditMode(this)">취소</button>
				            <button type="button" class="milestone-save-btn" onclick="saveMilestone(this)">변경</button>
				        </div>
				    </div>
				    <div style="width: 100%;">
				        <input type="text" class="edit-describe-input" th:value="${milestone.milestoneDescribe}" placeholder="마일스톤 설명 입력" style="width: 100%; box-sizing: border-box; padding: 6px 10px;" />
				    </div>
				</div>
            </div>

            <div class="milestone-progress-row" style="display: flex; align-items: center; gap: 15px; width: 100%;">
			    <div class="milestone-progress-bar-wrap" style="flex-shrink: 0; width: 200px; background-color: #e9ecef; height: 8px; border-radius: 4px; overflow: hidden;">
			        <div class="milestone-progress-bar" th:style="'width: ' + ${milestone.progressPercentage} + '%; background-color: #4A90E2; height: 100%;'"></div>
			    </div>
			    <span class="milestone-progress-percent" th:text="${milestone.progressPercentage} + '%'" style="flex-shrink: 0; font-weight: bold; min-width: 40px; color: #333;">0%</span>
			    <span class="milestone-describe" 
			          th:if="${milestone.milestoneDescribe != null}"
			          th:text="${milestone.milestoneDescribe}" 
			          th:title="${milestone.milestoneDescribe}"
			          style="flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #000; font-size: 16px;">
			        마일스톤 설명
			    </span>
			</div>
            
            <div class="milestone-task-summary">
                <span th:text="${milestone.totalMilestoneCount} + ' 마일스톤 (' + ${milestone.closedMilestoneCount} + ' 건 완료 — ' + (${milestone.progressPercentage == 100} ? '모두 완료' : '진행중') + ')'">
                    0 마일스톤 (0 건 완료)
                </span>
            </div>

            <div class="connected-tasks-section">
                <h3 class="connected-tasks-title">소속 하위 마일스톤</h3>
                
                <div class="task-list-card">
                    <div class="task-item-row" 
                    	th:each="child : ${milestone.childMilestones}"
                    	th:onclick="|location.href='@{/project/milestone/detail(projectId=${projectId}, milestoneId=${child.milestoneId})}'|"
                    	style="cursor: pointer;">
                    	
                        <div class="task-col col-id" th:text="'#' + ${child.milestoneId}">#2</div>
                        
                        <div class="task-col col-name">
                            <span th:text="${child.milestoneTitle}">하위 마일스톤명</span>
                        </div>
                        
                        <div class="task-col col-progress">
                            <div class="task-mini-bar-wrap">
                                <div class="task-mini-bar" th:style="'width: ' + ${child.progressPercentage} + '%'"></div>
                            </div>
                            <span class="task-mini-percent" th:text="${child.progressPercentage} + '%'">0%</span>
                        </div>
                        
                        <div class="task-col col-summary">
                            <span th:text="${child.totalTaskCount} + ' 일감 (' + ${child.closedTaskCount} + ' 완료)'">0 일감 (0 완료)</span>
                        </div>
                        
                        <div class="task-col col-status">
                            <span class="child-delay-badge" th:if="${child.delayDays > 0}" th:text="'D+' + ${child.delayDays}">D+1</span>
                            <span class="child-status-badge" 
                                  th:classappend="${child.milestoneStatus == 'g2' ? 'badge-success' : 'badge-process'}"
                                  th:text="${child.milestoneStatus == 'g2' ? '완료' : '진행중'}">진행중</span>
                        </div>
                    </div>

                    <div class="task-empty-row" th:if="${#lists.isEmpty(milestone.childMilestones)}" style="padding: 20px; text-align: center; color: #9ca3af;">
                        등록된 하위 마일스톤이 존재하지 않습니다.
                    </div>
                </div>
            </div>
        </div>
        
        <dialog th:if="${canManageMilestone}" class="milestone-delete-dialog" id="milestoneDeleteDialog" aria-labelledby="milestoneDeleteDialogTitle">
            <div class="milestone-delete-dialog-header">
                <h2 id="milestoneDeleteDialogTitle">마일스톤 삭제</h2>
                <button class="milestone-dialog-close" type="button" aria-label="닫기" data-milestone-delete-close>&times;</button>
            </div>
            <p><strong id="milestoneDeleteName" style="color: #ff4d4f;">마일스톤명</strong>을(를) 삭제합니다. 하위 일감이나 관련 데이터가 함께 영향받을 수 있으며, 이 작업은 되돌릴 수 없습니다.</p>
            
            <form th:action="@{/project/milestone/delete}" method="post" id="milestoneDeleteForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="projectId" th:value="${projectId}">
                <input id="milestoneDeleteId" type="hidden" name="milestoneId">
                
                <label for="milestoneDeleteConfirmationName">
                    <span id="milestoneDeletePrompt">삭제하려면 마일스톤명을 입력하세요.</span>
                    <input id="milestoneDeleteConfirmationName" name="confirmationName" type="text" required autocomplete="off">
                </label>
                
                <div class="milestone-dialog-actions">
                    <button class="milestone-button milestone-button-secondary" type="button" data-milestone-delete-close>취소</button>
                    <button class="milestone-button milestone-button-danger" type="submit" id="milestoneDeleteSubmitBtn" disabled>삭제 확인</button>
                </div>
            </form>
        </dialog>
    </div>
    
    <script th:inline="javascript">
    function toggleStatusText(checkbox) {
        const container = checkbox.closest('.edit-mode-container');
        if(!container) return; // 권한 없을 시 돔 미생성 예외방지
        const textSpan = container.querySelector('.switch-text');
        const progress = parseInt(textSpan.getAttribute('data-progress') || '0', 10);
        
        if (progress < 100) {
            textSpan.textContent = '진척도 100% 필수';
            return;
        }
        textSpan.textContent = checkbox.checked ? '완료 처리' : '진행 중';
    }

    function enableEditMode(button) {
        const header = button.closest('.milestone-header');
        header.dataset.oriTitle = header.querySelector('.edit-title-input').value;
        header.dataset.oriDate = header.querySelector('.edit-date-input').value;
        header.dataset.oriDescribe = header.querySelector('.edit-describe-input').value;
        header.dataset.oriChecked = header.querySelector('.edit-status-toggle').checked;

        header.querySelector('.view-mode-container').style.display = 'none';
        header.querySelector('.edit-mode-container').style.display = 'flex';
    }

    function cancelEditMode(button) {
        const header = button.closest('.milestone-header');
        header.querySelector('.edit-title-input').value = header.dataset.oriTitle || '';
        header.querySelector('.edit-date-input').value = header.dataset.oriDate || '';
        header.querySelector('.edit-describe-input').value = header.dataset.oriDescribe || '';
        
        const toggle = header.querySelector('.edit-status-toggle');
        toggle.checked = header.dataset.oriChecked === 'true';
        toggleStatusText(toggle); 

        header.querySelector('.edit-mode-container').style.display = 'none';
        header.querySelector('.view-mode-container').style.display = 'flex';
    }

    // [변경] alert를 제거하고 동적 토스트 알림 적용
    function saveMilestone(button) {
        const header = button.closest('.milestone-header');
        const milestoneId = header.getAttribute('data-milestone-id');
        
        const updatedTitle = header.querySelector('.edit-title-input').value;
        const updatedDate = header.querySelector('.edit-date-input').value;
        const isChecked = header.querySelector('.edit-status-toggle').checked;
        const updatedStatus = isChecked ? 'g2' : 'g1';
        const milestoneDescribe = header.querySelector('.edit-describe-input').value;
        
        const csrfParameter = document.querySelector('meta[name="_csrf_parameter"]').getAttribute('content');
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');

        if (!updatedTitle.trim()) {
            showToast("마일스톤 명칭은 공백일 수 없습니다.", true);
            return;
        }
        if (!updatedDate) {
            showToast("목표 완료일을 입력해 주세요.", true);
            return;
        }

        const formData = new URLSearchParams();
        formData.append('milestoneId', milestoneId);
        formData.append('projectId', [[${projectId}]]); 
        formData.append('milestoneTitle', updatedTitle);
        formData.append('finishDate', updatedDate);
        formData.append('milestoneStatus', updatedStatus);
        formData.append('milestoneDescribe', milestoneDescribe);
        formData.append(csrfParameter, csrfToken);

        fetch('/project/milestone/update-parent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        })
        .then(response => {
            if (response.ok) {
                showToast('마일스톤 수정이 완료되었습니다.', false);
                // 사용자가 성공 토스트를 읽을 수 있도록 1.2초 뒤 새로고침 처리
                setTimeout(() => {
                    location.reload();
                }, 1200);
            } else {
                showToast('수정 작업 처리에 실패하였습니다.', true);
            }
        })
        .catch(error => {
            console.error('AJAX 에러:', error);
            showToast('네트워크 연결이 원활하지 않습니다.', true);
        });
    }

    // [유지] 기존의 명칭 확인식 <dialog> 모달 제어 로직은 그대로 유지합니다.
    document.addEventListener("DOMContentLoaded", function() {
    const dialog = document.getElementById('milestoneDeleteDialog');
    const confirmInput = document.getElementById('milestoneDeleteConfirmationName');
    const submitBtn = document.getElementById('milestoneDeleteSubmitBtn');
    const deleteNameSpan = document.getElementById('milestoneDeleteName');
    const promptSpan = document.getElementById('milestoneDeletePrompt');
    const milestoneIdInput = document.getElementById('milestoneDeleteId');
    
    // [추가] HTML 내의 삭제 폼 엘리먼트 선택
    const deleteForm = document.getElementById('milestoneDeleteForm');

    if (!dialog) return; // 권한이 없는 사용자는 대화상자가 랜더링되지 않으므로 예외 처리 추가

    // 1. 트리거 버튼 클릭 시 모달 오픈 및 데이터 주입
    document.querySelectorAll('.milestone-delete-trigger').forEach(function (button) {
        button.addEventListener('click', function () {
            const milestoneId = button.dataset.milestoneId;
            const milestoneTitle = button.dataset.milestoneTitle;

            milestoneIdInput.value = milestoneId;
            deleteNameSpan.textContent = milestoneTitle;
            promptSpan.textContent = '삭제하려면 ' + milestoneTitle + '을(를) 입력하세요.';
            confirmInput.value = '';
            submitBtn.disabled = true;

            confirmInput.oninput = function() {
                submitBtn.disabled = (this.value.trim() !== milestoneTitle.trim());
            };
            dialog.showModal();
        });
    });

    // 2. 닫기 버튼 이벤트 처리
    document.querySelectorAll('[data-milestone-delete-close]').forEach(function (button) {
        button.addEventListener('click', function () { dialog.close(); });
    });

    // 3. [추가] 폼 제출(Submit) 이벤트 가로채기 (비동기 삭제 처리)
    if (deleteForm) {
        deleteForm.addEventListener('submit', function (event) {
            event.preventDefault(); // 기본 Submit 동작(페이지 이동)을 막음

            // Form 내부의 데이터(milestoneId, projectId, CSRF 토큰 등)를 그대로 추출
            const formData = new URLSearchParams(new FormData(deleteForm));

            // th:action에 지정된 경로로 비동기 요청 전송
            fetch(deleteForm.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    dialog.close(); // 모달 닫기
                    showToast('마일스톤이 성공적으로 삭제되었습니다.', false); // 성공 토스트
                    
                    // 토스트를 읽을 수 있도록 1.2초 뒤 새로고침
                    setTimeout(() => {
                        location.reload();
                    }, 1200);
                } else {
                    showToast('삭제 처리에 실패하였습니다.', true); // 실패 토스트
                }
            })
            .catch(error => {
                console.error('삭제 AJAX 에러:', error);
                showToast('네트워크 연결이 원활하지 않습니다.', true); // 에러 토스트
            });
        });
    }
});

    /**
     * 3. 동적 토스트 생성 함수 (전달받은 스타일 시트 연동)
     * @param {string} message - 노출할 문구
     * @param {boolean} isError - true일 때 빨간색(에러), false일 때 초록색(성공)
     */
    function showToast(message, isError) {
        const toastWrap = document.createElement('div');
        toastWrap.className = 'toast-wrap';
        
        const toastMsg = document.createElement('div');
        toastMsg.className = `toast-msg ${isError ? 'toast-error' : 'toast-success'}`;
        toastMsg.textContent = message;
        
        toastWrap.appendChild(toastMsg);
        document.body.appendChild(toastWrap);
        
        setTimeout(() => {
            toastWrap.remove();
        }, 3500);
    }
</script>
</section>

</body>
</html>
