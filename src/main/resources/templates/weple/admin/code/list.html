<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

	<section>
		<div class="code-management-container">
			<h2 class="page-title">코드값</h2>

			<div class="code-card">
				<div class="card-header">
					<h3 class="card-title">작업분류(시간추적)</h3>
					<button class="btn-add" th:onclick="|location.href='@{/codeInsert(type='work')}'|">+ 코드값 추가</button>
				</div>
				<div class="code-table-wrap">
				<table class="code-table">
					<thead>
						<tr>
							<th>이름</th>
							<th>기본값</th>
							<th>사용중</th>
							<th class="text-center">관리</th>
						</tr>
					</thead>
					<tbody>
					<tr th:if="${codeList == null or codeList.?[workName != null].isEmpty()}">
						<td colspan="4" class="empty-message">표시할 데이터가 없습니다</td>
					</tr>
					<th:block th:each="item : ${codeList}" th:if="${item.workName != null}" >
							<tr th:data-id="${item.taskClassificationId}"
								th:data-company-id="${item.companyId}" 
    							th:data-default-yn="${item.defaultYn}" 
    							th:data-using-yn="${item.usingYn}">
								<td><span th:text="${item.workName}"></span></td>
								<td><span th:if="${item.defaultYn == 'Y'}" class="check-icon check-blue">✓</span></td>
								<td><span th:if="${item.usingYn == 'Y'}" class="check-icon">✓</span></td>
								<td class="action-buttons">
									<button class="btn-action" title="순서 변경">
										<i class="fa fa-arrows-v"></i>
									</button>
									<button class="btn-action" title="수정" 	th:onclick="|location.href='@{/codeUpdate(cno=${item.taskClassificationId}, type='work')}'|">
											<i class="fa fa-pencil"></i>
									</button>
									<button type="button" class="btn-action btn-delete code-delete-trigger" title="삭제"
										th:data-id="${item.taskClassificationId}" th:data-type="work"
										th:data-name="${item.workName}">❌</button>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>
				</div>
			</div>

			<div class="code-card">
				<div class="card-header">
					<h3 class="card-title">일감 우선순위</h3>
					<button class="btn-add" th:onclick="|location.href='@{/codeInsert(type='map')}'|">+ 코드값 추가</button>
				</div>
				<div class="code-table-wrap">
				<table class="code-table">
					<thead>
						<tr>
							<th>이름</th>
							<th>기본값</th>
							<th>사용중</th>
							<th class="text-center">관리</th>
						</tr>
					</thead>
					<tbody>
					<tr th:if="${codeList == null or codeList.?[priorityName != null].isEmpty()}">
						<td colspan="4" class="empty-message">표시할 데이터가 없습니다</td>
					</tr>
					<th:block th:each="item : ${codeList}" th:if="${item.priorityName != null}" th:data-id="${item.taskPriorityId}">
							<tr th:data-id="${item.taskPriorityId}"
								th:data-company-id="${item.companyId}" 
    							th:data-default-yn="${item.defaultYn}" 
    							th:data-using-yn="${item.usingYn}">
								<td><span th:text="${item.priorityName}"></span></td>
								<td><span th:if="${item.defaultYn == 'Y'}" class="check-icon check-blue">✓</span></td>
								<td><span th:if="${item.usingYn == 'Y'}" class="check-icon">✓</span></td>

								<td class="action-buttons">
									<button class="btn-action" title="순서 변경">
										<i class="fa fa-arrows-v"></i>
									</button>
									<button class="btn-action" title="수정"	th:onclick="|location.href='@{/codeUpdate(cno=${item.taskPriorityId}, type='priority')}'|">
										<i class="fa fa-pencil"></i>
									</button>
									<button type="button" class="btn-action btn-delete code-delete-trigger" title="삭제"
										th:data-id="${item.taskPriorityId}" th:data-type="priority"
										th:data-name="${item.priorityName}">❌</button>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>
				</div>
			</div>
		</div>
		
<script>
//드래그앤드랍
document.addEventListener("DOMContentLoaded", function() {
    const tables = document.querySelectorAll('.code-table');
    
    tables.forEach((table, tableIndex) => {
        const tbody = table.querySelector('tbody');
        if (!tbody) return;
        
        tbody.id = 'table-body-' + tableIndex;

        const rows = tbody.querySelectorAll('tr');
        rows.forEach((tr, rowIndex) => {
            const actionButtons = tr.querySelector('.action-buttons');
            if (actionButtons) {
                const sortBtn = actionButtons.querySelector('button:first-child');
                if (sortBtn) {
                    sortBtn.classList.add('drag-handle');
                    sortBtn.style.cursor = 'move';
                }
            }
        });

        Sortable.create(tbody, {
            handle: '.drag-handle',
            animation: 200,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: function (evt) {
                const tableId = evt.to.id; 
                const rows = Array.from(evt.to.querySelectorAll('tr'));
                
                const itemList = rows.map(row => {
                	return {
                        id: row.getAttribute('data-id'),
                        name: row.querySelector('td:first-child').innerText.trim(),
                        companyId: row.getAttribute('data-company-id'),
                        defaultYn: row.getAttribute('data-default-yn'),
                        usingYn: row.getAttribute('data-using-yn')
                    };
                });
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('[[@{/updateOrder}]]', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken // CSRF 토큰 추가
                    },
                    body: JSON.stringify({
                        type: tableId === 'table-body-0' ? 'work' : 'priority',
                        items: itemList 
                    })
                })
                .then(res => {
                    if (!res.ok) throw new Error("서버 통신 실패");
                    return res.json();
                })
                .then(data => console.log("순서가 저장되었습니다."))
                .catch(error => {
                    console.error("진짜 에러 원인:", error);
                    showToast("오류 발생: " + error.message, 'error');
                });
            }
        });
    });
});

// 토스트 (그룹/소요시간/파일관리 등과 동일한 스타일)
function showToast(msg, type) {
    const old = document.getElementById('_toastWrap');
    if (old) old.remove();
    const wrap = document.createElement('div');
    wrap.id = '_toastWrap';
    wrap.style.cssText = 'position:fixed;top:24px;left:50%;transform:translate(-50%,0);z-index:99999;';
    const box = document.createElement('div');
    box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:250px;';
    box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
    box.textContent = msg;
    wrap.appendChild(box);
    document.body.appendChild(wrap);
    setTimeout(() => {
        wrap.style.transition = 'opacity 0.4s';
        wrap.style.opacity = '0';
        setTimeout(() => wrap.remove(), 400);
    }, 2500);
}

// 삭제 확인 모달 (위키 삭제 모달과 동일한 스타일)
function showConfirmModal(title, msg, onConfirm, onCancel) {
    const old = document.getElementById('_confirmModalWrap');
    if (old) old.remove();
    const overlay = document.createElement('div');
    overlay.id = '_confirmModalWrap';
    overlay.className = 'wiki-confirm-overlay';
    overlay.innerHTML =
        '<div class="wiki-confirm-box">' +
            '<p class="wiki-confirm-title"></p>' +
            '<p class="wiki-confirm-msg"></p>' +
            '<div class="wiki-confirm-actions">' +
                '<button class="wiki-confirm-btn wiki-confirm-cancel" id="_confirmModalCancelBtn">취소</button>' +
                '<button class="wiki-confirm-btn wiki-confirm-ok" id="_confirmModalOkBtn">삭제</button>' +
            '</div>' +
        '</div>';
    overlay.querySelector('.wiki-confirm-title').textContent = title;
    overlay.querySelector('.wiki-confirm-msg').textContent = msg;
    document.body.appendChild(overlay);

    document.getElementById('_confirmModalOkBtn').onclick = () => { overlay.remove(); if (onConfirm) onConfirm(); };
    document.getElementById('_confirmModalCancelBtn').onclick = () => { overlay.remove(); if (onCancel) onCancel(); };
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); } });
}

// 코드값 삭제
document.addEventListener('click', function (e) {
    const btn = e.target.closest('.code-delete-trigger');
    if (!btn) return;

    const id = btn.dataset.id;
    const type = btn.dataset.type;
    const name = btn.dataset.name;

    showConfirmModal('코드값 삭제', `"${name}" 코드값을 정말 삭제하시겠습니까?`, () => {
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        const body = new URLSearchParams({ cno: id, type: type });

        fetch('[[@{/codeDelete}]]', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                [csrfHeader]: csrfToken
            },
            body: body.toString()
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                btn.closest('tr').remove();
                showToast('삭제되었습니다.', 'success');
            } else {
                showToast(data.message || '삭제 중 오류가 발생했습니다.', 'error');
            }
        })
        .catch(() => showToast('서버와 통신할 수 없습니다.', 'error'));
    });
});
</script>
		
		<style>
/* 드래그 핸들 디자인 */
.drag-handle {
    color: #94a3b8;
    cursor: grab;
    font-size: 16px;
    transition: color 0.2s;
}

.drag-handle:hover {
    color: #6D5EF7;
}

/* 드래그 동작 중 스타일 */
.sortable-chosen .drag-handle {
    cursor: grabbing !important;
    color: #6D5EF7;
}

/* 드래그 중인 아이템의 잔상 (빈 공간) */
.sortable-ghost {
    background-color: #f1f5f9 !important;
    opacity: 0.5;
    border: 2px dashed #cbd5e1 !important;
}

/* 선택된 아이템 하이라이트 */
.sortable-chosen {
    background-color: #F1EDFF !important;
    box-shadow: 0 4px 12px rgba(109, 94, 247, 0.1);
}
/* ===========================공통=========================== */
.code-management-container {
	padding: 20px 25px;
	color: #333;
	font-family: "Noto Sans KR", sans-serif;
}

/* ===========================제목=========================== */
.page-title {
	font-size: 24px !important;
	font-weight: 700 !important;
	line-height: 1.2 !important;
	margin: 0 0 20px 0 !important;
	padding: 0 !important;
	border: none !important;
	height: auto !important;
}
/* ===========================카드=========================== */
.code-card {
	background: #fff;
	border: 1px solid #DDD6FE;
	border-radius: 24px;
	padding: 30px;
	margin-bottom: 28px;
	box-shadow: 0 2px 10px rgba(0, 0, 0, .03);
}

.card-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 18px;
}

.card-title {
	margin: 0;
	font-size: 17px;
	font-weight: 700;
}

.sub-text {
	margin-left: 6px;
	color: #999;
	font-size: 13px;
	font-weight: 400;
}

/* ===========================버튼=========================== */
.btn-add {
	height: 40px;
	padding: 0 18px;
	border: none;
	border-radius: 10px;
	background: #6D5EF7;
	color: #ffffff;
	cursor: pointer;
	font-size: 13px;
	font-weight: 600;
	transition: .2s;
}

.btn-add:hover {
	background: #5B4FEA;
	color: #ffffff;
}

/* ===========================테이블========================== */
.code-table-wrap {
	border: 1px solid #DDD6FE;
	border-radius: 14px;
	overflow: hidden;
	background: #fff;
}

.code-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 14px;
}

.code-table thead th {
	background: #F1EDFF;
	color: #5d6b87;
	padding: 13px 16px;
	font-weight: 700;
	font-size: 13px;
	border-bottom: 1px solid #DDD6FE;
}

.code-table tbody td {
	padding: 15px 16px;
	border-top: 1px solid #DDD6FE;
	vertical-align: middle;
}

.code-table tbody tr:first-child td {
	border-top: none;
}

.code-table tbody tr:hover {
	background: #FAFAFC;
}

.empty-message {
	padding: 40px !important;
	text-align: center !important;
	color: #9CA3AF;
	font-size: 14px;
}

/* ===== 삭제 확인 모달 (위키 삭제 모달과 동일 스타일) ===== */
.wiki-confirm-overlay {
	position: fixed; inset: 0; background: rgba(0,0,0,.15);
	z-index: 99999; display: flex; align-items: center; justify-content: center;
	animation: wikiConfirmFadeIn .18s ease;
}
@keyframes wikiConfirmFadeIn { from { opacity:0; } to { opacity:1; } }
.wiki-confirm-box {
	background: #fff; border-radius: 18px; padding: 26px 28px 22px;
	min-width: 300px; max-width: 380px;
	box-shadow: 0 12px 40px rgba(109,94,247,.18); text-align: center;
	animation: wikiConfirmSlideUp .2s ease;
}
@keyframes wikiConfirmSlideUp { from { transform:translateY(12px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.wiki-confirm-title  { font-size: 15px; font-weight: 700; color: #374151; margin: 0 0 10px; }
.wiki-confirm-msg    { font-size: 13px; color: #726F8F; margin: 0 0 20px; line-height: 1.6; white-space: pre-line; }
.wiki-confirm-actions{ display: flex; gap: 8px; justify-content: center; }
.wiki-confirm-btn {
	display: inline-flex; align-items: center; justify-content: center;
	height: 36px; min-width: 88px; padding: 0 20px;
	border-radius: 10px; font-size: 13px; font-weight: 600;
	cursor: pointer; border: none; transition: opacity .2s;
}
.wiki-confirm-btn:hover { opacity: .82; }
.wiki-confirm-cancel { background: #F1EDFF; color: #6D5EF7; }
.wiki-confirm-ok     { background: #EF4444; color: #fff; }

/* ==========================체크========================== */
.check-icon {
	color: #22c55e;
	font-size: 15px;
	font-weight: bold;
}

.check-blue {
	color: #6D5EF7;
}

/* ===========================우선순위=========================== */
.dot {
	display: inline-block;
	width: 10px;
	height: 10px;
	margin-right: 8px;
	border-radius: 50%;
	vertical-align: middle;
}

.dot-danger {
	background: #ef4444;
}

.dot-warning {
	background: #f97316;
}

.dot-success {
	background: #6D5EF7;
}

.dot-info {
	background: #cbd5e1;
}

/* ===========================관리 버튼========================== */
.text-center {
	text-align: center;
}

.action-buttons {
	display: flex;
	justify-content: center;
	gap: 8px;
}

.btn-action {
	width: 34px;
	height: 34px;
	border: 1px solid #dbe2ea;
	background: #fff;
	border-radius: 6px;
	cursor: pointer;
	color: #64748b;
	transition: .2s;
	display: flex;
	align-items: center;
	justify-content: center;
}

.btn-action:hover {
	background: #f1f5f9;
	border-color: #94a3b8;
}

.btn-delete:hover {
	background: #fff5f5;
	border-color: #ff8787;
	color: #fa5252;
}

/* ===========================반응형=========================== */
@media ( max-width : 768px) {
	.page-title {
		font-size: 20px;
	}
	.code-card {
		padding: 18px;
	}
	.card-header {
		flex-direction: column;
		align-items: flex-start;
		gap: 12px;
	}
	.btn-add {
		width: 100%;
	}
}
</style>
	</section>

</body>
</html>
