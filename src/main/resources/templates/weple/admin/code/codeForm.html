<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE - 코드값 등록/수정</title>
<link rel="stylesheet" href="https://uicdn.toast.com/tui-notification/latest/tui-notification.min.css" />
</head>

<body>
<script src="https://uicdn.toast.com/tui-notification/latest/tui-notification.min.js"></script>
	<section>
		<h2 class="page-title"
			th:text="${CodeValue == null ? '새 코드값 등록' : '코드값 수정'}">새 코드값 등록</h2>

		<div class="breadcrumb">
			<span th:text="${pageTitle}"></span> &lt;
			<span class="current"
				th:text="${CodeValue == null ? '새 코드값' : '코드값 수정'}"></span>
		</div>

		<form id="codeForm" th:action="${CodeValue == null ? '/codeInsert' : '/codeUpdate'}"
			method="post">

			<input type="hidden" name="type" th:value="${type}"> <input
				type="hidden" name="taskClassificationId"
				th:value="${CodeValue != null ? CodeValue.taskClassificationId : ''}"
				th:if="${type == 'work'}"> <input type="hidden"
				th:if="${type == 'priority'}" name="taskPriorityId"
				th:value="${CodeValue.taskPriorityId}">

			<div class="form-row">
				<div class="form-label">
					<label for="codeName">이름 <span class="required">*</span></label>
				</div>
				<div class="form-input">
					<input type="text" id="codeName"
						th:name="${type == 'work' ? 'workName' : 'priorityName'}"
						th:value="${CodeValue != null ? (type == 'work' ? CodeValue.workName : CodeValue.priorityName) : ''}"
						placeholder="코드값 이름을 입력하세요" required>
				</div>
			</div>

			<div class="form-row">
				<div class="form-label">
					<label>사용중</label>
				</div>
				<div class="form-input">
					<label class="checkbox-container"> <input type="checkbox"
						name="usingYn" value="Y"
						th:checked="${CodeValue != null ? CodeValue.usingYn == 'Y' : true}">
						<span class="checkmark"></span> <span class="label-text">사용함</span>
					</label>
				</div>
			</div>

			<div class="form-row">
				<div class="form-label">
					<label>기본값</label>
				</div>
				<div class="form-input">
					<label class="checkbox-container"> <input type="checkbox"
						name="defaultYn" value="Y"
						th:checked="${CodeValue != null ? CodeValue.defaultYn == 'Y' : false}">
						<span class="checkmark"></span> <span class="label-text">기본값으로
							설정</span>
					</label>
				</div>
			</div>

			<div class="form-actions">
				<button type="submit" class="btn-save"
					th:text="${CodeValue == null ? '등록' : '수정'}"></button>
				<button type="button" class="btn-cancel" onclick="history.back();">취소</button>
			</div>
		</form>

		<script th:inline="javascript">

function showToast(msg, type) {
  var old = document.getElementById('_toastWrap');
  if (old) old.remove();
  var wrap = document.createElement('div');
  wrap.id = '_toastWrap';
  wrap.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;';
  var box = document.createElement('div');
  box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:220px;';
  box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
  box.textContent = msg;
  wrap.appendChild(box);
  document.body.appendChild(wrap);
  setTimeout(function() {
    wrap.style.transition = 'opacity 0.4s';
    wrap.style.opacity = '0';
    setTimeout(function() { wrap.remove(); }, 400);
  }, 2500);
}

function showConfirm(msg, onOk, onCancel) {
  var old = document.getElementById('_confirmWrap');
  if (old) old.remove();
  var overlay = document.createElement('div');
  overlay.id = '_confirmWrap';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99999;display:flex;align-items:center;justify-content:center;';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:10px;padding:28px 32px;min-width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18);';
  var txt = document.createElement('p');
  txt.style.cssText = 'font-size:15px;font-weight:500;color:#1a1a2e;margin:0 0 24px;line-height:1.6;';
  txt.textContent = msg;
  var btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex;justify-content:center;gap:12px;';
  var btnCancel = document.createElement('button');
  btnCancel.textContent = '취소';
  btnCancel.style.cssText = 'height:36px;padding:0 24px;background:#fff;border:1px solid #d1d5db;border-radius:6px;font-size:14px;cursor:pointer;';
  btnCancel.onclick = function() { overlay.remove(); if (onCancel) onCancel(); };
  var btnOk = document.createElement('button');
  btnOk.textContent = '확인';
  btnOk.style.cssText = 'height:36px;padding:0 24px;background:#e53e3e;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;';
  btnOk.onclick = function() { overlay.remove(); if (onOk) onOk(); };
  btnWrap.appendChild(btnCancel);
  btnWrap.appendChild(btnOk);
  box.appendChild(txt);
  box.appendChild(btnWrap);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

		document.addEventListener('DOMContentLoaded', function() {
		    const form = document.getElementById('codeForm');
		    
		    // 서버에서 넘어온 현재 기본값 이름 (Thymeleaf 인라인)
		    const currentDefaultName = /*[[${defaultItemName}]]*/ '기본값';
		
		    form.addEventListener('submit', function(e) {
		        const defaultCheckbox = document.querySelector('input[name="defaultYn"]');
		        const isDefaultChecked = defaultCheckbox ? defaultCheckbox.checked : false;

		        if (isDefaultChecked && !form.dataset.confirmed) {
		            e.preventDefault();
		
		            // 2. 동적 메시지 생성
		            const message = `이미 '${currentDefaultName}'으(로) 기본값이 설정되어 있습니다. 현재 항목을 기본값으로 변경하시겠습니까?`;
		            showConfirm(message,
		                function() {
		                    form.dataset.confirmed = "true";
		                    form.submit();
		                },
		                function() {
		                    showToast("기본값 변경이 취소되었습니다.", 'error');
		                }
		            );
		        }
		    });
		});
		</script>
		
		<style>
/* ===========================공통 컨테이너=========================== */
.code-edit-container {
	max-width: 800px; /* 등록 폼은 약간 좁게 설정 */
	margin: 0 auto;
	padding: 24px;
	font-family: "Noto Sans KR", sans-serif;
}

/* ===========================경로(Breadcrumb)=========================== */
.breadcrumb {
	font-size: 13px;
	color: #888;
	margin-bottom: 12px;
}

.breadcrumb .current {
	color: #333;
	font-weight: 500;
}

/* ===========================제목=========================== */
.page-title {
	font-size: 24px;
	font-weight: 700;
	margin-bottom: 24px;
	color: #111;
}

/* ===========================카드 영역=========================== */
.edit-card {
	background: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 10px;
	padding: 40px; /* 내부 여유공간 넉넉히 */
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}

/* ===========================폼 레이아웃=========================== */
.form-row {
	display: flex;
	align-items: center;
	margin-bottom: 24px;
}

.form-row:last-child {
	margin-bottom: 0;
}

.form-label {
	width: 120px; /* 라벨 너비 고정 */
	font-size: 15px;
	font-weight: 600;
	color: #444;
}

.form-label .required {
	color: #ef4444;
	margin-left: 2px;
}

.form-input {
	flex: 1;
}

/* 텍스트 입력창 */
input[type="text"] {
	width: 100%;
	height: 44px;
	padding: 0 16px;
	border: 1px solid #d1d5db;
	border-radius: 6px;
	font-size: 14px;
	transition: border-color 0.2s;
	outline: none;
}

input[type="text"]:focus {
	border-color: #6D5EF7;
	box-shadow: 0 0 0 3px rgba(109, 94, 247, 0.1);
}

/* ===========================커스텀 체크박스=========================== */
.checkbox-container {
	display: flex;
	align-items: center;
	cursor: pointer;
	user-select: none;
}

.checkbox-container input {
	display: none; /* 기본 체크박스 숨김 */
}

.checkmark {
	width: 20px;
	height: 20px;
	border: 2px solid #d1d5db;
	border-radius: 4px;
	margin-right: 10px;
	position: relative;
	transition: 0.2s;
}

.checkbox-container input:checked+.checkmark {
	background-color: #6D5EF7;
	border-color: #6D5EF7;
}

.checkmark:after {
	content: "";
	position: absolute;
	display: none;
	left: 6px;
	top: 2px;
	width: 5px;
	height: 10px;
	border: solid white;
	border-width: 0 2px 2px 0;
	transform: rotate(45deg);
}

.checkbox-container input:checked+.checkmark:after {
	display: block;
}

.label-text {
	font-size: 14px;
	color: #666;
}

/* ===========================하단 버튼=========================== */
.form-actions {
	margin-top: 32px;
	display: flex;
	justify-content: center;
	gap: 12px;
}

.btn-save {
	height: 48px;
	padding: 0 40px;
	background: #6D5EF7;
	color: #fff;
	border: none;
	border-radius: 6px;
	font-size: 16px;
	font-weight: 600;
	cursor: pointer;
	transition: background 0.2s;
}

.btn-save:hover {
	background: #5B4FEA;
}

.btn-cancel {
	height: 48px;
	padding: 0 40px;
	background: #fff;
	color: #666;
	border: 1px solid #d1d5db;
	border-radius: 6px;
	font-size: 16px;
	font-weight: 600;
	cursor: pointer;
	transition: .2s;
}

.btn-cancel:hover {
	background: #f9fafb;
	border-color: #9ca3af;
}

/* 반응형 */
@media ( max-width : 600px) {
	.form-row {
		flex-direction: column;
		align-items: flex-start;
		gap: 8px;
	}
	.form-label {
		width: 100%;
	}
	.edit-card {
		padding: 24px;
	}
	.btn-save, .btn-cancel {
		flex: 1;
	}
}
</style>
	</section>

</body>
</html>
