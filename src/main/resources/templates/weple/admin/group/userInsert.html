<!doctype html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>그룹 사용자 관리</title>
    <link rel="stylesheet" href="/css/system/project-create.css">
</head>
<body>
	<section>
		<div class="container">
			<div class="content">

				<div class="title-area">
					<span class="parent-title">그룹</span> <span class="separator">&gt;&gt;</span>
    				<span class="child-title" th:text="${selectedGroupName}">그룹명</span>
				</div>

				<div class="management-card">

					<div class="card-subtitle">새 사용자 추가</div>

					<form id="groupUserForm" th:action="@{/groupUserInsert}" method="post">

						<div class="search-section">
							<div class="search-title">사용자 찾기</div>

							<div class="search-input-wrap">
								<svg class="search-icon" width="14" height="14"
									viewBox="0 0 16 16" fill="none" stroke="currentColor"
									stroke-width="1.5" aria-hidden="true">
            						<circle cx="7" cy="7" r="5"></circle>
            						<path d="M11 11l3.5 3.5"></path>
        						</svg>

								<input type="text" id="userSearchInput"
									placeholder="사용자를 입력하세요." />
							</div>
						</div>

						<input type="hidden" name="groupId" th:value="${groupId}" />

						<div class="list-section">
							<div class="group-box-card" id="availableGroup">
							    <div class="group-title">추가할 사용자 목록</div>
							    <div class="user-grid">
							        <th:block th:each="user : ${availableUsers}">
							            <label class="user-item"> 
							                <input type="checkbox" name="availableUserIds" th:value="${user.userCode}" /> 
							                <span class="checkbox-custom"></span> 
							                <span class="user-name" th:text="${user.userName}">사용자명</span>
							            </label>
							        </th:block>
							    </div>
							</div>
							
							<div class="direction-arrows">
								<svg id="btnMoveDown" xmlns="http://www.w3.org/2000/svg"
									width="20" height="20" viewBox="0 0 24 24" fill="none"
									stroke="currentColor" stroke-width="2" stroke-linecap="round"
									stroke-linejoin="round">
            						<polyline points="6 9 12 15 18 9"></polyline>
       							</svg>
								<svg id="btnMoveUp" xmlns="http://www.w3.org/2000/svg"
									width="20" height="20" viewBox="0 0 24 24" fill="none"
									stroke="currentColor" stroke-width="2" stroke-linecap="round"
									stroke-linejoin="round">
            						<polyline points="18 15 12 9 6 15"></polyline>
        						</svg>
							</div>

							<div class="group-box-card" id="currentGroup">
							    <div class="group-title">현재 소속되어있는 사용자 목록</div>
							    <div class="user-grid">
							        <th:block th:each="user : ${currentGroupUsers}">
							            <label class="user-item"> 
							                <input type="checkbox" name="currentUserIds" th:value="${user.userCode}" /> 
							                <span class="checkbox-custom"></span> 
							                <span class="user-name" th:text="${user.userName}">사용자명</span>
							            </label>
							        </th:block>
							    </div>
							</div>

						</div>

						<div class="bottom-action-bar">
							<button type="button" class="btn-cancel"
								onclick="history.back();">취소</button>
							<button type="submit" class="btn-submit">등록</button>
						</div>

					</form>

				</div>

			</div>
		</div>

		<script>
        function showToast(msg, type) {
            var old = document.getElementById('_toastWrap');
            if (old) old.remove();
            var wrap = document.createElement('div');
            wrap.id = '_toastWrap';
            wrap.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;';
            var box = document.createElement('div');
            box.style.cssText = 'padding:16px 28px;border-radius:8px;font-size:15px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);text-align:center;min-width:220px;';
            box.style.backgroundColor = (type === 'error') ? '#e53e3e' : '#38a169';
            box.textContent = msg;
            wrap.appendChild(box);
            document.body.appendChild(wrap);
            setTimeout(function() {
                wrap.style.transition = 'opacity 0.4s';
                wrap.style.opacity = '0';
                setTimeout(function() { wrap.remove(); }, 400);
            }, 2500);
        }

		document.addEventListener('DOMContentLoaded', () => {

		    const form = document.getElementById('groupUserForm');

		    // 1. 그룹명
		    const groupNameElement = document.querySelector('.child-title');
		    if (groupNameElement) {
		        const groupName = groupNameElement.textContent.trim();
		    }

		    // 2. 검색
		    const searchInput = document.getElementById('userSearchInput');
			if (searchInput) {
			    searchInput.addEventListener('input', function () {
			        const keyword = this.value.trim().toLowerCase();
			        const targetUsers = document.querySelectorAll('#availableGroup .user-item');
			        targetUsers.forEach(item => {
			            const name = item.querySelector('.user-name').textContent.toLowerCase();
			            item.style.display = name.includes(keyword) ? 'flex' : 'none';
			        });
			    });
			}

		    // 3. 이동 기능
		    const arrows = document.querySelectorAll('.direction-arrows svg');

		    if (arrows.length >= 2) {

		        const downArrow = arrows[0];
		        const upArrow = arrows[1];

		        const availableGrid = document.getElementById('availableGroup').querySelector('.user-grid');
		        const currentGrid = document.getElementById('currentGroup').querySelector('.user-grid');

		        downArrow.style.cursor = 'pointer';
		        downArrow.addEventListener('click', () => {
		            // 아래 화살표: 추가할 목록 → 현재 소속으로 이동
		            const checkedItems = availableGrid.querySelectorAll('.user-item input:checked');

		            if (checkedItems.length === 0) {
		                showToast('이동할 사용자를 선택해주세요.', 'error');
		                return;
		            }

		            checkedItems.forEach(checkbox => {
		                const userItem = checkbox.closest('.user-item');
		                checkbox.checked = false;
		                currentGrid.appendChild(userItem);
		            });
		        });

		        upArrow.style.cursor = 'pointer';
		        upArrow.addEventListener('click', () => {
		            // 위 화살표: 현재 소속 → 추가할 목록으로 이동
		            const checkedItems = currentGrid.querySelectorAll('.user-item input:checked');

		            if (checkedItems.length === 0) {
		                showToast('이동할 사용자를 선택해주세요.', 'error');
		                return;
		            }

		            checkedItems.forEach(checkbox => {
		                const userItem = checkbox.closest('.user-item');
		                checkbox.checked = false;
		                availableGrid.appendChild(userItem);
		            });
		        });
		    }

		    // 4. submit 처리 (핵심)
		    if (form) {
		        form.addEventListener('submit', (e) => {
		            e.preventDefault();

		            const currentGrid = document.getElementById('currentGroup').querySelector('.user-grid');
		            const finalUserIds = Array.from(
		                currentGrid.querySelectorAll('.user-item input')
		            ).map(cb => cb.value);

		            document.querySelectorAll('input[name="currentUserIds"]').forEach(el => el.remove());

		            finalUserIds.forEach(id => {
		                const input = document.createElement('input');
		                input.type = 'hidden';
		                input.name = 'currentUserIds';
		                input.value = id;
		                form.appendChild(input);
		            });

		            setTimeout(() => {
		                form.submit();
		            }, 0);
		        });
		    }
		});
		</script>

		<style>
/* 레이아웃 병합 시 스타일 깨짐 방지를 위한 상위 노출 스코프 지정 */
section .container {
	width: 100%;
	background-color: #fff;
}

section .content {
	padding: 32px;
}

section .title-area {
	display: flex;
	align-items: center;
	gap: 12px;
	margin-bottom: 24px;
}

section .parent-title {
	font-size: 20px;
	font-weight: 700;
	color: #000000;
}

section .separator {
	font-size: 16px;
	color: #64748b;
	font-weight: 600;
}

section .child-title {
	font-size: 20px;
	font-weight: 700;
	color: #111827;
}

section .management-card {
	background: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 12px;
	padding: 24px;
	box-shadow: 0 1px 3px rgba(0, 0, 0, .05);
}

section .card-subtitle {
	font-size: 16px;
	font-weight: 700;
	color: #374151;
	margin-bottom: 24px;
}

section .search-section {
	margin-bottom: 24px;
}

section .search-title {
	font-size: 14px;
	font-weight: 600;
	color: #374151;
	margin-bottom: 8px;
}

section .search-input-wrap {
	position: relative;
	max-width: 320px;
}

section .search-input-wrap input {
	width: 100%;
	height: 42px;
	padding: 0 14px 0 40px;
	border: 1px solid #d1d5db;
	border-radius: 8px;
	outline: none;
	color: #333;
}

section .search-input-wrap input:focus {
	border-color: #6D5EF7;
}

section .search-icon {
	position: absolute;
	left: 14px;
	top: 50%;
	transform: translateY(-50%);
	color: #9ca3af;
}

section .list-section {
	display: flex;
	flex-direction: column;
	gap: 10px;
	margin-bottom: 32px;
}

section .group-box-card {
	border: 1px solid #e5e7eb;
	border-radius: 12px;
	padding: 20px;
	background: #fff;
}

section .group-title {
	font-size: 14px;
	font-weight: 700;
	color: #1f2937;
	margin-bottom: 16px;
}

section .user-grid {
	display: grid;
	grid-template-columns: repeat(5, minmax(0, 1fr));
	gap: 12px;
}

section .user-item {
	display: flex;
	align-items: center;
	padding: 10px 14px;
	border: 1px solid #e5e7eb;
	border-radius: 8px;
	background: #fff;
	cursor: pointer;
	min-height: 42px;
}

section .user-item:hover {
	background: #f9fafb;
	border-color: #d1d5db;
}

section .user-item input[type="checkbox"] {
	display: none;
}

section .checkbox-custom {
	position: relative;
	width: 16px;
	height: 16px;
	margin-right: 10px;
	border: 1px solid #d1d5db;
	border-radius: 4px;
	flex-shrink: 0;
	display: inline-block;
}

section .user-item input:checked ~ .checkbox-custom {
	background: #111827;
	border-color: #111827;
}

section .checkbox-custom::after {
	content: "";
	position: absolute;
	display: none;
	left: 5px;
	top: 2px;
	width: 4px;
	height: 8px;
	border: solid #fff;
	border-width: 0 2px 2px 0;
	transform: rotate(45deg);
}

section .user-item input:checked ~ .checkbox-custom::after {
	display: block;
}

section .user-name {
	font-size: 14px;
	color: #374151;
	font-weight: 500;
}

section .direction-arrows {
	display: flex;
	justify-content: center;
	align-items: center;
	gap: 24px;
	color: #6b7280;
	margin: 10px 0;
}

section .bottom-action-bar {
	display: flex;
	justify-content: flex-end;
	gap: 12px;
}

section .btn-cancel {
	padding: 10px 24px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	background: #fff;
	color: #334155;
	font-weight: 600;
	cursor: pointer;
}

section .btn-submit {
	padding: 10px 24px;
	border: none;
	border-radius: 8px;
	background: #6D5EF7;
	color: #fff;
	font-weight: 600;
	cursor: pointer;
}

@media ( max-width : 1024px) {
	section .user-grid {
		grid-template-columns: repeat(3, minmax(0, 1fr));
	}
}

@media ( max-width : 768px) {
	section .user-grid {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}
}

        /* ===== 토스트 (project-create.css 동일) ===== */
        .toast-wrap {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            animation: toastFadeOut 3.5s forwards;
            pointer-events: none;
        }
        .toast-msg {
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            text-align: center;
            white-space: nowrap;
        }
        .toast-error   { background-color: #e53e3e; }
        .toast-success { background-color: #38a169; }
        @keyframes toastFadeOut {
            0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            75%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.97); }
        }
        </style>
	</section>
</body>
</html>
