<!doctype html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" th:href="@{/css/system/project-list.css}" />
<title>그룹 관리</title>
</head>
<body>
	<section class="project-page">

		<h3 class="project-title">그룹</h3>
		<div class="project-card">
			<div class="project-toolbar">
				<div class="project-search">
					<i class="fa fa-search"></i>
					<input type="text" id="groupSearchInput"
						placeholder="그룹명을 입력하세요." />
				</div>
				<a class="project-create-btn" th:href="@{/groupInsert}">
					<i class="fa fa-folder"></i>
					<span>+ 새 그룹 추가</span>
				</a>
			</div>

			<div class="project-table-wrap">
				<table class="project-table data-table">
					<thead>
						<tr>
							<th>NO</th>
							<th>그룹명</th>
							<th>사용자 수</th>
							<th>관리</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${#lists.isEmpty(systemGroupList)}">
							<td colspan="4" class="empty-message">등록된 그룹이 없습니다.</td>
						</tr>
						<th:block th:each="info : ${systemGroupList}">
							<tr th:data-id="${info.groupId}">
								<td>[[ ${info.groupId} ]]</td>
								<td>
									<a class="project-link" th:href="@{/groupUserList(groupId=${info.groupId})}"
										th:text="${info.groupName}"></a>
								</td>
								<td>[[${info.userCount}]]명</td>
								<td style="position: relative; text-align: center;"
									onclick="event.stopPropagation();">
									<div class="dropdown-wrapper">
										<span class="more-options-btn" onclick="toggleDropdown(this)">•••</span>
										<div class="dropdown-menu-box">
											<button type="button" class="dropdown-item edit-btn"
												th:data-id="${info.groupId}" th:data-name="${info.groupName}"
												onclick="openGroupEditModal(this)">✏️ 편집</button>
											<button type="button" class="dropdown-item delete-btn"
												th:data-id="${info.groupId}" th:data-name="${info.groupName}">
												🗑️ 삭제</button>
										</div>
									</div>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>
			</div>

			<div class="pagination-wrap" id="paginationWrap"></div>
		</div>

		<!-- 그룹명 편집 모달 -->
		<div id="groupEditModal" class="wiki-confirm-overlay" style="display: none;">
			<div class="wiki-confirm-box" style="text-align: left;">
				<p class="wiki-confirm-title" style="text-align: center; margin-bottom: 18px;">그룹명 편집</p>
				<form id="groupEditForm" method="post" th:action="@{/groupUpdate}">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<input type="hidden" id="groupEditId" name="groupId">
					<input type="text" id="groupEditNameInput" name="groupName" maxlength="50" required
						style="width:100%; height:40px; padding:0 12px; border:1px solid #DDD6FE; border-radius:8px; font-size:14px; outline:none; box-sizing:border-box; margin-bottom:20px;">
					<div class="wiki-confirm-actions">
						<button type="button" class="wiki-confirm-btn wiki-confirm-cancel" onclick="closeGroupEditModal()">취소</button>
						<button type="submit" class="wiki-confirm-btn wiki-confirm-ok" style="background:#6D5EF7;">저장</button>
					</div>
				</form>
			</div>
		</div>
		<script>
      // 삭제 확인 모달 (위키 삭제 모달과 동일한 스타일)
      function showConfirmModal(title, msg, onConfirm, onCancel) {
          const old = document.getElementById('_confirmModalWrap');
          if (old) old.remove();
          const overlay = document.createElement('div');
          overlay.id = '_confirmModalWrap';
          overlay.className = 'wiki-confirm-overlay';
          overlay.innerHTML =
              '<div class="wiki-confirm-box">' +
                  '<p class="wiki-confirm-title"></p>' +
                  '<p class="wiki-confirm-msg"></p>' +
                  '<div class="wiki-confirm-actions">' +
                      '<button class="wiki-confirm-btn wiki-confirm-cancel" id="_confirmModalCancelBtn">취소</button>' +
                      '<button class="wiki-confirm-btn wiki-confirm-ok" id="_confirmModalOkBtn">삭제</button>' +
                  '</div>' +
              '</div>';
          overlay.querySelector('.wiki-confirm-title').textContent = title;
          overlay.querySelector('.wiki-confirm-msg').textContent = msg;
          document.body.appendChild(overlay);

          document.getElementById('_confirmModalOkBtn').onclick = () => { overlay.remove(); if (onConfirm) onConfirm(); };
          document.getElementById('_confirmModalCancelBtn').onclick = () => { overlay.remove(); if (onCancel) onCancel(); };
          overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); } });
      }

      // 드롭다운 토글 (관리 프로젝트 탭과 동일한 패턴)
      function toggleDropdown(el) {
          document.querySelectorAll('.dropdown-menu-box').forEach(menu => {
              if (menu !== el.nextElementSibling) {
                  menu.classList.remove('show');
              }
          });
          el.nextElementSibling.classList.toggle('show');
      }

      // 그룹명 편집 모달
      function openGroupEditModal(btn) {
          document.getElementById('groupEditId').value = btn.dataset.id;
          document.getElementById('groupEditNameInput').value = btn.dataset.name;
          document.getElementById('groupEditModal').style.display = 'flex';
          document.getElementById('groupEditNameInput').focus();
      }
      function closeGroupEditModal() {
          document.getElementById('groupEditModal').style.display = 'none';
      }
      document.getElementById('groupEditModal').addEventListener('click', function (e) {
          if (e.target === this) closeGroupEditModal();
      });

      document.addEventListener('click', function () {
          document.querySelectorAll('.dropdown-menu-box').forEach(menu => menu.classList.remove('show'));
      });

      // 1. 삭제 버튼 클릭 로직
      document.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", function (e) {
              e.stopPropagation();
              e.preventDefault();

              const id = this.dataset.id;
              const name = this.dataset.name;
              showConfirmModal('그룹 삭제', `${name} 그룹을 정말 삭제하시겠습니까?`, () => {
                  location.href = `/groupDelete?groupId=${id}`;
              });
          });
      });

      // 2. 프론트엔드 전용 페이징 & 검색 연동 통합 스크립트
      let currentPage = 1;
      const rowPerPage = 10; // 한 페이지에 노출할 행 개수

      function renderTableAndPagination() {
          const searchInput = document.getElementById('groupSearchInput');
          const keyword = searchInput ? searchInput.value.trim().toLowerCase() : '';
          const allRows = Array.from(document.querySelectorAll('.project-table tbody tr'));
          
          // A. 검색 키워드가 포함된 행들만 골라내기 (필터링)
          const filteredRows = allRows.filter(row => {
              const groupNameTd = row.querySelector('td:nth-child(2)');
              if (groupNameTd) {
                  return groupNameTd.textContent.toLowerCase().includes(keyword);
              }
              return false;
          });

          // B. 페이징 계산
          const totalRows = filteredRows.length;
          const totalPages = Math.ceil(totalRows / rowPerPage) || 1;

          // 페이지 번호가 최대 범위를 벗어나지 않게 조절
          if (currentPage > totalPages) currentPage = totalPages;
          if (currentPage < 1) currentPage = 1;

          // C. 현재 페이지에 해당하는 10개만 화면에 노출하고 나머지는 숨기기
          allRows.forEach(row => row.style.display = 'none');

          const startIdx = (currentPage - 1) * rowPerPage;
          const endIdx = startIdx + rowPerPage;

          filteredRows.forEach((row, idx) => {
              if (idx >= startIdx && idx < endIdx) {
                  row.style.display = '';
              }
          });

          // D. 하단 페이징 버튼 HTML 동적 생성
          const paginationWrap = document.getElementById('paginationWrap');
          if (!paginationWrap) return;

          let paginationHtml = '';
          
          // 이전 버튼
          paginationHtml += `<a href="#" class="page-btn ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}">&lt; 이전</a>`;

          // 숫자 버튼들
          for (let i = 1; i <= totalPages; i++) {
              paginationHtml += `<a href="#" class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`;
          }

          // 다음 버튼
          paginationHtml += `<a href="#" class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}">다음 &gt;</a>`;

          paginationWrap.innerHTML = paginationHtml;

          // E. 동적으로 생성된 페이징 버튼에 클릭 이벤트 달기
          paginationWrap.querySelectorAll('.page-btn:not(.disabled):not(.active)').forEach(btn => {
              btn.addEventListener('click', function(e) {
                  e.preventDefault();
                  currentPage = parseInt(this.dataset.page);
                  renderTableAndPagination();
              });
          });
      }

      // 처음 페이지가 로드되었을 때 초기 페이징 구동
      document.addEventListener('DOMContentLoaded', () => {
          renderTableAndPagination();

          const searchInput = document.getElementById('groupSearchInput');
          if (searchInput) {
              searchInput.addEventListener('input', function() {
                  currentPage = 1;
                  renderTableAndPagination();
              });
          }
      });
  </script>

<Style>

/* ===== 삭제 확인 모달 (위키 삭제 모달과 동일 스타일) ===== */
.wiki-confirm-overlay {
	position: fixed; inset: 0; background: rgba(0,0,0,.15);
	z-index: 99999; display: flex; align-items: center; justify-content: center;
	animation: wikiConfirmFadeIn .18s ease;
}
@keyframes wikiConfirmFadeIn { from { opacity:0; } to { opacity:1; } }
.wiki-confirm-box {
	background: #fff; border-radius: 18px; padding: 26px 28px 22px;
	min-width: 300px; max-width: 380px;
	box-shadow: 0 12px 40px rgba(109,94,247,.18); text-align: center;
	animation: wikiConfirmSlideUp .2s ease;
}
@keyframes wikiConfirmSlideUp { from { transform:translateY(12px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.wiki-confirm-title  { font-size: 15px; font-weight: 700; color: #374151; margin: 0 0 10px; }
.wiki-confirm-msg    { font-size: 13px; color: #726F8F; margin: 0 0 20px; line-height: 1.6; white-space: pre-line; }
.wiki-confirm-actions{ display: flex; gap: 8px; justify-content: center; }
.wiki-confirm-btn {
	display: inline-flex; align-items: center; justify-content: center;
	height: 36px; min-width: 88px; padding: 0 20px;
	border-radius: 10px; font-size: 13px; font-weight: 600;
	cursor: pointer; border: none; transition: opacity .2s;
}
.wiki-confirm-btn:hover { opacity: .82; }
.wiki-confirm-cancel { background: #F1EDFF; color: #6D5EF7; }
.wiki-confirm-ok     { background: #EF4444; color: #fff; }

</Style>
	</section>
</body>
</html>
