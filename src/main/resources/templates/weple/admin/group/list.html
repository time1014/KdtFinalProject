<!doctype html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" th:href="@{/css/groupList.css}" />
<title>그룹 관리</title>
</head>
<body>
	<section>
		<div class="container">
			<div class="header-bar"></div>
			<div class="content">
				<h1 class="main-title">그룹</h1>
				<div style="text-align: right; margin: 15px 0">
					<button type="button" class="add-btn"
						th:onclick="|location.href ='@{/groupInsert}'|">+ 새 그룹 추가</button>
				</div>

				<div class="search-container">
					<button type="button" class="search-btn">
						<svg class="search-icon" width="14" height="14"
							viewBox="0 0 16 16" fill="none" stroke="currentColor"
							stroke-width="1.5" aria-hidden="true">
  								<circle cx="7" cy="7" r="5"></circle>
  								<path d="M11 11l3.5 3.5"></path>
						</svg>
					</button>

					<input type="text" id="groupSearchInput" class="search-input"
						placeholder="그룹명을 입력하세요." />
				</div>

				<table class="data-table">
					<thead>
						<tr>
							<th>NO</th>
							<th>그룹명</th>
							<th>사용자 수</th>
							<th>상태</th>
						</tr>
					</thead>
					<tbody>
						<th:block th:each="info : ${systemGroupList}">
							<tr>
								<td>[[ ${info.groupId} ]]</td>
								<td>[[ ${info.groupName} ]]</td>
								<td>[[${info.userCount}]]명</td>
								<td>
									<button type="button" class="btn btn-sm btn-danger delete-btn"
										th:data-id="${info.groupId}" th:data-name="${info.groupName}"
										th:onclick="|location.href='@{/groupDelete(groupId=${info.groupId})}'|">
										삭제</button>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>

				<div class="pagination-wrap" id="paginationWrap"></div>
			</div>
		</div>

		<script>
      // 1. 기존 유지: 행 클릭 시 이동 및 삭제 버튼 클릭 로직
      document.querySelectorAll(".delete-btn").forEach((btn) => {
          const row = btn.closest("tr");
          const groupId = btn.dataset.id;

          if (row && groupId) {
              row.style.cursor = "pointer";
              row.addEventListener("click", function () {
                  location.href = `/groupUserList?groupId=${groupId}`;
              });
          }

          btn.addEventListener("click", function (e) {
              e.stopPropagation(); 
              e.preventDefault(); 

              const id = this.dataset.id;
              const name = this.dataset.name;
              if (confirm(`${name} 그룹을 정말 삭제하시겠습니까?`)) {
                  location.href = `/groupDelete?groupId=${id}`;
              }
          });
      });

      // 2. 프론트엔드 전용 페이징 & 검색 연동 통합 스크립트
      let currentPage = 1;
      const rowPerPage = 10; // 한 페이지에 노출할 행 개수

      function renderTableAndPagination() {
          const searchInput = document.getElementById('groupSearchInput');
          const keyword = searchInput ? searchInput.value.trim().toLowerCase() : '';
          const allRows = Array.from(document.querySelectorAll('.data-table tbody tr'));
          
          // A. 검색 키워드가 포함된 행들만 골라내기 (필터링)
          const filteredRows = allRows.filter(row => {
              const groupNameTd = row.querySelector('td:nth-child(2)');
              if (groupNameTd) {
                  return groupNameTd.textContent.toLowerCase().includes(keyword);
              }
              return false;
          });

          // B. 페이징 계산
          const totalRows = filteredRows.length;
          const totalPages = Math.ceil(totalRows / rowPerPage) || 1;

          // 페이지 번호가 최대 범위를 벗어나지 않게 조절
          if (currentPage > totalPages) currentPage = totalPages;
          if (currentPage < 1) currentPage = 1;

          // C. 현재 페이지에 해당하는 10개만 화면에 노출하고 나머지는 숨기기
          allRows.forEach(row => row.style.display = 'none');

          const startIdx = (currentPage - 1) * rowPerPage;
          const endIdx = startIdx + rowPerPage;

          filteredRows.forEach((row, idx) => {
              if (idx >= startIdx && idx < endIdx) {
                  row.style.display = '';
              }
          });

          // D. 하단 페이징 버튼 HTML 동적 생성
          const paginationWrap = document.getElementById('paginationWrap');
          if (!paginationWrap) return;

          let paginationHtml = '';
          
          // 이전 버튼
          paginationHtml += `<a href="#" class="page-btn ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}">&lt; 이전</a>`;

          // 숫자 버튼들
          for (let i = 1; i <= totalPages; i++) {
              paginationHtml += `<a href="#" class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`;
          }

          // 다음 버튼
          paginationHtml += `<a href="#" class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}">다음 &gt;</a>`;

          paginationWrap.innerHTML = paginationHtml;

          // E. 동적으로 생성된 페이징 버튼에 클릭 이벤트 달기
          paginationWrap.querySelectorAll('.page-btn:not(.disabled):not(.active)').forEach(btn => {
              btn.addEventListener('click', function(e) {
                  e.preventDefault();
                  currentPage = parseInt(this.dataset.page);
                  renderTableAndPagination();
              });
          });
      }

      // 처음 페이지가 로드되었을 때 초기 페이징 구동
      document.addEventListener('DOMContentLoaded', () => {
          renderTableAndPagination();

          const searchInput = document.getElementById('groupSearchInput');
          if (searchInput) {
              searchInput.addEventListener('input', function() {
                  currentPage = 1;
                  renderTableAndPagination();
              });
          }
      });
  </script>

<Style>


.container {
	width: 100%;
	min-height: 100vh;
	background: #fff;
	border-radius: 0;
	box-shadow: none;
	overflow: hidden;
	display: flex;
	flex-direction: column;
}

.content {
	padding: 30px;
	flex: 1;
}

.main-title {
	font-size: 24px;
	font-weight: 700;
	color: #000000;
	margin-bottom: 24px;
}

.add-btn {
	padding: 10px 18px;
	border: none;
	border-radius: 5px;
	background: #6D5EF7;
	color: #fff;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	transition: 0.2s;
}

.add-btn:hover {
	background: #5747E6;
}

.search-container {
	position: relative;
	width: 300px;
	margin-bottom: 20px;
}

.search-btn {
	position: absolute;
	left: 12px;
	top: 50%;
	transform: translateY(-50%);
	border: none;
	background: none;
	cursor: pointer;
	color: #999;
}

.search-btn:hover {
	color: #6D5EF7;
}

.search-input {
	width: 100%;
	padding: 10px 12px 10px 38px;
	border: 1px solid #ddd;
	outline: none;
	transition: 0.2s;
	border-radius: 10px;
}

.search-input:focus {
	border-color: #6D5EF7;
	box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.1);
}

.data-table {
	width: 100%;
	border-collapse: collapse;
	border: 1px solid #e5e5e5;
}

.data-table th {
	background: #fafafa;
	color: #666;
	font-size: 14px;
	font-weight: 600;
	padding: 14px;
	border-bottom: 1px solid #e5e5e5;
	text-align: center;
}

.data-table td {
	padding: 16px 14px;
	border-bottom: 1px solid #eee;
	color: #333;
	text-align: center;
}

.data-table tbody tr:hover {
	background: #fafafa;
}

.data-table tbody tr:last-child td {
	border-bottom: none;
}

.data-table th:nth-child(1), .data-table td:nth-child(1) {
	width: 15%;
}

.data-table th:nth-child(2), .data-table td:nth-child(2) {
	width: 40%;
}

.data-table th:nth-child(3), .data-table td:nth-child(3) {
	width: 25%;
}

.data-table th:nth-child(4), .data-table td:nth-child(4) {
	width: 20%;
}

.pagination-wrap {
	display: flex !important;
	flex-direction: row !important;
	justify-content: center;
	align-items: center;
	gap: 8px;
	margin-top: 30px;
	margin-bottom: 10px;
	width: 100%;
}

.page-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-width: 34px;
	height: 34px;
	padding: 0 8px;
	text-decoration: none;
	font-size: 13px;
	font-weight: 500;
	color: #5d6b87;
	border: none;
	background: transparent;
	transition: all 0.2s ease;
}

.page-btn.active {
	border-radius: 8px;
	background: #6D5EF7;
	color: #fff;
	font-weight: 700;
}

.page-btn.disabled {
	opacity: 0.4;
	pointer-events: none;
}

.page-btn:hover:not(.active):not(.disabled) {
	color: #6D5EF7;
}

@media ( max-width : 768px) {
	body {
		padding: 0;
	}
	.search-container {
		width: 100%;
	}
	.data-table {
		font-size: 14px;
	}
	.add-btn {
		width: 100%;
	}
}

.delete-btn {
	background-color: #ff0000 !important;
	border-color: #ef3826 !important;
	border-radius: 16px !important;
	color: #ffffff !important;
	padding: 6px 18px !important;
	font-weight: 500;
}

.delete-btn:hover {
	background-color: #d32f1f !important;
	border-color: #d32f1f !important;
}

</Style>
	</section>
</body>
</html>
