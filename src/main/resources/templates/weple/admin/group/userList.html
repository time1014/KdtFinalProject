<!doctype html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" th:href="@{/css/groupList.css}" />
<title>그룹 사용자 관리</title>
</head>
<body>
	<section>
		<div class="container">
			<div class="header-bar"></div>
			<div class="content">

				<div class="title-area">
					<span class="parent-title">그룹</span> <span class="separator">&gt;&gt;</span>
    				<span class="child-title">[[ ${selectedGroupName} ]]</span>
				</div>
										
				<div class="action-bar">
					<button type="button" class="add-user-btn"
						th:onclick="|location.href='@{/groupUserInsert(groupId=${groupId})}'|">
						+ 사용자 추가
					</button>
				</div>

				<table class="data-table">
					<thead>
						<tr>
							<th>NO</th>
							<th>아이디</th>
							<th>이름</th>
							<th>이메일</th>
							<th>역할</th>
							<th>STATUS</th>
						</tr>
					</thead>
					<tbody>
						<th:block th:each="info, sts : ${systemGroupUserList}">
							<tr>
								<td>[[ ${sts.count} ]]</td>
								<td>[[ ${info.loginId} ]]</td>
								<td>[[ ${info.userName} ]]</td>
								<td>[[ ${info.email} ]]</td>
								<td>[[ ${info.roleName} ]]</td>
								<td>
									<button type="button" class="delete-btn"
											th:data-id="${info.loginId}"
											th:data-name="${info.userName}"
											th:data-group="${groupId}">
											삭제
									</button>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>

				<div class="pagination-wrap" id="paginationWrap"></div>
			</div>
		</div>

		<script>
        // 1. 기존 삭제 로직 유지
        document.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            const id = this.dataset.id;
            const name = this.dataset.name;
            const groupId = this.dataset.group;

            if (id && name && confirm(`${name} 사용자를 현재 그룹에서 제외하시겠습니까?`)) {
                location.href = `/groupUserDelete?userCode=${id}&groupId=${groupId}`;
              }
          });
        });

        // 2. 프론트엔드 10개씩 페이징 처리 로직
        let currentPage = 1;
        const rowPerPage = 10;

        function renderTableAndPagination() {
            const allRows = Array.from(document.querySelectorAll('.data-table tbody tr'));
            const totalRows = allRows.length;
            const totalPages = Math.ceil(totalRows / rowPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            // 전체 행을 먼저 숨긴 후 현재 페이지 해당 행만 노출
            allRows.forEach(row => row.style.display = 'none');

            const startIdx = (currentPage - 1) * rowPerPage;
            const endIdx = startIdx + rowPerPage;

            allRows.forEach((row, idx) => {
                if (idx >= startIdx && idx < endIdx) {
                    row.style.display = '';
                }
            });

            // 페이징 버튼 동적 렌더링
            const paginationWrap = document.getElementById('paginationWrap');
            if (!paginationWrap) return;

            let paginationHtml = '';
            
            // 이전 버튼
            paginationHtml += `<a href="#" class="page-btn text-btn ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}">이전</a>`;

            // 숫자 번호 버튼
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<a href="#" class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`;
            }

            // 다음 버튼
            paginationHtml += `<a href="#" class="page-btn text-btn ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}">다음</a>`;

            paginationWrap.innerHTML = paginationHtml;

            // 버튼 클릭 이벤트 바인딩
            paginationWrap.querySelectorAll('.page-btn:not(.disabled):not(.active)').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    currentPage = parseInt(this.dataset.page);
                    renderTableAndPagination();
                });
            });
        }

        // 페이지 로드 시 페이징 기능 실행
        document.addEventListener('DOMContentLoaded', () => {
            renderTableAndPagination();
        });
      </script>

		<style>


.container {
	width: 100%;
	min-height: 100vh;
	background: #fff;
	border-radius: 0;
	box-shadow: none;
	overflow: hidden;
	display: flex;
	flex-direction: column;
}

.content {
	padding: 40px;
	flex: 1;
}

/* [1번] 타이틀 스타일 */
.title-area {
	display: flex;
	align-items: center;
	gap: 12px;
	margin-bottom: 20px;
}

.parent-title {
	font-size: 20px;
	font-weight: 700;
	color: #000000;
}

.separator {
	font-size: 16px;
	color: #333;
	font-weight: 600;
}

.child-title {
	font-size: 20px;
	font-weight: 700;
	color: #000;
}

/* [3번] 우측 상단 사용자 추가 버튼 영역 */
.action-bar {
	display: flex;
	justify-content: flex-end;
	margin-bottom: 35px;
}

.add-user-btn {
	padding: 8px 14px;
	border: none;
	border-radius: 5px;
	background: #6D5EF7;
	color: #fff;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	display: flex;
	align-items: center;
	gap: 6px;
	transition: 0.2s;
}

.add-user-btn:hover {
	background: #5747E6;
}

/* [2번] 테이블 구조 리디자인 */
.data-table {
	width: 100%;
	border-collapse: collapse;
	border: 1px solid #ebdada;
	border-radius: 12px;
	border-style: hidden;
	box-shadow: 0 0 0 1px #e5e7eb;
	overflow: hidden;
}

.data-table th {
	background: #ffffff;
	color: #333333;
	font-size: 14px;
	font-weight: 700;
	padding: 18px;
	border-bottom: 1px solid #e5e7eb;
	text-align: center;
}

.data-table td {
	padding: 18px;
	border-bottom: 1px solid #e5e7eb;
	color: #4b5563;
	font-size: 14px;
	text-align: center;
}

.data-table tbody tr:hover {
	background: #fafafa;
}

/* 테이블 가로 너비(%) 균형 분배 구조 */
.data-table th:nth-child(1), .data-table td:nth-child(1) {
	width: 8%;
}

.data-table th:nth-child(2), .data-table td:nth-child(2) {
	width: 18%;
}

.data-table th:nth-child(3), .data-table td:nth-child(3) {
	width: 18%;
}

.data-table th:nth-child(4), .data-table td:nth-child(4) {
	width: 26%;
}

.data-table th:nth-child(5), .data-table td:nth-child(5) {
	width: 15%;
}

.data-table th:nth-child(6), .data-table td:nth-child(6) {
	width: 15%;
}

/* [2번] 이미지 매칭 파스텔톤 삭제 버튼 스타일 */
.delete-btn {
	background-color: #fde2e2 !important;
	border: none !important;
	border-radius: 6px !important;
	color: #f87171 !important;
	padding: 6px 30px !important;
	font-size: 13px;
	font-weight: 600;
	cursor: pointer;
	transition: background-color 0.2s;
}

.delete-btn:hover {
	background-color: #fee2e2 !important;
	color: #ef4444 !important;
}

/* [4번] 이미지 매칭 페이지네이션 CSS */
.pagination-wrap {
	display: flex !important;
	justify-content: center;
	align-items: center;
	gap: 16px;
	margin-top: 50px;
	width: 100%;
}

.page-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-width: 32px;
	height: 32px;
	text-decoration: none;
	font-size: 14px;
	font-weight: 500;
	color: #4b5563;
	border: none;
	background: transparent;
	transition: all 0.2s ease;
}

.page-btn.text-btn {
	color: #6D5EF7;
	font-weight: 500;
	padding: 0 4px;
}

/* 비활성화(disabled) 비클릭 스타일 추가 */
.page-btn.disabled {
	opacity: 0.3;
	pointer-events: none;
}

.page-btn.active {
	border-radius: 8px;
	background: #6D5EF7;
	color: #fff;
	font-weight: 600;
}

.page-btn:hover:not(.active) {
	color: #5747E6;
}

/* 반응형 */
@media ( max-width : 768px) {
	.content {
		padding: 20px;
	}
	.action-bar {
		justify-content: center;
    	width: 100%;
	}
	.add-user-btn {
		width: 100%;
		justify-content: center;
	}
	.data-table {
		font-size: 12px;
	}
	.delete-btn {
		padding: 6px 15px !important;
	}
}
</style>
	</section>
</body>
</html>
