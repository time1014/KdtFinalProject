<!doctype html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<link rel="stylesheet" th:href="@{/css/groupList.css}" />
<title>그룹 사용자 관리</title>
</head>
<body>
	<section>
		<div class="container">
			<div class="header-bar"></div>
			<div class="content">

				<div class="title-area">
					<span class="parent-title">그룹</span> <span class="separator">|</span>
    				<span class="child-title">[[ ${selectedGroupName} ]]</span>
				</div>

				<div class="list-card">
					<div class="action-bar">
						<button type="button" class="add-user-btn"
							th:onclick="|location.href='@{/groupUserInsert(groupId=${groupId})}'|">
							+ 사용자 추가
						</button>
					</div>

					<table class="data-table">
						<thead>
							<tr>
								<th>NO</th>
								<th>아이디</th>
								<th>이름</th>
								<th>이메일</th>
								<th>역할</th>
								<th>STATUS</th>
							</tr>
						</thead>
						<tbody>
							<th:block th:each="info, sts : ${systemGroupUserList}">
								<tr>
									<td>[[ ${sts.count} ]]</td>
									<td>[[ ${info.loginId} ]]</td>
									<td>[[ ${info.userName} ]]</td>
									<td>[[ ${info.email} ]]</td>
									<td>[[ ${info.roleName} ]]</td>
									<td>
										<button type="button" class="delete-btn"
												th:data-id="${info.loginId}"
												th:data-name="${info.userName}"
												th:data-group="${groupId}">
												삭제
									</button>
								</td>
							</tr>
						</th:block>
					</tbody>
				</table>

				<div class="bottom-area">
					<div class="pagination-wrap" id="paginationWrap"></div>
					<button type="button" class="back-to-group-btn"
						th:onclick="|location.href='@{/groupList}'|">
						목록으로
					</button>
				</div>
				</div>
			</div>
		</div>

		<script>
        // 제외 확인 모달 (파일관리 삭제 모달과 동일한 스타일)
        function showConfirmModal(title, msg, onConfirm, onCancel) {
            const old = document.getElementById('_confirmModalWrap');
            if (old) old.remove();
            const overlay = document.createElement('div');
            overlay.id = '_confirmModalWrap';
            overlay.className = 'wiki-confirm-overlay';
            overlay.innerHTML =
                '<div class="wiki-confirm-box">' +
                    '<p class="wiki-confirm-title"></p>' +
                    '<p class="wiki-confirm-msg"></p>' +
                    '<div class="wiki-confirm-actions">' +
                        '<button class="wiki-confirm-btn wiki-confirm-cancel" id="_confirmModalCancelBtn">취소</button>' +
                        '<button class="wiki-confirm-btn wiki-confirm-ok" id="_confirmModalOkBtn">삭제</button>' +
                    '</div>' +
                '</div>';
            overlay.querySelector('.wiki-confirm-title').textContent = title;
            overlay.querySelector('.wiki-confirm-msg').textContent = msg;
            document.body.appendChild(overlay);

            document.getElementById('_confirmModalOkBtn').onclick = () => { overlay.remove(); if (onConfirm) onConfirm(); };
            document.getElementById('_confirmModalCancelBtn').onclick = () => { overlay.remove(); if (onCancel) onCancel(); };
            overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); } });
        }

        // 1. 기존 삭제 로직 유지
        document.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            const id = this.dataset.id;
            const name = this.dataset.name;
            const groupId = this.dataset.group;

            if (id && name) {
                showConfirmModal('그룹에서 제외', `${name} 사용자를 현재 그룹에서 제외하시겠습니까?`, () => {
                    location.href = `/groupUserDelete?userCode=${id}&groupId=${groupId}`;
                });
              }
          });
        });

        // 2. 프론트엔드 10개씩 페이징 처리 로직
        let currentPage = 1;
        const rowPerPage = 10;

        function renderTableAndPagination() {
            const allRows = Array.from(document.querySelectorAll('.data-table tbody tr'));
            const totalRows = allRows.length;
            const totalPages = Math.ceil(totalRows / rowPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            // 전체 행을 먼저 숨긴 후 현재 페이지 해당 행만 노출
            allRows.forEach(row => row.style.display = 'none');

            const startIdx = (currentPage - 1) * rowPerPage;
            const endIdx = startIdx + rowPerPage;

            allRows.forEach((row, idx) => {
                if (idx >= startIdx && idx < endIdx) {
                    row.style.display = '';
                }
            });

            // 페이징 버튼 동적 렌더링
            const paginationWrap = document.getElementById('paginationWrap');
            if (!paginationWrap) return;

            let paginationHtml = '';
            
            // 이전 버튼
            paginationHtml += `<a href="#" class="page-btn text-btn ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}">이전</a>`;

            // 숫자 번호 버튼
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<a href="#" class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</a>`;
            }

            // 다음 버튼
            paginationHtml += `<a href="#" class="page-btn text-btn ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}">다음</a>`;

            paginationWrap.innerHTML = paginationHtml;

            // 버튼 클릭 이벤트 바인딩
            paginationWrap.querySelectorAll('.page-btn:not(.disabled):not(.active)').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    currentPage = parseInt(this.dataset.page);
                    renderTableAndPagination();
                });
            });
        }

        // 페이지 로드 시 페이징 기능 실행
        document.addEventListener('DOMContentLoaded', () => {
            renderTableAndPagination();
        });
      </script>

		<style>


.container {
	width: 100%;
	min-height: 100vh;
	background: #fff;
	border-radius: 0;
	box-shadow: none;
	overflow: hidden;
	display: flex;
	flex-direction: column;
}

.content {
	padding: 40px;
	flex: 1;
}

/* [1번] 타이틀 스타일 */
.title-area {
	display: flex;
	align-items: center;
	gap: 12px;
	margin-bottom: 20px;
}

.parent-title {
	font-size: 20px;
	font-weight: 700;
	color: #000000;
}

.title-area .separator {
	font-size: 20px !important;
	color: #6D5EF7 !important;
	font-weight: 700 !important;
	margin: 0 2px;
	padding: 0 !important;
	line-height: 1 !important;
	display: inline-block;
	vertical-align: middle;
}

.child-title {
	font-size: 20px;
	font-weight: 700;
	color: #000;
}

/* 프로젝트 목록 페이지와 통일된 카드 테두리 */
.list-card {
	border: 1px solid #e2e8f0;
	border-radius: 14px;
	background: #ffffff;
	padding: 28px 30px;
	box-shadow: 0 2px 6px rgba(0, 0, 0, .03);
}

/* [3번] 우측 상단 사용자 추가 버튼 영역 */
.action-bar {
	display: flex;
	justify-content: flex-end;
	margin-bottom: 35px;
}

.add-user-btn {
	padding: 8px 14px;
	border: none;
	border-radius: 5px;
	background: #6D5EF7;
	color: #fff;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	display: flex;
	align-items: center;
	gap: 6px;
	transition: 0.2s;
}

.add-user-btn:hover {
	background: #5747E6;
}

/* [2번] 테이블 구조 리디자인 */
.data-table {
	width: 100%;
	border-collapse: collapse;
	border-radius: 12px;
	overflow: hidden;
}

.data-table th {
	background: #ffffff;
	color: #333333;
	font-size: 14px;
	font-weight: 700;
	padding: 18px;
	border-bottom: 1px solid #e5e7eb;
	text-align: center;
}

.data-table td {
	padding: 18px;
	border-bottom: 1px solid #e5e7eb;
	color: #4b5563;
	font-size: 14px;
	text-align: center;
}

.data-table tbody tr:hover {
	background: #fafafa;
}

/* 테이블 가로 너비(%) 균형 분배 구조 */
.data-table th:nth-child(1), .data-table td:nth-child(1) {
	width: 8%;
}

.data-table th:nth-child(2), .data-table td:nth-child(2) {
	width: 18%;
}

.data-table th:nth-child(3), .data-table td:nth-child(3) {
	width: 18%;
}

.data-table th:nth-child(4), .data-table td:nth-child(4) {
	width: 26%;
}

.data-table th:nth-child(5), .data-table td:nth-child(5) {
	width: 15%;
}

.data-table th:nth-child(6), .data-table td:nth-child(6) {
	width: 15%;
}

/* [2번] 이미지 매칭 파스텔톤 삭제 버튼 스타일 */
.delete-btn {
	background-color: #fde2e2 !important;
	border: none !important;
	border-radius: 6px !important;
	color: #f87171 !important;
	padding: 6px 30px !important;
	font-size: 13px;
	font-weight: 600;
	cursor: pointer;
	transition: background-color 0.2s;
}

.delete-btn:hover {
	background-color: #fee2e2 !important;
	color: #ef4444 !important;
}

/* [4번] 이미지 매칭 페이지네이션 CSS */
.bottom-area {
	position: relative;
	display: flex;
	justify-content: center;
	align-items: center;
	margin-top: 50px;
	width: 100%;
	min-height: 32px;
}

.pagination-wrap {
	display: flex !important;
	justify-content: center;
	align-items: center;
	gap: 16px;
	width: 100%;
}

.page-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-width: 32px;
	height: 32px;
	text-decoration: none;
	font-size: 14px;
	font-weight: 500;
	color: #4b5563;
	border: none;
	background: transparent;
	transition: all 0.2s ease;
}

.page-btn.text-btn {
	color: #6D5EF7;
	font-weight: 500;
	padding: 0 4px;
}

/* 비활성화(disabled) 비클릭 스타일 추가 */
.page-btn.disabled {
	opacity: 0.3;
	pointer-events: none;
}

.page-btn.active {
	border-radius: 8px;
	background: #6D5EF7;
	color: #fff;
	font-weight: 600;
}

.page-btn:hover:not(.active) {
	color: #5747E6;
}

/* 그룹 목록으로 돌아가는 버튼 */
.back-to-group-btn {
	position: absolute;
	right: 0;
	top: 50%;
	transform: translateY(-50%);
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 6px;
	height: 32px;
	padding: 0 14px;
	border: none;
	border-radius: 5px;
	background: #6D5EF7;
	color: #fff;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	transition: .2s;
}

.back-to-group-btn:hover {
	background: #5747E6;
}

.back-to-group-btn:active {
	background: #5747E6;
}

/* 반응형 */
@media ( max-width : 768px) {
	.content {
		padding: 20px;
	}
	.action-bar {
		justify-content: center;
    	width: 100%;
	}
	.add-user-btn {
		width: 100%;
		justify-content: center;
	}
	.data-table {
		font-size: 12px;
	}
	.delete-btn {
		padding: 6px 15px !important;
	}
	.bottom-area {
		flex-direction: column;
		gap: 16px;
	}
	.back-to-group-btn {
		position: static;
		transform: none;
		width: 100%;
		justify-content: center;
	}
}

/* ===== 삭제 확인 모달 (위키 삭제 모달과 동일 스타일) ===== */
.wiki-confirm-overlay {
	position: fixed; inset: 0; background: rgba(0,0,0,.15);
	z-index: 99999; display: flex; align-items: center; justify-content: center;
	animation: wikiConfirmFadeIn .18s ease;
}
@keyframes wikiConfirmFadeIn { from { opacity:0; } to { opacity:1; } }
.wiki-confirm-box {
	background: #fff; border-radius: 18px; padding: 26px 28px 22px;
	min-width: 300px; max-width: 380px;
	box-shadow: 0 12px 40px rgba(109,94,247,.18); text-align: center;
	animation: wikiConfirmSlideUp .2s ease;
}
@keyframes wikiConfirmSlideUp { from { transform:translateY(12px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.wiki-confirm-title  { font-size: 15px; font-weight: 700; color: #374151; margin: 0 0 10px; }
.wiki-confirm-msg    { font-size: 13px; color: #726F8F; margin: 0 0 20px; line-height: 1.6; white-space: pre-line; }
.wiki-confirm-actions{ display: flex; gap: 8px; justify-content: center; }
.wiki-confirm-btn {
	display: inline-flex; align-items: center; justify-content: center;
	height: 36px; min-width: 88px; padding: 0 20px;
	border-radius: 10px; font-size: 13px; font-weight: 600;
	cursor: pointer; border: none; transition: opacity .2s;
}
.wiki-confirm-btn:hover { opacity: .82; }
.wiki-confirm-cancel { background: #F1EDFF; color: #6D5EF7; }
.wiki-confirm-ok     { background: #EF4444; color: #fff; }
</style>
	</section>
</body>
</html>
