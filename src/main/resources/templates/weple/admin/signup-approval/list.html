<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 가입승인</title>
    <link rel="stylesheet" th:href="@{/css/admin/join-request.css}">
</head>
<body>
    <section>
        <div class="approval-page">
            <h1 class="approval-title">가입승인</h1>

            <p class="approval-message approval-message-success" th:if="${approvalSuccess}" th:text="${approvalSuccess}">
                가입 요청이 승인되었습니다.
            </p>
            <p class="approval-message approval-message-error" th:if="${approvalError}" th:text="${approvalError}">
                처리 중 오류가 발생했습니다.
            </p>

            <div id="approvalList" class="approval-table-wrap">
                <table class="approval-table">
                    <thead>
                        <tr>
                            <th>NO</th>
                            <th>아이디</th>
                            <th>이메일</th>
                            <th>연락처</th>
                            <th>이름</th>
                            <th>회원가입 요청 일자</th>
                            <th>승인</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pendingUser, stat : ${pendingUsers}">
                            <td th:text="${totalCount - ((currentPage - 1) * pageSize + stat.index)}">1</td>
                            <td th:text="${pendingUser.loginId}">weple1234</td>
                            <td th:text="${pendingUser.email}">weple@example.com</td>
                            <td th:text="${pendingUser.phoneNumber}">010-1234-5678</td>
                            <td th:text="${pendingUser.userName}">홍길동</td>
                            <td th:text="${pendingUser.requestedAt}">2026/06/11</td>
                            <td>
                                <!-- 승인과 취소 요청은 CSRF 토큰을 포함한 POST 방식으로 처리합니다. -->
                                <div class="approval-actions">
                                    <form th:action="@{/approvalList/{userCode}/approve(userCode=${pendingUser.userCode})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="page" th:value="${currentPage}">
                                        <button class="approval-button approval-button-confirm" type="submit">승인</button>
                                    </form>
                                    <form th:action="@{/approvalList/{userCode}/cancel(userCode=${pendingUser.userCode})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="page" th:value="${currentPage}">
                                        <button class="approval-button approval-button-cancel" type="submit"
                                                onclick="return confirm('가입 요청을 취소하시겠습니까?');">취소</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pendingUsers)}">
                            <td class="approval-empty" colspan="7">승인 대기 중인 가입 요청이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 프로젝트 관리 목록과 같은 10개 단위 페이지 버튼을 사용합니다. -->
            <nav class="pagination-wrap" th:if="${totalPages > 1}" aria-label="가입승인 목록 페이지">
                <a th:href="@{/approvalList(page=${currentPage - 1})} + '#approvalList'"
                   th:classappend="${currentPage <= 1} ? 'disabled' : ''"
                   class="page-btn">&lt; 이전</a>
                <a th:each="i : ${#numbers.sequence(startPage, endPage)}"
                   th:href="@{/approvalList(page=${i})} + '#approvalList'"
                   th:text="${i}"
                   th:classappend="${i == currentPage} ? 'active' : ''"
                   class="page-btn"></a>
                <a th:href="@{/approvalList(page=${currentPage + 1})} + '#approvalList'"
                   th:classappend="${currentPage >= totalPages} ? 'disabled' : ''"
                   class="page-btn">다음 &gt;</a>
            </nav>
        </div>
    </section>
</body>
</html>
