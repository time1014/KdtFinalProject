<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="navbarSettingFragment" class="sub_menu_nav" th:if="${sidebarMenu == 'system'}">
    <ul>
        <li th:classappend="${currentMenu == 'systemproject'} ? 'active' : ''">
            <a th:href="@{/system/project/list}" 
               th:class="${menu == 'project' || menu == null} ? 'active' : ''">프로젝트</a>
        </li>
        <li>
            <a th:href="@{/userList}" 
               th:class="${menu == 'user'} ? 'active' : ''">사용자</a>
        </li>
       <li>
            <a th:href="@{/groupList}" 
               th:class="${menu == 'group'} ? 'active' : ''">그룹</a>
        </li>
        <li>
            <a th:href="@{/system/role}" 
               th:class="${menu == 'role'} ? 'active' : ''">역할 및 권한</a>
        </li>
        <li>
            <a th:href="@{/system/taskType}" 
               th:class="${menu == 'issueType'} ? 'active' : ''">일감 유형</a>
        </li>
        <li>
            <a th:href="@{/issueStatusList}" 
               th:class="${menu == 'issueStatus'} ? 'active' : ''">일감 상태</a>
        </li>
        <li>
            <a th:href="@{/codeValueList}" 
               th:class="${menu == 'codeValue'} ? 'active' : ''">코드값</a>
        </li>
        <li th:if="${canApproveSignup}" th:classappend="${menu == 'approval'} ? 'active' : ''">
            <a th:href="@{/approvalList}" 
               th:class="${menu == 'approval'} ? 'active' : ''">가입승인</a>
        </li>
        <li>
            <a th:href="@{/settingDetail}" 
               th:class="${menu == 'setting'} ? 'active' : ''">설정</a>
        </li>
        

    </ul>
</div>
<style>
        .sub_menu_nav ul {
            display: flex !important;
            list-style: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        
        .sub_menu_nav ul li {
            margin-right: 20px !important;
            display: inline-block !important;
        }

        .sub_menu_nav ul li a {
            display: block !important;
            padding: 10px 5px !important;
            color: #4b5563 !important; 
            text-decoration: none !important;
            font-weight: 500 !important;
            border-bottom: 2px solid transparent !important; 
            transition: all 0.15s ease-in-out !important;
        }

        .sub_menu_nav ul li a.active {
            color: #2563eb !important; 
            font-weight: 700 !important;
            border-bottom: 2px solid #2563eb !important;
        }
</style>
</body>
</html>
