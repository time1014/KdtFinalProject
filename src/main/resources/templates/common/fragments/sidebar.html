<div th:fragment="sidebarFragment" class="left_col scroll-view"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <div class="navbar nav_title" style="border: 0">
    <a th:href="@{/dashboard}" class="site_title">
      <i class="fa fa-group"></i> <span>WEPLE</span>
    </a>
  </div>
  <div class="clearfix"></div>

  <br />

    <div id="sidebar-menu" class="main_menu_side hidden-print main_menu">
        <div class="menu_section">
            <ul class="nav side-menu">
                <li th:classappend="${sidebarMenu == 'dashboard'} ? 'active' : ''"><a th:href="@{/dashboard}"></i> 대시보드</a></li>
                <li th:classappend="${sidebarMenu == 'task'} ? 'active' : ''"><a th:href="@{/task/all-list}"><i class="fa fa-tasks"></i> 일감</a></li>
                <li th:classappend="${sidebarMenu == 'project'} ? 'active' : ''"><a th:href="@{/project}"><i class="fa fa-folder-open"></i> 프로젝트</a></li>
                <li th:classappend="${sidebarMenu == 'work-history'} ? 'active' : ''"><a th:href="@{/worklog}"><i class="fa fa-history"></i> 작업내역</a></li>
                <li th:classappend="${sidebarMenu == 'time'} ? 'active' : ''"><a th:href="@{/totalTimeList}"><i class="fa fa-clock-o"></i> 소요시간</a></li>
                <li th:classappend="${sidebarMenu == 'system'} ? 'active' : ''"
                    sec:authorize="hasAnyAuthority('ROLE_COMPANY_OWNER','ROLE_COMPANY_ADMIN')">
                    <a th:href="@{/system/project/list}"><i class="fa fa-gears"></i> 관리</a>
                </li>
            </ul>
        </div>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const currentPath = window.location.pathname;
      const sidebarItems = document.querySelectorAll("#sidebar-ul > li");

      sidebarItems.forEach((li) => {
        const link = li.querySelector("a");
        if (!link) return;

        const linkPath = link.getAttribute("href");

        if (currentPath.includes(linkPath) && linkPath !== "/") {
          li.classList.add("active");
        } else {
          li.classList.remove("active");
        }
      });
    });
  </script>
</div>
